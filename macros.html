<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#080808" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Luca" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<title>Luca · Foods</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>
<link rel="stylesheet" href="theme.css" />
<style>
/* ── Food / Calories tab ── */
.macroGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3); }
@media (max-width:560px) { .macroGrid { grid-template-columns:repeat(2,1fr); } }
.macroBox { display:flex; flex-direction:column; gap:4px; padding:var(--space-4); border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.macroBox[data-accent="cal"] { border-color:var(--brand-line); background:var(--brand-soft); }
.macroVal { font-family:var(--font-display); font-weight:600; font-size:var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.macroLabel { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.calHead { display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; margin-bottom:var(--space-4); }
.calMath { display:flex; align-items:center; gap:var(--space-5); flex-wrap:wrap; }
.calCell { display:flex; flex-direction:column; gap:2px; }
.calCell .n { font-family:var(--font-display); font-weight:600; font-size:var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.calCell .l { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.calOp { font-family:var(--font-display); font-size:var(--text-xl); color:var(--muted); }
.calCell.remain .n { color:var(--brand); }
.calCell.remain.over .n { color:var(--neg); }
.goalEdit { display:flex; align-items:center; gap:8px; }
.goalEdit .fieldInput { width:92px; }
.calBar { height:10px; border-radius:var(--radius-pill); background:var(--track); overflow:hidden; }
.calBarFill { height:100%; border-radius:var(--radius-pill); background:var(--brand); transition:width var(--duration) var(--ease-premium); }
.calBarFill.over { background:var(--neg); }
.foodSearch { margin:var(--space-5) 0 var(--space-3); }
.foodResults { display:flex; flex-direction:column; gap:6px; margin-top:var(--space-3); }
.foodRow { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.foodRowMeta { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.foodName { font-weight:600; font-size:var(--text-sm); }
.gramInput { width:74px; }
.emptyNote { color:var(--muted); font-size:13px; padding:var(--space-4) 0; }
.logList { display:flex; flex-direction:column; gap:6px; margin-top:var(--space-3); }
.logRow { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.logNums { font-family:var(--font-mono); font-size:11px; color:var(--muted-strong); }
.xBtn { background:transparent; border:1px solid var(--border); color:var(--muted); width:28px; height:28px; border-radius:50%; cursor:pointer; flex-shrink:0; transition:color var(--duration),border-color var(--duration); }
.xBtn:hover { color:var(--neg); border-color:var(--neg-line); }
.secTitle { font-family:var(--font-display); font-weight:600; font-size:var(--text-lg); margin:var(--space-8) 0 0; }

/* ── Caffeine tab ── */
.cafSecTitle {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--muted);
  display:flex; align-items:center; gap:12px; margin:var(--space-6) 0 var(--space-3);
}
.cafSecTitle::after { content:''; flex:1; height:1px; background:var(--border); }
.cafCard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-5); margin-bottom:var(--space-4); box-shadow:var(--card-shadow); }
/* Ring */
.cafRing { position:relative; width:88px; height:88px; flex-shrink:0; }
.cafRing svg { width:100%; height:100%; transform:rotate(-90deg); }
.cafRingTrack { fill:none; stroke:var(--track); stroke-width:7; }
.cafRingFill { fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1),stroke 0.4s; }
.cafRingNum { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:26px; font-weight:600; color:var(--fg); letter-spacing:-0.03em; font-variant-numeric:tabular-nums; }
/* Energy head */
.cafEnergyHead { display:flex; align-items:center; gap:var(--space-4); flex-wrap:wrap; margin-bottom:var(--space-3); }
.cafEnergyLabel { display:flex; flex-direction:column; gap:3px; flex:1; min-width:130px; }
.cafEnergyState { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:600; letter-spacing:-0.02em; color:var(--fg); }
.cafEnergyWhen { font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
.cafEnergyHint { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); margin-top:2px; }
.cafEnergyHint .hintDot { width:6px; height:6px; border-radius:50%; background:var(--brand); flex-shrink:0; }
/* Mode toggle */
.cafModeSeg { display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-pill); overflow:hidden; flex-shrink:0; }
.cafModeBtn { appearance:none; border:0; background:transparent; color:var(--muted); font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.08em; padding:7px 10px; cursor:pointer; transition:background 0.15s,color 0.15s; }
.cafModeBtn.on { background:var(--brand-soft); color:var(--brand); }
/* Chart */
.cafCurveWrap { position:relative; width:100%; margin-top:var(--space-3); touch-action:pan-y; cursor:crosshair; }
.cafCurveWrap svg { width:100%; height:200px; display:block; overflow:visible; }
.cafAxis { display:flex; justify-content:space-between; margin-top:5px; font-family:var(--font-mono); font-size:9px; color:var(--muted); }
/* Plan band */
.cafPlanBand { margin-top:var(--space-4); padding:var(--space-3) var(--space-4); border:1px dashed var(--border-strong); border-radius:var(--radius-md); display:flex; flex-wrap:wrap; gap:12px 20px; }
.cafPlanItem .pk { font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.cafPlanItem .pv { font-family:var(--font-display); font-size:var(--text-base); font-weight:600; color:var(--fg); font-variant-numeric:tabular-nums; margin-top:2px; }
.cafPlanItem .pv.g { color:var(--pos); } .cafPlanItem .pv.a { color:var(--warn); }
/* Mini tiles */
.cafTileGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3); }
@media (max-width:520px) { .cafTileGrid { grid-template-columns:1fr; } }
.cafMini { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-4); }
.cafMini .mk { font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.cafMini .mv { font-family:var(--font-display); font-size:var(--text-xl); font-weight:600; color:var(--fg); margin-top:5px; font-variant-numeric:tabular-nums; }
.cafMini .ms { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.4; }
.cafMini.cafPeak .mv { color:var(--pos); } .cafMini.cafCrash .mv { color:var(--warn); } .cafMini.cafCutoff .mv { color:#7DD3FC; }
/* Tips */
.cafTips { list-style:none; margin:var(--space-3) 0 0; padding:0; }
.cafTip { display:flex; gap:10px; align-items:flex-start; padding:9px 0; font-size:13px; color:var(--muted-strong); line-height:1.5; border-top:1px solid var(--border); }
.cafTip:first-child { border-top:0; }
/* Daily bar */
.cafDailyTop { display:flex; align-items:baseline; gap:8px; }
.cafDailyNum { font-family:var(--font-display); font-size:var(--text-3xl); font-weight:600; letter-spacing:-0.04em; color:var(--fg); line-height:1; font-variant-numeric:tabular-nums; }
.cafDailyOf { font-family:var(--font-mono); font-size:var(--text-lg); color:var(--muted); }
.cafDailyUnit { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.cafDailyActive { margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--warn); }
.cafDailyBarTrack { height:10px; border-radius:var(--radius-pill); background:var(--track); overflow:hidden; margin:var(--space-4) 0 var(--space-3); }
.cafDailyBarFill { height:100%; border-radius:var(--radius-pill); transition:width 0.5s cubic-bezier(0.22,1,0.36,1),background 0.4s; }
.cafMsg { font-size:13px; line-height:1.5; }
.cafMsg.good { color:var(--pos); } .cafMsg.warn { color:var(--warn); } .cafMsg.bad { color:var(--neg); }
.cafNote { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-top:var(--space-2); line-height:1.5; }
/* Search results */
.cafResults { list-style:none; margin:var(--space-3) 0 0; padding:0; max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.cafResult { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:border-color var(--duration),background var(--duration); }
.cafResult:hover { border-color:var(--brand-line); background:var(--brand-soft); }
.cafResultEmoji { font-size:18px; flex-shrink:0; }
.cafResultName { flex:1; font-size:13px; font-weight:600; color:var(--fg); }
.cafResultCat { font-size:11px; color:var(--muted); font-weight:400; }
.cafResultMg { font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--warn); font-variant-numeric:tabular-nums; }
.cafResultMg small { color:var(--muted); font-weight:600; }
.cafCustomRow { display:flex; gap:var(--space-2); align-items:center; flex-wrap:wrap; margin-top:var(--space-4); padding-top:var(--space-4); border-top:1px solid var(--border); }
.cafCustomRow .fieldInput { flex:1; min-width:0; }
.cafMgInput { width:84px; flex:none; }
/* Log list */
.cafLogList { list-style:none; margin:var(--space-3) 0 0; padding:0; display:flex; flex-direction:column; gap:6px; }
.cafLogRow { display:flex; align-items:center; gap:10px; padding:11px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); }
.cafLogEmoji { font-size:18px; flex-shrink:0; }
.cafLogMain { flex:1; min-width:0; }
.cafLogName { font-size:13px; font-weight:600; color:var(--fg); }
.cafLogName b { font-family:var(--font-mono); color:var(--warn); font-weight:700; margin-left:6px; }
.cafLogMeta { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:3px; line-height:1.5; }
.cafLogTime { font-family:var(--font-mono); font-size:11px; color:var(--muted-strong); flex-shrink:0; font-variant-numeric:tabular-nums; }
.cafLogDel { appearance:none; background:transparent; border:0; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; opacity:0.5; transition:opacity 0.2s,color 0.2s; }
.cafLogDel:hover { opacity:1; color:var(--neg); }
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell">
    <!-- Food Tab -->
    <div id="tabFood"></div>
    <!-- Calories Tab -->
    <div id="tabCalories" style="display:none"></div>
    <!-- Caffeine Tab -->
    <div id="tabCaffeine" style="display:none">
      <p class="cafSecTitle">Your Day</p>
      <div class="cafCard">
        <div class="cafEnergyHead">
          <div class="cafRing">
            <svg viewBox="0 0 88 88">
              <circle class="cafRingTrack" cx="44" cy="44" r="38"></circle>
              <circle class="cafRingFill" id="cafRingFill" cx="44" cy="44" r="38"></circle>
            </svg>
            <div class="cafRingNum" id="cafRingNum">—</div>
          </div>
          <div class="cafEnergyLabel">
            <span class="cafEnergyState" id="cafEnergyState">Energy</span>
            <span class="cafEnergyWhen" id="cafEnergyWhen">Right now</span>
            <span class="cafEnergyHint"><span class="hintDot"></span>Drag the curve to scrub time</span>
          </div>
          <div class="cafModeSeg" id="cafModeToggle">
            <button data-m="line" class="cafModeBtn on">LINE</button>
            <button data-m="bars" class="cafModeBtn">BARS</button>
            <button data-m="stack" class="cafModeBtn">STACK</button>
          </div>
        </div>
        <div class="cafCurveWrap" id="cafCurveWrap">
          <svg id="cafEnergyChart" viewBox="0 0 600 200" preserveAspectRatio="none"></svg>
        </div>
        <div class="cafAxis">
          <span>12A</span><span>3A</span><span>6A</span><span>9A</span><span>12P</span><span>3P</span><span>6P</span><span>9P</span><span>12A</span>
        </div>
        <div class="cafPlanBand" id="cafPlanBand">
          <div class="cafPlanItem"><span class="pk">Peak focus</span><div class="pv g" id="cafPeakVal">—</div></div>
          <div class="cafPlanItem"><span class="pk">Predicted crash</span><div class="pv a" id="cafCrashVal">—</div></div>
          <div class="cafPlanItem"><span class="pk">Last coffee by</span><div class="pv" id="cafCutoffVal" style="color:#7DD3FC">—</div></div>
        </div>
      </div>

      <p class="cafSecTitle">Smart Timing</p>
      <div class="cafCard">
        <div class="cafTileGrid">
          <div class="cafMini cafPeak"><div class="mk">Most productive</div><div class="mv" id="cafMPeak">—</div><div class="ms" id="cafMPeakSub"></div></div>
          <div class="cafMini cafCrash"><div class="mk">You'll crash</div><div class="mv" id="cafMCrash">—</div><div class="ms" id="cafMCrashSub"></div></div>
          <div class="cafMini cafCutoff"><div class="mk">Coffee cutoff</div><div class="mv" id="cafMCutoff">—</div><div class="ms" id="cafMCutoffSub"></div></div>
        </div>
        <ul class="cafTips" id="cafTips"></ul>
      </div>

      <p class="cafSecTitle">Today</p>
      <div class="cafCard">
        <div class="cafDailyTop">
          <span class="cafDailyNum" id="cafDailyNum">0</span>
          <span class="cafDailyOf">/ <span id="cafDailyLimit">400</span></span>
          <span class="cafDailyUnit">mg</span>
          <span class="cafDailyActive" id="cafDailyActive"></span>
        </div>
        <div class="cafDailyBarTrack"><div class="cafDailyBarFill" id="cafDailyFill" style="width:0%"></div></div>
        <div class="cafMsg good" id="cafDailyMsg">You haven't logged anything today.</div>
        <div class="cafNote" id="cafDailyNote"></div>
      </div>

      <p class="cafSecTitle">Log a Drink</p>
      <div class="cafCard">
        <input class="fieldInput" id="cafSearch" type="text" placeholder="Search a drink… (coffee, monster, matcha…)" autocomplete="off" />
        <ul class="cafResults" id="cafResults"></ul>
        <div class="cafCustomRow">
          <input class="fieldInput" id="cafCustomName" type="text" placeholder="Custom drink name" autocomplete="off" />
          <input class="fieldInput cafMgInput" id="cafCustomMg" type="number" min="0" placeholder="mg" autocomplete="off" />
          <button class="btn btn-primary" id="cafCustomAdd" type="button">Add</button>
        </div>
      </div>

      <p class="cafSecTitle">Logged Today</p>
      <div class="cafCard">
        <ul class="cafLogList" id="cafLogList"></ul>
      </div>
    </div>
  </div>
</main>

<!-- Food + Calories JS -->
<script>
(function(){
  'use strict';
  const STORE_KEY = 'macros_standalone_v1';
  const FOODS = [
    { name:'Chicken breast',  cal:165, p:31,  c:0,   f:3.6 },
    { name:'Beef mince (5%)', cal:137, p:21,  c:0,   f:5   },
    { name:'Salmon',          cal:208, p:20,  c:0,   f:13  },
    { name:'Egg',             cal:143, p:13,  c:1.1, f:9.5 },
    { name:'Greek yogurt',    cal:59,  p:10,  c:3.6, f:0.4 },
    { name:'Whey protein',    cal:400, p:80,  c:8,   f:6   },
    { name:'White rice',      cal:130, p:2.7, c:28,  f:0.3 },
    { name:'Oats',            cal:389, p:17,  c:66,  f:7   },
    { name:'Pasta (cooked)',  cal:157, p:6,   c:31,  f:0.9 },
    { name:'Potato',          cal:77,  p:2,   c:17,  f:0.1 },
    { name:'Sweet potato',    cal:86,  p:1.6, c:20,  f:0.1 },
    { name:'Banana',          cal:89,  p:1.1, c:23,  f:0.3 },
    { name:'Apple',           cal:52,  p:0.3, c:14,  f:0.2 },
    { name:'Broccoli',        cal:34,  p:2.8, c:7,   f:0.4 },
    { name:'Almonds',         cal:579, p:21,  c:22,  f:50  },
    { name:'Peanut butter',   cal:588, p:25,  c:20,  f:50  },
    { name:'Olive oil',       cal:884, p:0,   c:0,   f:100 },
    { name:'Avocado',         cal:160, p:2,   c:9,   f:15  },
    { name:'Cheddar cheese',  cal:402, p:25,  c:1.3, f:33  },
    { name:'Milk (whole)',    cal:61,  p:3.2, c:4.8, f:3.3 },
    { name:'Bread (slice)',   cal:265, p:9,   c:49,  f:3.2 },
    { name:'Tuna (canned)',   cal:116, p:26,  c:0,   f:1   },
  ];

  function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function loadAll(){ try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{}; }catch(e){ return {}; } }
  function saveAll(o){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(o)); }catch(e){} }
  let store=loadAll();
  function todaysLog(){ return store[todayKey()]||[]; }
  function setTodaysLog(list){ store[todayKey()]=list; saveAll(store); }
  function goalCal(){ return store.goalCal!=null?store.goalCal:2000; }
  function setGoalCal(n){ store.goalCal=n; saveAll(store); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function round(n){ return Math.round(n); }

  let query='';
  let matches=[];
  let currentTab='food';

  function totals(){
    return todaysLog().reduce((t,e)=>{ t.cal+=e.cal; t.p+=e.p; t.c+=e.c; t.f+=e.f; return t; },{cal:0,p:0,c:0,f:0});
  }

  function summaryHtml(){
    const t=totals(), goal=goalCal(), remaining=goal-t.cal, over=remaining<0;
    const pct=Math.min(100,goal>0?(t.cal/goal)*100:0);
    const cell=(cls,n,l)=>'<div class="calCell '+cls+'"><span class="n">'+round(n)+'</span><span class="l">'+l+'</span></div>';
    const head='<div class="calHead"><div class="calMath">'
      +cell('',goal,'goal')+'<span class="calOp">−</span>'
      +cell('',t.cal,'food')+'<span class="calOp">=</span>'
      +cell('remain'+(over?' over':''),Math.abs(remaining),over?'over':'remaining')
      +'</div><div class="goalEdit"><span class="calCell"><span class="l">daily goal</span></span>'
      +'<input class="fieldInput" id="goal" type="number" min="0" step="50" value="'+goal+'" /></div></div>';
    const bar='<div class="calBar"><div class="calBarFill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>';
    const box=(accent,val,unit,label)=>'<div class="macroBox" data-accent="'+accent+'"><span class="macroVal">'+round(val)+(unit||'')+'</span><span class="macroLabel">'+label+'</span></div>';
    return '<section class="card"><span class="cardName">Today</span>'
      +head+bar
      +'<div class="macroGrid" style="margin-top:var(--space-4)">'
      +box('p',t.p,'g','protein')+box('c',t.c,'g','carbs')+box('f',t.f,'g','fat')+box('cal',t.cal,'','calories')
      +'</div></section>';
  }

  function resultsInner(){
    const q=query.trim().toLowerCase();
    matches=q?FOODS.filter(f=>f.name.toLowerCase().includes(q)).slice(0,8):[];
    if(!q) return '<p class="emptyNote">Start typing to find a food…</p>';
    if(!matches.length) return '<p class="emptyNote">No match — try another name.</p>';
    return matches.map((f,i)=>
      '<div class="foodRow"><div><div class="foodName">'+esc(f.name)+'</div>'
      +'<div class="foodRowMeta">'+f.cal+' kcal · '+f.p+'P / '+f.c+'C / '+f.f+'F per 100g</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
      +'<input class="fieldInput gramInput" type="number" min="0" placeholder="g" data-grams="'+i+'" />'
      +'<button class="btn btn-primary" data-add="'+i+'">Add</button></div></div>').join('');
  }

  function searchHtml(){
    return '<h2 class="secTitle">Add food</h2>'
      +'<div class="foodSearch"><input class="fieldInput" id="q" type="text" placeholder="Search foods (e.g. chicken, rice, banana)" value="'+esc(query)+'" autocomplete="off" /></div>'
      +'<div class="foodResults" id="results">'+resultsInner()+'</div>';
  }

  function logHtml(){
    const log=todaysLog();
    if(!log.length) return '<h2 class="secTitle">Logged today</h2><p class="emptyNote">Nothing logged yet.</p>';
    const rows=log.map((e,i)=>
      '<div class="logRow"><div><div class="foodName">'+esc(e.name)+' <span class="foodRowMeta">'+e.grams+'g</span></div>'
      +'<div class="logNums">'+round(e.cal)+' kcal · '+round(e.p)+'P / '+round(e.c)+'C / '+round(e.f)+'F</div></div>'
      +'<button class="xBtn" data-del="'+i+'" title="Remove">×</button></div>').join('');
    return '<h2 class="secTitle">Logged today</h2><div class="logList">'+rows+'</div>';
  }

  function render(){
    if(currentTab==='food'){
      document.getElementById('tabFood').innerHTML=searchHtml()+logHtml();
    } else if(currentTab==='calories'){
      document.getElementById('tabCalories').innerHTML=summaryHtml();
    }
  }

  window.foodsRender=function(tab){
    currentTab=tab||currentTab;
    store=loadAll();
    render();
  };

  document.addEventListener('input',e=>{
    if(e.target.id==='q'){ query=e.target.value; const r=document.getElementById('results'); if(r) r.innerHTML=resultsInner(); }
    if(e.target.id==='goal'){ const n=Number(e.target.value); setGoalCal(isFinite(n)&&n>=0?n:0); render(); const g=document.getElementById('goal'); if(g) g.focus(); }
  });

  document.addEventListener('click',e=>{
    const add=e.target.closest('[data-add]');
    if(add){
      const f=matches[Number(add.getAttribute('data-add'))];
      const gramsEl=document.querySelector('[data-grams="'+add.getAttribute('data-add')+'"]');
      const grams=Number(gramsEl&&gramsEl.value);
      if(!f||!isFinite(grams)||grams<=0){ alert('Enter how many grams.'); return; }
      const k=grams/100;
      const log=todaysLog();
      log.push({name:f.name,grams,cal:f.cal*k,p:f.p*k,c:f.c*k,f:f.f*k});
      setTodaysLog(log); query=''; render(); return;
    }
    const del=e.target.closest('[data-del]');
    if(del){ const log=todaysLog(); log.splice(Number(del.getAttribute('data-del')),1); setTodaysLog(log); render(); return; }
  });

  window.addEventListener('storage',e=>{ if(e.key===STORE_KEY){ store=loadAll(); render(); } });
  render();
})();
</script>

<!-- Caffeine tracker JS -->
<script>
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const gauss=(x,mu,sd)=>Math.exp(-Math.pow(x-mu,2)/(2*sd*sd));

  const HALF_LIFE_H=5, PEAK_MIN=45, FDA_MAX=400;

  const DB=[
    {n:'Brewed coffee (8 oz)',mg:95,c:'Coffee',e:'☕'},{n:'Brewed coffee (12 oz)',mg:140,c:'Coffee',e:'☕'},

    {n:'White tea (8 oz)',mg:30,c:'Tea',e:'🍵'},{n:'Chai latte (8 oz)',mg:50,c:'Tea',e:'🍵'},
    {n:'Yerba mate (8 oz)',mg:85,c:'Tea',e:'🍵'},{n:'Iced tea (16 oz)',mg:47,c:'Tea',e:'🧋'},
    {n:'Red Bull (8.4 oz)',mg:80,c:'Energy',e:'⚡'},{n:'Red Bull (12 oz)',mg:114,c:'Energy',e:'⚡'},
    {n:'Monster (16 oz)',mg:160,c:'Energy',e:'⚡'},{n:'Monster Ultra (16 oz)',mg:150,c:'Energy',e:'⚡'},
    {n:'Bang (16 oz)',mg:300,c:'Energy',e:'⚡'},{n:'Reign (16 oz)',mg:300,c:'Energy',e:'⚡'},
    {n:'Celsius (12 oz)',mg:200,c:'Energy',e:'⚡'},{n:'Celsius Essentials (16 oz)',mg:270,c:'Energy',e:'⚡'},
    {n:'Alani Nu (12 oz)',mg:200,c:'Energy',e:'⚡'},{n:'Prime Energy (12 oz)',mg:200,c:'Energy',e:'⚡'},
    {n:'C4 Energy (16 oz)',mg:200,c:'Energy',e:'⚡'},{n:'5-Hour Energy',mg:200,c:'Energy',e:'⚡'},
    {n:'Coca-Cola (12 oz)',mg:34,c:'Soda',e:'🥤'},{n:'Diet Coke (12 oz)',mg:46,c:'Soda',e:'🥤'},
    {n:'Coke Zero (12 oz)',mg:34,c:'Soda',e:'🥤'},{n:'Pepsi (12 oz)',mg:38,c:'Soda',e:'🥤'},
    {n:'Mountain Dew (12 oz)',mg:54,c:'Soda',e:'🥤'},{n:'Dr Pepper (12 oz)',mg:41,c:'Soda',e:'🥤'},
    {n:'Pre-workout (1 scoop)',mg:200,c:'Supplement',e:'💊'},{n:'Caffeine pill (200 mg)',mg:200,c:'Supplement',e:'💊'},
    {n:'Caffeine pill (100 mg)',mg:100,c:'Supplement',e:'💊'},
    {n:'Dark chocolate (1 oz)',mg:24,c:'Other',e:'🍫'},{n:'Milk chocolate (1 oz)',mg:6,c:'Other',e:'🍫'},
  ];

  const LOGS_KEY='caf:logs', CUSTOM_KEY='caf:custom';
  const loadJSON=(k,f)=>{ try{ return JSON.parse(localStorage.getItem(k))||f; }catch(e){ return f; } };
  const saveJSON=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  let logs=loadJSON(LOGS_KEY,[]);
  let custom=loadJSON(CUSTOM_KEY,[]);

  let bodyKg=null, recovery=null, wakeHour=7, bedHour=23;
  function readProfile(){
    try{
      const p=JSON.parse(localStorage.getItem('patron_profile_v1')||'null');
      if(p&&p.weightKg>0) bodyKg=p.weightKg;
      const h=JSON.parse(localStorage.getItem('patron_health_v1')||'null');
      if(h){
        if(h.recovery!=null) recovery=h.recovery;
        if(h.bedtime){ const[hh,mm]=String(h.bedtime).split(':').map(Number); bedHour=clamp(hh+mm/60,20,23.9); }
        if(h.wakeTime){ const[hh,mm]=String(h.wakeTime).split(':').map(Number); wakeHour=clamp(hh+mm/60,4,11); }
      }
    }catch(e){}
  }

  const dailyLimit=()=>recovery!=null&&recovery<34?200:recovery!=null&&recovery<67?300:FDA_MAX;
  const moderateTarget=()=>bodyKg?Math.round(3*bodyKg):200;

  const midnight=()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); };
  const nowHour=()=>{ const d=new Date(); return d.getHours()+d.getMinutes()/60; };
  const hToTs=h=>midnight()+h*3600000;
  function fmtClock(h){
    h=((h%24)+24)%24;
    let hr=Math.floor(h),m=Math.round((h-hr)*60);
    if(m===60){m=0;hr=(hr+1)%24;}
    const ap=hr>=12?'PM':'AM'; let h12=hr%12||12;
    return h12+':'+String(m).padStart(2,'0')+' '+ap;
  }
  const fmtTime=ts=>{ const d=new Date(ts); return fmtClock(d.getHours()+d.getMinutes()/60); };

  const activeAt=(dose,ts,t)=>{ const hrs=(t-ts)/3600000; return hrs<0?0:dose*Math.pow(0.5,hrs/HALF_LIFE_H); };
  const totalActiveAt=t=>logs.reduce((s,l)=>s+activeAt(l.mg,l.ts,t),0);
  function milestones(l){
    const clearedH=l.mg>10?HALF_LIFE_H*Math.log2(l.mg/10):0.5;
    return{peak:l.ts+PEAK_MIN*60000,half:l.ts+HALF_LIFE_H*3600000,cleared:l.ts+clearedH*3600000};
  }

  const circadian=t=>50+18*Math.cos(2*Math.PI*(t-16.5)/24);
  const lunchDip=t=>10*gauss(t,14,1.4);
  const sleepPressure=awakeH=>clamp(awakeH,0,24)*1.7;
  const morningBump=t=>{ const d=t-wakeHour; return(d<0||d>4)?0:10*gauss(d,1.2,0.9); };
  const cafBoostAt=t=>34*(1-Math.exp(-totalActiveAt(hToTs(t))/110));
  const asleepAt=t=>(t<wakeHour)||(t>=bedHour);
  function energyAt(t,withCaf){
    const C=circadian(t);
    if(asleepAt(t)) return clamp(C-34,3,20);
    let e=C-lunchDip(t)-sleepPressure(t-wakeHour)+morningBump(t);
    if(withCaf!==false) e+=cafBoostAt(t);
    return clamp(e,0,100);
  }
  const stateWord=v=>v>=80?'Peak':v>=62?'High':v>=44?'Steady':v>=28?'Dip':'Low';
  const energyColor=v=>v>=62?'#00FF88':v>=40?'#FFB930':'#FF4060';

  const sample=withCaf=>{ const pts=[]; for(let i=0;i<=144;i++){ const t=i/6; pts.push([t,energyAt(t,withCaf)]); } return pts; };

  function analysis(){
    const now=nowHour(), pts=sample(true);
    let peakT=null,peakV=-1;
    for(const[t,v] of pts){ if(t>=now-0.05&&t<=bedHour&&v>peakV){peakV=v;peakT=t;} }
    let pStart=peakT,pEnd=peakT;
    if(peakT!=null){
      for(let t=peakT;t>=now;t-=1/6){ if(energyAt(t,true)>=peakV-3)pStart=t; else break; }
      for(let t=peakT;t<=bedHour;t+=1/6){ if(energyAt(t,true)>=peakV-3)pEnd=t; else break; }
    }
    let crashT=null,worst=0;
    for(let t=now+0.25;t<=Math.min(bedHour,now+8);t+=1/6){
      const drop=energyAt(t-0.25,true)-energyAt(t+0.25,true);
      if(drop>worst){worst=drop;crashT=t;}
    }
    return{now,peakT,peakV:Math.round(peakV),pStart,pEnd,crashT,crashSignificant:worst>=2.2,crashTo:crashT!=null?Math.round(energyAt(crashT+0.5,true)):null,cutoff:bedHour-HALF_LIFE_H*Math.log2(95/30)};
  }

  let chartMode='line', scrubT=null;
  const todaysLogs=()=>{ const s=midnight(); return logs.filter(l=>l.ts>=s); };
  const dailyTotal=()=>Math.round(todaysLogs().reduce((a,l)=>a+l.mg,0));

  function renderRing(){
    const t=scrubT!=null?scrubT:nowHour(), v=Math.round(energyAt(t,true));
    const fill=$('cafRingFill'); if(!fill) return;
    const C=2*Math.PI*38;
    fill.style.strokeDasharray=C; fill.style.strokeDashoffset=C*(1-v/100); fill.style.stroke=energyColor(v);
    $('cafRingNum').textContent=v;
    $('cafEnergyState').textContent=stateWord(v); $('cafEnergyState').style.color=energyColor(v);
    $('cafEnergyWhen').textContent=scrubT!=null?('at '+fmtClock(t)):'Right now';
  }

  function renderChart(){
    const svg=$('cafEnergyChart'); if(!svg) return;
    const W=600,H=200,padT=12,padB=8,now=nowHour();
    const X=t=>(t/24)*W, Y=v=>H-padB-(v/100)*(H-padB-padT);
    const pts=sample(true);
    let p=[];
    p.push('<rect x="0" y="0" width="'+X(wakeHour)+'" height="'+H+'" fill="rgba(255,255,255,0.018)"/>');
    p.push('<rect x="'+X(bedHour)+'" y="0" width="'+(W-X(bedHour))+'" height="'+H+'" fill="rgba(255,255,255,0.018)"/>');
    for(let g=25;g<=100;g+=25){ const y=Y(g).toFixed(1); p.push('<line x1="0" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>'); }
    p.push('<defs>'
      +'<linearGradient id="cafEg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,255,136,0.35)"/><stop offset="100%" stop-color="rgba(0,255,136,0)"/></linearGradient>'
      +'<linearGradient id="cafCg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,185,48,0.38)"/><stop offset="100%" stop-color="rgba(255,185,48,0.03)"/></linearGradient>'
      +'</defs>');
    if(chartMode==='bars'){
      for(let hh=0;hh<24;hh++){
        const v=energyAt(hh+0.5,true),x=X(hh+0.12),w=X(0.76),y=Y(v),h=H-padB-y;
        p.push('<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+Math.max(0,h).toFixed(1)+'" rx="2" fill="'+energyColor(v)+'" opacity="0.85"/>');
      }
    } else if(chartMode==='stack'){
      const base=sample(false);
      let bl='M '+X(base[0][0]).toFixed(1)+' '+Y(base[0][1]).toFixed(1);
      base.forEach((pp,i)=>{ if(i) bl+=' L '+X(pp[0]).toFixed(1)+' '+Y(pp[1]).toFixed(1); });
      p.push('<path d="'+bl+' L '+W+' '+(H-padB)+' L 0 '+(H-padB)+' Z" fill="rgba(255,255,255,0.05)"/>');
      p.push('<path d="'+bl+'" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1.5" stroke-dasharray="4 3"/>');
      let top='M '+X(pts[0][0]).toFixed(1)+' '+Y(pts[0][1]).toFixed(1);
      pts.forEach((pp,i)=>{ if(i) top+=' L '+X(pp[0]).toFixed(1)+' '+Y(pp[1]).toFixed(1); });
      let band=top; for(let i=base.length-1;i>=0;i--) band+=' L '+X(base[i][0]).toFixed(1)+' '+Y(base[i][1]).toFixed(1);
      p.push('<path d="'+band+' Z" fill="url(#cafCg)"/>');
      p.push('<path d="'+top+'" fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linejoin="round"/>');
    } else {
      let line='M '+X(pts[0][0]).toFixed(1)+' '+Y(pts[0][1]).toFixed(1);
      pts.forEach((pp,i)=>{ if(i) line+=' L '+X(pp[0]).toFixed(1)+' '+Y(pp[1]).toFixed(1); });
      p.push('<path d="'+line+' L '+W+' '+(H-padB)+' L 0 '+(H-padB)+' Z" fill="url(#cafEg)"/>');
      p.push('<path d="'+line+'" fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 6px rgba(0,255,136,0.5))"/>');
    }
    const xNow=X(now).toFixed(1);
    p.push('<line x1="'+xNow+'" y1="0" x2="'+xNow+'" y2="'+H+'" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>');
    p.push('<circle cx="'+xNow+'" cy="'+Y(energyAt(now,true)).toFixed(1)+'" r="4" fill="#fff"/>');
    if(scrubT!=null){
      const xs=X(scrubT).toFixed(1),ys=Y(energyAt(scrubT,true)).toFixed(1);
      p.push('<line x1="'+xs+'" y1="0" x2="'+xs+'" y2="'+H+'" stroke="rgba(0,255,136,0.6)" stroke-width="1.5" stroke-dasharray="3 3"/>');
      p.push('<circle cx="'+xs+'" cy="'+ys+'" r="5" fill="#080808" stroke="#00FF88" stroke-width="2"/>');
    }
    svg.innerHTML=p.join('');
  }

  function renderPlan(){
    const a=analysis(); const pv=$('cafPeakVal'); if(!pv) return;
    $('cafPeakVal').textContent=a.peakT!=null?(fmtClock(a.pStart)+'–'+fmtClock(a.pEnd)):'—';
    $('cafCrashVal').textContent=a.crashSignificant?('~'+fmtClock(a.crashT)):'none soon';
    $('cafCutoffVal').textContent=fmtClock(a.cutoff);
    $('cafMPeak').textContent=a.peakT!=null?fmtClock(a.peakT):'—';
    $('cafMPeakSub').textContent=a.peakT!=null?('Energy ~'+a.peakV+'/100 · window '+fmtClock(a.pStart)+'–'+fmtClock(a.pEnd)):'Log a drink to see your curve.';
    if(a.crashSignificant){$('cafMCrash').textContent=fmtClock(a.crashT);$('cafMCrashSub').textContent='Drops to ~'+a.crashTo+'/100 — plan lighter work then.';}
    else{$('cafMCrash').textContent='No crash';$('cafMCrashSub').textContent='No steep drop predicted in the next several hours.';}
    $('cafMCutoff').textContent=fmtClock(a.cutoff);
    $('cafMCutoffSub').textContent='Last coffee to keep <30 mg by your '+fmtClock(bedHour)+' bedtime.';
    const tips=[];
    tips.push(['⏰','Front-load it. Caffeine works best 30–90 min after waking — aim your first cup near '+fmtClock(wakeHour+0.5)+'.']);
    if(a.cutoff<a.now) tips.push(['🌙','It\'s past your coffee cutoff ('+fmtClock(a.cutoff)+'). More caffeine now will likely cost you sleep.']);
    else tips.push(['☀️','You can still have coffee until ~'+fmtClock(a.cutoff)+' without wrecking your '+fmtClock(bedHour)+' bedtime.']);
    const atBed=Math.round(totalActiveAt(hToTs(bedHour<a.now?bedHour+24:bedHour)));
    if(atBed>=50) tips.push(['⚠️','~'+atBed+' mg will still be active at bedtime — enough to delay deep sleep.']);
    if(a.crashSignificant) tips.push(['🚶','Beat the '+fmtClock(a.crashT)+' dip with 10 min of daylight + water instead of another coffee.']);
    tips.push(['💧','Drink a glass of water per caffeinated drink — dehydration mimics the crash.']);
    if(recovery!=null&&recovery<34) tips.push(['😴','WHOOP recovery is '+recovery+'% — keep today under '+dailyLimit()+' mg.']);
    const ul=$('cafTips'); if(!ul) return; ul.innerHTML='';
    tips.forEach(([ic,txt])=>{ const li=document.createElement('li'); li.className='cafTip'; li.innerHTML='<span style="flex-shrink:0">'+ic+'</span><span>'+txt+'</span>'; ul.appendChild(li); });
  }

  function renderDaily(){
    const total=dailyTotal(),limit=dailyLimit(),target=moderateTarget();
    const dn=$('cafDailyNum'); if(!dn) return;
    $('cafDailyNum').textContent=total; $('cafDailyLimit').textContent=limit;
    const activeNow=Math.round(totalActiveAt(Date.now()));
    $('cafDailyActive').textContent=activeNow>0?(activeNow+' mg active'):'';
    const fill=$('cafDailyFill'),pct=Math.min(100,(total/limit)*100);
    fill.style.width=pct+'%';
    fill.style.background=total>=limit?'linear-gradient(90deg,#FF4060,#FF6060)':total>=target?'linear-gradient(90deg,#FFB930,#FFCA60)':'linear-gradient(90deg,#00FF88,#00CC6A)';
    const msg=$('cafDailyMsg'); msg.className='cafMsg';
    if(total===0){msg.classList.add('good');msg.textContent="You haven't logged anything today.";}
    else if(total>=limit){msg.classList.add('bad');msg.textContent='⚠️ Over your limit — ease off the caffeine.';}
    else if(total>=target){msg.classList.add('warn');msg.textContent='Getting up there. '+(limit-total)+' mg until your ceiling.';}
    else{msg.classList.add('good');msg.textContent='Good range — '+(target-total)+' mg under your target.';}
    const parts=[];
    if(bodyKg) parts.push('Target ~'+target+' mg (3 mg/kg for '+Math.round(bodyKg)+' kg). Ceiling '+limit+' mg.');
    else parts.push('Using the 400 mg/day ceiling.');
    if(recovery!=null) parts.push('WHOOP recovery '+recovery+'%'+(recovery<34?' — limit adjusted.':'.'));
    $('cafDailyNote').innerHTML=parts.join(' ');
  }

  const escH=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function renderLog(){
    const list=$('cafLogList'); if(!list) return;
    const tl=todaysLogs().slice().sort((a,b)=>b.ts-a.ts); list.innerHTML='';
    if(!tl.length){const li=document.createElement('li');li.style.cssText='font-size:13px;color:var(--muted);padding:var(--space-4) 0;';li.textContent='No drinks logged — search one above.';list.appendChild(li);return;}
    tl.forEach(l=>{
      const m=milestones(l),li=document.createElement('li');li.className='cafLogRow';
      li.innerHTML='<span class="cafLogEmoji">'+(l.e||'☕')+'</span>'
        +'<div class="cafLogMain"><div class="cafLogName">'+escH(l.n)+'<b>'+l.mg+' mg</b></div>'
        +'<div class="cafLogMeta">Peak '+fmtTime(m.peak)+' · Half-life '+fmtTime(m.half)+' · Clear '+fmtTime(m.cleared)+'</div></div>'
        +'<span class="cafLogTime">'+fmtTime(l.ts)+'</span>'
        +'<button class="cafLogDel" type="button" aria-label="Delete">×</button>';
      li.querySelector('.cafLogDel').addEventListener('click',()=>{logs=logs.filter(x=>x.id!==l.id);saveJSON(LOGS_KEY,logs);renderAll();});
      list.appendChild(li);
    });
  }

  function renderAll(){ renderRing(); renderChart(); renderPlan(); renderDaily(); renderLog(); }

  function logDrink(item){ logs.push({id:'c'+Date.now()+Math.floor(Math.random()*1e4),n:item.n,mg:Math.round(item.mg),e:item.e||'☕',ts:Date.now()}); saveJSON(LOGS_KEY,logs); renderAll(); }
  const allDrinks=()=>DB.concat(custom.map(c=>({n:c.n,mg:c.mg,c:'Custom',e:'☕'})));

  function renderResults(q){
    const el=$('cafResults'); if(!el) return;
    const query=(q||'').trim().toLowerCase();
    let items=allDrinks();
    if(query) items=items.filter(d=>d.n.toLowerCase().includes(query)||d.c.toLowerCase().includes(query));
    items=items.slice(0,query?40:12); el.innerHTML='';
    if(!items.length){const li=document.createElement('li');li.style.cssText='font-size:13px;color:var(--muted);padding:var(--space-3) 0;';li.textContent='No match — add it as a custom drink below.';el.appendChild(li);return;}
    items.forEach(d=>{
      const li=document.createElement('li');li.className='cafResult';
      li.innerHTML='<span class="cafResultEmoji">'+(d.e||'☕')+'</span>'
        +'<span class="cafResultName">'+escH(d.n)+' <span class="cafResultCat">· '+d.c+'</span></span>'
        +'<span class="cafResultMg">'+d.mg+'<small> mg</small></span>';
      li.addEventListener('click',()=>{logDrink(d);const s=$('cafSearch');if(s)s.value='';renderResults('');});
      el.appendChild(li);
    });
  }

  function addCustom(){
    const name=($('cafCustomName')||{}).value||''; const mgVal=($('cafCustomMg')||{}).value||'';
    const mg=parseInt(mgVal,10);
    if(!name.trim()||!(mg>=0)) return;
    custom.push({n:name.trim(),mg,e:'☕',c:'Custom'}); saveJSON(CUSTOM_KEY,custom);
    logDrink({n:name.trim(),mg,e:'☕'});
    $('cafCustomName').value=''; $('cafCustomMg').value='';
    renderResults(($('cafSearch')||{}).value||'');
  }

  function scrubFromEvent(e){
    const wrap=$('cafCurveWrap'); if(!wrap) return;
    const rect=wrap.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    scrubT=clamp((cx/rect.width)*24,0,24); renderRing(); renderChart();
  }
  function endScrub(){ scrubT=null; renderRing(); renderChart(); }

  function initEvents(){
    const wrap=$('cafCurveWrap'); if(!wrap) return;
    wrap.addEventListener('mousemove',scrubFromEvent);
    wrap.addEventListener('mouseleave',endScrub);
    wrap.addEventListener('touchstart',scrubFromEvent,{passive:true});
    wrap.addEventListener('touchmove',scrubFromEvent,{passive:true});
    wrap.addEventListener('touchend',endScrub);
    const toggle=$('cafModeToggle');
    if(toggle) toggle.querySelectorAll('.cafModeBtn').forEach(b=>b.addEventListener('click',()=>{
      chartMode=b.dataset.m;
      toggle.querySelectorAll('.cafModeBtn').forEach(x=>x.classList.toggle('on',x===b));
      renderChart();
    }));
    const search=$('cafSearch');
    if(search) search.addEventListener('input',e=>renderResults(e.target.value));
    const addBtn=$('cafCustomAdd');
    if(addBtn) addBtn.addEventListener('click',addCustom);
    const mgIn=$('cafCustomMg');
    if(mgIn) mgIn.addEventListener('keydown',e=>{ if(e.key==='Enter') addCustom(); });
  }

  readProfile();
  renderResults('');
  renderAll();
  initEvents();
  setInterval(()=>{ if(scrubT==null) renderAll(); },60000);
})();
</script>

    '.stTabBar{display:flex;align-items:center;gap:2px;flex:1;justify-content:center;}',
    '.stTab{appearance:none;border:0;background:transparent;color:rgba(242,242,242,0.42);font-family:"Hanken Grotesk",sans-serif;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;transition:background 180ms,color 180ms;white-space:nowrap;}',
    '.stTab.stTabOn{background:var(--brand-soft,rgba(0,255,136,0.09));color:var(--brand,#00FF88);}',
    '.stBack{display:inline-flex;align-items:center;gap:5px;padding:6px 11px 6px 8px;border-radius:999px;flex-shrink:0;',
    'background:var(--brand-soft,rgba(0,255,136,0.09));border:1px solid var(--brand-line,rgba(0,255,136,0.22));',
    'color:var(--brand,#00FF88);font-family:"Hanken Grotesk",sans-serif;font-size:12px;font-weight:600;',
    'text-decoration:none;transition:background 180ms ease;white-space:nowrap;}',
    '.stBack:hover{background:rgba(0,255,136,0.16);}'
  ].join('');
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  var svg='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>';
  var bar=document.createElement('div'); bar.id='suiteBar';
  bar.innerHTML='<a class="stLogo" href="index.html"><div class="stLogoIcon">'+svg+'</div><span class="stLogoName">Wayne Mode</span></a>'
    +'<div class="stTabBar">'
    +'<button class="stTab stTabOn" data-tab="food">Food</button>'
    +'<button class="stTab" data-tab="calories">Calories</button>'
    +'<button class="stTab" data-tab="caffeine">Caffeine</button>'
    +'</div>'
    +'<a class="stBack" href="index.html">← Home</a>';
  document.body.insertBefore(bar,document.body.firstChild);

  var panels={food:document.getElementById('tabFood'),calories:document.getElementById('tabCalories'),caffeine:document.getElementById('tabCaffeine')};

  bar.querySelectorAll('.stTab').forEach(function(btn){
    btn.addEventListener('click',function(){
      var t=btn.dataset.tab;
      bar.querySelectorAll('.stTab').forEach(function(b){b.classList.remove('stTabOn');});
      btn.classList.add('stTabOn');
      Object.keys(panels).forEach(function(k){if(panels[k])panels[k].style.display=k===t?'':'none';});
      if(t==='food'||t==='calories'){if(window.foodsRender)window.foodsRender(t);}
      try{localStorage.setItem('foods_tab',t);}catch(e){}
    });
  });

  var lastTab='food';
  try{lastTab=localStorage.getItem('foods_tab')||'food';}catch(e){}
  if(lastTab!=='food'){var btn=bar.querySelector('[data-tab="'+lastTab+'"]');if(btn)btn.click();}
})();
</script>
