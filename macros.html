<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#080808" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Luca" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<title>Luca · Foods</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"vision");}catch(e){document.documentElement.setAttribute("data-theme","vision");}</script>
<link rel="stylesheet" href="theme.css" />
<style>
/* ── Food / Calories tab ── */
.macroGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3); }
@media (max-width:560px) { .macroGrid { grid-template-columns:repeat(2,1fr); } }
.macroBox { display:flex; flex-direction:column; gap:4px; padding:var(--space-4); border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.macroBox[data-accent="cal"] { border-color:var(--brand-line); background:var(--brand-soft); }
.macroVal { font-family:var(--font-display); font-weight:600; font-size:var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.macroLabel { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.calHead { display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; margin-bottom:var(--space-4); }
.calMath { display:flex; align-items:center; gap:var(--space-5); flex-wrap:wrap; }
.calCell { display:flex; flex-direction:column; gap:2px; }
.calCell .n { font-family:var(--font-display); font-weight:600; font-size:var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.calCell .l { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.calOp { font-family:var(--font-display); font-size:var(--text-xl); color:var(--muted); }
.calCell.remain .n { color:var(--brand); }
.calCell.remain.over .n { color:var(--neg); }
.goalEdit { display:flex; align-items:center; gap:8px; }
.goalEdit .fieldInput { width:92px; }
.calBar { height:10px; border-radius:var(--radius-pill); background:var(--track); overflow:hidden; }
.calBarFill { height:100%; border-radius:var(--radius-pill); background:var(--brand); transition:width var(--duration) var(--ease-premium); }
.calBarFill.over { background:var(--neg); }
.foodSearch { margin:var(--space-5) 0 var(--space-3); }
.foodResults { display:flex; flex-direction:column; gap:6px; margin-top:var(--space-3); }
.foodRow { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.foodRowMeta { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.foodName { font-weight:600; font-size:var(--text-sm); }
.gramInput { width:74px; }
.emptyNote { color:var(--muted); font-size:13px; padding:var(--space-4) 0; }
.logList { display:flex; flex-direction:column; gap:6px; margin-top:var(--space-3); }
.logRow { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.logNums { font-family:var(--font-mono); font-size:11px; color:var(--muted-strong); }
.xBtn { background:transparent; border:1px solid var(--border); color:var(--muted); width:28px; height:28px; border-radius:50%; cursor:pointer; flex-shrink:0; transition:color var(--duration),border-color var(--duration); }
.xBtn:hover { color:var(--neg); border-color:var(--neg-line); }
.secTitle { font-family:var(--font-display); font-weight:600; font-size:var(--text-lg); margin:var(--space-8) 0 0; }

/* ── Meal tagging ── */
.stack { display:flex; flex-direction:column; gap:var(--space-5); }
.mealPills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:var(--space-3); }
.mealPill { appearance:none; padding:7px 14px; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--surface); color:var(--muted-strong); font-family:var(--font-ui); font-size:12px; font-weight:600; cursor:pointer; transition:all var(--duration) var(--ease-premium); }
.mealPill:hover { border-color:var(--border-strong); }
.mealPillActive, .mealPillActive:hover { border-color:var(--brand-line); background:var(--brand-soft); color:var(--fg); }

/* ── Trend chart ── */
.trendHead { display:flex; align-items:baseline; justify-content:space-between; gap:var(--space-3); flex-wrap:wrap; }
.trendDelta { font-family:var(--font-mono); font-size:11px; font-weight:600; }
.trendDelta.up { color:var(--pos); }
.trendDelta.down { color:var(--neg); }
.trendSvg { width:100%; overflow:visible; margin-top:var(--space-3); }
.trendLine { fill:none; stroke:var(--brand); stroke-width:2; stroke-linejoin:round; stroke-linecap:round; }
.trendGoalLine { stroke:var(--muted); stroke-width:1; stroke-dasharray:3 4; }
.trendDot { fill:var(--brand); }
.macroTrendRow { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-4); margin-top:var(--space-4); }
.macroTrendItem { display:flex; flex-direction:column; gap:4px; }
.macroTrendLabel { font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:flex; justify-content:space-between; }
.miniTrendSvg { width:100%; height:22px; overflow:visible; }

/* ── Meal breakdown ── */
.mealBar { display:flex; height:14px; border-radius:var(--radius-pill); overflow:hidden; background:var(--track); margin-top:var(--space-2); }
.mealBarSeg { height:100%; }
.mealLegend { display:flex; flex-wrap:wrap; gap:var(--space-4); margin-top:var(--space-3); font-family:var(--font-mono); font-size:11px; color:var(--muted-strong); }
.mdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }

/* ── Weekly summary ── */
.weekGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3); }
@media (max-width:560px) { .weekGrid { grid-template-columns:repeat(2,1fr); } }
.weekBox { display:flex; flex-direction:column; gap:4px; padding:var(--space-4); border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
.weekVal { font-family:var(--font-display); font-weight:600; font-size:var(--text-xl); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.weekLabel { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }

</style>
</head>
<body>
<script src="earth-bg.js"></script>
<main class="page grain-overlay">
  <div class="shell">
    <!-- Food Tab -->
    <div id="tabFood"></div>
    <!-- Calories Tab -->
    <div id="tabCalories" style="display:none"></div>

  </div>
</main>

<!-- Food + Calories JS -->
<script>
(function(){
  'use strict';
  const STORE_KEY = 'macros_standalone_v1';
  const FOODS = [
    { name:'Chicken breast',  cal:165, p:31,  c:0,   f:3.6 },
    { name:'Beef mince (5%)', cal:137, p:21,  c:0,   f:5   },
    { name:'Salmon',          cal:208, p:20,  c:0,   f:13  },
    { name:'Egg',             cal:143, p:13,  c:1.1, f:9.5 },
    { name:'Greek yogurt',    cal:59,  p:10,  c:3.6, f:0.4 },
    { name:'Whey protein',    cal:400, p:80,  c:8,   f:6   },
    { name:'White rice',      cal:130, p:2.7, c:28,  f:0.3 },
    { name:'Oats',            cal:389, p:17,  c:66,  f:7   },
    { name:'Pasta (cooked)',  cal:157, p:6,   c:31,  f:0.9 },
    { name:'Potato',          cal:77,  p:2,   c:17,  f:0.1 },
    { name:'Sweet potato',    cal:86,  p:1.6, c:20,  f:0.1 },
    { name:'Banana',          cal:89,  p:1.1, c:23,  f:0.3 },
    { name:'Apple',           cal:52,  p:0.3, c:14,  f:0.2 },
    { name:'Broccoli',        cal:34,  p:2.8, c:7,   f:0.4 },
    { name:'Almonds',         cal:579, p:21,  c:22,  f:50  },
    { name:'Peanut butter',   cal:588, p:25,  c:20,  f:50  },
    { name:'Olive oil',       cal:884, p:0,   c:0,   f:100 },
    { name:'Avocado',         cal:160, p:2,   c:9,   f:15  },
    { name:'Cheddar cheese',  cal:402, p:25,  c:1.3, f:33  },
    { name:'Milk (whole)',    cal:61,  p:3.2, c:4.8, f:3.3 },
    { name:'Bread (slice)',   cal:265, p:9,   c:49,  f:3.2 },
    { name:'Tuna (canned)',   cal:116, p:26,  c:0,   f:1   },
  ];

  function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function dateKeyOffset(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function lastNDates(n){ const a=[]; for(let i=n-1;i>=0;i--) a.push(dateKeyOffset(i)); return a; }
  function loadAll(){ try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{}; }catch(e){ return {}; } }
  function saveAll(o){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(o)); }catch(e){} }
  let store=loadAll();
  function todaysLog(){ return store[todayKey()]||[]; }
  function setTodaysLog(list){ store[todayKey()]=list; saveAll(store); }
  function goalCal(){ return store.goalCal!=null?store.goalCal:2000; }
  function setGoalCal(n){ store.goalCal=n; saveAll(store); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function round(n){ return Math.round(n); }
  function totalsFor(dateKey){ return (store[dateKey]||[]).reduce((t,e)=>{ t.cal+=e.cal; t.p+=e.p; t.c+=e.c; t.f+=e.f; return t; },{cal:0,p:0,c:0,f:0}); }

  const MEALS=['breakfast','lunch','dinner','snack'];
  const MEAL_LABEL={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack'};
  const MEAL_COLOR={breakfast:'var(--brand)',lunch:'var(--pos)',dinner:'var(--warn)',snack:'var(--muted-strong)'};
  function defaultMeal(){ const h=new Date().getHours(); if(h<11) return 'breakfast'; if(h<15) return 'lunch'; if(h<21) return 'dinner'; return 'snack'; }

  let query='';
  let matches=[];
  let currentTab='food';
  let currentMeal=defaultMeal();

  function totals(){ return totalsFor(todayKey()); }

  function summaryHtml(){
    const t=totals(), goal=goalCal(), remaining=goal-t.cal, over=remaining<0;
    const pct=Math.min(100,goal>0?(t.cal/goal)*100:0);
    const cell=(cls,n,l)=>'<div class="calCell '+cls+'"><span class="n">'+round(n)+'</span><span class="l">'+l+'</span></div>';
    const head='<div class="calHead"><div class="calMath">'
      +cell('',goal,'goal')+'<span class="calOp">−</span>'
      +cell('',t.cal,'food')+'<span class="calOp">=</span>'
      +cell('remain'+(over?' over':''),Math.abs(remaining),over?'over':'remaining')
      +'</div><div class="goalEdit"><span class="calCell"><span class="l">daily goal</span></span>'
      +'<input class="fieldInput" id="goal" type="number" min="0" step="50" value="'+goal+'" /></div></div>';
    const bar='<div class="calBar"><div class="calBarFill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>';
    const box=(accent,val,unit,label)=>'<div class="macroBox" data-accent="'+accent+'"><span class="macroVal">'+round(val)+(unit||'')+'</span><span class="macroLabel">'+label+'</span></div>';
    return '<section class="card"><span class="cardName">Today</span>'
      +head+bar
      +'<div class="macroGrid" style="margin-top:var(--space-4)">'
      +box('p',t.p,'g','protein')+box('c',t.c,'g','carbs')+box('f',t.f,'g','fat')+box('cal',t.cal,'','calories')
      +'</div></section>';
  }

  function buildPath(values,maxVal,W,H,pad){
    const mx=Math.max(1,maxVal);
    const stepX=values.length>1?(W-pad*2)/(values.length-1):0;
    return values.map((v,i)=>(pad+i*stepX).toFixed(1)+','+(H-pad-(v/mx)*(H-pad*2)).toFixed(1));
  }

  function trendCardHtml(){
    const dates=lastNDates(14);
    const dayTotals=dates.map(totalsFor);
    const cals=dayTotals.map(t=>t.cal);
    const hasData=cals.some(v=>v>0);
    const today=cals[cals.length-1], yesterday=cals[cals.length-2];
    const delta=(yesterday!=null)?Math.round(today-yesterday):null;
    const goal=goalCal();
    let svg='<p class="emptyNote">Log meals for a few days to see your trend.</p>';
    if(hasData){
      const W=560,H=110,pad=6;
      const maxVal=Math.max(1,goal,...cals);
      const pts=buildPath(cals,maxVal,W,H,pad);
      const last=pts[pts.length-1].split(',');
      const goalY=(H-pad-(goal/maxVal)*(H-pad*2)).toFixed(1);
      svg='<svg viewBox="0 0 '+W+' '+H+'" class="trendSvg" preserveAspectRatio="none">'
        +'<line x1="'+pad+'" y1="'+goalY+'" x2="'+(W-pad)+'" y2="'+goalY+'" class="trendGoalLine"/>'
        +'<polyline points="'+pts.join(' ')+'" class="trendLine"/>'
        +'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3" class="trendDot"/>'
        +'</svg>';
    }
    const macroRows=hasData?['p','c','f'].map(k=>{
      const label=k==='p'?'Protein':k==='c'?'Carbs':'Fat';
      const vals=dayTotals.map(t=>t[k]);
      const mx=Math.max(1,...vals);
      const W=160,H=22,pad=2;
      const pts=buildPath(vals,mx,W,H,pad);
      const last=pts[pts.length-1].split(',');
      const spark='<svg viewBox="0 0 '+W+' '+H+'" class="miniTrendSvg" preserveAspectRatio="none">'
        +'<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--muted-strong)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>'
        +'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="1.8" fill="var(--fg)"/></svg>';
      return '<div class="macroTrendItem"><div class="macroTrendLabel"><span>'+label+'</span><span>'+round(vals[vals.length-1])+'g</span></div>'+spark+'</div>';
    }).join(''):'';
    return '<section class="card"><div class="trendHead"><span class="cardName">Last 14 Days</span>'
      +(delta!=null?'<span class="trendDelta '+(delta<=0?'up':'down')+'">'+(delta>0?'+':'')+delta+' kcal vs yesterday</span>':'')
      +'</div>'+svg
      +(macroRows?'<div class="macroTrendRow">'+macroRows+'</div>':'')
      +'</section>';
  }

  function weekSummaryHtml(){
    const dayTotals=lastNDates(7).map(totalsFor);
    const loggedDays=dayTotals.filter(t=>t.cal>0).length;
    const avg=k=>loggedDays?Math.round(dayTotals.reduce((a,t)=>a+t[k],0)/loggedDays):0;
    const goal=goalCal(), avgCal=avg('cal');
    const goalPct=goal>0&&loggedDays?Math.round((avgCal/goal)*100):0;
    const box=(val,label)=>'<div class="weekBox"><span class="weekVal">'+val+'</span><span class="weekLabel">'+label+'</span></div>';
    return '<section class="card"><span class="cardName">This Week</span>'
      +'<div class="weekGrid" style="margin-top:var(--space-3)">'
      +box(avgCal,'avg kcal/day')+box(avg('p')+'g','avg protein')+box(loggedDays+'/7','days logged')+box(goalPct+'%','of goal')
      +'</div></section>';
  }

  function mealBreakdownHtml(){
    const log=todaysLog();
    if(!log.length) return '';
    const sums={}; MEALS.forEach(m=>sums[m]=0); let other=0;
    log.forEach(e=>{ const m=e.meal&&sums.hasOwnProperty(e.meal)?e.meal:null; if(m) sums[m]+=e.cal; else other+=e.cal; });
    const total=Object.values(sums).reduce((a,b)=>a+b,0)+other;
    if(total<=0) return '';
    const segs=MEALS.filter(m=>sums[m]>0).map(m=>'<span class="mealBarSeg" style="width:'+(sums[m]/total*100).toFixed(1)+'%;background:'+MEAL_COLOR[m]+'"></span>').join('')
      +(other>0?'<span class="mealBarSeg" style="width:'+(other/total*100).toFixed(1)+'%;background:var(--border-strong)"></span>':'');
    const legend=MEALS.filter(m=>sums[m]>0).map(m=>'<span><span class="mdot" style="background:'+MEAL_COLOR[m]+'"></span>'+MEAL_LABEL[m]+' · '+round(sums[m])+' kcal</span>').join('')
      +(other>0?'<span><span class="mdot" style="background:var(--border-strong)"></span>Other · '+round(other)+' kcal</span>':'');
    return '<section class="card"><span class="cardName">Today by Meal</span>'
      +'<div class="mealBar">'+segs+'</div><div class="mealLegend">'+legend+'</div></section>';
  }

  function resultsInner(){
    const q=query.trim().toLowerCase();
    matches=q?FOODS.filter(f=>f.name.toLowerCase().includes(q)).slice(0,8):[];
    if(!q) return '<p class="emptyNote">Start typing to find a food…</p>';
    if(!matches.length) return '<p class="emptyNote">No match — try another name.</p>';
    return matches.map((f,i)=>
      '<div class="foodRow"><div><div class="foodName">'+esc(f.name)+'</div>'
      +'<div class="foodRowMeta">'+f.cal+' kcal · '+f.p+'P / '+f.c+'C / '+f.f+'F per 100g</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
      +'<input class="fieldInput gramInput" type="number" min="0" placeholder="g" data-grams="'+i+'" />'
      +'<button class="btn btn-primary" data-add="'+i+'">Add</button></div></div>').join('');
  }

  function mealPillsHtml(){
    return '<div class="mealPills">'+MEALS.map(m=>
      '<button type="button" class="mealPill'+(m===currentMeal?' mealPillActive':'')+'" data-meal="'+m+'">'+MEAL_LABEL[m]+'</button>'
    ).join('')+'</div>';
  }

  function searchHtml(){
    return '<h2 class="secTitle">Add food</h2>'
      +mealPillsHtml()
      +'<div class="foodSearch"><input class="fieldInput" id="q" type="text" placeholder="Search foods (e.g. chicken, rice, banana)" value="'+esc(query)+'" autocomplete="off" /></div>'
      +'<div class="foodResults" id="results">'+resultsInner()+'</div>';
  }

  function logHtml(){
    const log=todaysLog();
    if(!log.length) return '<h2 class="secTitle">Logged today</h2><p class="emptyNote">Nothing logged yet.</p>';
    const rows=log.map((e,i)=>
      '<div class="logRow"><div><div class="foodName">'+esc(e.name)+' <span class="foodRowMeta">'+(e.meal&&MEAL_LABEL[e.meal]?MEAL_LABEL[e.meal]+' · ':'')+e.grams+'g</span></div>'
      +'<div class="logNums">'+round(e.cal)+' kcal · '+round(e.p)+'P / '+round(e.c)+'C / '+round(e.f)+'F</div></div>'
      +'<button class="xBtn" data-del="'+i+'" title="Remove">×</button></div>').join('');
    return '<h2 class="secTitle">Logged today</h2><div class="logList">'+rows+'</div>';
  }

  function render(){
    if(currentTab==='food'){
      document.getElementById('tabFood').innerHTML=searchHtml()+logHtml();
    } else if(currentTab==='calories'){
      document.getElementById('tabCalories').innerHTML='<div class="stack">'+summaryHtml()+mealBreakdownHtml()+trendCardHtml()+weekSummaryHtml()+'</div>';
    }
  }

  window.foodsRender=function(tab){
    currentTab=tab||currentTab;
    store=loadAll();
    render();
  };

  document.addEventListener('input',e=>{
    if(e.target.id==='q'){ query=e.target.value; const r=document.getElementById('results'); if(r) r.innerHTML=resultsInner(); }
    if(e.target.id==='goal'){ const n=Number(e.target.value); setGoalCal(isFinite(n)&&n>=0?n:0); render(); const g=document.getElementById('goal'); if(g) g.focus(); }
  });

  document.addEventListener('click',e=>{
    const mealBtn=e.target.closest('[data-meal]');
    if(mealBtn){
      currentMeal=mealBtn.getAttribute('data-meal');
      document.querySelectorAll('.mealPill').forEach(b=>b.classList.toggle('mealPillActive', b.getAttribute('data-meal')===currentMeal));
      return;
    }
    const add=e.target.closest('[data-add]');
    if(add){
      const f=matches[Number(add.getAttribute('data-add'))];
      const gramsEl=document.querySelector('[data-grams="'+add.getAttribute('data-add')+'"]');
      const grams=Number(gramsEl&&gramsEl.value);
      if(!f||!isFinite(grams)||grams<=0){ alert('Enter how many grams.'); return; }
      const k=grams/100;
      const log=todaysLog();
      log.push({name:f.name,grams,cal:f.cal*k,p:f.p*k,c:f.c*k,f:f.f*k,meal:currentMeal});
      setTodaysLog(log); query=''; render(); return;
    }
    const del=e.target.closest('[data-del]');
    if(del){ const log=todaysLog(); log.splice(Number(del.getAttribute('data-del')),1); setTodaysLog(log); render(); return; }
  });

  window.addEventListener('storage',e=>{ if(e.key===STORE_KEY){ store=loadAll(); render(); } });
  render();
})();
</script>

<!-- Suitevar + tab switcher -->
<script>
(function(){
  var css=[
    'body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;',
    'background-image:linear-gradient(rgba(255,255,255,0.024) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.024) 1px,transparent 1px);',
    'background-size:44px 44px;}',
    '[data-theme="daylight"] body::before{background-image:linear-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.05) 1px,transparent 1px);}',
    '#suiteBar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:max(11px,env(safe-area-inset-top)) 16px 11px;',
    'background:rgba(8,8,8,0.90);border-bottom:1px solid rgba(255,255,255,0.07);',
    'backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}',
    '[data-theme="daylight"] #suiteBar{background:rgba(242,241,250,0.93);}',
    '[data-theme="aurora"] #suiteBar{background:rgba(6,8,18,0.92);}',
    '.stLogo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--fg,#F2F2F2);flex-shrink:0;}',
    '.stLogoIcon{width:26px;height:26px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--brand,#00FF88),var(--brand-2,#00CC6A));display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px var(--brand-glow,rgba(0,255,136,0.30));}',
    '.stLogoName{font-family:"Instrument Serif",Georgia,serif;font-weight:700;font-size:14px;letter-spacing:-0.3px;}',
    '.stTabBar{display:flex;align-items:center;gap:2px;flex:1;justify-content:center;}',
    '.stTab{appearance:none;border:0;background:transparent;color:rgba(242,242,242,0.42);font-family:"Inter",sans-serif;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;transition:background 180ms,color 180ms;white-space:nowrap;}',
    '.stTab.stTabOn{background:var(--brand-soft,rgba(0,255,136,0.09));color:var(--brand,#00FF88);}',
    '.stBack{display:inline-flex;align-items:center;gap:5px;padding:6px 11px 6px 8px;border-radius:999px;flex-shrink:0;',
    'background:var(--brand-soft,rgba(0,255,136,0.09));border:1px solid var(--brand-line,rgba(0,255,136,0.22));',
    'color:var(--brand,#00FF88);font-family:"Inter",sans-serif;font-size:12px;font-weight:600;',
    'text-decoration:none;transition:background 180ms ease;white-space:nowrap;}',
    '.stBack:hover{background:rgba(0,255,136,0.16);}'
  ].join('');
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  var svg='<svg width="12" height="12" viewBox="0 0 24 24" fill="#000"><path d="M12 1.5L13.8 10.2 22.5 12 13.8 13.8 12 22.5 10.2 13.8 1.5 12 10.2 10.2Z"/></svg>';
  var bar=document.createElement('div'); bar.id='suiteBar';
  bar.innerHTML='<a class="stLogo" href="index.html"><div class="stLogoIcon">'+svg+'</div><span class="stLogoName">Wayne Mode</span></a>'
    +'<div class="stTabBar">'
    +'<button class="stTab stTabOn" data-tab="food">Food</button>'
    +'<button class="stTab" data-tab="calories">Calories</button>'
    +'</div>'
    +'<a class="stBack" href="index.html">← Home</a>';
  document.body.insertBefore(bar,document.body.firstChild);

  var panels={food:document.getElementById('tabFood'),calories:document.getElementById('tabCalories')};

  bar.querySelectorAll('.stTab').forEach(function(btn){
    btn.addEventListener('click',function(){
      var t=btn.dataset.tab;
      bar.querySelectorAll('.stTab').forEach(function(b){b.classList.remove('stTabOn');});
      btn.classList.add('stTabOn');
      Object.keys(panels).forEach(function(k){if(panels[k])panels[k].style.display=k===t?'':'none';});
      if(t==='food'||t==='calories'){if(window.foodsRender)window.foodsRender(t);}
      try{localStorage.setItem('foods_tab',t);}catch(e){}
    });
  });

  var lastTab='food';
  try{lastTab=localStorage.getItem('foods_tab')||'food';}catch(e){}
  if(lastTab!=='food'){var btn=bar.querySelector('[data-tab="'+lastTab+'"]');if(btn)btn.click();}
})();
</script>
