<style>
:root {
  color-scheme: dark;
  --bg: #080808; --bg-elevated: #111111;
  --surface: rgba(255,255,255,0.035); --surface-2: rgba(255,255,255,0.065);
  --fg: #F2F2F2; --muted: rgba(242,242,242,0.50); --muted-strong: rgba(242,242,242,0.74);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.15);
  --brand: #00FF88; --brand-2: #00CC6A; --brand-ink: #000000;
  --brand-soft: rgba(0,255,136,0.09); --brand-line: rgba(0,255,136,0.22); --brand-glow: rgba(0,255,136,0.30);
  --pos: #00FF88; --pos-soft: rgba(0,255,136,0.09); --pos-line: rgba(0,255,136,0.22);
  --neg: #FF4060; --neg-soft: rgba(255,64,96,0.10); --neg-line: rgba(255,64,96,0.22);
  --warn: #FFB930; --warn-soft: rgba(255,185,48,0.10); --warn-line: rgba(255,185,48,0.24);
  --track: rgba(255,255,255,0.07);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 20px 48px -28px rgba(0,0,0,0.95);
  --glow-1: rgba(0,255,136,0.05); --glow-2: rgba(0,200,100,0.025);
  --grain-opacity: 0.04; --overlay: rgba(0,0,0,0.80);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:16px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Instrument Serif',Georgia,serif; --font-ui:'Inter',-apple-system,sans-serif; --font-mono:'JetBrains Mono',monospace;
}

  --bg: #060812; --bg-elevated: #0E0F1E;
  --surface: rgba(120,130,255,0.045); --surface-2: rgba(120,130,255,0.08);
  --fg: #EEF0FF; --muted: rgba(210,215,255,0.52); --muted-strong: rgba(210,215,255,0.76);
  --border: rgba(140,150,255,0.11); --border-strong: rgba(140,150,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.30); --brand-glow: rgba(124,107,255,0.50);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.15); --glow-2: rgba(79,227,208,0.08);
  --grain-opacity: 0.04; --overlay: rgba(5,6,18,0.80);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F2F1FA; --bg-elevated: #FFFFFF;
  --surface: rgba(255,255,255,0.90); --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.06), 0 16px 34px -24px rgba(23,22,60,0.20);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02; --overlay: rgba(28,26,52,0.42);
}
[data-theme="vision"] {
  color-scheme: dark;
  --bg: #050505; --bg-elevated: #0D0D0D;
  --surface: rgba(255,255,255,0.03); --surface-2: rgba(255,255,255,0.055);
  --fg: #F5F5F5; --muted: rgba(255,255,255,0.45); --muted-strong: rgba(255,255,255,0.72);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
  --brand: #FFFFFF; --brand-2: rgba(255,255,255,0.68); --brand-ink: #000000;
  --brand-soft: rgba(255,255,255,0.06); --brand-line: rgba(255,255,255,0.14); --brand-glow: rgba(255,255,255,0.20);
  --pos: #22C55E; --pos-soft: rgba(34,197,94,0.10); --pos-line: rgba(34,197,94,0.26);
  --neg: #EF4444; --neg-soft: rgba(239,68,68,0.10); --neg-line: rgba(239,68,68,0.26);
  --warn: #F59E0B; --warn-soft: rgba(245,158,11,0.10); --warn-line: rgba(245,158,11,0.26);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 22px 56px -28px rgba(0,0,0,0.80);
  --glow-1: rgba(255,255,255,0.04); --glow-2: rgba(255,255,255,0.02);
  --grain-opacity: 0.038; --overlay: rgba(5,5,5,0.92);
}
[data-theme="vision"] .card,.statTile { background: rgba(255,255,255,0.025); backdrop-filter: blur(24px) saturate(1.1); -webkit-backdrop-filter: blur(24px) saturate(1.1); border-color: rgba(255,255,255,0.07); }
[data-theme="vision"] .skillItem { background: rgba(255,255,255,0.025); border-color: rgba(255,255,255,0.07); }
[data-theme="vision"] .skillItem:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.18); }
[data-theme="vision"] .logEntry,.resourceRow,.chartCard { background: rgba(255,255,255,0.025); border-color: rgba(255,255,255,0.07); }

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base); -webkit-font-smoothing: antialiased;
  transition: background var(--duration) var(--ease);
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.024) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.024) 1px, transparent 1px);
  background-size: 44px 44px;
}
[data-theme="daylight"] body::before {
  background-image:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
}
.grain-overlay::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  opacity: var(--grain-opacity); mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 200px 200px;
}
.page {
  position: relative; min-height: 100dvh;
  padding: var(--space-8) var(--space-5) var(--space-16);
  isolation: isolate;
}
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: -1;
  background:
    radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%),
    radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%);
}
.shell { max-width: 800px; margin: 0 auto; position: relative; z-index: 2; }

/* ── Header ── */
.header { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-4); margin-bottom: var(--space-8); }
.headerLeft { display: flex; flex-direction: column; gap: var(--space-2); }
.headerRight { display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-2); }
.back {
  display: inline-flex; align-items: center; gap: var(--space-2); align-self: flex-start;
  padding: 6px 13px 6px 9px;
  background: var(--brand-soft); border: 1px solid var(--brand-line); border-radius: var(--radius-pill);
  color: var(--brand); font-family: var(--font-ui); font-size: var(--text-xs); font-weight: 600;
  letter-spacing: 0.01em; text-decoration: none;
  transition: background var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium);
}
.back:hover { background: var(--brand-line); border-color: var(--brand); }
.titleRow { display: flex; align-items: center; gap: 14px; }
.title { font-family: var(--font-display); font-weight: 600; font-size: var(--text-3xl); line-height: 1.0; letter-spacing: -0.03em; margin: 0; }
.subtitle { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); margin: 5px 0 0; }
.brandOrb { width: 38px; height: 38px; flex-shrink: 0; }
.brandOrb svg { width: 100%; height: 100%; display: block; animation: orbSpin 14s linear infinite; transform-origin: 50% 50%; }
.orbTrack { fill: none; stroke: var(--border); stroke-width: 1.5; }
.orbFill { fill: none; stroke: var(--brand); stroke-width: 1.5; stroke-dasharray: 12 88; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--brand-line)); }
.orbCore { fill: var(--brand); filter: drop-shadow(0 0 6px var(--brand-glow)); }
@keyframes orbSpin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .brandOrb svg { animation: none; } }

/* ── Theme switcher ── */
.themeSeg { display: inline-flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
.themeBtn { appearance: none; background: transparent; border: 0; color: var(--muted); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink: 0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }
@media (max-width: 420px) { .themeSeg { display: none; } }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); padding: 0.6rem var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); font-family: var(--font-ui); font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--fg); white-space: nowrap; text-decoration: none; transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease), filter var(--duration) var(--ease), box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--brand); color: var(--brand-ink); font-weight: 700; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 26px var(--brand-glow); transform: translateY(-1px); }
.btn-ghost { color: var(--fg); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--surface); }
.btn-sm { padding: 0.4rem var(--space-3); font-size: var(--text-xs); }
.btn-danger { color: var(--neg); border-color: var(--neg-line); }
.btn-danger:hover { background: var(--neg-soft); }
.btn svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── Form fields ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.fieldLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.fieldInput { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; color: var(--fg); font-family: var(--font-mono); font-size: 14px; outline: none; transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }
.fieldInput:focus { border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
textarea.fieldInput { resize: vertical; min-height: 64px; }
select.fieldInput option { background: var(--bg-elevated); color: var(--fg); }
.formGrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
@media (max-width: 480px) { .formGrid { grid-template-columns: 1fr; } }

/* ── Modal ── */
.overlay { position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; display: grid; place-items: center; padding: var(--space-4); animation: fade 200ms var(--ease-premium); }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.panel { position: relative; width: min(480px, 100%); background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-6); box-shadow: 0 28px 70px -16px rgba(0,0,0,0.7); animation: rise 320ms var(--ease-premium); max-height: 90dvh; overflow-y: auto; }
.panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
@keyframes rise { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
.panelHead { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-5); }
.panelEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--brand); }
.panelTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-2xl); letter-spacing: -0.03em; margin: var(--space-2) 0 0; }
.panelClose { background: transparent; border: 1px solid var(--border); color: var(--muted-strong); font-size: 20px; line-height: 1; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; flex-shrink: 0; transition: color var(--duration), border-color var(--duration); }
.panelClose:hover { color: var(--fg); border-color: var(--border-strong); }
.panelBody { display: flex; flex-direction: column; gap: var(--space-4); }
.panelActions { display: flex; align-items: center; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-6); }
.spacer { margin-right: auto; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.20); }

/* ── Mobile bottom nav ── */
.mobileNav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(8,8,8,0.92); border-top: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
[data-theme="daylight"] .mobileNav { background: rgba(242,241,250,0.94); }
[data-theme="aurora"]   .mobileNav { background: rgba(6,8,18,0.92); }
@media (max-width: 520px) { .mobileNav { display: flex; } .page { padding-bottom: calc(80px + env(safe-area-inset-bottom)); } }
.mobileNavItem { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; text-decoration: none; color: var(--muted); font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; transition: color 180ms; }
.mobileNavItem:hover, .mobileNavItem.active { color: var(--brand); }
.mobileNavIcon { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; background: var(--brand-soft); border: 1px solid var(--brand-line); color: var(--brand); }
.mobileNavItem.active .mobileNavIcon, .mobileNavItem:hover .mobileNavIcon { background: var(--brand); color: var(--brand-ink); }
.mobileNavIcon svg { width: 55%; height: 55%; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ================================================================
 * Page-specific
 * ================================================================ */

/* Radial ring component */
.ringWrap { position: relative; display: inline-flex; flex-shrink: 0; }
.ringSvg { display: block; transform: rotate(-90deg); overflow: visible; }
.ringTrack { fill: none; stroke: var(--track); }
.ringFill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 900ms var(--ease-premium); }

/* Stats row */
.statsRow { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
@media (max-width: 600px) { .statsRow { grid-template-columns: repeat(2, 1fr); } }
.statTile { position: relative; padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 6px; overflow: hidden; transition: border-color 220ms, transform 220ms; }
.statTile:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.statTile::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); }
.statTop { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.statLabel { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.statValue { font-family: var(--font-display); font-size: 1.7rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: var(--fg); font-variant-numeric: tabular-nums; }
.statValue em { font-style: normal; font-size: 1rem; color: var(--muted); }
.statSub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.statBreakdown { display: flex; height: 4px; border-radius: 3px; overflow: hidden; background: var(--track); margin: 2px 0 1px; }
.statBreakdown span { display: block; height: 100%; }
.statFlame svg { width: 17px; height: 17px; color: var(--warn); filter: drop-shadow(0 0 6px var(--warn-line)); transition: opacity 300ms; }

/* Section */
.sectionGap { margin-bottom: var(--space-8); }
.sectionHead { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); gap: var(--space-3); }
.sectionTitle { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

/* Empty state */
.emptyState { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 42px 20px; text-align: center; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius-lg); color: var(--muted); }
.emptyState svg { width: 28px; height: 28px; color: var(--muted); opacity: 0.55; }
.emptyState p { margin: 0; font-family: var(--font-mono); font-size: 12px; line-height: 1.65; max-width: 34ch; }

/* Skill Canopy */
.skillTree { display: flex; flex-direction: column; gap: var(--space-2); }
.skillNode { display: flex; flex-direction: column; position: relative; }
.skillItem { display: flex; align-items: center; gap: 12px; padding: 13px 15px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: border-color 180ms var(--ease-premium), background 180ms var(--ease-premium), transform 160ms var(--ease-premium); }
.skillItem[data-depth]:not([data-depth="0"]) { padding: 9px 12px; }
.skillItem:hover { border-color: var(--brand-line); background: var(--brand-soft); transform: translateX(2px); }
.skillInfo { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.skillName { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.skillHrs { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }
.skillBadge { flex-shrink: 0; font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-pill); }
.skillBadge[data-s="not-started"] { background: var(--track); color: var(--muted); }
.skillBadge[data-s="learning"]    { background: var(--warn-soft); border: 1px solid var(--warn-line); color: var(--warn); }
.skillBadge[data-s="mastered"]    { background: var(--pos-soft);  border: 1px solid var(--pos-line);  color: var(--pos); }
.skillCount { flex-shrink: 0; font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: var(--muted-strong); background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 2px 7px; }
.skillChildren { padding-left: 34px; position: relative; margin-top: 6px; display: flex; flex-direction: column; gap: 8px; }
.skillChildren::before { content: ''; position: absolute; left: 14px; top: -2px; bottom: 18px; width: 1px; background: linear-gradient(180deg, var(--border-strong), transparent); }
.skillChildren > .skillNode::before { content: ''; position: absolute; left: -20px; top: 20px; width: 20px; height: 1px; background: var(--border-strong); }

/* Log timeline */
.logFeed { position: relative; display: flex; flex-direction: column; gap: 10px; }
.logFeed::before { content: ''; position: absolute; left: 26px; top: 4px; bottom: 4px; width: 1px; background: linear-gradient(180deg, var(--border-strong), transparent); z-index: 0; }
.logEntry { position: relative; z-index: 1; display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); transition: border-color 180ms, background 180ms; }
.logEntry:hover { border-color: var(--brand-line); }
.logDot { flex-shrink: 0; width: 9px; height: 9px; margin-top: 5px; margin-left: 8px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-line); }
.logMeta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.logSkill { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 600; color: var(--fg); }
.logNotes { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logResource { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--brand); text-decoration: none; }
.logResource svg { width: 11px; height: 11px; }
.logResource:hover { text-decoration: underline; }
.logRight { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.logDuration { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 700; color: var(--brand); }
.logDate { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.logDelete { background: none; border: none; cursor: pointer; color: var(--muted); padding: 3px; line-height: 1; border-radius: 50%; transition: color 150ms; flex-shrink: 0; align-self: flex-start; }
.logDelete svg { width: 12px; height: 12px; display: block; }
.logDelete:hover { color: var(--neg); }

/* Resource cards */
.resourceGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
.resourceRow { display: flex; flex-direction: column; gap: 11px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); transition: border-color 180ms, transform 180ms; }
.resourceRow:hover { border-color: var(--brand-line); transform: translateY(-2px); }
.resTop { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.resBadge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 9px; border-radius: var(--radius-pill); }
.resBadge svg { width: 10px; height: 10px; }
.resBadge.book    { background: var(--warn-soft); border: 1px solid var(--warn-line); color: var(--warn); }
.resBadge.course  { background: var(--brand-soft); border: 1px solid var(--brand-line); color: var(--brand); }
.resBadge.mentor  { background: var(--pos-soft); border: 1px solid var(--pos-line); color: var(--pos); }
.resBadge.article { background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--muted-strong); }
.resDelete { background: none; border: none; cursor: pointer; color: var(--muted); padding: 3px; line-height: 1; transition: color 150ms; flex-shrink: 0; }
.resDelete svg { width: 12px; height: 12px; display: block; }
.resDelete:hover { color: var(--neg); }
.resInfo { flex: 1; min-width: 0; }
.resTitle { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 600; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; text-decoration: none; }
a.resTitle:hover { color: var(--brand); }
.resCost { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
.resStars { display: flex; gap: 2px; }
.resStar { background: none; border: none; cursor: pointer; color: var(--track); padding: 1px; line-height: 1; transition: color 120ms, transform 120ms; }
.resStar svg { width: 14px; height: 14px; display: block; }
.resStar:hover { transform: scale(1.12); }
.resStar.on { color: var(--warn); }

/* Analytics */
.chartsRow { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
@media (max-width: 640px) { .chartsRow { grid-template-columns: 1fr; } }
.chartCard { position: relative; padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); overflow: hidden; }
.chartCard::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); }
.chartTitle { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-3); }
.chartSvgWrap { width: 100%; }
.chartSvgWrap svg { width: 100%; display: block; overflow: visible; }
.skillBarList { display: flex; flex-direction: column; gap: 11px; }
.skillBar { display: flex; align-items: center; gap: 10px; }
.skillBarRank { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display: grid; place-items: center; font-family: var(--font-mono); font-size: 9px; color: var(--muted-strong); }
.skillBarBody { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.skillBarTop { display: flex; justify-content: space-between; align-items: baseline; }
.skillBarName { font-family: var(--font-ui); font-size: var(--text-xs); font-weight: 600; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.skillBarHrs  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }
.skillBarTrack { height: 5px; background: var(--track); border-radius: 3px; overflow: hidden; }
.skillBarFill  { height: 100%; background: linear-gradient(90deg, var(--brand-2), var(--brand)); border-radius: 3px; transition: width 700ms var(--ease-premium); }
</style>
</head>
<body>
<script src="earth-bg.js"></script>

</main>

  </a>

<div id="modalRoot"></div>

<script>
/* ── Icons (inline, no emoji) ── */
const ICON = {
  plus:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  link:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5"/><path d="M19 5l-9 9"/><path d="M9 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-3"/></svg>',
  flame: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12.5 2.4c.9 2.7-1.6 3.9-1.6 6.6a3.1 3.1 0 0 0 6.2 0c0-1.6-.7-2.5-.7-2.5s.6 3.3-1.7 3.3c-1.7 0-1.6-2.1-.9-3.8-2 .3-3.5 2.4-3.5 5a5.7 5.7 0 0 0 11.4 0c0-4.9-4.1-5.9-4.1-8.6-1.5.7-2.1 2.1-2.1 2.1s-1.4-1.1-3-2.1Z"/></svg>',
  starFill: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2.5l2.9 6.4 7 .7-5.3 4.7 1.6 6.9L12 17.6 5.8 20.7l1.6-6.9L2.1 9.6l7-.7L12 2.5Z"/></svg>',
  starLine: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2.5l2.9 6.4 7 .7-5.3 4.7 1.6 6.9L12 17.6 5.8 20.7l1.6-6.9L2.1 9.6l7-.7L12 2.5Z"/></svg>',
  book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"/><path d="M4 19h16"/><path d="M9 10h6M9 14h4"/></svg>',
  course: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9l10-5 10 5-10 5-10-5Z"/><path d="M6 11v5c0 1.5 2.5 3 6 3s6-1.5 6-3v-5"/><path d="M22 9v6"/></svg>',
  mentor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.3"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>',
  article: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M14 3v4h4"/><path d="M9 12h6M9 16h6"/></svg>',
};
const RES_ICON = { book: ICON.book, course: ICON.course, mentor: ICON.mentor, article: ICON.article };
document.querySelectorAll('.sectionHead .btn-primary').forEach((b,i)=>{
  const labels = ['Add Skill','Log Session','Add Resource'];
  b.innerHTML = ICON.plus + labels[i];
});

/* ── Ring helper ── */
function ringSvg(pct, opts) {
  opts = opts || {};
  const size = opts.size || 44, stroke = opts.stroke || 4;
  const color = opts.color || 'var(--brand)', glow = opts.glow || 'var(--brand-line)';
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const off = c - (Math.max(0, Math.min(100, pct)) / 100) * c;
  return `<span class="ringWrap" style="width:${size}px;height:${size}px">
    <svg class="ringSvg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ringTrack" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"></circle>
      <circle class="ringFill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" style="stroke:${color};filter:drop-shadow(0 0 5px ${glow})"></circle>
    </svg>
  </span>`;
}

/* ── Storage ── */
const KEY = 'learning_standalone_v1';
function load() { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function persist() { try { localStorage.setItem(KEY, JSON.stringify(D)); } catch(e) {} }
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

let D = load() || { skills: [], logs: [], resources: [] };
if (!Array.isArray(D.skills))    D.skills    = [];
if (!Array.isArray(D.logs))      D.logs      = [];
if (!Array.isArray(D.resources)) D.resources = [];

/* ── Theme ── */
const THEMES = [
  { key:'vision',   label:'Vision',   swatch:'linear-gradient(135deg,#FFFFFF,#888888)' },
  { key:'nocturne', label:'Nocturne', swatch:'#00FF88' },
  { key:'aurora',   label:'Aurora',   swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key:'daylight', label:'Daylight', swatch:'#6A45FF' },
];
let theme = (function(){ try { return localStorage.getItem('patron_theme')||'vision'; } catch(e){ return 'vision'; } })();
function renderTheme() {
  document.getElementById('themeSeg').innerHTML =
    '<div class="themeSeg">' +
    THEMES.map(t => '<button type="button" class="themeBtn'+(t.key===theme?' themeBtnActive':'')+'" data-t="'+t.key+'">' +
      '<span class="themeSwatch" style="background:'+t.swatch+'"></span>'+t.label+'</button>').join('') + '</div>';
}
document.getElementById('themeSeg').addEventListener('click', function(e) {
  const b = e.target.closest('[data-t]'); if (!b) return;
  theme = b.dataset.t;
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('patron_theme', theme); } catch(e) {}
  renderTheme();
});
renderTheme();

/* ── Computed ── */
function skillMinutes(id) { return D.logs.filter(l=>l.skillId===id).reduce((s,l)=>s+(+l.duration||0),0); }
function fmtMins(m) { return m>=60 ? (m/60).toFixed(1)+'h' : m+'m'; }

function weekMins() {
  const cut = new Date(); cut.setDate(cut.getDate()-7);
  return D.logs.filter(l=>new Date(l.date)>=cut).reduce((s,l)=>s+(+l.duration||0),0);
}

function streak() {
  if (!D.logs.length) return 0;
  const days = [...new Set(D.logs.map(l=>l.date.slice(0,10)))].sort().reverse();
  let n=0, cur=new Date();
  for (const d of days) {
    if (d === cur.toISOString().slice(0,10)) { n++; cur.setDate(cur.getDate()-1); }
    else if (d < cur.toISOString().slice(0,10)) break;
  }
  return n;
}

function masteredPct() {
  if (!D.skills.length) return 0;
  return Math.round(D.skills.filter(s=>s.status==='mastered').length / D.skills.length * 100);
}

/* ── Stats ── */
function renderStats() {
  const wm = weekMins();
  const whrs = wm>=60 ? (wm/60).toFixed(1) : null;
  const wPct = Math.min(100, Math.round(wm/300*100));
  const mPct = masteredPct();
  const st = streak();
  const counts = { 'not-started':0, 'learning':0, 'mastered':0 };
  D.skills.forEach(s=>{ counts[s.status] = (counts[s.status]||0) + 1; });
  document.getElementById('statsRow').innerHTML = `
    <div class="statTile">
      <div class="statTop"><span class="statLabel">Skills</span></div>
      <div class="statValue">${D.skills.length}</div>
      <div class="statBreakdown">
        <span style="flex:${counts['not-started']||0.0001};background:var(--track)"></span>
        <span style="flex:${counts['learning']||0.0001};background:var(--warn)"></span>
        <span style="flex:${counts['mastered']||0.0001};background:var(--pos)"></span>
      </div>
      <div class="statSub">tracked</div>
    </div>
    <div class="statTile">
      <div class="statTop">
        <span class="statLabel">This Week</span>
        ${ringSvg(wPct, {size:32, stroke:3, color:'var(--brand)', glow:'var(--brand-line)'})}
      </div>
      <div class="statValue">${whrs ? whrs+'<em>h</em>' : wm+'<em>m</em>'}</div>
      <div class="statSub">study time</div>
    </div>
    <div class="statTile">
      <div class="statTop">
        <span class="statLabel">Streak</span>
        <span class="statFlame" style="opacity:${st?1:0.35}">${ICON.flame}</span>
      </div>
      <div class="statValue">${st}</div>
      <div class="statSub">day${st===1?'':'s'} in a row</div>
    </div>
    <div class="statTile">
      <div class="statTop">
        <span class="statLabel">Mastered</span>
        ${ringSvg(mPct, {size:32, stroke:3, color:'var(--pos)', glow:'var(--pos-line)'})}
      </div>
      <div class="statValue">${mPct}<em>%</em></div>
      <div class="statSub">of all skills</div>
    </div>`;
}

/* ── Skill Canopy ── */
const STATUS_LABEL = { 'not-started':'Not Started', 'learning':'Learning', 'mastered':'Mastered' };

function skillPct(skill) {
  if (skill.status === 'mastered') return 100;
  if (skill.status === 'not-started') return 4;
  const m = skillMinutes(skill.id);
  return Math.max(8, Math.min(92, 8 + (m/480)*84));
}
function skillRingColor(skill) {
  if (skill.status === 'mastered') return { color:'var(--pos)', glow:'var(--pos-line)' };
  if (skill.status === 'learning') return { color:'var(--warn)', glow:'var(--warn-line)' };
  return { color:'var(--muted)', glow:'var(--border)' };
}

function skillHtml(skill, depth) {
  depth = depth || 0;
  const m = skillMinutes(skill.id);
  const children = D.skills.filter(s=>s.parent===skill.id);
  const rc = skillRingColor(skill);
  const size = depth ? 34 : 46;
  return `<div class="skillNode">
    <div class="skillItem" data-depth="${depth}" onclick="openSkillModal('${esc(skill.id)}')">
      ${ringSvg(skillPct(skill), {size, stroke: depth?3:4, color:rc.color, glow:rc.glow})}
      <div class="skillInfo">
        <span class="skillName">${esc(skill.name)}</span>
        <span class="skillHrs">${m ? fmtMins(m) : 'Not logged yet'}</span>
      </div>
      <span class="skillBadge" data-s="${esc(skill.status)}">${STATUS_LABEL[skill.status]||skill.status}</span>
      ${children.length ? `<span class="skillCount">${children.length}</span>` : ''}
    </div>
    ${children.length ? `<div class="skillChildren">${children.map(c=>skillHtml(c, depth+1)).join('')}</div>` : ''}
  </div>`;
}

function renderSkillTree() {
  const el = document.getElementById('skillTreeRoot');
  const roots = D.skills.filter(s=>!s.parent);
  if (!D.skills.length) { el.innerHTML = `<div class="emptyState">${ICON.book}<p>No skills yet — plant your first one and watch it grow as you log hours</p></div>`; return; }
  el.innerHTML = '<div class="skillTree">' + roots.map(s=>skillHtml(s,0)).join('') + '</div>';
}

/* ── Log Feed ── */
function renderLog() {
  const el = document.getElementById('logFeed');
  const sorted = [...D.logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,25);
  if (!sorted.length) { el.innerHTML = `<div class="emptyState">${ICON.book}<p>No sessions logged yet — track your first study session above</p></div>`; return; }
  const sm = Object.fromEntries(D.skills.map(s=>[s.id,s.name]));
  el.innerHTML = '<div class="logFeed">' + sorted.map(l => {
    const dStr = l.date ? new Date(l.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
    return `<div class="logEntry">
      <span class="logDot"></span>
      <div class="logMeta">
        <div class="logSkill">${esc(sm[l.skillId]||'Unknown skill')}</div>
        ${l.notes ? `<div class="logNotes">${esc(l.notes)}</div>` : ''}
        ${l.resource ? `<a class="logResource" href="${esc(l.resource)}" target="_blank" rel="noopener">${ICON.link}Resource</a>` : ''}
      </div>
      <div class="logRight">
        <div class="logDuration">${fmtMins(+l.duration||0)}</div>
        <div class="logDate">${esc(dStr)}</div>
      </div>
      <button class="logDelete" onclick="deleteLog('${esc(l.id)}')" title="Delete" aria-label="Delete session">${ICON.close}</button>
    </div>`;
  }).join('') + '</div>';
}

function deleteLog(id) { D.logs = D.logs.filter(l=>l.id!==id); persist(); render(); }

/* ── Resources ── */
function renderResources() {
  const el = document.getElementById('resourceList');
  const sorted = [...D.resources].sort((a,b)=>(b.rating||0)-(a.rating||0));
  if (!sorted.length) { el.innerHTML = `<div class="emptyState">${ICON.course}<p>No resources added — track books, courses &amp; mentors here</p></div>`; return; }
  el.innerHTML = '<div class="resourceGrid">' + sorted.map(r => `
    <div class="resourceRow">
      <div class="resTop">
        <span class="resBadge ${esc(r.type)}">${RES_ICON[r.type]||ICON.article}${esc(r.type)}</span>
        <button class="resDelete" onclick="deleteRes('${esc(r.id)}')" title="Delete" aria-label="Delete resource">${ICON.close}</button>
      </div>
      <div class="resInfo">
        ${r.url ? `<a class="resTitle" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>` : `<span class="resTitle">${esc(r.title)}</span>`}
        ${r.cost ? `<div class="resCost">€${esc(r.cost)}</div>` : ''}
      </div>
      <div class="resStars">${[1,2,3,4,5].map(n=>`<button class="resStar${n<=(r.rating||0)?' on':''}" onclick="rateRes('${esc(r.id)}',${n})" aria-label="Rate ${n} stars">${n<=(r.rating||0)?ICON.starFill:ICON.starLine}</button>`).join('')}</div>
    </div>`).join('') + '</div>';
}

function rateRes(id,n) { const r=D.resources.find(r=>r.id===id); if(r){ r.rating=n; persist(); render(); } }
function deleteRes(id) { D.resources=D.resources.filter(r=>r.id!==id); persist(); render(); }

/* ── Analytics ── */
function renderLineChart() {
  const el = document.getElementById('lineChart');
  const N = 14;
  const pts = [];
  for (let i=N-1;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    pts.push({ k, m: D.logs.filter(l=>l.date===k).reduce((s,l)=>s+(+l.duration||0),0) });
  }
  const max = Math.max(...pts.map(p=>p.m), 1);
  const W=280, H=80, px=4;
  const coords = pts.map((p,i)=>[px+(i/(N-1))*(W-2*px), H-px-(p.m/max)*(H-2*px)]);
  const area = `M${coords[0][0]},${H} `+coords.map(([x,y])=>`L${x},${y}`).join(' ')+` L${coords[N-1][0]},${H}Z`;
  const line = `M`+coords.map(([x,y])=>`${x},${y}`).join('L');
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" height="90">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--brand)" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="var(--brand)" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${line}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 6px var(--brand-line))"/>
    ${coords.map(([x,y],i)=>pts[i].m>0?`<circle cx="${x}" cy="${y}" r="3" fill="var(--brand)" style="filter:drop-shadow(0 0 4px var(--brand-line))"/>`:'').join('')}
  </svg>`;
}

function renderSkillBars() {
  const el = document.getElementById('skillBars');
  if (!D.skills.length) { el.innerHTML = ''; return; }
  const items = D.skills.map(s=>({ name:s.name, m:skillMinutes(s.id) })).sort((a,b)=>b.m-a.m).slice(0,5);
  const max = Math.max(...items.map(i=>i.m), 1);
  el.innerHTML = items.map((i,idx)=>`
    <div class="skillBar">
      <span class="skillBarRank">${idx+1}</span>
      <div class="skillBarBody">
        <div class="skillBarTop">
          <span class="skillBarName">${esc(i.name)}</span>
          <span class="skillBarHrs">${i.m?fmtMins(i.m):'—'}</span>
        </div>
        <div class="skillBarTrack"><div class="skillBarFill" style="width:${(i.m/max*100).toFixed(1)}%"></div></div>
      </div>
    </div>`).join('');
}

/* ── Modal helpers ── */
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }
document.getElementById('modalRoot').addEventListener('click', e=>{ if(e.target.classList.contains('overlay')) closeModal(); });

/* ── Skill Modal ── */
function openSkillModal(id) {
  const sk = id ? D.skills.find(s=>s.id===id) : null;
  const parentOpts = D.skills.filter(s=>s.id!==id)
    .map(s=>`<option value="${esc(s.id)}"${sk&&sk.parent===s.id?' selected':''}>${esc(s.name)}</option>`).join('');
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay">
      <div class="panel">
        <div class="panelHead">
          <div>
            <div class="panelEyebrow">${sk?'Edit Skill':'New Skill'}</div>
            <div class="panelTitle">${sk?esc(sk.name):'Add a Skill'}</div>
          </div>
          <button class="panelClose" onclick="closeModal()">×</button>
        </div>
        <div class="panelBody">
          <div class="field">
            <label class="fieldLabel">Skill Name</label>
            <input id="sName" class="fieldInput" type="text" placeholder="e.g. TypeScript, Photography…" value="${esc(sk?sk.name:'')}"/>
          </div>
          <div class="field">
            <label class="fieldLabel">Status</label>
            <select id="sStatus" class="fieldInput">
              <option value="not-started"${!sk||sk.status==='not-started'?' selected':''}>Not Started</option>
              <option value="learning"${sk&&sk.status==='learning'?' selected':''}>Learning</option>
              <option value="mastered"${sk&&sk.status==='mastered'?' selected':''}>Mastered</option>
            </select>
          </div>
          <div class="field">
            <label class="fieldLabel">Parent Skill (optional)</label>
            <select id="sParent" class="fieldInput">
              <option value="">— None (root skill) —</option>
              ${parentOpts}
            </select>
          </div>
          <div class="field">
            <label class="fieldLabel">Notes</label>
            <textarea id="sNotes" class="fieldInput" placeholder="What are you learning and why?">${esc(sk?sk.notes||'':'')}</textarea>
          </div>
        </div>
        <div class="panelActions">
          ${sk?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteSkill('${esc(id)}')">Delete</button>`:''}
          <span class="spacer"></span>
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveSkill('${esc(id||'')}')">Save</button>
        </div>
      </div>
    </div>`;
  document.getElementById('sName').focus();
}

function saveSkill(id) {
  const name = document.getElementById('sName').value.trim();
  if (!name) { document.getElementById('sName').focus(); return; }
  const status = document.getElementById('sStatus').value;
  const parent = document.getElementById('sParent').value || null;
  const notes  = document.getElementById('sNotes').value.trim();
  if (id) {
    const sk = D.skills.find(s=>s.id===id);
    if (sk) Object.assign(sk, { name, status, parent, notes });
  } else {
    D.skills.push({ id:uid(), name, status, parent, notes });
  }
  persist(); closeModal(); render();
}

function deleteSkill(id) {
  D.skills = D.skills.filter(s=>s.id!==id && s.parent!==id);
  D.logs   = D.logs.filter(l=>l.skillId!==id);
  persist(); closeModal(); render();
}

/* ── Log Modal ── */
function openLogModal() {
  const today = new Date().toISOString().slice(0,10);
  const opts = D.skills.map(s=>`<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('');
  const noSkills = !D.skills.length;
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay">
      <div class="panel">
        <div class="panelHead">
          <div>
            <div class="panelEyebrow">Learning Log</div>
            <div class="panelTitle">Log a Session</div>
          </div>
          <button class="panelClose" onclick="closeModal()">×</button>
        </div>
        <div class="panelBody">
          ${noSkills?'<p style="color:var(--muted);font-size:var(--text-sm);margin:0">Add a skill first before logging a session.</p>':''}
          <div class="field">
            <label class="fieldLabel">Skill</label>
            <select id="lSkill" class="fieldInput"${noSkills?' disabled':''}>
              <option value="">— Select skill —</option>${opts}
            </select>
          </div>
          <div class="formGrid">
            <div class="field">
              <label class="fieldLabel">Duration (minutes)</label>
              <input id="lDur" class="fieldInput" type="number" min="1" placeholder="e.g. 45"/>
            </div>
            <div class="field">
              <label class="fieldLabel">Date</label>
              <input id="lDate" class="fieldInput" type="date" value="${today}"/>
            </div>
          </div>
          <div class="field">
            <label class="fieldLabel">Notes</label>
            <input id="lNotes" class="fieldInput" type="text" placeholder="What did you work on?"/>
          </div>
          <div class="field">
            <label class="fieldLabel">Resource Link (optional)</label>
            <input id="lRes" class="fieldInput" type="url" placeholder="https://…"/>
          </div>
        </div>
        <div class="panelActions">
          <span class="spacer"></span>
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveLog()"${noSkills?' disabled':''}>Save</button>
        </div>
      </div>
    </div>`;
  if (!noSkills) document.getElementById('lSkill').focus();
}

function saveLog() {
  const skillId = document.getElementById('lSkill').value;
  const dur     = parseInt(document.getElementById('lDur').value, 10);
  const date    = document.getElementById('lDate').value;
  if (!skillId || !dur || dur < 1 || !date) return;
  D.logs.push({ id:uid(), skillId, duration:dur, date,
    notes:    document.getElementById('lNotes').value.trim(),
    resource: document.getElementById('lRes').value.trim() });
  persist(); closeModal(); render();
}

/* ── Resource Modal ── */
function openResourceModal(id) {
  const r = id ? D.resources.find(r=>r.id===id) : null;
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay">
      <div class="panel">
        <div class="panelHead">
          <div>
            <div class="panelEyebrow">${r?'Edit Resource':'New Resource'}</div>
            <div class="panelTitle">${r?esc(r.title):'Add Resource'}</div>
          </div>
          <button class="panelClose" onclick="closeModal()">×</button>
        </div>
        <div class="panelBody">
          <div class="field">
            <label class="fieldLabel">Title</label>
            <input id="rTitle" class="fieldInput" type="text" placeholder="e.g. Clean Code by Robert Martin" value="${esc(r?r.title:'')}"/>
          </div>
          <div class="formGrid">
            <div class="field">
              <label class="fieldLabel">Type</label>
              <select id="rType" class="fieldInput">
                <option value="book"${!r||r.type==='book'?' selected':''}>Book</option>
                <option value="course"${r&&r.type==='course'?' selected':''}>Course</option>
                <option value="mentor"${r&&r.type==='mentor'?' selected':''}>Mentor</option>
                <option value="article"${r&&r.type==='article'?' selected':''}>Article</option>
              </select>
            </div>
            <div class="field">
              <label class="fieldLabel">Cost (€)</label>
              <input id="rCost" class="fieldInput" type="number" min="0" step="0.01" placeholder="0" value="${esc(r?r.cost||'':'')}"/>
            </div>
          </div>
          <div class="field">
            <label class="fieldLabel">URL (optional)</label>
            <input id="rUrl" class="fieldInput" type="url" placeholder="https://…" value="${esc(r?r.url||'':'')}"/>
          </div>
          <div class="field">
            <label class="fieldLabel">Rating (1–5)</label>
            <input id="rRating" class="fieldInput" type="number" min="1" max="5" placeholder="5" value="${esc(r?r.rating||'':'')}"/>
          </div>
        </div>
        <div class="panelActions">
          ${r?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteRes('${esc(id)}');closeModal()">Delete</button>`:''}
          <span class="spacer"></span>
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveResource('${esc(id||'')}')">Save</button>
        </div>
      </div>
    </div>`;
  document.getElementById('rTitle').focus();
}

function saveResource(id) {
  const title = document.getElementById('rTitle').value.trim();
  if (!title) { document.getElementById('rTitle').focus(); return; }
  const obj = { title, type: document.getElementById('rType').value,
    cost: document.getElementById('rCost').value.trim(),
    url:  document.getElementById('rUrl').value.trim(),
    rating: parseInt(document.getElementById('rRating').value,10)||0 };
  if (id) { const r=D.resources.find(r=>r.id===id); if(r) Object.assign(r,obj); }
  else D.resources.push({ id:uid(), ...obj });
  persist(); closeModal(); render();
}

/* ── Main render ── */
function render() {
  renderStats();
  renderSkillTree();
  renderLog();
  renderResources();
  renderLineChart();
  renderSkillBars();
}
render();
</script>
</body>
</html>
