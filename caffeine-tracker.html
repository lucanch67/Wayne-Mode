<style>
:root {
  color-scheme: dark;
  --bg:#080808; --bg-elevated:#111111;
  --surface:rgba(255,255,255,0.035); --surface-2:rgba(255,255,255,0.065);
  --fg:#F2F2F2; --muted:rgba(242,242,242,0.50); --muted-strong:rgba(242,242,242,0.74);
  --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.15);
  --brand:#00FF88; --brand-2:#00CC6A; --brand-ink:#000000;
  --brand-soft:rgba(0,255,136,0.09); --brand-line:rgba(0,255,136,0.22); --brand-glow:rgba(0,255,136,0.30);
  --pos:#00FF88; --pos-soft:rgba(0,255,136,0.09); --pos-line:rgba(0,255,136,0.22);
  --neg:#FF4060; --neg-soft:rgba(255,64,96,0.10); --neg-line:rgba(255,64,96,0.22);
  --warn:#FFB930; --warn-soft:rgba(255,185,48,0.10); --warn-line:rgba(255,185,48,0.24);
  --track:rgba(255,255,255,0.07);
  --card-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 20px 48px -28px rgba(0,0,0,0.95);
  --glow-1:rgba(0,255,136,0.05); --glow-2:rgba(0,200,100,0.025);
  --grain-opacity:0.04; --overlay:rgba(0,0,0,0.80);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:16px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg:#060812; --bg-elevated:#0E0F1E;
  --surface:rgba(120,130,255,0.045); --surface-2:rgba(120,130,255,0.08);
  --fg:#EEF0FF; --muted:rgba(210,215,255,0.52); --muted-strong:rgba(210,215,255,0.76);
  --border:rgba(140,150,255,0.11); --border-strong:rgba(140,150,255,0.22);
  --brand:#8B7BFF; --brand-2:#B9ABFF; --brand-ink:#0A0922;
  --brand-soft:rgba(139,123,255,0.15); --brand-line:rgba(139,123,255,0.30); --brand-glow:rgba(124,107,255,0.50);
  --pos:#4FE3D0; --pos-soft:rgba(79,227,208,0.13); --pos-line:rgba(79,227,208,0.28);

  --glow-1:rgba(124,107,255,0.15); --glow-2:rgba(79,227,208,0.08);

  --brand:#6A45FF; --brand-2:#8E6BFF; --brand-ink:#FFFFFF;
  --brand-soft:rgba(106,69,255,0.08); --brand-line:rgba(106,69,255,0.24); --brand-glow:rgba(106,69,255,0.28);
  --pos:#0E9E64; --pos-soft:rgba(14,158,100,0.10); --pos-line:rgba(14,158,100,0.26);
  --neg:#E11D63; --neg-soft:rgba(225,29,99,0.08); --neg-line:rgba(225,29,99,0.24);
  --warn:#B4690E; --warn-soft:rgba(180,105,14,0.10); --warn-line:rgba(180,105,14,0.24);
  --track:rgba(23,22,60,0.08);
  --card-shadow:0 1px 2px rgba(23,22,60,0.06), 0 16px 34px -24px rgba(23,22,60,0.20);
  --glow-1:rgba(106,69,255,0.07); --glow-2:rgba(14,158,100,0.04);
  --grain-opacity:0.02; --overlay:rgba(28,26,52,0.42);
}
[data-theme="vision"] {
  color-scheme: dark;
  --bg:#050505; --bg-elevated:#0D0D0D;
  --surface:rgba(255,255,255,0.03); --surface-2:rgba(255,255,255,0.055);
  --fg:#F5F5F5; --muted:rgba(255,255,255,0.45); --muted-strong:rgba(255,255,255,0.72);
  --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.14);
  --brand:#FFFFFF; --brand-2:rgba(255,255,255,0.68); --brand-ink:#000000;
  --brand-soft:rgba(255,255,255,0.06); --brand-line:rgba(255,255,255,0.14); --brand-glow:rgba(255,255,255,0.20);
  --pos:#22C55E; --pos-soft:rgba(34,197,94,0.10); --pos-line:rgba(34,197,94,0.26);
  --neg:#EF4444; --neg-soft:rgba(239,68,68,0.10); --neg-line:rgba(239,68,68,0.26);
  --warn:#F59E0B; --warn-soft:rgba(245,158,11,0.10); --warn-line:rgba(245,158,11,0.26);
  --track:rgba(255,255,255,0.06);
  --card-shadow:0 0 0 1px rgba(255,255,255,0.05) inset, 0 22px 56px -28px rgba(0,0,0,0.80);
  --glow-1:rgba(255,255,255,0.04); --glow-2:rgba(255,255,255,0.02);
  --grain-opacity:0.038; --overlay:rgba(5,5,5,0.92);
}
[data-theme="vision"] .card{background:rgba(255,255,255,0.025);backdrop-filter:blur(24px) saturate(1.1);-webkit-backdrop-filter:blur(24px) saturate(1.1);border-color:rgba(255,255,255,0.07);}
[data-theme="vision"] .card:hover{background:rgba(255,255,255,0.045);border-color:rgba(255,255,255,0.16);box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 0 40px -12px rgba(255,255,255,0.07),var(--card-shadow);}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--text-base);-webkit-font-smoothing:antialiased;transition:background var(--duration) var(--ease)}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.024) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.024) 1px,transparent 1px);
  background-size:44px 44px}
[data-theme="daylight"] body::before{background-image:linear-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.05) 1px,transparent 1px)}

.grain-overlay::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:var(--grain-opacity);mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size:200px 200px}

.page{position:relative;min-height:100dvh;padding:var(--space-8) var(--space-5) var(--space-16);isolation:isolate}
.page::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:-1;
  background:radial-gradient(58% 42% at 82% 6%,var(--glow-1),transparent 70%),
              radial-gradient(48% 38% at 12% 92%,var(--glow-2),transparent 72%)}
.shell{max-width:720px;margin:0 auto;position:relative;z-index:2}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);margin-bottom:var(--space-8)}
.headerLeft{display:flex;flex-direction:column;gap:var(--space-2)}
.headerRight{display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-2)}
.back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:6px 13px 6px 9px;
  background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:var(--radius-pill);
  color:var(--brand);font-size:var(--text-xs);font-weight:600;text-decoration:none;
  transition:background var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium)}
.back:hover{background:var(--brand-line);border-color:var(--brand)}
.title{font-family:var(--font-display);font-weight:600;font-size:var(--text-3xl);line-height:1.0;letter-spacing:-0.03em;margin:0}
.subtitle{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);margin:5px 0 0}

/* ── Theme switcher ── */
.themeSeg{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px}
.themeBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.02em;padding:5px 11px 5px 8px;border-radius:var(--radius-pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium)}
.themeBtn:hover{color:var(--muted-strong)}
.themeSwatch{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 1px var(--border-strong) inset;flex-shrink:0}
.themeBtnActive,.themeBtnActive:hover{background:var(--brand-soft);color:var(--fg)}
.themeBtnActive .themeSwatch{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--brand)}
@media(max-width:420px){.themeSeg{display:none}}

/* ── Status row ── */
.statRow{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-5)}
@media(max-width:560px){.statRow{grid-template-columns:repeat(2,1fr)}}
.statBox{display:flex;flex-direction:column;gap:4px;padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
.statBox[data-tone="ok"]{border-color:var(--pos-line);background:var(--pos-soft)}
.statBox[data-tone="warn"]{border-color:var(--warn-line);background:var(--warn-soft)}
.statBox[data-tone="over"]{border-color:var(--neg-line);background:var(--neg-soft)}
.statVal{font-family:var(--font-display);font-weight:600;font-size:var(--text-xl);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.statLbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}

/* ── Warning banner ── */
.banner{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-5);font-size:var(--text-sm);line-height:1.5}
.banner-warn{background:var(--warn-soft);border:1px solid var(--warn-line);color:var(--fg)}
.banner-over{background:var(--neg-soft);border:1px solid var(--neg-line);color:var(--fg)}
.banner-sleep{background:var(--surface-2);border:1px solid var(--border-strong);color:var(--fg)}
.bannerIcon{font-size:18px;flex-shrink:0;margin-top:1px}
.bannerText strong{color:var(--warn)}
.banner-over .bannerText strong{color:var(--neg)}

/* ── Curve card ── */
.curveCard{position:relative;padding:var(--space-5);border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);box-shadow:var(--card-shadow);margin-bottom:var(--space-5);overflow:hidden}
.curveCard::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent)}
.curveHead{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap}
.curveEyebrow{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--brand)}
.curveLegend{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap}
.legendItem{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.legendDot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.curveWrap{position:relative;width:100%;height:160px}
.curveSvg{width:100%;height:100%;overflow:visible;display:block}
.curveEmpty{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:0.08em}
.curveTimeRow{position:relative;height:14px;margin-top:var(--space-2)}
.curveTimeLbl{position:absolute;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;white-space:nowrap}

/* ── Search ── */
.searchRow{display:flex;gap:var(--space-3);margin-bottom:var(--space-3)}
.searchWrap{position:relative;flex:1}
.searchIcon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.searchInput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px 10px 36px;color:var(--fg);font-family:var(--font-ui);font-size:var(--text-sm);outline:none;transition:border-color var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium)}
.searchInput:focus{border-color:var(--brand-line);box-shadow:0 0 0 3px var(--brand-soft)}
.searchInput::placeholder{color:var(--muted)}

/* ── Results ── */
.results{display:flex;flex-direction:column;gap:6px;margin-bottom:var(--space-5)}
.drinkRow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);cursor:pointer;transition:border-color var(--duration) var(--ease-premium),background var(--duration) var(--ease-premium),transform var(--duration) var(--ease-premium)}
.drinkRow:hover{border-color:var(--brand-line);background:var(--brand-soft);transform:translateX(2px)}
.drinkLeft{display:flex;flex-direction:column;gap:2px;min-width:0}
.drinkName{font-weight:600;font-size:var(--text-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drinkMeta{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.06em}
.drinkRight{display:flex;align-items:center;gap:var(--space-3);flex-shrink:0}
.drinkMg{font-family:var(--font-display);font-weight:600;font-size:var(--text-lg);font-variant-numeric:tabular-nums;color:var(--brand)}
.drinkUnit{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.logBtn{appearance:none;background:var(--brand);border:0;border-radius:var(--radius-md);color:var(--brand-ink);font-family:var(--font-ui);font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer;white-space:nowrap;transition:filter var(--duration) var(--ease),transform var(--duration) var(--ease)}
.logBtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.emptyNote{font-family:var(--font-mono);font-size:12px;color:var(--muted);padding:var(--space-4) 0;text-align:center;letter-spacing:0.06em}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);padding:0.6rem var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-family:var(--font-ui);font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--fg);white-space:nowrap;text-decoration:none;transition:background var(--duration) var(--ease),border-color var(--duration) var(--ease),color var(--duration) var(--ease),filter var(--duration) var(--ease),box-shadow var(--duration) var(--ease),transform var(--duration) var(--ease)}
.btn-primary{background:var(--brand);color:var(--brand-ink);font-weight:700}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 0 26px var(--brand-glow);transform:translateY(-1px)}
.btn-ghost{color:var(--fg);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-strong);background:var(--surface)}
.btn-link{color:var(--muted-strong);padding:var(--space-2)}
.btn-link:hover{color:var(--neg)}

/* ── Today's log ── */
.secTitle{font-family:var(--font-display);font-weight:600;font-size:var(--text-lg);letter-spacing:-0.01em;margin:var(--space-6) 0 var(--space-3)}
.logList{display:flex;flex-direction:column;gap:6px}
.logEntry{display:flex;align-items:flex-start;gap:var(--space-3);padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
.logEntryLeft{flex:1;min-width:0}
.logEntryName{font-weight:600;font-size:var(--text-sm)}
.logEntryMeta{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-top:3px}
.logEntryTimes{display:flex;gap:var(--space-4);margin-top:6px;flex-wrap:wrap}
.timeChip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface-2);font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em}
.timeChip.peak{border-color:var(--brand-line);background:var(--brand-soft);color:var(--brand)}
.timeChip.crash{border-color:var(--warn-line);background:var(--warn-soft);color:var(--warn)}
.logEntryMg{font-family:var(--font-display);font-weight:600;font-size:var(--text-lg);color:var(--brand);font-variant-numeric:tabular-nums;flex-shrink:0}
.xBtn{appearance:none;background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;flex-shrink:0;font-size:14px;display:grid;place-items:center;transition:color var(--duration),border-color var(--duration)}
.xBtn:hover{color:var(--neg);border-color:var(--neg-line)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:1000;display:grid;place-items:center;padding:var(--space-4);animation:fade 200ms var(--ease-premium)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.panel{width:min(440px,100%);background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:var(--space-6);box-shadow:0 28px 70px -16px rgba(0,0,0,0.7);animation:rise 320ms var(--ease-premium);max-height:90dvh;overflow-y:auto}
@keyframes rise{from{opacity:0;transform:translateY(12px) scale(0.98)}to{opacity:1;transform:none}}
.panelHead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-5)}
.panelEyebrow{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--brand)}
.panelTitle{font-family:var(--font-display);font-weight:600;font-size:var(--text-2xl);letter-spacing:-0.03em;margin:var(--space-2) 0 0}

const CAT_LABEL = { coffee:'Coffee', energy:'Energy drink', tea:'Tea', soda:'Soda', pre:'Pre-workout', pill:'Supplement', food:'Food' };

/* ================================================================
 * Profile & health data
 * ================================================================ */
function loadJSON(key, def) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : def; } catch(e) { return def; } }

function getProfile() {
  const p = loadJSON('patron_profile_v1', {});
  return {
    age: p.age ? Number(p.age) : 25,
    sex: p.sex || '',
    weightKg: p.weightKg || 70,
    caffeineMgPerDay: p.caffeineMgPerDay || null,
  };
}

function getHealth() {
  return loadJSON('patron_health_v1', null);
}

/* ================================================================
 * Pharmacokinetic model
 * Caffeine oral one-compartment: C(t) = D * ka/(ka−kel) * (e^−kel·t − e^−ka·t)
 * ka = ln2 / 0.75 h  (Tmax ≈ 45 min)
 * kel = ln2 / half_life
 * ================================================================ */
function halfLifeHours() {
  const p = getProfile();
  const h = getHealth();
  let hl = 5.0;
  // Age adjustment
  if (p.age >= 60) hl += 1.5;
  else if (p.age >= 45) hl += 0.8;
  else if (p.age >= 35) hl += 0.3;
  // Sex adjustment (small average effect)
  if (p.sex === 'F') hl += 0.4;
  // Sleep deprivation slows metabolism
  if (h && h.sleepHours != null && h.sleepHours < 6) hl += 0.7;
  return Math.min(Math.max(hl, 3), 9);
}

const KA = Math.LN2 / 0.75; // absorption rate constant

function doseLevel(doseMs, doseMg, atMs, kel) {
  const dt = (atMs - doseMs) / 3600000;
  if (dt <= 0) return 0;
  const c = doseMg * (KA / (KA - kel)) * (Math.exp(-kel * dt) - Math.exp(-KA * dt));
  return Math.max(0, c);
}

function totalLevel(logs, atMs) {
  if (!logs.length) return 0;
  const kel = Math.LN2 / halfLifeHours();
  return logs.reduce((sum, l) => sum + doseLevel(l.ts, l.mg, atMs, kel), 0);
}

/* ================================================================
 * Storage
 * ================================================================ */
const STORE_KEY = 'caffeine_tracker_v1';
const todayKey = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };

function load() {
  const s = loadJSON(STORE_KEY, null);
  if (s && s.dateKey === todayKey()) return s;
  return { dateKey: todayKey(), logs: [] };
}

function save(state) { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {} }

let state = load();

/* ================================================================
 * Helpers
 * ================================================================ */
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  const ap = h < 12 ? 'am' : 'pm';
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0') + ap;
}
function fmtHourMin(ms) {
  const m = Math.round(ms / 60000);
  if (m < 60) return m + 'min';
  const h = Math.floor(m / 60), rm = m % 60;
  return h + 'h' + (rm ? ' ' + rm + 'm' : '');
}
function genId() { return Math.random().toString(36).slice(2, 9); }

/* daily caffeine limit */
function dailyLimit() {
  const p = getProfile();
  // FDA 400mg; adjust slightly for low body weight
  if (p.weightKg < 55) return 300;
  return 400;
}

/* ================================================================
 * Peak & crash finder for a single dose log entry
 * ================================================================ */
function peakCrashForEntry(entry) {
  const kel = Math.LN2 / halfLifeHours();
  // Analytical Tmax: t_max = ln(ka/kel) / (ka - kel)
  const tMaxH = Math.log(KA / kel) / (KA - kel);
  const peakTs = entry.ts + tMaxH * 3600000;
  const peakMg = doseLevel(entry.ts, entry.mg, peakTs, kel);
  // Crash = when this dose drops below 25% of its peak (or 15mg, whichever larger)
  const threshold = Math.max(15, peakMg * 0.25);
  let crashTs = null;
  for (let dt = tMaxH * 3600000; dt <= 24 * 3600000; dt += 5 * 60000) {
    const t = entry.ts + dt;
    if (doseLevel(entry.ts, entry.mg, t, kel) <= threshold) { crashTs = t; break; }
  }
  return { peakTs, peakMg: Math.round(peakMg), crashTs };
}

/* ================================================================
 * Stats for status row
 * ================================================================ */
function computeStats() {
  const now = Date.now();
  const logs = state.logs;
  const totalMg = logs.reduce((s, l) => s + l.mg, 0);
  const curLevel = Math.round(totalLevel(logs, now));
  const limit = dailyLimit();
  const kel = Math.LN2 / halfLifeHours();

  // Find global peak (next 8h)
  let peakLevel = curLevel, peakTs = now;
  for (let dt = 0; dt <= 8 * 3600000; dt += 2 * 60000) {
    const t = now + dt;
    const c = totalLevel(logs, t);
    if (c > peakLevel) { peakLevel = c; peakTs = t; }
  }

  // Find crash (next 20h, when level drops below max(30, 15% of peakLevel))
  const crashThreshold = Math.max(30, peakLevel * 0.15);
  let crashTs = null;
  const searchStart = peakTs;
  for (let dt = 0; dt <= 20 * 3600000; dt += 5 * 60000) {
    const t = searchStart + dt;
    if (totalLevel(logs, t) <= crashThreshold) { crashTs = t; break; }
  }

  // Sleep time from health or default 23:00
  const health = getHealth();
  let bedHour = 23, bedMin = 0;
  if (health && health.bedtime) {
    const [bh, bm] = String(health.bedtime).split(':').map(Number);
    if (isFinite(bh)) { bedHour = bh; bedMin = bm || 0; }
  }
  const bedTs = (() => {
    const d = new Date(); d.setHours(bedHour, bedMin, 0, 0);
    if (d.getTime() < now) d.setDate(d.getDate() + 1);
    return d.getTime();
  })();
  const levelAtBed = Math.round(totalLevel(logs, bedTs));

  return { totalMg, curLevel, peakLevel: Math.round(peakLevel), peakTs, crashTs, limit, bedTs, levelAtBed };
}

/* ================================================================
 * Render status row
 * ================================================================ */
function renderStatus() {
  const { totalMg, curLevel, peakLevel, peakTs, crashTs, limit } = computeStats();
  const pct = Math.min(100, Math.round((totalMg / limit) * 100));
  const tone = totalMg > limit ? 'over' : totalMg > limit * 0.75 ? 'warn' : 'ok';
  const now = Date.now();
  const peakIn = peakTs > now ? fmtHourMin(peakTs - now) : 'now';

  document.getElementById('statusRow').innerHTML =
    '<div class="statBox" data-tone="' + tone + '">' +
      '<div class="statVal">' + curLevel + ' <span style="font-size:var(--text-sm);color:var(--muted)">mg</span></div>' +
      '<div class="statLbl">current level</div>' +
    '</div>' +
    '<div class="statBox">' +
      '<div class="statVal">' + (peakLevel || '—') + ' <span style="font-size:var(--text-sm);color:var(--muted)">mg</span></div>' +
      '<div class="statLbl">peak ' + (peakLevel ? 'in ' + peakIn : '—') + '</div>' +
    '</div>' +
    '<div class="statBox">' +
      '<div class="statVal">' + (crashTs ? fmtTime(crashTs) : '—') + '</div>' +
      '<div class="statLbl">crash (75% cleared)</div>' +
    '</div>' +
    '<div class="statBox" data-tone="' + tone + '">' +
      '<div class="statVal">' + totalMg + '<span style="font-size:var(--text-sm);color:var(--muted)">/' + limit + '</span></div>' +
      '<div class="statLbl">daily mg · ' + pct + '%</div>' +
    '</div>';
}

/* ================================================================
 * Render warning banners
 * ================================================================ */
function renderBanners() {
  const { totalMg, limit, levelAtBed, bedTs, crashTs } = computeStats();
  const now = Date.now();
  const hoursUntilBed = (bedTs - now) / 3600000;
  let html = '';

  if (totalMg > limit) {
    html += '<div class="banner banner-over"><span class="bannerIcon">⚠</span><div class="bannerText"><strong>Over daily limit</strong> — you\'ve consumed ' + totalMg + ' mg today, exceeding the ' + limit + ' mg recommended maximum. Avoid any more caffeine today.</div></div>';
  } else if (totalMg > limit * 0.80) {
    html += '<div class="banner banner-warn"><span class="bannerIcon">⚡</span><div class="bannerText"><strong>Approaching limit</strong> — ' + totalMg + ' mg of ' + limit + ' mg consumed. Consider stopping here.</div></div>';
  }

  if (levelAtBed > 100 && bedTs > now) {
    html += '<div class="banner banner-sleep"><span class="bannerIcon">🌙</span><div class="bannerText"><strong>Sleep impact warning</strong> — estimated <strong>' + levelAtBed + ' mg</strong> of caffeine still active at bedtime (' + fmtTime(bedTs) + '). This may reduce sleep quality. Caffeine has a ~' + halfLifeHours().toFixed(1) + 'h half-life for you.</div></div>';
  } else if (crashTs && crashTs < now + 7200000 && state.logs.length) {
    html += '<div class="banner banner-warn"><span class="bannerIcon">💤</span><div class="bannerText"><strong>Energy dip incoming</strong> — crash estimated at ' + fmtTime(crashTs) + '. Consider a small dose now to bridge, or prepare to rest.</div></div>';
  }

  document.getElementById('banners').innerHTML = html;
}

/* ================================================================
 * Render caffeine curve SVG
 * ================================================================ */
function renderCurve() {
  const logs = state.logs;
  const area = document.getElementById('curveArea');
  const timeRow = document.getElementById('curveTimeRow');

  if (!logs.length) {
    area.innerHTML = '<div class="curveEmpty">Log a drink to see your caffeine curve</div>';
    timeRow.innerHTML = '';
    return;
  }

  // Window: 6:00 AM today → midnight (18 h), or earliest log − 30 min → latest log + 8 h
  const today6am = (() => { const d = new Date(); d.setHours(6,0,0,0); return d.getTime(); })();
  const midnight = (() => { const d = new Date(); d.setHours(24,0,0,0); return d.getTime(); })();
  const firstLog = Math.min(...logs.map(l => l.ts));
  const winStart = Math.min(today6am, firstLog - 30 * 60000);
  const winEnd   = Math.max(midnight, firstLog + 20 * 3600000);
  const winMs = winEnd - winStart;

  // Sample every 10 min
  const steps = 120;
  const pts = [];
  let maxLevel = 20;
  for (let i = 0; i <= steps; i++) {
    const t = winStart + (i / steps) * winMs;
    const c = totalLevel(logs, t);
    pts.push({ t, c });
    if (c > maxLevel) maxLevel = c;
  }
  // Add some headroom
  maxLevel = Math.ceil(maxLevel * 1.15 / 50) * 50;

  const W = 700, H = 140, padL = 38, padR = 12, padT = 12, padB = 8;
  const iW = W - padL - padR, iH = H - padT - padB;

  function xPx(t) { return padL + ((t - winStart) / winMs) * iW; }
  function yPx(c) { return padT + iH - (c / maxLevel) * iH; }

  // Danger zone rect (> 400 mg)
  const limit = dailyLimit();
  const dangerY = yPx(limit);
  const warnY = yPx(limit * 0.75);

  // Build path
  const poly = pts.map((p, i) => (i === 0 ? 'M' : 'L') + xPx(p.t).toFixed(1) + ' ' + yPx(p.c).toFixed(1)).join(' ');
  const areaPath = poly + ' L' + xPx(pts[pts.length-1].t).toFixed(1) + ' ' + (padT+iH) + ' L' + padL + ' ' + (padT+iH) + ' Z';

  // Now marker
  const now = Date.now();
  const nowX = xPx(now).toFixed(1);
  const nowY = yPx(totalLevel(logs, now)).toFixed(1);

  // Peak marker
  const stats = computeStats();
  const pkX = xPx(stats.peakTs).toFixed(1);
  const pkY = yPx(stats.peakLevel).toFixed(1);

  // Bedtime line
  const health = getHealth();
  let bedHour = 23;
  if (health && health.bedtime) { const [bh] = String(health.bedtime).split(':').map(Number); if (isFinite(bh)) bedHour = bh; }
  const bedTs = (() => { const d = new Date(); d.setHours(bedHour, 0, 0, 0); if (d.getTime() < winStart) d.setDate(d.getDate()+1); return d.getTime(); })();
  const bedX = xPx(bedTs).toFixed(1);

  // Y-axis labels
  const yLabels = [0, Math.round(maxLevel*0.25), Math.round(maxLevel*0.5), Math.round(maxLevel*0.75), maxLevel];

  // X-axis time labels (every 3h)
  const xLabels = [];
  for (let h = 0; h <= 24; h += 3) {
    const d = new Date(); d.setHours(h, 0, 0, 0);
    const t = d.getTime();
    if (t >= winStart && t <= winEnd) xLabels.push({ t, label: (h % 12 || 12) + (h < 12 ? 'am' : 'pm') });
  }

  const svg = `<svg class="curveSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-label="Caffeine level over time">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--brand)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="var(--brand)" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <!-- grid -->
  ${yLabels.map(v => `<line x1="${padL}" y1="${yPx(v).toFixed(1)}" x2="${W-padR}" y2="${yPx(v).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>`).join('')}
  ${yLabels.map(v => `<text x="${padL-4}" y="${(yPx(v)+4).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono'" font-size="9" fill="var(--muted)">${v}</text>`).join('')}
  <!-- warn zone -->
  <rect x="${padL}" y="${dangerY.toFixed(1)}" width="${iW}" height="${Math.max(0,iH-(dangerY-padT)).toFixed(1)}" fill="var(--neg)" opacity="0.05"/>
  <rect x="${padL}" y="${warnY.toFixed(1)}" width="${iW}" height="${Math.max(0,dangerY-warnY).toFixed(1)}" fill="var(--warn)" opacity="0.05"/>
  <!-- bedtime line -->
  <line x1="${bedX}" y1="${padT}" x2="${bedX}" y2="${padT+iH}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="${bedX}" y="${padT-2}" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="var(--muted)">bed</text>
  <!-- now line -->
  <line x1="${nowX}" y1="${padT}" x2="${nowX}" y2="${padT+iH}" stroke="var(--brand)" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- area fill -->
  <path d="${areaPath}" fill="url(#curveGrad)"/>
  <!-- curve line -->
  <path d="${poly}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- peak marker -->
  ${stats.peakLevel > 5 ? `<circle cx="${pkX}" cy="${pkY}" r="4" fill="var(--warn)" stroke="var(--bg)" stroke-width="1.5"/>
  <text x="${pkX}" y="${(Number(pkY)-8).toFixed(1)}" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="var(--warn)">↑ ${stats.peakLevel}mg</text>` : ''}
  <!-- now dot -->
  <circle cx="${nowX}" cy="${nowY}" r="4" fill="var(--brand)" stroke="var(--bg)" stroke-width="2"/>
  <circle cx="${nowX}" cy="${nowY}" r="7" fill="none" stroke="var(--brand)" stroke-width="1" opacity="0.4"/>
  </svg>`;

  area.innerHTML = svg;

  timeRow.innerHTML = xLabels.map(xl => {
    const pct = (xPx(xl.t) / W * 100).toFixed(2);
    return `<span class="curveTimeLbl" style="left:${pct}%">${xl.label}</span>`;
  }).join('');
}

/* ================================================================
 * Search
 * ================================================================ */
let searchQ = '';

function matchDrinks(q) {
  if (!q.trim()) return DRINKS.slice(0, 8);
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  return DRINKS.filter(d => words.every(w => d.name.toLowerCase().includes(w) || CAT_LABEL[d.cat].toLowerCase().includes(w))).slice(0, 10);
}

function renderResults() {
  const list = matchDrinks(searchQ);
  const el = document.getElementById('results');
  if (!list.length) {
    el.innerHTML = '<div class="emptyNote">No match — use the Custom button to add it</div>';
    return;
  }
  el.innerHTML = list.map(d =>
    `<div class="drinkRow" data-name="${esc(d.name)}" data-mg="${d.mg}">
      <div class="drinkLeft">
        <div class="drinkName">${esc(d.name)}</div>
        <div class="drinkMeta">${CAT_LABEL[d.cat]}${d.ml ? ' · ' + d.ml + ' ml' : ''}</div>
      </div>
      <div class="drinkRight">
        <span class="drinkMg">${d.mg}</span><span class="drinkUnit">mg</span>
        <button class="logBtn" data-log="${esc(d.name)}" data-mg="${d.mg}">Log</button>
      </div>
    </div>`
  ).join('');
}

/* ================================================================
 * Render today's log
 * ================================================================ */
function renderLog() {
  const logs = state.logs;
  const title = document.getElementById('logTitle');
  const list = document.getElementById('logList');
  if (!logs.length) { title.style.display = 'none'; list.innerHTML = ''; return; }
  title.style.display = '';

  list.innerHTML = logs.slice().reverse().map(entry => {
    const { peakTs, crashTs } = peakCrashForEntry(entry);
    const now = Date.now();
    const peakLabel = peakTs > now ? 'Peak in ' + fmtHourMin(peakTs - now) : 'Peaked at ' + fmtTime(peakTs);
    const crashLabel = crashTs ? (crashTs > now ? 'Crash ~' + fmtTime(crashTs) : 'Cleared') : '—';
    return `<div class="logEntry">
      <div class="logEntryLeft">
        <div class="logEntryName">${esc(entry.name)}</div>
        <div class="logEntryMeta">${fmtTime(entry.ts)}</div>
        <div class="logEntryTimes">
          <span class="timeChip peak">⚡ ${peakLabel}</span>
          <span class="timeChip crash">💤 ${crashLabel}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-2);flex-shrink:0">
        <div class="logEntryMg">${entry.mg}<span style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-left:3px">mg</span></div>
        <button class="xBtn" data-del="${entry.id}" aria-label="Remove">×</button>
      </div>
    </div>`;
  }).join('');
}

/* ================================================================
 * Add entry
 * ================================================================ */
function addEntry(name, mg) {
  state.logs.push({ id: genId(), name, mg: Number(mg), ts: Date.now() });
  save(state);
  render();
}

function deleteEntry(id) {
  state.logs = state.logs.filter(l => l.id !== id);
  save(state);
  render();
}

/* ================================================================
 * Custom drink modal
 * ================================================================ */
let modalOpen = false;

function openCustomModal() {
  modalOpen = true;
  renderModal();
}

function renderModal() {
  const root = document.getElementById('modalRoot');
  if (!modalOpen) { root.innerHTML = ''; return; }
  root.innerHTML = `<div class="overlay" id="overlay">
    <div class="panel" data-stop="1">
      <div class="panelHead">
        <div>
          <div class="panelEyebrow">Custom</div>
          <h2 class="panelTitle">Add a drink</h2>
        </div>
        <button class="panelClose" id="closeModal">×</button>
      </div>
      <div class="field">
        <label class="fieldLabel" for="customName">Drink name</label>
        <input id="customName" class="fieldInput" type="text" placeholder="e.g. My energy drink" />
      </div>
      <div class="field">
        <label class="fieldLabel" for="customMg">Caffeine (mg)</label>
        <input id="customMg" class="fieldInput" type="number" min="0" max="1000" step="5" inputmode="numeric" placeholder="e.g. 150" />
      </div>
      <div class="panelActions">
        <button class="btn btn-ghost" id="cancelModal">Cancel</button>
        <button class="btn btn-primary" id="saveCustom">Log it</button>
      </div>
    </div>
  </div>`;

  document.getElementById('closeModal').onclick = () => { modalOpen = false; renderModal(); };
  document.getElementById('cancelModal').onclick = () => { modalOpen = false; renderModal(); };
  document.getElementById('overlay').onclick = (e) => { if (!e.target.closest('[data-stop]')) { modalOpen = false; renderModal(); } };
  document.getElementById('saveCustom').onclick = () => {
    const name = (document.getElementById('customName').value || '').trim();
    const mg = Number(document.getElementById('customMg').value);
    if (!name) { document.getElementById('customName').focus(); return; }
    if (!mg || mg <= 0) { document.getElementById('customMg').focus(); return; }
    addEntry(name, mg);
    modalOpen = false;
    renderModal();
  };
}

/* ================================================================
 * Theme switcher
 * ================================================================ */
const THEMES = [
  { key:'vision',   label:'Vision',   swatch:'linear-gradient(135deg,#FFFFFF,#888888)' },
  { key:'nocturne', label:'Nocturne', swatch:'#00FF88' },
  { key:'aurora',   label:'Aurora',   swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key:'daylight', label:'Daylight', swatch:'#6A45FF' },
];
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme') || 'vision'; } catch(e){ return 'vision'; } })();

function renderThemeSeg() {
  document.getElementById('themeSeg').innerHTML =
    '<div class="themeSeg" role="radiogroup" aria-label="Theme">'
    + THEMES.map(t => '<button type="button" class="themeBtn ' + (t.key === currentTheme ? 'themeBtnActive' : '') + '" data-theme="' + t.key + '"><span class="themeSwatch" style="background:' + t.swatch + '"></span>' + t.label + '</button>').join('')
    + '</div>';
}

document.getElementById('themeSeg').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-theme]');
  if (!btn) return;
  currentTheme = btn.dataset.theme;
  document.documentElement.setAttribute('data-theme', currentTheme);
  try { localStorage.setItem('patron_theme', currentTheme); } catch(e) {}
  renderThemeSeg();
});

/* ================================================================
 * Full render
 * ================================================================ */
function render() {
  renderThemeSeg();
  renderStatus();
  renderBanners();
  renderCurve();
  renderResults();
  renderLog();
}

/* ================================================================
 * Events
 * ================================================================ */
document.getElementById('searchInput').addEventListener('input', function() {
  searchQ = this.value;
  renderResults();
});

document.getElementById('customBtn').addEventListener('click', openCustomModal);

document.addEventListener('click', function(e) {
  const logBtn = e.target.closest('[data-log]');
  if (logBtn) { addEntry(logBtn.dataset.log, logBtn.dataset.mg); return; }
  const delBtn = e.target.closest('[data-del]');
  if (delBtn) { deleteEntry(delBtn.dataset.del); return; }
});

// Refresh curve dot every minute
setInterval(() => { if (state.logs.length) { renderStatus(); renderBanners(); renderCurve(); } }, 60000);

render();

})();
</script>
