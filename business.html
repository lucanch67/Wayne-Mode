<style>
/* ============================================================
 * Business OS — Wayne Mode — premium fintech dark skin
 * 3 themes: Nocturne / Aurora / Daylight
 * ============================================================ */

:root {
  color-scheme: dark;
  --bg: #0C0C12; --bg-elevated: #15151F;
  --surface: rgba(255,255,255,0.028); --surface-2: rgba(255,255,255,0.055);
  --fg: #F3F2F8; --muted: rgba(243,242,248,0.50); --muted-strong: rgba(243,242,248,0.74);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.17);
  --brand: #8B7CFF; --brand-2: #C7BBFF; --brand-ink: #130E2E;
  --brand-soft: rgba(139,124,255,0.12); --brand-line: rgba(139,124,255,0.28); --brand-glow: rgba(139,124,255,0.42);
  --pos: #46E0A8; --pos-soft: rgba(70,224,168,0.12); --pos-line: rgba(70,224,168,0.26);
  --neg: #FB7185; --neg-soft: rgba(251,113,133,0.12); --neg-line: rgba(251,113,133,0.26);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.10); --warn-line: rgba(251,191,36,0.26);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 18px 44px -30px rgba(0,0,0,0.85);
  --glow-1: rgba(139,124,255,0.12); --glow-2: rgba(70,224,168,0.05);
  --grain-opacity: 0.05; --overlay: rgba(6,6,12,0.66);
  --tabbar-grad: linear-gradient(to top, rgba(10,10,16,0.92) 55%, transparent);
  --tabbar-pill: rgba(26,26,36,0.9);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:18px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #080913; --bg-elevated: #12131F;
  --surface: rgba(150,160,255,0.045); --surface-2: rgba(150,160,255,0.08);
  --fg: #EEF0FF; --muted: rgba(220,225,255,0.52); --muted-strong: rgba(220,225,255,0.76);
  --border: rgba(150,160,255,0.11); --border-strong: rgba(150,160,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.32); --brand-glow: rgba(124,107,255,0.6);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.20); --glow-2: rgba(79,227,208,0.13);
  --grain-opacity: 0.05; --overlay: rgba(5,6,16,0.7);
  --tabbar-grad: linear-gradient(to top, rgba(8,9,19,0.92) 55%, transparent);
  --tabbar-pill: rgba(18,19,32,0.92);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F3F2FA; --bg-elevated: #FFFFFF;
  --surface: #FFFFFF; --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02; --overlay: rgba(28,26,52,0.4);
  --tabbar-grad: linear-gradient(to top, rgba(243,242,250,0.95) 55%, transparent);
  --tabbar-pill: rgba(255,255,255,0.94);
}
[data-theme="vision"] {
  color-scheme: dark;
  --bg: #050505; --bg-elevated: #0D0D0D;
  --surface: rgba(255,255,255,0.03); --surface-2: rgba(255,255,255,0.055);
  --fg: #F5F5F5; --muted: rgba(255,255,255,0.45); --muted-strong: rgba(255,255,255,0.72);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
  --brand: #FFFFFF; --brand-2: rgba(255,255,255,0.68); --brand-ink: #000000;
  --brand-soft: rgba(255,255,255,0.06); --brand-line: rgba(255,255,255,0.14); --brand-glow: rgba(255,255,255,0.20);
  --pos: #22C55E; --pos-soft: rgba(34,197,94,0.10); --pos-line: rgba(34,197,94,0.26);
  --neg: #EF4444; --neg-soft: rgba(239,68,68,0.10); --neg-line: rgba(239,68,68,0.26);
  --warn: #F59E0B; --warn-soft: rgba(245,158,11,0.10); --warn-line: rgba(245,158,11,0.26);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 22px 56px -28px rgba(0,0,0,0.80);
  --glow-1: rgba(255,255,255,0.04); --glow-2: rgba(255,255,255,0.02);
  --grain-opacity: 0.038; --overlay: rgba(5,5,5,0.92);
  --tabbar-grad: linear-gradient(to top, rgba(5,5,5,0.95) 55%, transparent);
  --tabbar-pill: rgba(13,13,13,0.94);
}
[data-theme="vision"] .card{background:rgba(255,255,255,0.025);backdrop-filter:blur(24px) saturate(1.1);-webkit-backdrop-filter:blur(24px) saturate(1.1);border-color:rgba(255,255,255,0.07);}
[data-theme="vision"] .card:hover{background:rgba(255,255,255,0.045);border-color:rgba(255,255,255,0.16);box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 0 40px -12px rgba(255,255,255,0.07),var(--card-shadow);}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: var(--text-base); -webkit-font-smoothing: antialiased; transition: background var(--duration) var(--ease); }

.grain-overlay::after { content:''; position: fixed; inset:0; pointer-events:none; z-index:1; opacity: var(--grain-opacity); mix-blend-mode: overlay; background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); background-size: 200px 200px; }

body::before { content:''; position: fixed; inset:0; pointer-events:none; z-index:0; background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px); background-size: 44px 44px; }
[data-theme="daylight"] body::before { background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); }

.page { position: relative; min-height: 100dvh; background: var(--bg); color: var(--fg); padding: var(--space-8) var(--space-5) var(--space-16); isolation: isolate; }
.page::before { content:''; position: absolute; inset:0; pointer-events:none; z-index:-1; background: radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%), radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%); }
.shell { max-width: 780px; margin: 0 auto; padding-bottom: 100px; position: relative; z-index: 2; }

/* ── Header ── */
.header { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-4); margin-bottom: var(--space-8); flex-wrap: wrap; }
.headerLeft { display:flex; flex-direction:column; gap: var(--space-3); }
.headerRight { display:flex; flex-direction:column; align-items:flex-end; gap: var(--space-2); }
.back { display:inline-flex; align-items:center; gap: var(--space-2); align-self:flex-start; padding: 6px 13px 6px 9px; background: var(--brand-soft); border: 1px solid var(--brand-line); border-radius: var(--radius-pill); color: var(--brand); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.01em; text-decoration: none; transition: background var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium); }
.back:hover { background: color-mix(in srgb, var(--brand) 18%, transparent); border-color: var(--brand); }
.title { font-family: var(--font-display); font-weight: 600; font-size: var(--text-3xl); line-height: 1.0; letter-spacing: -0.03em; color: var(--fg); margin: 0; }
.subtitle { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin: 0; }

/* ── Theme switcher ── */
.themeSeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
.themeBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer; display:inline-flex; align-items:center; gap:6px; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink:0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }

/* ── Section ── */
.section { margin-bottom: var(--space-8); }
.sectionHead { display:flex; align-items:baseline; justify-content:space-between; gap: var(--space-3); margin-bottom: var(--space-4); }
.sectionTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; color: var(--fg); display:inline-flex; align-items:center; gap: 10px; }
.sectionTitle::before { content:''; width: 7px; height: 18px; border-radius: 3px; background: var(--brand); box-shadow: 0 0 12px -2px var(--brand-glow); flex-shrink:0; }
.sectionNote { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

/* ── MRR Hero ── */
.mrrHero { padding: var(--space-6); background: var(--surface); border: 1px solid var(--brand-line); border-radius: var(--radius-lg); box-shadow: 0 0 40px -16px var(--brand-glow), var(--card-shadow); position: relative; overflow: hidden; margin-bottom: var(--space-5); display:flex; flex-direction:column; gap: var(--space-2); }
.mrrHero::before { content:''; position: absolute; top:0; left:0; right:0; height: 2px; background: linear-gradient(90deg, transparent, var(--brand), transparent); opacity: 0.7; }
.mrrHero::after { content:''; position: absolute; top: -40px; right: -40px; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, var(--brand-soft), transparent 70%); pointer-events:none; }
.heroEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--brand); position: relative; z-index: 1; }
.heroNum { font-family: var(--font-display); font-weight: 600; font-size: clamp(2.6rem, 7vw, 3.8rem); line-height: 1; letter-spacing: -0.035em; color: var(--fg); font-variant-numeric: tabular-nums; position: relative; z-index: 1; }
[data-theme="aurora"] .heroNum { background: linear-gradient(100deg, var(--brand-2) 0%, var(--pos) 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
.heroSub { font-size: 13px; color: var(--muted); position: relative; z-index: 1; }
.heroSubStrong { color: var(--muted-strong); font-weight: 600; }

/* ── Metrics grid ── */
.metricsGrid { display:grid; grid-template-columns: repeat(3,1fr); gap: var(--space-3); margin-bottom: var(--space-5); }
@media (max-width: 540px) { .metricsGrid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 380px) { .metricsGrid { grid-template-columns: 1fr; } }
.metricCard { padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display:flex; flex-direction:column; gap: 6px; box-shadow: var(--card-shadow); transition: border-color var(--duration) var(--ease-premium); }
.metricCard:hover { border-color: var(--brand-line); }
.metricLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.metricVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--fg); line-height: 1; }
.metricSub { font-size: 11px; color: var(--muted); }
.metricVal.good { color: var(--pos); }
.metricVal.warn { color: var(--warn); }
.metricVal.bad  { color: var(--neg); }

/* ── Progress bar ── */
.progressWrap { margin-bottom: var(--space-4); }
.progressLabel { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 8px; }
.progressName { font-size: 13px; font-weight: 600; color: var(--fg); }
.progressPct { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--brand); }
.progressBar { height: 7px; border-radius: var(--radius-pill); background: var(--track); overflow: hidden; }
.progressFill { height: 100%; border-radius: var(--radius-pill); background: var(--brand); transition: width 700ms var(--ease-premium); box-shadow: 0 0 10px var(--brand-glow); }
.progressFill.good { background: var(--pos); box-shadow: 0 0 10px var(--pos-soft); }
.progressFill.warn { background: var(--warn); }
.progressSub { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* ── Add card ── */
.addCard { padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-4); box-shadow: var(--card-shadow); }
.addCardHead { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
.addEyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.inputGroup { display:flex; flex-direction:column; gap: 5px; }
.inputLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.fieldInput { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; color: var(--fg); font-family: var(--font-mono); font-size: 14px; outline: none; transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }
.fieldInput::placeholder { color: var(--muted); }
.fieldInput:focus { border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
.addBtn { background: var(--brand); border:0; color: var(--brand-ink); font-family: var(--font-ui); font-size: 13px; font-weight: 700; border-radius: var(--radius-md); padding: 10px 18px; cursor: pointer; transition: filter var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium); white-space: nowrap; }
.addBtn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.ghostBtn { background: transparent; border: 1px solid var(--border); color: var(--muted-strong); font-family: var(--font-ui); font-size: 13px; font-weight: 500; border-radius: var(--radius-md); padding: 9px 15px; cursor: pointer; transition: color var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium); }
.ghostBtn:hover { color: var(--fg); border-color: var(--border-strong); }

/* ── Outreach counters ── */
.outreachGrid { display:grid; grid-template-columns: repeat(2,1fr); gap: var(--space-3); margin-bottom: var(--space-5); }
@media (max-width: 420px) { .outreachGrid { grid-template-columns: 1fr; } }
.outreachCard { padding: var(--space-4) var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); box-shadow: var(--card-shadow); transition: border-color var(--duration) var(--ease-premium); }
.outreachCard:hover { border-color: var(--brand-line); }
.outreachCardLeft { display:flex; flex-direction:column; gap: 4px; }
.outreachCardLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.outreachCardVal { font-family: var(--font-display); font-weight: 600; font-size: 30px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--fg); line-height: 1; }
.outreachCardSub { font-size: 11px; color: var(--muted); }
.outreachCardRight { display:flex; flex-direction:column; align-items:center; gap: var(--space-2); }
.outreachCardIcon { width: 36px; height: 36px; border-radius: 11px; display:grid; place-items:center; background: var(--brand-soft); border: 1px solid var(--brand-line); color: var(--brand); flex-shrink:0; }
.outreachCardIcon svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.countBtns { display:flex; gap: 6px; }
.countBtn { appearance:none; border: 1px solid var(--border); background: var(--surface); color: var(--fg); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1; display:grid; place-items:center; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); font-family: var(--font-mono); }
.countBtn:hover { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); }

/* ── Pipeline funnel ── */
.funnelWrap { display:flex; flex-direction:column; gap: 0; margin-bottom: var(--space-5); }
.funnelRow { display:flex; align-items:center; gap: var(--space-3); padding: 11px var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 6px; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.funnelRow:hover { border-color: var(--brand-line); background: color-mix(in srgb, var(--brand) 5%, transparent); }
.funnelStage { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); width: 120px; flex-shrink:0; }
.funnelBar { flex:1; height: 8px; border-radius: var(--radius-pill); background: var(--track); overflow: hidden; }
.funnelFill { height: 100%; border-radius: var(--radius-pill); background: var(--brand); transition: width 700ms var(--ease-premium); }
.funnelNum { font-family: var(--font-display); font-weight: 600; font-size: var(--text-base); font-variant-numeric: tabular-nums; color: var(--fg); width: 32px; text-align:right; flex-shrink:0; }
.funnelConv { font-family: var(--font-mono); font-size: 10px; width: 40px; text-align:right; flex-shrink:0; color: var(--muted); }
.funnelConv.good { color: var(--pos); }
.funnelConv.warn { color: var(--warn); }
.funnelArrow { text-align:left; padding: 1px 0 1px var(--space-4); font-size: 10px; color: var(--muted); }
.pipelineInputGrid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-3); }
@media (max-width: 500px) { .pipelineInputGrid { grid-template-columns: 1fr 1fr; } }

/* ── Goals ── */
.goalCard { padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-3); box-shadow: var(--card-shadow); position: relative; overflow: hidden; transition: border-color var(--duration) var(--ease-premium); }
.goalCard:hover { border-color: var(--brand-line); }
.goalCard.achieved { border-color: var(--pos-line); }
.goalCard.achieved::before { content:''; position: absolute; top:0; left:0; right:0; height: 2px; background: var(--pos); }
.goalHead { display:flex; align-items:flex-start; justify-content:space-between; gap: var(--space-3); margin-bottom: var(--space-3); }
.goalName { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); color: var(--fg); letter-spacing: -0.01em; }
.goalBadge { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; padding: 4px 11px; border-radius: var(--radius-pill); background: var(--brand-soft); color: var(--brand); border: 1px solid var(--brand-line); white-space: nowrap; flex-shrink:0; }
.goalBadge.done { background: var(--pos-soft); color: var(--pos); border-color: var(--pos-line); }
.goalProgress { font-family: var(--font-display); font-weight: 600; font-size: 32px; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; color: var(--fg); line-height: 1; margin-bottom: var(--space-3); }
.goalTarget { font-size: 14px; color: var(--muted); margin-left: 6px; font-family: var(--font-mono); font-weight: 400; letter-spacing: 0; }
.goalCheck { display:inline-flex; align-items:center; gap: 7px; font-size: 12px; color: var(--pos); margin-top: var(--space-2); font-weight: 600; font-family: var(--font-mono); }
.goalTime { font-size: 11px; color: var(--muted); margin-top: 5px; font-style: italic; }

/* ── Intelligence ── */
.intelGrid { display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-5); }
@media (max-width: 480px) { .intelGrid { grid-template-columns: 1fr; } }
.intelCard { padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display:flex; flex-direction:column; gap: 5px; box-shadow: var(--card-shadow); }
.intelLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.intelVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--fg); line-height: 1; }
.intelSub { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* ── Health ring ── */
.healthRing { display:grid; grid-template-columns: auto 1fr; gap: var(--space-5); align-items:center; padding: var(--space-5); background: var(--surface); border: 1px solid var(--brand-line); border-radius: var(--radius-lg); margin-bottom: var(--space-5); box-shadow: 0 0 30px -12px var(--brand-glow), var(--card-shadow); }
@media (max-width: 440px) { .healthRing { grid-template-columns: 1fr; justify-items: center; } }
.ringWrap { position: relative; width: 104px; height: 104px; display:grid; place-items:center; flex-shrink:0; }
.ringWrap svg { position: absolute; inset:0; transform: rotate(-90deg); }
.ringTrack { fill: none; stroke: var(--track); stroke-width: 9; }
.ringFill { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 900ms var(--ease-premium); }
.ringCenter { text-align:center; }
.ringNum { font-family: var(--font-display); font-weight: 600; font-size: 30px; letter-spacing: -0.03em; line-height: 1; }
.ringCap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.healthRows { display:flex; flex-direction:column; gap: var(--space-2); }
.healthRow { display:flex; align-items:baseline; justify-content:space-between; gap: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--border); }
.healthRow:last-child { border-bottom:0; padding-bottom:0; }
.healthRowLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.healthRowVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-base); font-variant-numeric: tabular-nums; }
.healthRowVal.good { color: var(--pos); }
.healthRowVal.warn { color: var(--warn); }
.healthRowVal.bad  { color: var(--neg); }

/* ── AI Insights ── */
.insightCard { padding: var(--space-4) var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--space-3); display:flex; gap: var(--space-3); align-items:flex-start; box-shadow: var(--card-shadow); }
.insightIcon { width: 34px; height: 34px; border-radius: 10px; display:grid; place-items:center; background: var(--brand-soft); border: 1px solid var(--brand-line); color: var(--brand); flex-shrink:0; font-size: 16px; margin-top: 1px; }
.insightBody { flex:1; min-width:0; }
.insightType { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brand); margin-bottom: 5px; font-weight: 600; }
.insightText { font-size: 13px; color: var(--muted-strong); line-height: 1.55; }
.insightText strong { color: var(--fg); font-weight: 700; }
.insightCard.warn .insightIcon { background: var(--warn-soft); border-color: var(--warn-line); color: var(--warn); }
.insightCard.warn .insightType { color: var(--warn); }
.insightCard.good .insightIcon { background: var(--pos-soft); border-color: var(--pos-line); color: var(--pos); }
.insightCard.good .insightType { color: var(--pos); }
.insightCard.neg .insightIcon { background: var(--neg-soft); border-color: var(--neg-line); color: var(--neg); }
.insightCard.neg .insightType { color: var(--neg); }

/* ── Tab bar ── */
.tabBar { position: fixed; bottom:0; left:0; right:0; z-index: 30; display:flex; justify-content:center; padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom)); background: var(--tabbar-grad); pointer-events:none; }
.tabBarInner { display:flex; gap: 3px; padding: 5px; background: var(--tabbar-pill); border: 1px solid var(--border); border-radius: var(--radius-pill); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 14px 44px rgba(0,0,0,0.45); pointer-events:auto; }
.tab { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; padding: 9px 15px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); white-space: nowrap; }
.tab:hover { color: var(--muted-strong); }
.tab.active, .tab.active:hover { background: var(--brand); color: var(--brand-ink); }

/* ── History table ── */
.histWrap { padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); overflow-x: auto; }
.histTable { width:100%; border-collapse:collapse; }
.histTable th { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-align:left; padding: 7px 10px 7px 0; border-bottom: 1px solid var(--border); }
.histTable th:not(:first-child) { text-align: center; }
.histTable td { font-size: 13px; padding: 10px 10px 10px 0; border-bottom: 1px solid var(--border); color: var(--fg); }
.histTable tr:last-child td { border-bottom:0; }
.histTable td:not(:first-child) { font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-align: center; }
.histDate { color: var(--muted); font-size: 12px; }
.histHighlight { color: var(--pos) !important; }

/* ── Empty state ── */
.emptyState { padding: var(--space-8) var(--space-5); text-align:center; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); margin-bottom: var(--space-4); }
.emptyTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); color: var(--muted-strong); margin-bottom: var(--space-2); }
.emptyBody { font-size: 12px; color: var(--muted); max-width: 38ch; margin: 0 auto; line-height: 1.55; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

@media (max-width: 560px) { .tab { font-size: 11px; padding: 8px 11px; } }
@media (max-width: 420px) { .tab { font-size: 10px; padding: 7px 9px; } .funnelStage { width: 80px; } }
</style>
</head>
<body>
<script src="theme-bg.js"></script>
<main class="page grain-overlay">
  <div class="shell" id="app"></div>
</main>
<div id="modalRoot"></div>
<script>
/* ============================================================
 * Business OS — Wayne Mode
 * All data persisted in localStorage. No external API needed.
 * ============================================================ */

const STORAGE_KEY = 'business_v1';
const TABS = ['revenue','outreach','pipeline','goals','intel'];
const TAB_LABELS = { revenue:'Revenue', outreach:'Outreach', pipeline:'Pipeline', goals:'Goals', intel:'Intel' };

/* ── Helpers ── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtEur(n){ n = Number(n)||0; return '€' + Math.round(n).toLocaleString('en-US'); }
function pct(a,b){ return b>0 ? Math.round(a/b*100) : 0; }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }

function dateKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function today(){ return dateKey(new Date()); }
function pastDays(n){ const out=[]; for(let i=n-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); out.push(dateKey(d)); } return out; }
function dayLabel(dk){ const d=new Date(dk+'T00:00'); if(dk===today()) return 'Today'; const y=new Date(); y.setDate(y.getDate()-1); if(dk===dateKey(y)) return 'Yesterday'; return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

/* ── Default state ── */
const DEFAULT = {
  version:1, activeTab:'revenue',
  mrr:0, totalRevenue:0, activeClients:0, mrrGoal:10000,
  outreach:{},
  pipeline:{ leadsFound:0, contacted:0, replies:0, meetings:0, proposals:0, closed:0 },
  mrrHistory:[],
};

/* ── Persistence ── */
function load(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(!r) return Object.assign({},DEFAULT); return Object.assign({},DEFAULT,JSON.parse(r)); }catch{ return Object.assign({},DEFAULT); } }
function save(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch{} }

let state = load();

/* ── Outreach helpers ── */
function getDay(dk){ if(!state.outreach[dk]) state.outreach[dk]={calls:0,emails:0,linkedin:0,followups:0}; return state.outreach[dk]; }
function sumOutreach(days){ const a={calls:0,emails:0,linkedin:0,followups:0}; days.forEach(k=>{ const d=state.outreach[k]; if(d){ a.calls+=(d.calls||0); a.emails+=(d.emails||0); a.linkedin+=(d.linkedin||0); a.followups+=(d.followups||0); } }); return a; }

/* ── Intelligence calculations ── */
function calcIntel(){
  const p = state.pipeline;
  const mrr = state.mrr;
  const clients = state.activeClients;

  const leadToClose   = pct(p.closed, p.leadsFound);
  const contactToReply= pct(p.replies, Math.max(p.contacted,1));
  const replyToMeet   = pct(p.meetings, Math.max(p.replies,1));
  const meetToProp    = pct(p.proposals, Math.max(p.meetings,1));
  const propToClose   = pct(p.closed, Math.max(p.proposals,1));

  const mrrPerClient  = clients>0 ? mrr/clients : 0;
  const mrrPerLead    = p.leadsFound>0 ? mrr/p.leadsFound : 0;
  const mrrPerMeet    = p.meetings>0 ? mrr/p.meetings : 0;

  const inFlight = Math.max(0, p.contacted - p.closed);
  const closeRate = p.contacted>0 ? p.closed/p.contacted : 0;
  const pipelineValue = inFlight * closeRate * mrrPerClient;

  const expectedNewClients = p.proposals>0 ? Math.max(0, Math.round(p.proposals*(propToClose/100)) - p.closed) : 0;
  const expectedMrr = mrr + (expectedNewClients * mrrPerClient);

  const wk = sumOutreach(pastDays(7));
  const wkTouches = wk.calls+wk.emails+wk.linkedin+wk.followups;

  // Health score (0–100)
  let score = 0;
  if(mrr>0) score += clamp(Math.round(mrr/334),0,30);
  if(clients>0) score += clamp(clients*4,0,20);
  if(p.leadsFound>0) score += clamp(p.leadsFound,0,10);
  if(wkTouches>0) score += clamp(wkTouches/2,0,10);
  if(leadToClose>0) score += clamp(leadToClose,0,15);
  if(propToClose>0) score += clamp(propToClose/2,0,15);
  score = clamp(Math.round(score),0,100);

  return { leadToClose, contactToReply, replyToMeet, meetToProp, propToClose,
    mrrPerClient, mrrPerLead, mrrPerMeet, pipelineValue, expectedNewClients, expectedMrr,
    revForecast30: mrr, revForecast90: mrr*3, score, wk, wkTouches };
}

/* ── Theme ── */
const THEMES = [
  { key:'vision',   label:'Vision',   swatch:'linear-gradient(135deg,#FFFFFF,#888888)' },
  { key:'nocturne', label:'Nocturne', swatch:'#8B7CFF' },
  { key:'aurora',   label:'Aurora',   swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key:'daylight', label:'Daylight', swatch:'#6A45FF' },
];
let currentTheme = (function(){ try{ return localStorage.getItem('patron_theme')||'vision'; }catch{ return 'vision'; } })();
function applyTheme(name){ currentTheme=name; document.documentElement.setAttribute('data-theme',name); try{ localStorage.setItem('patron_theme',name); }catch{} render(); }

/* ============================================================
 * Render
 * ============================================================ */
function render(){ document.getElementById('app').innerHTML = headerHtml() + tabContentHtml(state.activeTab) + tabBarHtml(); attachEvents(); }

function headerHtml(){
  const btns = THEMES.map(t=>'<button type="button" class="themeBtn '+(t.key===currentTheme?'themeBtnActive':'')+'" data-action="theme" data-theme="'+t.key+'"><span class="themeSwatch" style="background:'+t.swatch+'"></span>'+t.label+'</button>').join('');
  return '<header class="header">'
    +'<div class="headerLeft"><a class="back" href="index.html">← Dashboard</a><h1 class="title">Business</h1><p class="subtitle">Revenue · Outreach · Pipeline · Intelligence</p></div>'
    +'<div class="headerRight"><div class="themeSeg" role="radiogroup" aria-label="Theme">'+btns+'</div></div>'
    +'</header>';
}
function tabBarHtml(){
  return '<div class="tabBar"><div class="tabBarInner">'+TABS.map(t=>'<button type="button" class="tab '+(t===state.activeTab?'active':'')+'" data-action="tab" data-tab="'+t+'">'+TAB_LABELS[t]+'</button>').join('')+'</div></div>';
}
function tabContentHtml(tab){
  if(tab==='revenue')  return revenueHtml();
  if(tab==='outreach') return outreachHtml();
  if(tab==='pipeline') return pipelineHtml();
  if(tab==='goals')    return goalsHtml();
  if(tab==='intel')    return intelHtml();
  return '';
}

/* ── Revenue Tab ── */
function revenueHtml(){
  const { mrr, totalRevenue, activeClients: clients, mrrGoal } = state;
  const mrrPerClient = clients>0 ? mrr/clients : 0;
  const goalPct = clamp(mrrGoal>0 ? Math.round(mrr/mrrGoal*100) : 0, 0, 100);

  return '<div class="section">'
    +'<div class="mrrHero">'
    +'<div class="heroEyebrow">Monthly Recurring Revenue</div>'
    +'<div class="heroNum">'+fmtEur(mrr)+'</div>'
    +'<div class="heroSub"><span class="heroSubStrong">'+clients+'</span> active client'+(clients!==1?'s':'')
      +' · avg <span class="heroSubStrong">'+(mrrPerClient>0?fmtEur(mrrPerClient):'—')+'</span> / client'
    +'</div>'
    +'</div>'
    +'<div class="metricsGrid">'
    +mCard('Active Clients', clients>0?String(clients):'—', clients>0?'good':'', 'paying clients')
    +mCard('Total Revenue', fmtEur(totalRevenue), '', 'all-time')
    +mCard('Avg Contract', mrrPerClient>0?fmtEur(mrrPerClient):'—', '', 'per month')
    +'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Update Revenue</div></div>'
    +'<div class="addCard">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-4);">'
    +'<div class="inputGroup"><div class="inputLabel">Current MRR (€)</div><input class="fieldInput" id="inMrr" type="number" min="0" placeholder="3500" value="'+(mrr||'')+'"/></div>'
    +'<div class="inputGroup"><div class="inputLabel">Active Clients</div><input class="fieldInput" id="inClients" type="number" min="0" placeholder="4" value="'+(clients||'')+'"/></div>'
    +'<div class="inputGroup"><div class="inputLabel">Total Revenue (€)</div><input class="fieldInput" id="inTotal" type="number" min="0" placeholder="12000" value="'+(totalRevenue||'')+'"/></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:flex-end;"><button class="addBtn" data-action="save-revenue">Save Revenue</button></div>'
    +'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Revenue Goal</div><div class="sectionNote">'+goalPct+'% achieved</div></div>'
    +'<div class="progressWrap">'
    +'<div class="progressLabel"><span class="progressName">Target: '+fmtEur(mrrGoal)+'/mo</span><span class="progressPct">'+goalPct+'%</span></div>'
    +'<div class="progressBar"><div class="progressFill '+(goalPct>=100?'good':'')+'" style="width:'+goalPct+'%"></div></div>'
    +'<div class="progressSub">'+fmtEur(mrr)+' of '+fmtEur(mrrGoal)+' · '+(goalPct<100?fmtEur(mrrGoal-mrr)+' remaining':'Goal reached!')+'</div>'
    +'</div>'
    +'<div class="addCard" style="margin-top:var(--space-3)">'
    +'<div class="addCardHead"><div class="addEyebrow">Set MRR Goal</div></div>'
    +'<div style="display:flex;gap:var(--space-2);">'
    +'<input class="fieldInput" id="inMrrGoal" type="number" min="0" placeholder="10000" value="'+mrrGoal+'" style="flex:1"/>'
    +'<button class="addBtn" data-action="save-mrr-goal">Update Goal</button>'
    +'</div>'
    +'</div>'
    +'</div>';
}

/* ── Outreach Tab ── */
function outreachHtml(){
  const d   = getDay(today());
  const wk  = sumOutreach(pastDays(7));
  const mo  = sumOutreach(pastDays(30));
  const cols = [
    { key:'calls',    label:'Calls Made',   icon:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.5A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.14 1 .37 1.95.7 2.87a2 2 0 0 1-.45 2.11L8 9.9a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.92.33 1.87.56 2.87.7A2 2 0 0 1 22 16.9Z"/>' },
    { key:'emails',   label:'Emails Sent',  icon:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>' },
    { key:'linkedin', label:'LinkedIn DMs', icon:'<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>' },
    { key:'followups',label:'Follow-ups',   icon:'<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>' },
  ];

  let cards = cols.map(c=>{
    const val = d[c.key]||0;
    return '<div class="outreachCard">'
      +'<div class="outreachCardLeft"><div class="outreachCardLabel">'+c.label+'</div><div class="outreachCardVal">'+val+'</div><div class="outreachCardSub">'+(wk[c.key]||0)+' this week</div></div>'
      +'<div class="outreachCardRight">'
      +'<div class="outreachCardIcon"><svg viewBox="0 0 24 24">'+c.icon+'</svg></div>'
      +'<div class="countBtns"><button class="countBtn" data-action="out-dec" data-key="'+c.key+'" aria-label="Decrease">−</button><button class="countBtn" data-action="out-inc" data-key="'+c.key+'" aria-label="Increase">+</button></div>'
      +'</div>'
      +'</div>';
  }).join('');

  // History table
  const days7 = pastDays(7).reverse();
  let histRows = days7.map(dk=>{
    const od = state.outreach[dk]||{};
    const cells = ['calls','emails','linkedin','followups'].map(k=>{
      const v = od[k]||0;
      return '<td'+(v>0?' class="histHighlight"':'')+'>'+( v||'—' )+'</td>';
    }).join('');
    return '<tr><td class="histDate">'+dayLabel(dk)+'</td>'+cells+'</tr>';
  }).join('');

  return '<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Today</div><div class="sectionNote">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})+'</div></div>'
    +'<div class="outreachGrid">'+cards+'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">7-Day History</div></div>'
    +'<div class="histWrap"><table class="histTable"><thead><tr><th>Date</th><th>Calls</th><th>Emails</th><th>LinkedIn</th><th>Follow-ups</th></tr></thead><tbody>'+histRows+'</tbody></table></div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">30-Day Totals</div></div>'
    +'<div class="metricsGrid" style="grid-template-columns:1fr 1fr">'
    +mCard('Calls',String(mo.calls),'','this month')
    +mCard('Emails',String(mo.emails),'','this month')
    +mCard('LinkedIn',String(mo.linkedin),'','this month')
    +mCard('Follow-ups',String(mo.followups),'','this month')
    +'</div>'
    +'</div>';
}

/* ── Pipeline Tab ── */
function pipelineHtml(){
  const p = state.pipeline;
  const maxV = Math.max(p.leadsFound,1);
  const stages = [
    { key:'leadsFound', label:'Leads Found',  val:p.leadsFound, convOf:null },
    { key:'contacted',  label:'Contacted',    val:p.contacted,  convOf:p.leadsFound },
    { key:'replies',    label:'Replies',      val:p.replies,    convOf:p.contacted },
    { key:'meetings',   label:'Meetings',     val:p.meetings,   convOf:p.replies },
    { key:'proposals',  label:'Proposals',    val:p.proposals,  convOf:p.meetings },
    { key:'closed',     label:'Closed',       val:p.closed,     convOf:p.proposals },
  ];

  let funnel = stages.map((s,i)=>{
    const barW = Math.round(s.val/maxV*100);
    const cv   = s.convOf!=null ? pct(s.val,Math.max(s.convOf,1)) : null;
    const cvCls= cv==null?'':cv>=50?'good':cv>=25?'':'warn';
    return '<div class="funnelRow">'
      +'<div class="funnelStage">'+s.label+'</div>'
      +'<div class="funnelBar"><div class="funnelFill" style="width:'+barW+'%;opacity:'+(0.4+barW/170)+'"></div></div>'
      +'<div class="funnelNum">'+s.val+'</div>'
      +'<div class="funnelConv '+cvCls+'">'+( cv!=null ? cv+'%' : '' )+'</div>'
      +'</div>'
      +( i<stages.length-1 ? '<div class="funnelArrow">↳</div>' : '' );
  }).join('');

  const inputs = stages.map(s=>'<div class="inputGroup"><div class="inputLabel">'+s.label+'</div><input class="fieldInput" type="number" min="0" id="pipe_'+s.key+'" placeholder="0" value="'+(p[s.key]||'')+'"/></div>').join('');

  return '<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Sales Funnel</div><div class="sectionNote">'+p.closed+' closed</div></div>'
    +'<div class="funnelWrap">'+funnel+'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Update Pipeline</div></div>'
    +'<div class="addCard">'
    +'<div class="pipelineInputGrid">'+inputs+'</div>'
    +'<div style="display:flex;justify-content:flex-end;margin-top:var(--space-4);"><button class="addBtn" data-action="save-pipeline">Save Pipeline</button></div>'
    +'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Conversion Rates</div></div>'
    +'<div class="metricsGrid">'
    +convCard('Lead → Close',   pct(p.closed,p.leadsFound),             'Overall close rate')
    +convCard('Contact → Reply',pct(p.replies,Math.max(p.contacted,1)), 'Response rate')
    +convCard('Proposal → Win', pct(p.closed,Math.max(p.proposals,1)),  'Proposal win rate')
    +'</div>'
    +'</div>';
}

/* ── Goals Tab ── */
function goalsHtml(){
  const mrr     = state.mrr;
  const clients  = state.activeClients;
  const intel    = calcIntel();

  const MILESTONES = [
    { label:'First Client',  type:'clients', target:1,     icon:'🏆' },
    { label:'€1k MRR',       type:'mrr',     target:1000,  icon:'💰' },
    { label:'€5k MRR',       type:'mrr',     target:5000,  icon:'🚀' },
    { label:'€10k MRR',      type:'mrr',     target:10000, icon:'💎' },
    { label:'10 Clients',    type:'clients', target:10,    icon:'👥' },
  ];

  const cards = MILESTONES.map(g=>{
    const cur     = g.type==='mrr' ? mrr : clients;
    const done    = cur >= g.target;
    const prog    = clamp(Math.round(cur/g.target*100),0,100);
    const rem     = Math.max(0, g.target - cur);
    const remLbl  = g.type==='mrr' ? fmtEur(rem)+' to go' : rem+' client'+(rem!==1?'s':'')+' to go';

    // Time estimate: if we have weekly outreach data, rough estimate
    let timeLbl = '';
    if(!done && g.type==='mrr' && intel.mrrPerClient>0 && intel.propToClose>0 && intel.wkTouches>0){
      const clientsNeeded = Math.ceil(rem/intel.mrrPerClient);
      const closesPerWeek = (intel.wkTouches/10) * (intel.propToClose/100);
      if(closesPerWeek>0){
        const weeksNeeded = Math.ceil(clientsNeeded/closesPerWeek);
        timeLbl = '~'+weeksNeeded+' week'+(weeksNeeded!==1?'s':'')+' at current pace';
      }
    }

    return '<div class="goalCard '+(done?'achieved':'')+'">'
      +'<div class="goalHead">'
      +'<div class="goalName">'+g.label+'</div>'
      +'<div class="goalBadge '+(done?'done':'')+'">'+( done ? '✓ Done' : prog+'%' )+'</div>'
      +'</div>'
      +'<div class="goalProgress">'
      +( g.type==='mrr' ? fmtEur(cur) : cur )
      +'<span class="goalTarget">/ '+( g.type==='mrr' ? fmtEur(g.target) : g.target+' clients' )+'</span>'
      +'</div>'
      +'<div class="progressBar" style="margin-bottom:8px"><div class="progressFill '+(done?'good':'')+'" style="width:'+prog+'%"></div></div>'
      +( done
          ? '<div class="goalCheck">✓ Milestone achieved — keep pushing</div>'
          : '<div class="progressSub">'+remLbl+( timeLbl?' · '+timeLbl:'' )+'</div>'
        )
      +'</div>';
  }).join('');

  return '<div class="section"><div class="sectionHead"><div class="sectionTitle">Business Milestones</div></div>'+cards+'</div>';
}

/* ── Intel Tab ── */
function intelHtml(){
  const intel = calcIntel();
  const p     = state.pipeline;
  const circ  = 2*Math.PI*43;
  const off   = circ*(1-intel.score/100);
  const sColor = intel.score>=70?'var(--pos)':intel.score>=40?'var(--warn)':'var(--neg)';
  const sLabel = intel.score>=70?'Strong':intel.score>=40?'Building':'Early Stage';

  const insights = buildInsights(intel, p);

  return '<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Business Health Score</div></div>'
    +'<div class="healthRing">'
    +'<div class="ringWrap">'
    +'<svg viewBox="0 0 104 104" aria-hidden><circle cx="52" cy="52" r="43" class="ringTrack"/>'
    +'<circle cx="52" cy="52" r="43" class="ringFill" style="stroke:'+sColor+';filter:drop-shadow(0 0 8px '+sColor+');stroke-dasharray:'+circ.toFixed(1)+';stroke-dashoffset:'+off.toFixed(1)+'"/>'
    +'</svg>'
    +'<div class="ringCenter"><div class="ringNum" style="color:'+sColor+'">'+intel.score+'</div><div class="ringCap">/ 100</div></div>'
    +'</div>'
    +'<div class="healthRows">'
    +hRow('Status',       sLabel,     intel.score>=70?'good':intel.score>=40?'warn':'bad')
    +hRow('Weekly Touches',intel.wkTouches+' touches', intel.wkTouches>=20?'good':intel.wkTouches>=5?'warn':'bad')
    +hRow('Close Rate',   intel.propToClose+'%',       intel.propToClose>=40?'good':intel.propToClose>0?'warn':'bad')
    +hRow('Pipeline',     p.closed>0?'Active':p.contacted>0?'In-progress':'Empty', p.closed>0?'good':p.contacted>0?'warn':'bad')
    +'</div>'
    +'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">Key Metrics</div></div>'
    +'<div class="intelGrid">'
    +iCard('Expected MRR',      intel.expectedMrr>0?fmtEur(intel.expectedMrr):'—',                 'Based on open proposals')
    +iCard('Pipeline Value',    intel.pipelineValue>0?fmtEur(intel.pipelineValue):'—',              'Expected from in-flight leads')
    +iCard('MRR per Lead',      intel.mrrPerLead>0?('€'+intel.mrrPerLead.toFixed(2)):'—',           'Revenue per lead generated')
    +iCard('MRR per Meeting',   intel.mrrPerMeet>0?('€'+intel.mrrPerMeet.toFixed(2)):'—',           'Revenue per meeting held')
    +iCard('30-Day Forecast',   fmtEur(intel.revForecast30),                                        'Next 30 days (MRR = forecast)')
    +iCard('90-Day Forecast',   fmtEur(intel.revForecast90),                                        '90-day projection (no churn model)')
    +'</div>'
    +'</div>'
    +'<div class="section">'
    +'<div class="sectionHead"><div class="sectionTitle">AI Insights</div></div>'
    +insights
    +'</div>';
}

/* ── Small helpers for HTML ── */
function mCard(label,val,cls,sub){ return '<div class="metricCard"><div class="metricLabel">'+label+'</div><div class="metricVal '+(cls||'')+'">'+val+'</div><div class="metricSub">'+sub+'</div></div>'; }
function convCard(label,v,sub){ const cls=v>=50?'good':v>=20?'':v>0?'warn':''; return '<div class="metricCard"><div class="metricLabel">'+label+'</div><div class="metricVal '+cls+'">'+v+'%</div><div class="metricSub">'+sub+'</div></div>'; }
function hRow(l,v,cls){ return '<div class="healthRow"><span class="healthRowLabel">'+l+'</span><span class="healthRowVal '+(cls||'')+'">'+v+'</span></div>'; }
function iCard(l,v,s){ return '<div class="intelCard"><div class="intelLabel">'+l+'</div><div class="intelVal">'+v+'</div><div class="intelSub">'+s+'</div></div>'; }

/* ── AI Insights ── */
function buildInsights(intel,p){
  const mrr     = state.mrr;
  const clients  = state.activeClients;
  const ins     = [];
  const push    = (type,icon,title,text) => ins.push({type,icon,title,text});

  if(!p.leadsFound && !mrr && !clients){
    return '<div class="emptyState"><div class="emptyTitle">No data yet</div>'
      +'<div class="emptyBody">Add your pipeline, outreach, and revenue numbers to unlock personalized AI insights and forecasts.</div></div>';
  }

  // Revenue status
  if(mrr===0 && clients===0){
    push('neg','⚡','ACTION NEEDED','You have <strong>zero revenue</strong>. Stop optimising what doesn\'t exist — close your first client. Every other metric is noise until then.');
  } else if(mrr>0){
    push('good','↗','REVENUE','Generating <strong>'+fmtEur(mrr)+'/month</strong> from <strong>'+clients+'</strong> client'+(clients!==1?'s':'')+'. Average contract value: <strong>'+fmtEur(intel.mrrPerClient)+'</strong>.');
  }

  // Outreach volume
  if(intel.wkTouches===0){
    push('neg','📞','OUTREACH DEAD','<strong>Zero outreach this week.</strong> No outreach = no pipeline = no revenue. Send 10 messages before you do anything else today.');
  } else if(intel.wkTouches<10){
    push('warn','📞','LOW OUTREACH','Only <strong>'+intel.wkTouches+' touches</strong> this week. Serious pipeline requires <strong>20–30 per week minimum</strong>. You\'re running at '+(intel.wkTouches<5?'dangerously':'uncomfortably')+' low volume.');
  } else {
    push('good','🔥','OUTREACH','<strong>'+intel.wkTouches+' outreach touches</strong> this week. Solid volume. Now focus on quality — personalise your message and improve response rates.');
  }

  // Lead conversion
  if(p.leadsFound>5 && intel.leadToClose===0){
    push('warn','📊','CONVERSION GAP','<strong>'+p.leadsFound+' leads, 0 closes.</strong> Your funnel is broken somewhere. Diagnose each stage — where are contacts going silent?');
  } else if(intel.leadToClose>0){
    const per = Math.round(100/intel.leadToClose);
    push('','📊','CONVERSION','Lead-to-close rate: <strong>'+intel.leadToClose+'%</strong> (1 in every '+per+' leads converts). Industry average is 1–3%. '+(intel.leadToClose>=3?'You\'re above average.':'Room to improve.'));
  }

  // Proposal pipeline
  if(p.proposals>0 && p.closed===0){
    push('warn','⏳','STALE PROPOSALS','<strong>'+p.proposals+' proposal'+(p.proposals!==1?'s':'')+' out, 0 closed.</strong> Follow up today — deals go cold in 48–72 hours. Call, don\'t email.');
  } else if(intel.propToClose>=50){
    push('good','🏆','CLOSE RATE','<strong>'+intel.propToClose+'%</strong> proposal close rate — that\'s elite. Your offer and pitch are working. Now systematically increase the number of proposals you send.');
  } else if(intel.propToClose>0 && intel.propToClose<30){
    push('warn','📝','CLOSE RATE','Proposal win rate: <strong>'+intel.propToClose+'%</strong>. You want 30%+. Either the proposal content is weak, pricing is off, or you\'re pitching unqualified leads.');
  }

  // Reply rate
  if(p.contacted>10 && intel.contactToReply<10){
    push('warn','✉️','POOR RESPONSE RATE','Only <strong>'+intel.contactToReply+'%</strong> respond to your outreach. Fix the message first — volume won\'t save a broken hook. Rewrite your opener.');
  }

  // Meetings to proposals
  if(p.meetings>3 && p.proposals===0){
    push('warn','📋','MISSING PROPOSALS','<strong>'+p.meetings+' meetings held, 0 proposals sent.</strong> Meetings without proposals are coffee chats, not sales. Close the loop after every call.');
  }

  // Next milestone
  if(mrr>0 && mrr<10000){
    const next   = mrr<1000?1000:mrr<5000?5000:10000;
    const needed  = next-mrr;
    const cNeeded = intel.mrrPerClient>0 ? Math.ceil(needed/intel.mrrPerClient) : '?';
    push('','🎯','NEXT MILESTONE','To reach <strong>'+fmtEur(next)+'</strong> MRR, you need <strong>'+fmtEur(needed)+'</strong> more — roughly <strong>'+cNeeded+' new client'+(cNeeded!==1?'s':'')+' </strong> at your current ACV.');
  }

  // Expected MRR
  if(intel.expectedNewClients>0){
    push('good','⚡','PIPELINE VALUE','Based on your open proposals, you could add <strong>'+intel.expectedNewClients+' new client'+(intel.expectedNewClients!==1?'s':'')+' </strong> and reach <strong>'+fmtEur(intel.expectedMrr)+'/month</strong>. Close them.');
  }

  return ins.map(i=>'<div class="insightCard '+(i.type||'')+'">'
    +'<div class="insightIcon">'+i.icon+'</div>'
    +'<div class="insightBody"><div class="insightType">'+i.title+'</div><div class="insightText">'+i.text+'</div></div>'
    +'</div>'
  ).join('');
}

/* ============================================================
 * Events
 * ============================================================ */
function attachEvents(){
  const app = document.getElementById('app');
  app.addEventListener('click', handleClick);
}

function handleClick(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const a = btn.dataset.action;

  if(a==='tab'){ state.activeTab=btn.dataset.tab; save(); render(); return; }
  if(a==='theme'){ applyTheme(btn.dataset.theme); return; }

  if(a==='save-revenue'){
    state.mrr           = parseFloat(document.getElementById('inMrr').value)||0;
    state.activeClients = parseInt(document.getElementById('inClients').value)||0;
    state.totalRevenue  = parseFloat(document.getElementById('inTotal').value)||0;
    const h = state.mrrHistory;
    h.push({ t:Date.now(), v:state.mrr });
    if(h.length>90) h.splice(0,h.length-90);
    save(); render(); return;
  }
  if(a==='save-mrr-goal'){
    state.mrrGoal = parseFloat(document.getElementById('inMrrGoal').value)||10000;
    save(); render(); return;
  }
  if(a==='out-inc'){
    const k=btn.dataset.key; const d=getDay(today()); d[k]=(d[k]||0)+1; save(); render(); return;
  }
  if(a==='out-dec'){
    const k=btn.dataset.key; const d=getDay(today()); d[k]=Math.max(0,(d[k]||0)-1); save(); render(); return;
  }
  if(a==='save-pipeline'){
    ['leadsFound','contacted','replies','meetings','proposals','closed'].forEach(k=>{
      const el=document.getElementById('pipe_'+k); if(el) state.pipeline[k]=parseInt(el.value)||0;
    });
    save(); render(); return;
  }
}

/* ── Boot ── */
render();
</script>

</html>
