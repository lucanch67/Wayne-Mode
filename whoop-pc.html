<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Fitness Band · Wayne Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"vision");}catch(e){document.documentElement.setAttribute("data-theme","vision");}</script>
<style>

/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════ */
:root {
  color-scheme: dark;
  --bg: #080808; --bg-elevated: #111111;
  --surface: rgba(255,255,255,0.032); --surface-2: rgba(255,255,255,0.062);
  --fg: #F3F2F8; --muted: rgba(243,242,248,0.48); --muted-strong: rgba(243,242,248,0.72);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.18);
  --brand: #00FF88; --brand-2: #00CC6A; --brand-ink: #000;
  --brand-soft: rgba(0,255,136,0.09); --brand-line: rgba(0,255,136,0.24); --brand-glow: rgba(0,255,136,0.32);
  --pos: #46E0A8; --pos-soft: rgba(70,224,168,0.12); --pos-line: rgba(70,224,168,0.28); --pos-glow: rgba(70,224,168,0.4);
  --neg: #FB7185; --neg-soft: rgba(251,113,133,0.11); --neg-line: rgba(251,113,133,0.28); --neg-glow: rgba(251,113,133,0.4);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.10); --warn-line: rgba(251,191,36,0.28); --warn-glow: rgba(251,191,36,0.4);
  --track: rgba(255,255,255,0.07);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 20px 48px -24px rgba(0,0,0,0.8);
  --card-shadow-hover: 0 1px 0 rgba(255,255,255,0.07) inset, 0 28px 56px -20px rgba(0,0,0,0.85);
  --glow-1: rgba(0,255,136,0.08); --glow-2: rgba(70,224,168,0.05);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px; --r-2xl:32px; --r-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.25rem; --text-4xl:3.5rem;
  --ease: cubic-bezier(0.2,0.8,0.2,1); --ease-out: cubic-bezier(0.16,1,0.3,1);
  --dur-fast:120ms; --dur:200ms; --dur-slow:320ms;
  --font-display:'Space Grotesk',sans-serif; --font-ui:'Hanken Grotesk',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --sidebar-w:300px; --bar-h:52px;
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #07080F; --bg-elevated: #0F1020;
  --surface: rgba(140,150,255,0.05); --surface-2: rgba(140,150,255,0.09);
  --fg: #EEF0FF; --muted: rgba(210,215,255,0.50); --muted-strong: rgba(210,215,255,0.74);
  --border: rgba(140,150,255,0.12); --border-strong: rgba(140,150,255,0.24);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #08072A;
  --brand-soft: rgba(139,123,255,0.14); --brand-line: rgba(139,123,255,0.30); --brand-glow: rgba(124,107,255,0.55);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.12); --pos-line: rgba(79,227,208,0.28); --pos-glow: rgba(79,227,208,0.5);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.12); --neg-line: rgba(255,111,165,0.28); --neg-glow: rgba(255,111,165,0.5);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.10); --warn-line: rgba(255,198,92,0.28); --warn-glow: rgba(255,198,92,0.45);
  --track: rgba(150,160,255,0.10);
  --card-shadow: 0 0 0 1px rgba(130,120,255,0.06) inset, 0 24px 56px -24px rgba(60,40,200,0.5);
  --card-shadow-hover: 0 0 0 1px rgba(130,120,255,0.1) inset, 0 32px 64px -20px rgba(60,40,200,0.6);
  --glow-1: rgba(120,100,255,0.18); --glow-2: rgba(79,227,208,0.10);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F2F1FA; --bg-elevated: #FFFFFF;
  --surface: rgba(255,255,255,0.82); --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.50); --muted-strong: rgba(23,22,34,0.70);
  --border: rgba(23,22,60,0.09); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.07); --brand-line: rgba(106,69,255,0.22); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.09); --pos-line: rgba(14,158,100,0.25); --pos-glow: rgba(14,158,100,0.35);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.22); --neg-glow: rgba(225,29,99,0.3);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.09); --warn-line: rgba(180,105,14,0.22); --warn-glow: rgba(180,105,14,0.3);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 12px 32px -16px rgba(23,22,60,0.16);
  --card-shadow-hover: 0 2px 6px rgba(23,22,60,0.08), 0 16px 40px -14px rgba(23,22,60,0.22);
  --glow-1: rgba(106,69,255,0.06); --glow-2: rgba(14,158,100,0.04);
}

[data-theme="vision"] {
  color-scheme: dark;
  --bg: #050505; --bg-elevated: #0D0D0D;
  --surface: rgba(255,255,255,0.03); --surface-2: rgba(255,255,255,0.055);
  --fg: #F5F5F5; --muted: rgba(255,255,255,0.45); --muted-strong: rgba(255,255,255,0.72);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
  --brand: #FFFFFF; --brand-2: rgba(255,255,255,0.68); --brand-ink: #000000;
  --brand-soft: rgba(255,255,255,0.06); --brand-line: rgba(255,255,255,0.14); --brand-glow: rgba(255,255,255,0.20);
  --pos: #22C55E; --pos-soft: rgba(34,197,94,0.10); --pos-line: rgba(34,197,94,0.26); --pos-glow: rgba(34,197,94,0.40);
  --neg: #EF4444; --neg-soft: rgba(239,68,68,0.10); --neg-line: rgba(239,68,68,0.26); --neg-glow: rgba(239,68,68,0.40);
  --warn: #F59E0B; --warn-soft: rgba(245,158,11,0.10); --warn-line: rgba(245,158,11,0.26); --warn-glow: rgba(245,158,11,0.40);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 22px 56px -28px rgba(0,0,0,0.80);
  --card-shadow-hover: 0 0 0 1px rgba(255,255,255,0.09) inset, 0 32px 64px -20px rgba(0,0,0,0.90);
  --glow-1: rgba(255,255,255,0.04); --glow-2: rgba(255,255,255,0.02);
}
[data-theme="vision"] #suiteBar { background:rgba(5,5,5,0.94); }
[data-theme="vision"] #sidebar  { background:rgba(5,5,5,0.92); }
[data-theme="vision"] #sidebar::after { display:none; }
[data-theme="vision"] .card { background:rgba(255,255,255,0.025); }
[data-theme="vision"] .pageTitleAccent { -webkit-text-fill-color:var(--fg); background:none; }

/* ═══════════════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--fg);
  font-family:var(--font-ui); font-size:var(--text-base);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
/* Grid texture */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.020) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.020) 1px,transparent 1px);
  background-size:48px 48px;
}
[data-theme="daylight"] body::before {
  background-image:
    linear-gradient(rgba(0,0,0,0.032) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.032) 1px,transparent 1px);
}

/* ═══════════════════════════════════════════════════════════
   SUITE TOP BAR
   ═══════════════════════════════════════════════════════════ */
#suiteBar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:var(--bar-h);
  display:flex; align-items:center; gap:12px; padding:0 20px;
  background:rgba(8,8,8,0.88);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
}
[data-theme="daylight"] #suiteBar { background:rgba(242,241,250,0.92); }
[data-theme="aurora"]   #suiteBar { background:rgba(6,7,14,0.92); }

.stLogo { display:flex; align-items:center; gap:9px; text-decoration:none; color:var(--fg); }
.stLogoIcon {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 16px var(--brand-glow);
}
.stLogoName { font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:-.3px; }
.stSpacer { flex:1; }
.stBack {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px 6px 10px; border-radius:var(--r-pill);
  background:var(--brand-soft); border:1px solid var(--brand-line);
  color:var(--brand); font-family:var(--font-ui); font-size:12px; font-weight:600;
  text-decoration:none; cursor:pointer;
  transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.stBack:hover { background:color-mix(in srgb,var(--brand) 18%,transparent); border-color:var(--brand); }

/* ═══════════════════════════════════════════════════════════
   TWO-COLUMN SHELL
   ═══════════════════════════════════════════════════════════ */
#shell {
  position:fixed; top:var(--bar-h); left:0; right:0; bottom:0;
  display:grid; grid-template-columns:var(--sidebar-w) 1fr; z-index:1;
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════════ */
#sidebar {
  display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  background:rgba(8,8,10,0.88);
  border-right:1px solid var(--border);
  position:relative;
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
}
[data-theme="daylight"] #sidebar { background:rgba(245,244,252,0.90); }
[data-theme="aurora"]   #sidebar { background:rgba(6,7,14,0.90); }

/* animated gradient line on right edge */
#sidebar::after {
  content:''; position:absolute; top:0; right:0; bottom:0; width:1px; pointer-events:none;
  background:linear-gradient(180deg,transparent 0%,var(--brand) 35%,var(--pos) 65%,transparent 100%);
  opacity:.28;
}
[data-theme="daylight"] #sidebar::after { display:none; }

/* Ambient page glow top */
#sidebar::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(60% 30% at 50% 0%,var(--glow-1),transparent 80%);
}

/* ── Sidebar head ── */
.sideHead {
  padding:var(--space-6) var(--space-5) var(--space-5);
  border-bottom:1px solid var(--border);
  position:relative; z-index:1;
}
.pageTitle {
  font-family:var(--font-display); font-weight:700;
  font-size:var(--text-2xl); letter-spacing:-.04em; color:var(--fg); line-height:1;
}
.pageTitleAccent {
  display:inline-block;
  background:linear-gradient(135deg,var(--brand),var(--pos));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
[data-theme="daylight"] .pageTitleAccent { -webkit-text-fill-color:var(--brand); background:none; }
.pageSub {
  font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase;
  letter-spacing:.20em; color:var(--muted); margin-top:6px;
}

/* ── Ring section ── */
.ringSection {
  padding:var(--space-8) var(--space-5) var(--space-6);
  display:flex; flex-direction:column; align-items:center; gap:var(--space-4);
  border-bottom:1px solid var(--border); position:relative; z-index:1;
  overflow:hidden;
}

/* Ambient glow orb behind ring */
.ringAura {
  position:absolute; width:220px; height:220px; border-radius:50%;
  pointer-events:none; opacity:.13; filter:blur(44px);
  transition:background var(--dur-slow) var(--ease), opacity var(--dur-slow) var(--ease);
  animation:auraPulse 4s ease-in-out infinite;
}
.ringAura[data-tone="good"]  { background:radial-gradient(circle,var(--pos),transparent 70%); }
.ringAura[data-tone="watch"] { background:radial-gradient(circle,var(--warn),transparent 70%); }
.ringAura[data-tone="low"]   { background:radial-gradient(circle,var(--neg),transparent 70%); }
.ringAura[data-tone="muted"] { background:radial-gradient(circle,var(--muted-strong),transparent 70%); opacity:.06; }
@keyframes auraPulse {
  0%,100%{ opacity:.13; transform:scale(1); }
  50%{ opacity:.20; transform:scale(1.08); }
}

.recoveryRing {
  position:relative; width:210px; height:210px;
  display:grid; place-items:center; flex-shrink:0;
}
.ringSvg { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
.ringTrack { fill:none; stroke:var(--track); stroke-width:10; }
.ringFill {
  fill:none; stroke:currentColor; stroke-width:10; stroke-linecap:round;
  transition:stroke-dashoffset 900ms var(--ease-out);
}
.recoveryRing[data-tone="good"]  .ringFill { color:var(--pos); filter:drop-shadow(0 0 14px var(--pos-glow)); }
.recoveryRing[data-tone="watch"] .ringFill { color:var(--warn); filter:drop-shadow(0 0 14px var(--warn-glow)); }
.recoveryRing[data-tone="low"]   .ringFill { color:var(--neg); filter:drop-shadow(0 0 14px var(--neg-glow)); }
.recoveryRing[data-tone="muted"] .ringFill { color:var(--muted); }

.ringInner {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:0;
  text-align:center;
}
.ringVal {
  font-family:var(--font-display); font-weight:700;
  font-size:4rem; line-height:1; letter-spacing:-.05em;
  font-variant-numeric:tabular-nums;
  transition:color var(--dur) var(--ease);
}
.ringVal[data-tone="good"]  {
  background:linear-gradient(135deg,var(--pos) 20%,var(--brand) 80%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.ringVal[data-tone="watch"] {
  background:linear-gradient(135deg,var(--warn) 30%,color-mix(in srgb,var(--warn) 70%,white) 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.ringVal[data-tone="low"]   {
  background:linear-gradient(135deg,var(--neg) 20%,color-mix(in srgb,var(--neg) 65%,white) 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.ringVal[data-tone="muted"] { color:var(--muted-strong); }
[data-theme="daylight"] .ringVal[data-tone="good"]  { background:none; -webkit-text-fill-color:var(--pos); }
[data-theme="daylight"] .ringVal[data-tone="watch"] { background:none; -webkit-text-fill-color:var(--warn); }
[data-theme="daylight"] .ringVal[data-tone="low"]   { background:none; -webkit-text-fill-color:var(--neg); }

.ringPct {
  font-family:var(--font-display); font-weight:500; font-size:var(--text-xl);
  color:var(--muted-strong); margin-top:-4px; line-height:1;
}
.ringLabel {
  margin-top:var(--space-2); font-family:var(--font-mono); font-size:9.5px;
  font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--muted);
}
.ringTier {
  font-family:var(--font-display); font-weight:600; font-size:var(--text-sm);
  letter-spacing:-.01em; color:var(--muted-strong); margin-top:2px;
}

/* ── Source section ── */
.srcSection {
  padding:var(--space-4) var(--space-5); border-bottom:1px solid var(--border);
  position:relative; z-index:1;
}
.sideLabel {
  font-family:var(--font-mono); font-size:9px; letter-spacing:.22em;
  text-transform:uppercase; color:var(--muted); margin-bottom:var(--space-3);
}
@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Actions section ── */
.actionsSection {
  padding:var(--space-4) var(--space-5);
  display:flex; flex-direction:column; gap:var(--space-3);
  position:relative; z-index:1;
}
.statusChip {
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 12px; border-radius:var(--r-pill);
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
}
.statusChip.live {
  background:var(--brand-soft); border:1px solid var(--brand-line); color:var(--brand);
}
.statusChip.sample-chip {
  background:var(--warn-soft); border:1px dashed var(--warn-line); color:var(--warn);
}
.statusChip.apple-chip {
  background:var(--surface); border:1px solid var(--border); color:var(--muted-strong);
}
.chipDot {
  width:6px; height:6px; border-radius:50%; background:currentColor;
  box-shadow:0 0 6px currentColor; animation:dotPulse 1.8s ease-in-out infinite;
}
.syncRow {
  display:flex; align-items:center; justify-content:space-between; gap:var(--space-3);
  font-family:var(--font-mono); font-size:9.5px; color:var(--muted); letter-spacing:.10em;
  text-transform:uppercase;
}

/* ── Theme section (pinned bottom) ── */
.themeSection {
  padding:var(--space-4) var(--space-5);
  border-top:1px solid var(--border); margin-top:auto;
  position:relative; z-index:1;
}
.themePills { display:flex; gap:var(--space-2); flex-wrap:wrap; }
.themeBtn {
  appearance:none; background:transparent; border:1px solid var(--border);
  color:var(--muted); font-family:var(--font-ui); font-size:11px; font-weight:600;
  padding:6px 11px 6px 8px; border-radius:var(--r-pill); cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease),
             border-color var(--dur) var(--ease);
}
.themeBtn:hover { color:var(--muted-strong); border-color:var(--border-strong); }
.themeBtnActive, .themeBtnActive:hover {
  background:var(--brand-soft); color:var(--fg); border-color:var(--brand-line);
}
.themeSwatch {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset;
}
.themeBtnActive .themeSwatch { box-shadow:0 0 0 2px var(--bg), 0 0 0 3.5px var(--brand); }

/* ═══════════════════════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════════════════════ */
#main {
  overflow-y:auto; overflow-x:hidden;
  background:var(--bg); position:relative; z-index:1;
}
#main::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(52% 38% at 85% 6%, var(--glow-1), transparent 72%),
    radial-gradient(44% 34% at 10% 90%, var(--glow-2), transparent 72%);
  z-index:0;
}
#mainInner {
  position:relative; z-index:1;
  padding:var(--space-6) var(--space-8) var(--space-10);
  display:flex; flex-direction:column; gap:var(--space-5);
}

/* ── Glass card base ── */
.card {
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  box-shadow:var(--card-shadow);
  transition:
    border-color var(--dur) var(--ease),
    box-shadow var(--dur) var(--ease),
    transform var(--dur) var(--ease),
    background var(--dur) var(--ease);
}
.card:hover {
  border-color:var(--border-strong);
  box-shadow:var(--card-shadow-hover);
  transform:translateY(-2px);
}
[data-theme="daylight"] .card { background:rgba(255,255,255,0.80); }

/* ── Live ticker ── */
.ticker {
  display:flex; align-items:center; gap:var(--space-3);
  padding:var(--space-2) var(--space-4);
  background:var(--brand-soft); border:1px solid var(--brand-line);
  border-radius:var(--r-pill); overflow:hidden; flex-shrink:0;
}
.tickerEyebrow {
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-mono); font-size:10px; letter-spacing:.20em;
  text-transform:uppercase; color:var(--brand); white-space:nowrap;
  padding-right:var(--space-3); border-right:1px solid var(--brand-line); flex-shrink:0;
}
.tickerPulse {
  width:6px; height:6px; border-radius:50%; background:var(--brand);
  box-shadow:0 0 8px var(--brand-glow); animation:dotPulse 1.6s ease-in-out infinite;
}
.tickerScroll {
  flex:1; overflow:hidden; min-width:0;
  mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);
}
.tickerTrack {
  display:inline-flex; align-items:center; gap:var(--space-8);
  animation:tickerScroll 44s linear infinite; white-space:nowrap;
  padding-left:var(--space-4); will-change:transform;
}
@keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker:hover .tickerTrack { animation-play-state:paused; }
.tickerCell {
  display:inline-flex; align-items:center; gap:var(--space-2);
  font-variant-numeric:tabular-nums; white-space:nowrap; padding:2px 8px; border-radius:6px;
}
.tickerCell[data-tone="good"]   { color:var(--pos); }
.tickerCell[data-tone="watch"]  { color:var(--warn); }
.tickerCell[data-tone="urgent"] { color:var(--neg); animation:urgentPulse 1.8s ease-in-out infinite; }
@keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.tickerSym   { font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-strong); }
.tickerVal   { font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--fg); display:inline-flex; align-items:baseline; gap:2px; }
.tickerUnit  { font-size:9px; font-weight:500; color:var(--muted); letter-spacing:.04em; }
.tickerSpark { width:48px; height:13px; flex-shrink:0; color:var(--pos); filter:drop-shadow(0 0 2px currentColor); }
.tickerSpark[data-tone="watch"]  { color:var(--warn); }
.tickerSpark[data-tone="urgent"] { color:var(--neg); }
.tickerDelta { font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.02em; }

/* ── Hero trend card ── */
.heroCard {
  display:grid; grid-template-columns:220px 1fr;
  gap:var(--space-8); align-items:center;
  padding:var(--space-7, 1.75rem) var(--space-8);
  position:relative; overflow:hidden;
}
.heroCard::before {
  content:''; position:absolute; top:-60px; left:-40px; width:300px; height:300px;
  border-radius:50%; pointer-events:none;
  background:radial-gradient(circle,var(--glow-1),transparent 70%);
  opacity:.6;
}
.heroLeft { display:flex; flex-direction:column; gap:var(--space-3); position:relative; z-index:1; }
.heroMetricLabel {
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.22em;
  text-transform:uppercase; color:var(--muted);
}
.heroMetricValue {
  font-family:var(--font-display); font-weight:700;
  font-size:5rem; line-height:1; letter-spacing:-.05em;
  font-variant-numeric:tabular-nums;
}
.heroMetricValue span { font-size:2rem; font-weight:500; color:var(--muted-strong); vertical-align:top; margin-top:.6rem; display:inline-block; }
.heroMetricValue[data-tone="good"]  {
  background:linear-gradient(135deg,var(--pos) 10%,var(--brand) 90%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.heroMetricValue[data-tone="watch"] {
  background:linear-gradient(135deg,var(--warn),color-mix(in srgb,var(--warn) 60%,white));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.heroMetricValue[data-tone="low"]   {
  background:linear-gradient(135deg,var(--neg),color-mix(in srgb,var(--neg) 55%,white));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.heroMetricValue[data-tone="muted"] { color:var(--muted-strong); }
[data-theme="daylight"] .heroMetricValue[data-tone="good"]  { background:none; -webkit-text-fill-color:var(--pos); }
[data-theme="daylight"] .heroMetricValue[data-tone="watch"] { background:none; -webkit-text-fill-color:var(--warn); }
[data-theme="daylight"] .heroMetricValue[data-tone="low"]   { background:none; -webkit-text-fill-color:var(--neg); }

.heroTierBadge {
  display:inline-flex; align-items:center; gap:6px; align-self:flex-start;
  padding:4px 12px; border-radius:var(--r-pill);
  font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
}
.heroTierBadge[data-tone="good"]  { background:var(--pos-soft);  border:1px solid var(--pos-line);  color:var(--pos); }
.heroTierBadge[data-tone="watch"] { background:var(--warn-soft); border:1px solid var(--warn-line); color:var(--warn); }
.heroTierBadge[data-tone="low"]   { background:var(--neg-soft);  border:1px solid var(--neg-line);  color:var(--neg); }
.heroTierBadge[data-tone="muted"] { background:var(--surface-2); border:1px solid var(--border);    color:var(--muted-strong); }

.heroDelta {
  font-family:var(--font-mono); font-size:var(--text-sm); font-weight:600;
  letter-spacing:.04em; font-variant-numeric:tabular-nums;
}
.heroDelta.up   { color:var(--pos); }
.heroDelta.down { color:var(--warn); }

.heroRight { position:relative; z-index:1; }
.heroSvg { width:100%; overflow:visible; }
.heroLine {
  fill:none; stroke:var(--brand); stroke-width:2;
  stroke-linejoin:round; stroke-linecap:round;
  filter:drop-shadow(0 0 6px var(--brand-glow));
}
.heroArea { stroke:none; }
.heroDotMid { fill:var(--brand); opacity:.35; }
.heroDotLast { fill:var(--brand); filter:drop-shadow(0 0 7px var(--brand-glow)); }
.heroEmpty { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--muted); padding:var(--space-4) 0; }

/* ── Stat grid (4 col) ── */
.statGrid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:var(--space-4); }
.statCard {
  padding:var(--space-5); display:flex; flex-direction:column; gap:var(--space-2); cursor:default;
  position:relative; overflow:hidden;
}
/* Tone tints */
.statCard[data-tone="good"]  { background:linear-gradient(155deg,color-mix(in srgb,var(--pos) 8%,transparent) 0%,var(--surface) 55%); border-color:color-mix(in srgb,var(--pos-line) 60%,var(--border)); }
.statCard[data-tone="watch"] { background:linear-gradient(155deg,color-mix(in srgb,var(--warn) 7%,transparent) 0%,var(--surface) 55%); border-color:color-mix(in srgb,var(--warn-line) 60%,var(--border)); }
.statCard[data-tone="low"]   { background:linear-gradient(155deg,color-mix(in srgb,var(--neg) 7%,transparent) 0%,var(--surface) 55%); border-color:color-mix(in srgb,var(--neg-line) 55%,var(--border)); }
.statCard[data-tone="muted"] { background:var(--surface); }

.statLabel {
  font-family:var(--font-mono); font-size:9.5px; font-weight:600;
  letter-spacing:.20em; text-transform:uppercase; color:var(--muted);
}
.statValueRow { display:flex; align-items:baseline; gap:5px; margin-top:2px; }
.statValue {
  font-family:var(--font-display); font-weight:700;
  font-size:var(--text-4xl); line-height:1;
  letter-spacing:-.04em; color:var(--fg); font-variant-numeric:tabular-nums;
}
.statUnit { font-family:var(--font-display); font-weight:500; font-size:var(--text-lg); color:var(--muted-strong); }
.statSub  { font-size:var(--text-xs); color:var(--muted); letter-spacing:.02em; line-height:1.4; }
.statBadge {
  font-family:var(--font-mono); font-size:9.5px; font-weight:600;
  letter-spacing:.04em; font-variant-numeric:tabular-nums;
  padding:3px 9px; border-radius:var(--r-pill); align-self:flex-start;
  border:1px solid var(--border); background:var(--surface-2);
}
.statBadge[data-tone="good"]    { color:var(--pos);          border-color:var(--pos-line); }
.statBadge[data-tone="watch"]   { color:var(--warn);         border-color:var(--warn-line); }
.statBadge[data-tone="low"]     { color:var(--neg);          border-color:var(--neg-line); }
.statBadge[data-tone="neutral"] { color:var(--muted-strong); }

/* Mini sparkline at bottom of stat card */
.miniSpark { width:100%; height:24px; margin-top:var(--space-2); overflow:visible; opacity:.6; }

/* ── Bottom row ── */
.bottomRow { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }

/* Debt card */
.debtCard { padding:var(--space-5) var(--space-6); display:flex; flex-direction:column; gap:var(--space-4); }
.cardHead { display:flex; align-items:baseline; justify-content:space-between; gap:var(--space-3); }
.cardTitle { font-family:var(--font-display); font-weight:600; font-size:var(--text-lg); letter-spacing:-.02em; color:var(--fg); }
.debtTotal { font-family:var(--font-display); font-weight:600; font-size:var(--text-lg); letter-spacing:-.01em; font-variant-numeric:tabular-nums; }
.debtTotal em { font-family:var(--font-mono); font-style:normal; font-size:var(--text-xs); letter-spacing:.06em; color:var(--muted); margin-left:6px; }
.debtTotal[data-tone="watch"] { color:var(--neg); }
.debtTotal[data-tone="good"]  { color:var(--pos); }
.debtBars { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:var(--space-2); }
.debtCol  { display:flex; flex-direction:column; align-items:center; gap:var(--space-2); }
.debtTrack { position:relative; width:100%; height:80px; display:flex; align-items:center; }
.debtBaseline { position:absolute; left:0; right:0; top:50%; height:1px; background:var(--border-strong); }
.debtBarSurplus, .debtBarDeficit { position:absolute; left:20%; right:20%; border-radius:3px; z-index:1; }
.debtBarSurplus { bottom:50%; border-radius:3px 3px 0 0; background:linear-gradient(180deg,var(--pos),var(--pos-soft)); box-shadow:0 0 8px -2px var(--pos-line); }
.debtBarDeficit { top:50%; border-radius:0 0 3px 3px; background:linear-gradient(180deg,var(--neg),var(--neg-soft)); }
.debtDay { font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.debtLegend { display:flex; gap:var(--space-4); font-family:var(--font-mono); font-size:9.5px; color:var(--muted-strong); letter-spacing:.06em; }
.ldot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.ldot[data-t="good"] { background:var(--pos); box-shadow:0 0 6px var(--pos-line); }
.ldot[data-t="low"]  { background:var(--neg); }

/* Coach card */
.coachCard { padding:var(--space-5) var(--space-6); display:flex; flex-direction:column; gap:var(--space-4); }
.coachList { list-style:none; display:flex; flex-direction:column; gap:var(--space-4); }
.coachList li {
  display:grid; grid-template-columns:20px 1fr; gap:var(--space-3); align-items:flex-start;
  padding-left:var(--space-3); border-left:1px solid var(--border);
  transition:border-color var(--dur) var(--ease);
}
.coachList li:hover { border-left-color:var(--brand); }
.coachMark { color:var(--brand); font-size:var(--text-base); line-height:1.3; filter:drop-shadow(0 0 5px var(--brand-glow)); }
.coachList strong { display:block; font-weight:700; color:var(--fg); margin-bottom:3px; font-size:var(--text-sm); line-height:1.4; }
.coachList li > div > span { color:var(--muted-strong); font-size:var(--text-sm); line-height:1.55; }

/* ── Buttons ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
  padding:.625rem var(--space-4); border-radius:var(--r-md);
  font-size:var(--text-sm); font-family:var(--font-ui); font-weight:600;
  cursor:pointer; border:1px solid transparent; background:transparent; color:var(--fg);
  transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease),
             color var(--dur) var(--ease), transform var(--dur-fast) var(--ease),
             box-shadow var(--dur) var(--ease), filter var(--dur) var(--ease);
}
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-primary { background:var(--brand); color:var(--brand-ink); font-weight:700; border-color:transparent; }
.btn-primary:hover:not(:disabled) { filter:brightness(1.1); box-shadow:0 0 28px var(--brand-glow); }
.btn-primary:active:not(:disabled) { transform:translateY(1px); }
.btn-ghost { border-color:var(--border); }
.btn-ghost:hover:not(:disabled) { border-color:var(--border-strong); background:var(--surface); }
.btn-link  { color:var(--muted-strong); padding:var(--space-2) var(--space-3); }
.btn-link:hover  { color:var(--fg); }
.btn-full  { width:100%; justify-content:center; }

/* ── Connect panel (empty state) ── */
.connectWrap { display:flex; align-items:center; justify-content:center; flex:1; padding:var(--space-8); }
.connectPanel {
  width:100%; max-width:640px;
  display:flex; flex-direction:column; gap:var(--space-5);
  padding:var(--space-8); border-radius:var(--r-2xl);
}
.connectHeading { font-family:var(--font-display); font-weight:700; font-size:var(--text-2xl); letter-spacing:-.03em; }
.connectSub { font-size:var(--text-sm); color:var(--muted); line-height:1.6; }
.connectIntro { font-size:var(--text-lg); line-height:1.5; color:var(--fg); }
.connectIntro em { font-style:normal; color:var(--brand); font-weight:700; }
.setupNote {
  padding:var(--space-3) var(--space-4); border-left:2px solid var(--warn-line);
  background:var(--warn-soft); border-radius:0 var(--r-sm) var(--r-sm) 0;
  font-size:var(--text-xs); line-height:1.55; color:var(--muted-strong);
}
.setupNote strong { color:var(--warn); font-weight:600; }
.fieldGrid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); }
.field { display:flex; flex-direction:column; gap:6px; }
.fieldFull { grid-column:1/-1; }
.fieldLabel { font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--muted-strong); }
.fieldInput {
  width:100%; padding:.625rem .75rem;
  background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--r-md);
  color:var(--fg); font-family:var(--font-ui); font-size:var(--text-base);
  transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.fieldInput:focus { outline:none; border-color:var(--brand-line); box-shadow:0 0 0 3px var(--brand-soft); }
.formActions { display:flex; align-items:center; justify-content:flex-end; gap:var(--space-3); }

/* ── Chips ── */
.chip {
  display:inline-flex; align-items:center; gap:8px;
  padding:5px 12px; border-radius:var(--r-pill);
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
}
.chip-brand { background:var(--brand-soft); border:1px solid var(--brand-line); color:var(--brand); }
.chip-warn  { background:var(--warn-soft);  border:1px dashed var(--warn-line);  color:var(--warn); }

/* ── Reduced motion ── */
@media (prefers-reduced-motion:reduce) {
  .tickerTrack,.ringAura,.chipDot,.tickerPulse { animation:none !important; }
  .card:hover { transform:none; }
}

/* ── Responsive (< 960px) ── */
@media (max-width:960px) {
  body { overflow:auto; }
  #shell { display:block; }
  #sidebar { position:static; border-right:none; border-bottom:1px solid var(--border); backdrop-filter:none; overflow:visible; }
  #main { overflow:visible; }
  .statGrid { grid-template-columns:repeat(2,1fr); }
  .bottomRow { grid-template-columns:1fr; }
  .heroCard { grid-template-columns:1fr; }
}

</style>
</head>
<body>

<!-- Suite top bar -->
<div id="suiteBar">
  <a class="stLogo" href="index.html" aria-label="Wayne Mode home">
    <div class="stLogoIcon" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="#000"><path d="M12 1.5L13.8 10.2 22.5 12 13.8 13.8 12 22.5 10.2 13.8 1.5 12 10.2 10.2Z"/></svg>
    </div>
    <span class="stLogoName">Wayne Mode</span>
  </a>
  <span class="stSpacer"></span>
  <a class="stBack" href="index.html">← Home</a>
</div>

<div id="shell">
  <!-- ════ SIDEBAR ════ -->
  <aside id="sidebar" aria-label="Fitness Band sidebar">

    <div class="sideHead">
      <div class="pageTitle">Fitness<br><span class="pageTitleAccent">Band</span></div>
      <div class="pageSub">Readiness · Sleep · HRV · Heart Rate</div>
    </div>

    <!-- Recovery ring -->
    <div class="ringSection" id="ringPanel"></div>

    <!-- Actions -->
    <div class="actionsSection" id="sideActions"></div>

    <!-- Theme -->
    <div class="themeSection">
      <div class="sideLabel">Theme</div>
      <div class="themePills" id="themePills"></div>
    </div>

  </aside>

  <!-- ════ MAIN ════ -->
  <main id="main" aria-label="Fitness data">
    <div id="mainInner"></div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════
   SAMPLE DATA
   ═══════════════════════════════════════════════════ */
const SLEEP_TARGET = 8;
const SAMPLE = {
  date:'today', recovery:92, hrv:218, rhr:32,
  sleepPerf:85, sleepHours:7+40/60, strain:4.0,
  hrvBaseline:null, rhrBaseline:null, sleepPerfBaseline:null,
  strainWeeklyAvg:7.8, hrvAnomalous:true,
  recoveryTrend:[68,72,78,85,80,88,92],
  sleepDebt7d:[
    {day:'Mon',hours:6.2},{day:'Tue',hours:7.5},{day:'Wed',hours:8.1},
    {day:'Thu',hours:6.8},{day:'Fri',hours:7+40/60},{day:'Sat',hours:8.5},{day:'Sun',hours:7.2},
  ],
  sleepTargetHours:SLEEP_TARGET, vitalityScore:73, vitalityTier:'Solid',
  lastSyncedMinutes:12, daysAvailable:7,
};

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function recoveryTone(r){
  if(r==null) return 'muted';
  return r>=67?'good':r>=34?'watch':'low';
}
function statTone(v,baseline,inverse){
  if(v==null||baseline==null) return 'muted';
  const d=v-baseline;
  if(inverse) return d<=0?'good':d<=3?'watch':'low';
  return d>=-2?'good':d>=-8?'watch':'low';
}
function sleepTone(h,target){
  if(h==null) return 'muted';
  return h>=target-.5?'good':h>=target-1.5?'watch':'low';
}
function formatHM(h){
  if(h==null) return '—';
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return hh+'h '+String(mm).padStart(2,'0')+'m';
}
function formatDebt(minutes){
  const s=minutes<0?'-':'+', a=Math.abs(minutes);
  return s+Math.floor(a/60)+'h '+String(a%60).padStart(2,'0')+'m';
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════════════════════════════════
   SPARKLINES
   ═══════════════════════════════════════════════════ */
function buildSparkPath(values, W, H, pad){
  if(!values||values.length<2) return null;
  const mn=Math.min(...values), mx=Math.max(...values);
  const rng=Math.max(.0001,mx-mn);
  const stepX=(W-pad*2)/(values.length-1);
  const pts=values.map((v,i)=>(pad+i*stepX).toFixed(1)+','+(H-pad-((v-mn)/rng)*(H-pad*2)).toFixed(1));
  return pts;
}
function tickerSparkSvg(values,tone){
  if(!values||values.length<2) return '';
  const pts=buildSparkPath(values,48,13,1.5);
  if(!pts) return '';
  const last=pts[pts.length-1].split(',');
  return '<svg viewBox="0 0 48 13" class="tickerSpark" aria-hidden data-tone="'+tone+'">'
    +'<polyline points="'+pts.join(' ')+'" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="1.6" fill="currentColor"/></svg>';
}
function miniSparkSvg(values, tone){
  if(!values||values.length<2) return '';
  const W=200, H=24, pad=2;
  const pts=buildSparkPath(values,W,H,pad);
  if(!pts) return '';
  const last=pts[pts.length-1].split(',');
  const colorVar = tone==='good'?'var(--pos)':tone==='watch'?'var(--warn)':tone==='low'?'var(--neg)':'var(--muted-strong)';
  return '<svg viewBox="0 0 '+W+' '+H+'" class="miniSpark" aria-hidden preserveAspectRatio="none">'
    +'<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+colorVar+'" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2" fill="'+colorVar+'"/></svg>';
}
function heroSparkSvg(values){
  if(!values||values.length<2) return '';
  const W=600, H=96, pad=8;
  const pts=buildSparkPath(values,W,H,pad);
  if(!pts) return '';
  const last=pts[pts.length-1].split(',');
  const first=pts[0].split(',');
  const area=[first[0]+','+H, ...pts, last[0]+','+H].join(' ');
  return '<svg viewBox="0 0 '+W+' '+H+'" class="heroSvg" aria-hidden preserveAspectRatio="none">'
    +'<defs>'
    +'<linearGradient id="hFill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="var(--brand)" stop-opacity=".25"/>'
    +'<stop offset="100%" stop-color="var(--brand)" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<polygon class="heroArea" points="'+area+'" fill="url(#hFill)"/>'
    +'<polyline class="heroLine" points="'+pts.join(' ')+'"/>'
    +pts.slice(0,-1).map((p,i)=>{const xy=p.split(',');return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="2" class="heroDotMid"/>';}).join('')
    +'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="4" class="heroDotLast"/>'
    +'</svg>';
}

/* ═══════════════════════════════════════════════════
   TICKER
   ═══════════════════════════════════════════════════ */
function buildTickerItems(d){
  const items=[];
  if(d.recovery!=null){
    const trend=d.recoveryTrend.length>=2?d.recoveryTrend:[d.recovery,d.recovery];
    const prior=trend.length>1?trend.slice(0,-1).reduce((a,b)=>a+b,0)/(trend.length-1):d.recovery;
    const delta=Math.round(d.recovery-prior);
    items.push({sym:'REC',val:String(Math.round(d.recovery)),unit:'%',spark:trend,delta,du:'%',tone:d.recovery>=67?'good':d.recovery>=34?'watch':'urgent'});
  }
  if(d.hrv!=null){
    const base=d.hrvBaseline??d.hrv;
    const delta=(d.hrvBaseline!=null&&!d.hrvAnomalous)?Math.round(d.hrv-d.hrvBaseline):null;
    const tone=d.hrvAnomalous?'urgent':delta==null?'watch':delta>=-2?'good':delta>=-8?'watch':'urgent';
    items.push({sym:'HRV',val:String(Math.round(d.hrv)),unit:'ms',spark:[base,d.hrv],delta,du:'ms',tone});
  }
  if(d.rhr!=null){
    const base=d.rhrBaseline??d.rhr;
    const delta=d.rhrBaseline!=null?Math.round(d.rhr-d.rhrBaseline):null;
    const tone=delta==null?'watch':delta<=0?'good':delta<=3?'watch':'urgent';
    items.push({sym:'RHR',val:String(Math.round(d.rhr)),unit:'bpm',spark:[base,d.rhr],delta,du:'bpm',inv:true,tone});
  }
  if(d.sleepHours!=null){
    const spark=d.sleepDebt7d.length>=2?d.sleepDebt7d.map(n=>n.hours):[d.sleepTargetHours,d.sleepHours];
    const delta=Math.round((d.sleepHours-d.sleepTargetHours)*10)/10;
    const tone=d.sleepHours>=d.sleepTargetHours-.5?'good':d.sleepHours>=d.sleepTargetHours-1.5?'watch':'urgent';
    const h=Math.floor(d.sleepHours),m=Math.round((d.sleepHours-h)*60);
    items.push({sym:'SLP',val:h+'h'+String(m).padStart(2,'0'),unit:'',spark,delta,du:'h',tone});
  }
  return items;
}
function tickerHtml(d){
  const items=buildTickerItems(d);
  if(!items.length) return '';
  const doubled=items.concat(items);
  const cells=doubled.map(it=>{
    const arrow=it.delta==null?'':it.inv?(it.delta<=0?'↗':'↘'):(it.delta>=0?'↗':'↘');
    const dt=it.delta==null?'':(it.delta>=0?'+':'')+it.delta+it.du;
    return '<span class="tickerCell" data-tone="'+it.tone+'">'
      +'<span class="tickerSym">'+it.sym+'</span>'
      +'<span class="tickerVal">'+esc(it.val)+(it.unit?'<span class="tickerUnit">'+it.unit+'</span>':'')+'</span>'
      +tickerSparkSvg(it.spark,it.tone)
      +(dt?'<span class="tickerDelta">'+arrow+' '+dt+'</span>':'')
      +'</span>';
  }).join('');
  return '<div class="ticker" role="status" aria-label="Live fitness metrics">'
    +'<div class="tickerEyebrow"><span class="tickerPulse" aria-hidden></span>Live</div>'
    +'<div class="tickerScroll"><div class="tickerTrack">'+cells+'</div></div>'
    +'</div>';
}

/* ═══════════════════════════════════════════════════
   HERO TREND CARD
   ═══════════════════════════════════════════════════ */
function heroCardHtml(d){
  const tone=recoveryTone(d.recovery);
  const tier=d.recovery!=null?(d.recovery>=67?'Ready':d.recovery>=34?'Building':'Low'):'—';
  const trend=d.recoveryTrend;
  const hasTrend=trend&&trend.length>=2;
  const delta=hasTrend?trend[trend.length-1]-trend[0]:0;
  const spark=hasTrend?heroSparkSvg(trend):'<p class="heroEmpty">Need a few more days of data for the trend.</p>';
  return '<div class="card heroCard">'
    +'<div class="heroLeft">'
    +  '<div class="heroMetricLabel">Readiness · Today</div>'
    +  '<div class="heroMetricValue" data-tone="'+tone+'">'+(d.recovery!=null?Math.round(d.recovery):'—')+'<span>'+(d.recovery!=null?'%':'')+'</span></div>'
    +  '<div class="heroTierBadge" data-tone="'+tone+'"><svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden><circle cx="4" cy="4" r="4"/></svg>'+tier+'</div>'
    +  (hasTrend?'<div class="heroDelta '+(delta>=0?'up':'down')+'">'+(delta>=0?'↑':'↓')+' '+Math.abs(Math.round(delta))+' pts · '+trend.length+'-day trend</div>':'')
    +'</div>'
    +'<div class="heroRight">'+spark+'</div>'
    +'</div>';
}

/* ═══════════════════════════════════════════════════
   STAT GRID
   ═══════════════════════════════════════════════════ */
function statGridHtml(d){
  function card(label,val,unit,sub,badge,badgeTone,tone,sparkValues){
    return '<div class="card statCard" data-tone="'+tone+'">'
      +'<div class="statLabel">'+label+'</div>'
      +'<div class="statValueRow"><span class="statValue">'+esc(val)+'</span>'+(unit?'<span class="statUnit">'+unit+'</span>':'')+'</div>'
      +'<div class="statSub">'+esc(sub)+'</div>'
      +(badge?'<div class="statBadge" data-tone="'+badgeTone+'">'+esc(badge)+'</div>':'')
      +(sparkValues?miniSparkSvg(sparkValues,tone):'')
      +'</div>';
  }
  const hrvDelta=(d.hrv!=null&&d.hrvBaseline!=null)?Math.round(d.hrv-d.hrvBaseline):null;
  const rhrDelta=(d.rhr!=null&&d.rhrBaseline!=null)?Math.round(d.rhr-d.rhrBaseline):null;
  const slpTone=sleepTone(d.sleepHours,d.sleepTargetHours);
  const hrvTone=d.hrv==null?'muted':d.hrvAnomalous?'low':statTone(d.hrv,d.hrvBaseline,false);
  const rhrTone=d.rhr==null?'muted':statTone(d.rhr,d.rhrBaseline,true);
  const strTone=(d.strain!=null&&d.strainWeeklyAvg!=null&&d.strain>d.strainWeeklyAvg+2)?'watch':'good';
  const sleepSpark=d.sleepDebt7d.length>=2?d.sleepDebt7d.map(n=>n.hours):null;
  const hrvSpark=d.hrvBaseline!=null?[d.hrvBaseline,d.hrv]:null;
  const rhrSpark=d.rhrBaseline!=null?[d.rhrBaseline,d.rhr]:null;
  const strSpark=d.strainWeeklyAvg!=null?[d.strainWeeklyAvg,d.strain]:null;
  const slpSub=d.bedtime&&d.wakeTime?d.bedtime+' → '+d.wakeTime:(d.sleepPerf!=null?Math.round(d.sleepPerf)+'% efficiency':'—');
  return '<div class="statGrid">'
    +card('Sleep',formatHM(d.sleepHours),'',slpSub,
        d.sleepPerf!=null&&!(d.bedtime&&d.wakeTime)?null:(d.sleepPerf!=null?Math.round(d.sleepPerf)+'% eff.':null),
        'good',slpTone,sleepSpark)
    +card('Bedtime',d.bedtime||'—','',
        d.wakeTime?'↑ wake '+d.wakeTime:'—',
        null,null,slpTone,null)
    +card('HRV',d.hrv!=null?String(Math.round(d.hrv)):'—','ms',
        d.hrvAnomalous?'flagged reading':'rmssd',
        hrvDelta!=null?(hrvDelta>=0?'↑ +'+hrvDelta+' ms':'↓ '+hrvDelta+' ms'):null,
        hrvDelta!=null&&hrvDelta>=0?'good':'watch',hrvTone,hrvSpark)
    +card('RHR',d.rhr!=null?String(Math.round(d.rhr)):'—','bpm','resting',
        rhrDelta!=null?(rhrDelta<=0?'↓ '+rhrDelta+' bpm':'↑ +'+rhrDelta+' bpm'):null,
        rhrDelta!=null&&rhrDelta<=0?'good':'watch',rhrTone,rhrSpark)
    +'</div>';
}

/* ═══════════════════════════════════════════════════
   SLEEP DEBT
   ═══════════════════════════════════════════════════ */
function sleepDebtHtml(d){
  if(!d.sleepDebt7d.length) return '';
  const nights=d.sleepDebt7d, target=d.sleepTargetHours;
  const totalMin=nights.reduce((a,x)=>a+(x.hours-target),0)*60;
  const maxA=1.5;
  let bars='';
  nights.forEach(n=>{
    const delta=n.hours-target;
    const pct=Math.min(Math.abs(delta)/maxA,1)*100;
    bars+='<div class="debtCol">'
      +'<div class="debtTrack"><div class="debtBaseline"></div>'
      +'<div class="'+(delta>=0?'debtBarSurplus':'debtBarDeficit')+'" style="height:'+pct.toFixed(1)+'%"></div>'
      +'</div><div class="debtDay">'+esc(n.day)+'</div></div>';
  });
  return '<div class="card debtCard">'
    +'<div class="cardHead"><span class="cardTitle">Sleep Debt</span>'
    +'<span class="debtTotal" data-tone="'+(totalMin<0?'watch':'good')+'">'+formatDebt(Math.round(totalMin))+'<em>last '+nights.length+' nights</em></span>'
    +'</div>'
    +'<div class="debtBars">'+bars+'</div>'
    +'<div class="debtLegend">'
    +'<span><span class="ldot" data-t="good"></span>Surplus</span>'
    +'<span><span class="ldot" data-t="low"></span>Deficit</span>'
    +'</div></div>';
}

/* ═══════════════════════════════════════════════════
   COACH
   ═══════════════════════════════════════════════════ */
function coachHtml(d){
  const tips=[];
  if(d.hrv!=null&&d.hrvBaseline!=null&&!d.hrvAnomalous){
    const delta=Math.round(d.hrv-d.hrvBaseline);
    if(delta<=-5) tips.push({s:'Your HRV is '+Math.round(d.hrv)+'ms, '+Math.abs(delta)+'ms under your '+Math.round(d.hrvBaseline)+'ms baseline.',r:' Aim for 8h sleep tonight and skip caffeine after 2pm. HRV usually rebounds inside 48h once the inputs reset.'});
    else if(delta>=5) tips.push({s:'HRV is '+Math.round(d.hrv)+'ms, '+delta+'ms above baseline.',r:' Strong recovery signal. Green-light day to push the hardest session.'});
  }
  if(d.strain!=null&&d.strainWeeklyAvg!=null&&d.strain>d.strainWeeklyAvg+2)
    tips.push({s:'Strain '+d.strain.toFixed(1)+' today, above your '+d.strainWeeklyAvg.toFixed(1)+' weekly avg.',r:' One recovery day (Z2 only, target under 10 strain) lets HRV climb back without sacrificing the block.'});
  if(d.sleepDebt7d.length>0){
    const dm=d.sleepDebt7d.reduce((a,x)=>a+(x.hours-d.sleepTargetHours),0)*60;
    if(dm<-90) tips.push({s:'Sleep debt '+formatDebt(Math.round(dm))+' across the week.',r:' Add 30 minutes tonight. Going to bed earlier is the cheapest performance intervention you have.'});
  }
  if(d.recovery!=null&&d.recovery<34)
    tips.unshift({s:'Readiness '+Math.round(d.recovery)+'%. Your ceiling is lower today.',r:' Cut caffeine ~30% and skip a second hard session. Brute-forcing a red day costs you tomorrow.'});
  else if(d.recovery!=null&&d.recovery>=80)
    tips.unshift({s:'Readiness '+Math.round(d.recovery)+'%. Green light to push.',r:' Stack the hardest training or cognitive session inside the peak window.'});
  if(!tips.length)
    tips.push({s:'Building your baseline.',r:" Need 7+ days of valid readings before personalized coaching kicks in. You're at "+d.daysAvailable+' now.'});
  const lis=tips.slice(0,3).map(t=>
    '<li><span class="coachMark" aria-hidden>✦</span><div><strong>'+esc(t.s)+'</strong><span>'+esc(t.r)+'</span></div></li>'
  ).join('');
  return '<div class="card coachCard"><div class="cardHead"><span class="cardTitle">How to Improve Today</span></div><ul class="coachList">'+lis+'</ul></div>';
}

/* ═══════════════════════════════════════════════════
   CONNECT PANEL
   ═══════════════════════════════════════════════════ */
function connectPanelHtml(){
  const body='<p class="connectIntro">Bring your <em>sleep</em> and <em>resting HR</em> into Luca via <strong>Google Health</strong>.</p>'
    +'<p style="font-size:var(--text-sm);color:var(--muted);line-height:1.6">One tap. Sign in with Google, allow access, you\'re back here. We never see your password.</p>'
    +(ON_SERVER
      ?'<a class="btn btn-primary" href="/api/fitbit/login" style="align-self:flex-start">Connect Google Health</a>'
        +'<p class="setupNote"><strong>Setup note:</strong> needs GOOGLE_CLIENT_ID &amp; GOOGLE_CLIENT_SECRET in Vercel env vars.</p>'
      :'<p class="setupNote"><strong>Setup note:</strong> Google Health sync runs on the deployed app.</p>');
  return '<div class="connectWrap"><div class="card connectPanel">'
    +'<div class="connectHeading">Connect Google Health</div>'
    +body+'</div></div>';
}

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
const HEALTH_KEY='patron_health_v1';
const ON_SERVER=location.protocol==='http:'||location.protocol==='https:';

let fitbitData=null, syncing=false, activeKind=null;

function publishFitbit(d){const s={source:'fitbit',connected:true,ts:Date.now(),recovery:d.recovery,hrv:d.hrv,rhr:d.rhr,sleepPerf:d.sleepPerf,sleepHours:d.sleepHours,sleepTargetHours:d.sleepTargetHours,strain:d.strain,bedtime:d.bedtime,wakeTime:d.wakeTime,vitalityScore:d.vitalityScore};try{localStorage.setItem(HEALTH_KEY,JSON.stringify(s));}catch{}}
function clearFitbit(){try{const c=JSON.parse(localStorage.getItem(HEALTH_KEY)||'null');if(c&&c.source==='fitbit')localStorage.removeItem(HEALTH_KEY);}catch{}}
function buildLiveData(j){
  const rec=j.readiness??j.recovery??null;
  const trend=Array.isArray(j.recoveryTrend)&&j.recoveryTrend.length?j.recoveryTrend:(rec!=null?[rec]:[]);
  return{date:'today',recovery:rec,hrv:j.hrv,rhr:j.rhr,sleepPerf:j.sleepPerf,sleepHours:j.sleepHours,strain:j.strain,
    hrvBaseline:null,rhrBaseline:null,sleepPerfBaseline:null,strainWeeklyAvg:j.strainWeeklyAvg||null,hrvAnomalous:false,
    recoveryTrend:trend,sleepDebt7d:Array.isArray(j.sleepDebt7d)?j.sleepDebt7d:[],
    sleepTargetHours:j.sleepTargetHours||8,vitalityScore:null,vitalityTier:'',lastSyncedMinutes:0,daysAvailable:trend.length};
}
async function syncFitbitLive(){if(!ON_SERVER)return;syncing=true;render();try{const r=await fetch('/api/fitbit/data',{cache:'no-store'}),j=await r.json();if(j&&j.connected){fitbitData=buildLiveData(j);fitbitData.bedtime=j.bedtime;fitbitData.wakeTime=j.wakeTime;}else{fitbitData=null;}}catch{fitbitData=null;}syncing=false;render();}

/* ═══════════════════════════════════════════════════
   THEMES
   ═══════════════════════════════════════════════════ */
const THEMES=[
  {key:'vision',  label:'Vision',  sw:'linear-gradient(135deg,#FFFFFF,#888888)'},
  {key:'nocturne',label:'Nocturne',sw:'#00FF88'},
  {key:'aurora',  label:'Aurora',  sw:'linear-gradient(135deg,#8B7BFF,#4FE3D0)'},
  {key:'daylight',label:'Daylight',sw:'#6A45FF'},
];
let currentTheme=(()=>{try{return localStorage.getItem('patron_theme')||'vision';}catch{return 'vision';}})();
if(!THEMES.some(t=>t.key===currentTheme)) currentTheme='vision';
function applyTheme(name){
  if(!THEMES.some(t=>t.key===name)) name='vision';
  currentTheme=name;
  document.documentElement.setAttribute('data-theme',name);
  try{localStorage.setItem('patron_theme',name);}catch{}
  renderThemePills();
}
function renderThemePills(){
  document.getElementById('themePills').innerHTML=THEMES.map(t=>
    '<button type="button" class="themeBtn '+(t.key===currentTheme?'themeBtnActive':'')+'" data-action="theme" data-theme="'+t.key+'">'
    +'<span class="themeSwatch" style="background:'+t.sw+'"></span>'+t.label+'</button>'
  ).join('');
}

/* ═══════════════════════════════════════════════════
   RENDER — SIDEBAR
   ═══════════════════════════════════════════════════ */
function renderRingPanel(d){
  const panel=document.getElementById('ringPanel');
  if(!d){
    panel.innerHTML='<p style="color:var(--muted);font-size:var(--text-xs);font-family:var(--font-mono);letter-spacing:.1em;text-align:center">— no data —</p>';
    return;
  }
  const tone=recoveryTone(d.recovery);
  const circ=2*Math.PI*88;
  const fill=d.recovery!=null?circ*(1-d.recovery/100):circ;
  const tier=d.recovery!=null?(d.recovery>=67?'Ready':d.recovery>=34?'Building':'Low'):'—';
  panel.innerHTML=
    '<div class="ringAura" data-tone="'+tone+'" aria-hidden></div>'
    +'<div class="recoveryRing" data-tone="'+tone+'" role="img" aria-label="Readiness '+Math.round(d.recovery??0)+'%">'
    +'<svg viewBox="0 0 200 200" class="ringSvg" aria-hidden>'
    +'<circle cx="100" cy="100" r="88" class="ringTrack"/>'
    +(d.recovery!=null?'<circle cx="100" cy="100" r="88" class="ringFill" style="stroke-dasharray:'+circ.toFixed(2)+';stroke-dashoffset:'+fill.toFixed(2)+'"/>':'')
    +'</svg>'
    +'<div class="ringInner">'
    +'<div class="ringVal" data-tone="'+tone+'">'+(d.recovery!=null?Math.round(d.recovery):'—')+'</div>'
    +(d.recovery!=null?'<div class="ringPct">%</div>':'')
    +'<div class="ringLabel">Readiness</div>'
    +'<div class="ringTier">'+tier+'</div>'
    +'</div></div>';
}

function renderSideActions(d){
  const el=document.getElementById('sideActions');
  if(!d){el.innerHTML='';return;}
  el.innerHTML='<span class="chip chip-brand"><span class="chipDot" aria-hidden></span>Google Health · Live</span>'
    +'<div class="syncRow"><span>—</span>'
    +'<button type="button" class="btn btn-ghost" data-action="sync"'+(syncing?' disabled':'')+' style="padding:5px 12px;font-size:11px">'+(syncing?'syncing…':'Sync now')+'</button></div>'
    +'<button type="button" class="btn btn-link btn-full" data-action="disconnect">Disconnect</button>';
}

/* ═══════════════════════════════════════════════════
   RENDER — MAIN
   ═══════════════════════════════════════════════════ */
function render(){
  const d=fitbitData||null;
  activeKind=d?'fitbit-live':null;
  if(d) publishFitbit(d);

  renderRingPanel(d);
  renderSideActions(d);

  const main=document.getElementById('mainInner');
  if(d){
    main.innerHTML=
      tickerHtml(d)
      +heroCardHtml(d)
      +statGridHtml(d)
      +'<div class="bottomRow">'
      +(d.sleepDebt7d.length?sleepDebtHtml(d):'<div></div>')
      +coachHtml(d)
      +'</div>';
  } else {
    main.innerHTML=connectPanelHtml();
  }
}

/* ═══════════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════════ */
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const action=btn.getAttribute('data-action');
  if(action==='theme'){applyTheme(btn.getAttribute('data-theme'));return;}
  if(action==='disconnect'){
    fetch('/api/fitbit/logout').catch(()=>{}).then(()=>{fitbitData=null;clearFitbit();render();});
    return;
  }
  if(action==='sync'){syncFitbitLive();return;}
});

/* ═══════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════ */
renderThemePills();
applyTheme(currentTheme);

(function bootLive(){
  if(!ON_SERVER) return;
  try{
    const f=new URLSearchParams(location.search).get('fitbit');
    if(f){
      history.replaceState(null,'',location.pathname);
      if(f==='error'||f==='denied') alert('Google Health connection didn\'t complete — make sure GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are set in Vercel.');
    }
  }catch{}
  syncFitbitLive();
})();
</script>
