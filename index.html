    + '<div class="cardTop">' + wmIcon(a.icon) + '<span class="cardName">' + esc(a.name) + '</span></div>'
    + tail + '</a>';
}

/* ================================================================
 * Live ticker
 * ================================================================ */
function sparkSvg(seed){
  const w = 46, h = 16, n = 6, pad = 2;
  const pts = [];
  for (let i = 0; i < n; i++){
    const t = (Math.sin(seed * 1.7 + i * 1.3) + Math.sin(seed * 0.6 + i * 0.7)) / 2;
    pts.push([pad + (i / (n - 1)) * (w - pad * 2), pad + (1 - (t * 0.5 + 0.5)) * (h - pad * 2)]);
  }
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length - 1];
  return '<svg class="tiSpark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" aria-hidden>'
    + '<path d="' + d + '" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>'
    + '<circle cx="' + last[0].toFixed(1) + '" cy="' + last[1].toFixed(1) + '" r="2.1" fill="currentColor" style="filter:drop-shadow(0 0 4px currentColor)"/></svg>';
}
function tickerMetrics(){
  const out = [];
  const add = (label, value, unit, tone, delta) => out.push({ label, value, unit: unit || '', tone: tone || 'brand', delta: delta || '' });
  const h = health;
  if (h){
    if (h.recovery != null) add('REC', Math.round(h.recovery), '%', recTone(h.recovery));
    if (h.sleepHours != null){ const hh = Math.floor(h.sleepHours), mm = Math.round((h.sleepHours - hh) * 60); add('SLP', hh + 'h' + String(mm).padStart(2,'0'), '', h.sleepPerf != null ? (h.sleepPerf >= 85 ? 'good' : h.sleepPerf >= 60 ? 'watch' : 'low') : 'brand'); }
    if (h.strain != null) add('STR', (Math.round(h.strain * 10) / 10).toFixed(1), '', 'brand');
    if (h.hrv != null) add('HRV', Math.round(h.hrv), 'ms', 'good');
    if (h.rhr != null) add('RHR', Math.round(h.rhr), 'bpm', 'brand');
  }
  try {
    const biz = lsGet('business_v1');
    if (biz && biz.mrr > 0) add('MRR', '€' + fmtNum(biz.mrr), '', biz.mrr >= 1000 ? 'good' : 'brand');
    const fin = lsGet('finance_standalone_v1');
    if (fin && Array.isArray(fin.accounts) && fin.accounts.length){ const nw = fin.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); add('NET', 'CHF ' + fmtNum(nw), '', 'good'); }
    const wat = lsGet('water_standalone_v1');
    if (wat && wat.logs){ const n = wat.logs[localDateKey()] || 0; add('H2O', String(n), n === 1 ? 'drink' : 'drinks', 'brand'); }
    const sup = lsGet('supplements_standalone_v1');
    if (sup && Array.isArray(sup.items) && sup.items.length){ const tk = (sup.taken && sup.taken[activeDateKey()]) || {}; const n = sup.items.filter(i => tk[i.id]).length; add('SUP', n + '/' + sup.items.length, '', n >= sup.items.length ? 'good' : 'brand'); }
  } catch(e){}
  return out;
}
function tickerHtml(){
  const items = tickerMetrics();
  if (!items.length){
    return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>Luca · Live</div>'
      + '<div class="tickerViewport"><div class="tickerTrack" style="animation:none;padding-left:var(--space-5)">'
      + '<span class="tickerItem" style="border:0"><span class="tiLabel">No data yet — add vitals to go live</span></span>'
      + '</div></div></div>';
  }
  const chip = (m, i) => '<span class="tickerItem" data-tone="' + m.tone + '">'
    + '<span class="tiLabel">' + esc(m.label) + '</span>'
    + '<span class="tiVal">' + esc(m.value) + (m.unit ? '<span class="tiUnit">' + esc(m.unit) + '</span>' : '') + '</span>'
    + (m.delta ? '<span class="tiDelta">' + esc(m.delta) + '</span>' : '')
    + sparkSvg(i + 1) + '</span>';
  const seq = items.map(chip).join('');
  const dur = Math.max(18, items.length * 6);
  return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>Luca · Live</div>'
    + '<div class="tickerViewport"><div class="tickerTrack" style="animation-duration:' + dur + 's">'
    + seq + seq + '</div></div></div>';
}

function openVitals(){
  ui.modalOpen = true;
  ui.draftSource = (health && health.source) ? health.source : 'manual';
  renderModal();

function saveVitals(){
  const num = (id) => { const el = document.getElementById(id); if (!el || el.value === '') return null; const n = Number(el.value); return isFinite(n) ? n : null; };
  const str = (id) => { const el = document.getElementById(id); return el && el.value ? el.value : null; };
  const recovery = num('f-rec');
  const bedtime = str('f-bed');
  const wakeTime = str('f-wake');
  let sleepHours = num('f-sleep');
  if (sleepHours == null && bedtime && wakeTime){
    const [bh, bm] = bedtime.split(':').map(Number);
    const [wh, wm] = wakeTime.split(':').map(Number);
    let mins = (wh * 60 + wm) - (bh * 60 + bm);
    if (mins <= 0) mins += 24 * 60;
    sleepHours = Math.round((mins / 60) * 10) / 10;
  }
  const hrv = num('f-hrv');
  const rhr = num('f-rhr');
  const target = num('f-target') || 8;
  if (recovery == null && sleepHours == null && hrv == null && rhr == null) { alert('Enter at least one value (recovery, sleep, or bed + wake times).'); return; }
  const sleepPerf = sleepHours != null ? Math.round(Math.min(100, (sleepHours / target) * 100)) : null;
  health = { source: ui.draftSource, connected: true, ts: Date.now(), recovery, sleepHours, sleepPerf, sleepTargetHours: target, bedtime, wakeTime, hrv, rhr, strain: null };
  saveHealth(health);
  ui.modalOpen = false;
  render();
}

  const units = p.units === 'imperial' ? 'imperial' : 'metric';
  const h = (p.heightCm == null || p.heightCm === '') ? '' : (units === 'imperial' ? Math.round(p.heightCm / 2.54) : Math.round(p.heightCm));
  const w = (p.weightKg == null || p.weightKg === '') ? '' : (units === 'imperial' ? Math.round(p.weightKg / 0.45359237) : p.weightKg);
  return { name: p.name || '', age: p.age != null ? String(p.age) : '', sex: p.sex || '', units, height: h === '' ? '' : String(h), weight: w === '' ? '' : String(w), workouts: p.workoutsPerWeek != null && p.workoutsPerWeek !== '' ? String(p.workoutsPerWeek) : '', level: p.gymLevel || '', goal: p.goal || '', caffeine: p.caffeineMgPerDay != null && p.caffeineMgPerDay !== '' ? String(p.caffeineMgPerDay) : '' };
}
function openProfile(){ ui.profileDraft = draftFromProfile(); ui.profileOpen = true; ui.modalOpen = false; renderModal(); }
function profileModalHtml(){
  const d = ui.profileDraft || draftFromProfile();
  const imperial = d.units === 'imperial';
  const isEdit = !!profile;
  const sel = (key, opts) => '<select class="fieldInput" data-pf="' + key + '"><option value=""' + (d[key] === '' ? ' selected' : '') + '>—</option>' + opts.map(o => '<option value="' + o[0] + '"' + (d[key] === o[0] ? ' selected' : '') + '>' + o[1] + '</option>').join('') + '</select>';
  const inp = (key, type, ph, attrs) => '<input class="fieldInput" type="' + type + '" data-pf="' + key + '" placeholder="' + esc(ph) + '" value="' + esc(d[key]) + '" ' + (attrs || '') + ' />';
  const field = (label, inner) => '<div class="field"><label class="fieldLabel">' + label + '</label>' + inner + '</div>';
  const body = '<div class="fieldGrid">'
    + '<div class="field fieldFull"><label class="fieldLabel">Name</label>' + inp('name', 'text', 'Luca', 'autocomplete="name"') + '</div>'
    + field('Age', inp('age', 'number', '—', 'min="0" max="120" inputmode="numeric"'))
    + field('Sex', sel('sex', [['M', 'Male'], ['F', 'Female']]))
    + field('Units', sel('units', [['metric', 'Metric (cm/kg)'], ['imperial', 'Imperial (in/lb)']]))
    + field('Height (' + (imperial ? 'in' : 'cm') + ')', inp('height', 'number', imperial ? '70' : '178', 'min="0" inputmode="numeric"'))
    + field('Weight (' + (imperial ? 'lb' : 'kg') + ')', inp('weight', 'number', imperial ? '170' : '77', 'min="0" step="0.1" inputmode="decimal"'))
    + field('Workouts / week', inp('workouts', 'number', '4', 'min="0" max="14" inputmode="numeric"'))
    + field('Training level', sel('level', [['beginner', 'Beginner'], ['intermediate', 'Intermediate'], ['advanced', 'Advanced']]))
    + field('Primary goal', sel('goal', [['cut', 'Cut'], ['bulk', 'Bulk'], ['recomp', 'Recomp'], ['maintain', 'Maintain'], ['general_health', 'General health']]))
    + field('Caffeine mg/day', inp('caffeine', 'number', 'optional', 'min="0" max="1000" step="10" inputmode="numeric"'))
    + '</div>';
  return '<div class="overlay" data-action="close-profile"><div class="panel" data-stop="1">'
    + '<div class="panelHead"><div><div class="panelEyebrow">' + (isEdit ? 'Your profile' : 'Welcome') + '</div><h2 class="panelTitle">' + (isEdit ? 'Edit profile' : 'Set up your dashboard') + '</h2></div>'
    + (isEdit ? '<button type="button" class="panelClose" data-action="close-profile">×</button>' : '') + '</div>'
    + (isEdit ? '' : '<p class="panelNote" style="border-color:var(--brand-line)">Tell the suite a little about you — Luca personalises it, and your stats pre-fill the apps. Stored only in this browser; edit anytime.</p>')
    + body
    + '<div class="panelActions"><button type="button" class="btn ' + (isEdit ? 'btn-ghost' : 'btn-link') + '" data-action="close-profile">' + (isEdit ? 'Cancel' : 'Skip for now') + '</button>'
    + '<button type="button" class="btn btn-primary" data-action="save-profile">' + (isEdit ? 'Save' : 'Save &amp; start') + '</button></div></div></div>';
}
function saveProfile(){
  const d = ui.profileDraft || {};
  const name = (d.name || '').trim();
  if (!name) { alert('Add a name to continue (or Skip for now).'); return; }
  const units = d.units === 'imperial' ? 'imperial' : 'metric';
  const num = (x) => { if (x === '' || x == null) return ''; const n = Number(x); return isFinite(n) ? n : ''; };
  const hRaw = num(d.height), wRaw = num(d.weight);
  const heightCm = hRaw === '' ? '' : (units === 'imperial' ? Math.round(hRaw * 2.54) : Math.round(hRaw));
  const weightKg = wRaw === '' ? '' : (units === 'imperial' ? Math.round(wRaw * 0.45359237 * 10) / 10 : wRaw);
  profile = { name, age: num(d.age), sex: d.sex || '', heightCm, weightKg, units, workoutsPerWeek: num(d.workouts), gymLevel: d.level || '', goal: d.goal || '', caffeineMgPerDay: num(d.caffeine), onboarded: true, ts: Date.now() };
  saveProfileObj(profile);
  ui.profileOpen = false;
  render();
}

document.addEventListener('click', e => {
  const stop = e.target.closest('[data-stop]');
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  if (action === 'theme') { applyTheme(btn.getAttribute('data-theme')); return; }
  if (action === 'set-tab') { ui.activeTab = btn.getAttribute('data-tab') || 'All'; render(); return; }
  if (action === 'open-vitals') { openVitals(); return; }
  if (action === 'open-profile') { openProfile(); return; }
  if (action === 'close-profile') {
    if (!stop || btn.tagName === 'BUTTON') {
      if (!profile) { profile = { onboarded: true, ts: Date.now() }; saveProfileObj(profile); }
      ui.profileOpen = false; renderModal();
    }
    return;
  }
  if (action === 'save-profile') { saveProfile(); return; }
  if (action === 'close-vitals') { if (!stop || btn.tagName === 'BUTTON') { ui.modalOpen = false; renderModal(); } return; }
  if (action === 'src') { ui.draftSource = btn.getAttribute('data-src'); renderModal(); return; }
  if (action === 'save-vitals') { saveVitals(); return; }
  if (action === 'clear-vitals') { if (confirm('Clear today\'s vitals from the suite?')) { clearHealth(); health = null; ui.modalOpen = false; render(); } return; }
  if (action === 'whoop-sync') { syncWhoop(); return; }
  if (action === 'whoop-disconnect') {
    fetch('/api/whoop/logout').catch(()=>{}).then(() => {
      whoopStatus = { connected: false, checked: true };
      if (health && health.source === 'whoop') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
  if (action === 'fitbit-sync') { syncFitbit(); return; }
  if (action === 'fitbit-disconnect') {
    fetch('/api/fitbit/logout').catch(()=>{}).then(() => {
      fitbitStatus = { connected: false, checked: true };
      if (health && health.source === 'fitbit') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
});

document.addEventListener('input', e => {
  const t = e.target; if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  ui.profileDraft[t.dataset.pf] = t.value;
});
document.addEventListener('change', e => {
  const t = e.target;
  if (t && t.dataset && t.dataset.action === 'toggle-insights') { ui.showInsights = t.checked; render(); return; }
  if (t && t.dataset && t.dataset.action === 'toggle-livesync') { ui.liveSync = t.checked; render(); return; }
  if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  if (t.dataset.pf === 'units') {
    const d = ui.profileDraft, toImp = t.value === 'imperial';
    const conv = (v, f, dp) => (v === '' || v == null || !isFinite(Number(v))) ? v : String(Math.round(Number(v) * f * (dp ? 10 : 1)) / (dp ? 10 : 1));
    if (toImp) { d.height = conv(d.height, 1/2.54, 0); d.weight = conv(d.weight, 1/0.45359237, 0); }
    else        { d.height = conv(d.height, 2.54, 0);   d.weight = conv(d.weight, 0.45359237, 1); }
    d.units = t.value;
    renderModal();
    return;
  }
  ui.profileDraft[t.dataset.pf] = t.value;
});

window.addEventListener('storage', e => {
  if (e.key === 'patron_theme' && e.newValue) { applyTheme(e.newValue); return; }
  if (e.key === HEALTH_KEY || e.key === LEGACY_WHOOP_KEY || e.key === null) { health = loadHealth(); render(); }
});

if (!profile) { ui.profileDraft = draftFromProfile(); ui.profileOpen = true; }
applyTheme(currentTheme);

(function bootVitals(){
  if (!ON_SERVER) return;
  try {
    const q = new URLSearchParams(location.search);
    const w = q.get('whoop'), f = q.get('fitbit');
    if (w || f) {
      history.replaceState(null, '', location.pathname);
      if (w === 'error' || w === 'denied') alert('Whoop connection didn\'t complete. Check your WHOOP_CLIENT_ID / SECRET and the registered redirect URL, then try again.');
      if (f === 'error' || f === 'denied') alert('Fitbit connection didn\'t complete. Check your FITBIT_CLIENT_ID / SECRET and the registered redirect URL, then try again.');
    }
  } catch (e) {}
  syncWhoop();
  syncFitbit();
})();

/* ================================================================
 * Animated canvas background — stars + aurora / nocturne
 * ================================================================ */
(function initBgCanvas(){
  var canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var ctx = canvas.getContext('2d');
  var W, H;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  /* ── Stars — sparse, silver-white, slow twinkle ── */
  var stars = [];
  for (var i = 0; i < 140; i++){
    stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 0.9 + 0.15,
      phase: Math.random() * 6.28,
      spd: Math.random() * 0.18 + 0.06
    });
  }

  /* ── Shooting stars (rare) ── */
  var shoots = [];
  var nextShoot = 0;

  var t = 0;
  function frame(){
    requestAnimationFrame(frame);
    t += 0.005;
    ctx.clearRect(0, 0, W, H);

    var theme = document.documentElement.getAttribute('data-theme') || 'aurora';
    var isAurora   = theme === 'aurora';
    var isNocturne = theme === 'nocturne';
    if (!isAurora && !isNocturne) return;

    /* ── Stars ── */
    var sc = isNocturne ? [160,255,210] : [230,228,255];
    for (var si = 0; si < stars.length; si++){
      var s = stars[si];
      /* stars in top 70% of screen only */
      if (s.y > 0.70) continue;
      var a = 0.15 + 0.45 * (0.5 + 0.5 * Math.sin(t * s.spd + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, 6.28);
      ctx.fillStyle = 'rgba('+sc[0]+','+sc[1]+','+sc[2]+','+a.toFixed(2)+')';
      ctx.fill();
    }

    /* ── Shooting star — one at a time, every ~18 s ── */
    if (t > nextShoot){
      nextShoot = t + 16 + Math.random() * 20;
      shoots.push({ x: Math.random()*W*0.6+W*0.1, y: Math.random()*H*0.35,
        vx: (Math.random()*3+2.5), vy: Math.random()*1.5+0.8, life: 1 });
    }
    shoots = shoots.filter(function(sh){ return sh.life > 0; });
    for (var si2 = 0; si2 < shoots.length; si2++){
      var sh = shoots[si2];
      sh.x += sh.vx; sh.y += sh.vy; sh.life -= 0.014;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh.x - sh.vx*12, sh.y - sh.vy*12);
      var shCol = isNocturne ? '80,255,160' : '210,205,255';
      var g = ctx.createLinearGradient(sh.x,sh.y, sh.x-sh.vx*12, sh.y-sh.vy*12);
      g.addColorStop(0, 'rgba('+shCol+','+(sh.life*0.55).toFixed(2)+')');
      g.addColorStop(1, 'rgba('+shCol+',0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = sh.life * 1.2;
      ctx.stroke();
      ctx.restore();
    }

    /* ── Aurora: two wide, barely-there curtain washes ── */
    if (isAurora){
      /* deep horizon glow — very wide, very low opacity */
      var horizon = ctx.createLinearGradient(0, H*0.55, 0, 0);
      horizon.addColorStop(0,    'rgba(30,20,80,0)');
      horizon.addColorStop(0.35, 'rgba(55,40,130,0.18)');
      horizon.addColorStop(0.65, 'rgba(40,100,120,0.10)');
      horizon.addColorStop(1,    'rgba(20,15,60,0)');
      ctx.fillStyle = horizon;
      ctx.fillRect(0, 0, W, H);

      /* two slow, very gentle undulating bands */
      var bands = [
        { y:0.28, amp:0.032, freq:0.85, spd:0.035,
          c1:'rgba(75,58,175,', c2:'rgba(45,140,150,' },
        { y:0.42, amp:0.045, freq:0.65, spd:0.022,
          c1:'rgba(55,40,155,', c2:'rgba(35,120,135,' },
      ];
      for (var bi = 0; bi < bands.length; bi++){
        var b = bands[bi];
        var yc = b.y * H, ampPx = b.amp * H;
        var grad = ctx.createLinearGradient(0, yc - ampPx*3, 0, yc + ampPx*4);
        grad.addColorStop(0,    b.c1+'0)');
        grad.addColorStop(0.30, b.c1+'0.055)');
        grad.addColorStop(0.52, b.c2+'0.07)');
        grad.addColorStop(0.74, b.c1+'0.04)');
        grad.addColorStop(1,    b.c1+'0)');
        ctx.beginPath();
        for (var x = 0; x <= W; x += 4){
          var y = yc
            + ampPx * Math.sin(x/W * Math.PI * b.freq + t * b.spd)
            + ampPx * 0.30 * Math.sin(x/W * Math.PI * b.freq * 1.6 - t * b.spd * 0.6 + 1.5);
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      }

      /* subtle vertical ray pillars — faint streaks of light */
      for (var ri = 0; ri < 6; ri++){
        var rx = (ri/5 + 0.06 * Math.sin(t*0.04 + ri*1.3)) * W;
        var ra = 0.02 + 0.025 * (0.5 + 0.5 * Math.sin(t*0.08 + ri*0.9));
        var rg2 = ctx.createLinearGradient(rx, H*0.55, rx, H*0.08);
        rg2.addColorStop(0, 'rgba(80,65,190,0)');
        rg2.addColorStop(0.5, 'rgba(80,65,190,'+ra.toFixed(3)+')');
        rg2.addColorStop(1, 'rgba(80,65,190,0)');
        ctx.beginPath();
        ctx.rect(rx - W*0.025, H*0.08, W*0.05, H*0.47);
        ctx.fillStyle = rg2;
        ctx.fill();
      }
    }

    /* ── Nocturne floating green orbs ── */
    if (isNocturne){
      for (var pi = 0; pi < 28; pi++){
        var px = (0.5 + 0.47 * Math.sin(t*0.20 + pi*1.71)) * W;
        var py = (0.5 + 0.47 * Math.cos(t*0.16 + pi*1.33)) * H;
        var pa = 0.07 + 0.15 * (0.5 + 0.5 * Math.sin(t*0.80 + pi));
        var pr = 1.0 + 1.4 * (0.5 + 0.5 * Math.sin(t*0.52 + pi*0.79));
        var rg3 = ctx.createRadialGradient(px,py,0, px,py,pr*14);
        rg3.addColorStop(0, 'rgba(0,255,136,'+(pa*0.5).toFixed(3)+')');
        rg3.addColorStop(1, 'rgba(0,255,136,0)');
        ctx.beginPath(); ctx.arc(px,py,pr*14,0,6.28);
        ctx.fillStyle = rg3; ctx.fill();
        ctx.beginPath(); ctx.arc(px,py,pr,0,6.28);
        ctx.fillStyle = 'rgba(0,255,136,'+Math.min(0.80,pa*3.2).toFixed(2)+')';
        ctx.fill();
      }
    }
  }
  frame();
})();
