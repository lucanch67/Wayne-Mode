<style>
/* ================================================================
 * Luca — dashboard · black/dark CryptoVault style
 * ================================================================ */

/* ── Design tokens ── */
:root {
  color-scheme: dark;
  --bg: #080808; --bg-elevated: #111111;
  --surface: rgba(255,255,255,0.035); --surface-2: rgba(255,255,255,0.065);
  --fg: #F2F2F2; --muted: rgba(242,242,242,0.50); --muted-strong: rgba(242,242,242,0.74);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.15);
  --brand: #00FF88; --brand-2: #00CC6A; --brand-ink: #000000;
  --brand-soft: rgba(0,255,136,0.09); --brand-line: rgba(0,255,136,0.22); --brand-glow: rgba(0,255,136,0.30);
  --pos: #00FF88; --pos-soft: rgba(0,255,136,0.09); --pos-line: rgba(0,255,136,0.22);
  --neg: #FF4060; --neg-soft: rgba(255,64,96,0.10); --neg-line: rgba(255,64,96,0.22);
  --warn: #FFB930; --warn-soft: rgba(255,185,48,0.10); --warn-line: rgba(255,185,48,0.24);
  --track: rgba(255,255,255,0.07);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 20px 48px -28px rgba(0,0,0,0.95);
  --glow-1: rgba(0,255,136,0.05); --glow-2: rgba(0,200,100,0.025);
  --grain-opacity: 0.04; --overlay: rgba(0,0,0,0.80);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:16px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #060812; --bg-elevated: #0E0F1E;
  --surface: rgba(120,130,255,0.045); --surface-2: rgba(120,130,255,0.08);
  --fg: #EEF0FF; --muted: rgba(210,215,255,0.52); --muted-strong: rgba(210,215,255,0.76);
  --border: rgba(140,150,255,0.11); --border-strong: rgba(140,150,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.30); --brand-glow: rgba(124,107,255,0.50);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.15); --glow-2: rgba(79,227,208,0.08);
  --grain-opacity: 0.04; --overlay: rgba(5,6,18,0.80);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F2F1FA; --bg-elevated: #FFFFFF;
  --surface: rgba(255,255,255,0.90); --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.06), 0 16px 34px -24px rgba(23,22,60,0.20);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02; --overlay: rgba(28,26,52,0.42);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base); -webkit-font-smoothing: antialiased;
  transition: background var(--duration) var(--ease);
}

/* ── Grid background ── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.024) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.024) 1px, transparent 1px);
  background-size: 44px 44px;
}
[data-theme="daylight"] body::before {
  background-image:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
}

/* ── Grain ── */
.grain-overlay::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  opacity: var(--grain-opacity); mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 200px 200px;
}

/* ── Sticky topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: var(--space-3);
  padding: max(13px, env(safe-area-inset-top)) 20px 13px;
  background: rgba(8,8,8,0.88);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
[data-theme="daylight"] .topbar { background: rgba(242,241,250,0.92); }
[data-theme="aurora"]   .topbar { background: rgba(6,8,18,0.90); }

.topbarLogo {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: var(--fg); flex-shrink: 0;
}
.topbarLogoIcon {
  width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px var(--brand-glow);
  animation: logo-glow 3s ease-in-out infinite;
}
@keyframes logo-glow {
  0%,100% { box-shadow: 0 0 14px var(--brand-glow); }
  50%      { box-shadow: 0 0 28px var(--brand-glow), 0 0 48px rgba(0,255,136,0.12); }
}
.topbarLogoName {
  font-family: var(--font-display); font-weight: 700; font-size: 15px;
  letter-spacing: -0.3px;
}
.topbarGreeting {
  font-size: 12px; color: var(--muted); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-left: var(--space-3); border-left: 1px solid var(--border); margin-left: 2px;
}
.topbarRight {
  display: flex; align-items: center; gap: var(--space-2);
  margin-left: auto; flex-shrink: 0;
}
.liveBadge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: var(--radius-pill);
  background: var(--brand-soft); border: 1px solid var(--brand-line);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px; color: var(--brand); white-space: nowrap;
}
.liveDot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--brand); box-shadow: 0 0 6px var(--brand-glow);
  animation: live-pulse 1.8s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(.75); }
}

/* hide overflow items on small screens */
@media (max-width: 640px) { .topbarGreeting { display: none; } }
@media (max-width: 520px) { .liveBadge { display: none; } }
@media (max-width: 420px) { .themeSeg { display: none; } }

/* ── Theme switcher ── */
.themeSeg {
  display: inline-flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill);
  padding: 3px; gap: 2px;
}
.themeBtn {
  appearance: none; background: transparent; border: 0; color: var(--muted);
  font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium);
}
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink: 0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }

/* ── Profile chip + gear ── */
.profileChip {
  display: inline-flex; align-items: center; gap: 8px; padding: 5px 13px 5px 6px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill);
  color: var(--fg); font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium);
}
.profileChip:hover { border-color: var(--brand-line); background: var(--brand-soft); }
.profileChipNew { padding: 7px 14px; color: var(--brand); border-color: var(--brand-line); background: var(--brand-soft); }
.profileAvatar {
  display: grid; place-items: center; width: 22px; height: 22px; border-radius: 50%;
  background: var(--brand); color: var(--brand-ink);
  font-family: var(--font-display); font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.gearBtn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted-strong); font-size: 16px; cursor: pointer;
  transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium);
}
.gearBtn:hover { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); }

/* ── Page shell ── */
.page {
  position: relative; min-height: 100dvh;
  background: var(--bg); color: var(--fg);
  padding: var(--space-6) var(--space-5) var(--space-16);
  isolation: isolate;
}
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: -1;
  background:
    radial-gradient(60% 50% at 80% 0%, var(--glow-1), transparent 70%),
    radial-gradient(50% 40% at 10% 95%, var(--glow-2), transparent 72%);
}
.shell { max-width: 1080px; margin: 0 auto; position: relative; z-index: 2; }

/* ── Reminders ── */
.reminders { display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-5); }
.remindersLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-right: var(--space-2); }
.reminderChip {
  display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px;
  border-radius: var(--radius-pill); border: 1px solid var(--warn-line); background: var(--warn-soft);
  color: var(--fg); font-size: 12px; font-weight: 600; text-decoration: none;
  transition: border-color var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium);
}
.reminderChip:hover { border-color: var(--warn); transform: translateY(-1px); }
.reminderDot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 8px var(--warn); flex-shrink: 0; }
.reminderGo { color: var(--muted); }

/* ── Bento grid ── */
.bento { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: var(--space-4); grid-auto-flow: dense; }
@media (max-width: 900px) { .bento { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 520px)  { .bento { grid-template-columns: 1fr; gap: var(--space-3); } }
.tileWide { grid-column: span 2; }
@media (max-width: 520px) { .tileWide { grid-column: span 1; } }

/* ── Entrance animation ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bento > * { opacity: 0; animation: fadeUp 560ms var(--ease-premium) forwards; }
.bento > *:nth-child(1)  { animation-delay: 40ms  }
.bento > *:nth-child(2)  { animation-delay: 90ms  }
.bento > *:nth-child(3)  { animation-delay: 140ms }
.bento > *:nth-child(4)  { animation-delay: 190ms }
.bento > *:nth-child(5)  { animation-delay: 240ms }
.bento > *:nth-child(6)  { animation-delay: 290ms }
.bento > *:nth-child(7)  { animation-delay: 340ms }
.bento > *:nth-child(8)  { animation-delay: 390ms }
.bento > *:nth-child(9)  { animation-delay: 440ms }
.bento > *:nth-child(10) { animation-delay: 490ms }
@media (prefers-reduced-motion: reduce) { .bento > * { animation: none; opacity: 1; } }

/* ── App card ── */
.card {
  position: relative; display: flex; flex-direction: column; gap: var(--space-3);
  min-height: 132px; padding: var(--space-5);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);
  text-decoration: none; color: var(--fg); overflow: hidden; cursor: pointer;
  transition: border-color 220ms var(--ease-premium), background 220ms var(--ease-premium),
              transform 220ms var(--ease-premium), box-shadow 220ms var(--ease-premium);
}
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
}
.card:hover {
  border-color: var(--brand-line);
  background: var(--brand-soft);
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px var(--brand-line) inset, 0 0 40px -12px var(--brand-glow), var(--card-shadow);
}
/* ── Animated SVG icons (Wayne Mode Icons) ── */
.wm-icon {
  position: relative; width: 44px; height: 44px; flex: none;
  display: grid; place-items: center; border-radius: 13px;
  background: var(--brand-soft); border: 1px solid var(--brand-line);
  color: var(--brand);
  box-shadow: 0 0 12px var(--brand-glow), inset 0 0 10px var(--brand-soft);
  transition: transform .28s cubic-bezier(.2,.85,.25,1),
              box-shadow .28s ease, background .28s ease,
              border-color .28s ease, color .28s ease;
}
.wm-icon::before {
  content: ''; position: absolute; inset: -1px; border-radius: inherit;
  border: 1px solid var(--brand-line);
  box-shadow: 0 0 10px var(--brand-soft);
  opacity: .5; pointer-events: none;
  animation: wm-pulse 2.6s ease-in-out infinite;
}
@keyframes wm-pulse {
  0%,100% { transform: scale(1);    opacity: .45; }
  45%     { transform: scale(1.04); opacity: .95; }
  55%     { transform: scale(1.035);opacity: .7;  }
}
.wm-icon svg { width: 48%; height: 48%; display: block; overflow: visible; }
.wm-icon .ic { fill: none; stroke: currentColor; stroke-width: 1.7;
               stroke-linecap: round; stroke-linejoin: round; }
.wm-icon .ic-fill { fill: currentColor; stroke: none; }
.wm-icon:hover {
  transform: translateY(-3px);
  background: var(--brand-line); border-color: var(--brand);
  box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 22px var(--brand-glow),
              inset 0 0 14px var(--brand-soft);
}
.wm-icon:hover::before { animation: none; opacity: 1; border-color: var(--brand); box-shadow: 0 0 22px var(--brand-glow); }
.wm-icon.is-active, .mobileNavItem.active .wm-icon {
  background: var(--brand); border-color: var(--brand); color: var(--brand-ink);
  transform: translateY(-1px);
  box-shadow: 0 0 24px var(--brand-glow), 0 6px 18px rgba(0,0,0,.5);
}
.wm-icon.is-active::before, .mobileNavItem.active .wm-icon::before { opacity: 0; animation: none; }
/* per-icon micro-animations on hover */
.wm-icon:hover .ic-sports { animation: wm-flash .55s steps(1,end) infinite; transform-origin: center; }
@keyframes wm-flash { 0%,100%{opacity:1;transform:scale(1);} 20%{opacity:.25;} 40%{opacity:1;transform:scale(1.12);} 60%{opacity:.4;} 80%{opacity:1;} }
.ic-water .ripple { opacity: 0; }
.wm-icon:hover .ic-water .drop   { animation: wm-squish .9s ease-in-out infinite; transform-origin: 12px 18px; }
.wm-icon:hover .ic-water .ripple { animation: wm-ripple 1.1s ease-out infinite; transform-origin: 12px 19px; }
@keyframes wm-squish { 0%,100%{transform:scaleY(1) scaleX(1);} 50%{transform:scaleY(.92) scaleX(1.06);} }
@keyframes wm-ripple { 0%{opacity:.8;transform:scale(.3);} 100%{opacity:0;transform:scale(1.5);} }
.wm-icon:hover .ic-progress .trend { animation: wm-grow .9s ease-out infinite; transform-origin: 4px 20px; }
@keyframes wm-grow { 0%{transform:scaleY(.2);opacity:.4;} 60%{transform:scaleY(1.08);opacity:1;} 100%{transform:scaleY(1);} }
.wm-icon:hover .ic-goals .ping { animation: wm-ping 1s ease-out infinite; transform-origin: 12px 12px; }
.wm-icon:hover .ic-goals .bull { animation: wm-beat .7s ease-in-out infinite; transform-origin: 12px 12px; }
@keyframes wm-ping { 0%{opacity:.7;transform:scale(.4);} 100%{opacity:0;transform:scale(1.25);} }
@keyframes wm-beat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);} }
.wm-icon:hover .ic-finance { animation: wm-flip 1.1s ease-in-out infinite; transform-origin: center; }
@keyframes wm-flip { 0%,100%{transform:rotateY(0);} 50%{transform:rotateY(180deg);} }
.wm-icon:hover .ic-supp { animation: wm-spin 1.2s linear infinite; transform-origin: center; }
@keyframes wm-spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
.wm-icon:hover .ic-foods { animation: wm-wiggle .6s ease-in-out infinite; transform-origin: center bottom; }
@keyframes wm-wiggle { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
.wm-icon:hover .ic-home { animation: wm-bob .7s ease-in-out infinite; transform-origin: center; }
@keyframes wm-bob { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-1.5px) scale(1.06);} }
.wm-icon:hover .ic-stim { animation: wm-steam 1.1s ease-in-out infinite; transform-origin: center bottom; }
@keyframes wm-steam { 0%,100%{transform:translateY(0) scaleX(1);} 30%{transform:translateY(-2px) scaleX(0.97);} 60%{transform:translateY(-1px) scaleX(1.02);} }
@media (prefers-reduced-motion: reduce) { .wm-icon,.wm-icon::before,.wm-icon * { animation: none !important; } }
.cardName { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.02em; }
.cardTag  { font-size: 12px; color: var(--muted); line-height: 1.4; }
.cardArrow {
  position: absolute; top: var(--space-5); right: var(--space-5);
  color: var(--muted); font-size: 16px;
  transition: color 220ms var(--ease-premium), transform 220ms var(--ease-premium);
}
.card:hover .cardArrow { color: var(--brand); transform: translate(2px,-2px); }
.cardTop  { display: flex; align-items: center; gap: var(--space-3); }
.cardStat { display: flex; flex-direction: column; gap: 2px; margin-top: auto; }
.cardStatValue { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; color: var(--fg); font-variant-numeric: tabular-nums; }
.cardStatLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* ── Vitals tile ── */
.vitals {
  grid-column: span 2; grid-row: span 2;
  display: flex; flex-direction: column; gap: var(--space-4);
  padding: var(--space-6);
  border: 1px solid var(--brand-line); border-radius: var(--radius-lg);
  background:
    radial-gradient(ellipse 60% 50% at 100% 0%, var(--brand-soft), transparent 70%),
    var(--surface);
  box-shadow: 0 0 50px -24px var(--brand-glow), var(--card-shadow);
  position: relative; overflow: hidden;
}
.vitals::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--brand), transparent);
  opacity: 0.6;
}
@media (max-width: 520px) { .vitals { grid-column: span 1; grid-row: auto; } }
@media (max-width: 480px) {
  .vitalsBody { flex-direction: column; align-items: flex-start; gap: var(--space-4); }
  .vMetrics { min-width: 0; width: 100%; }
  .recRing { width: 108px; height: 108px; }
  .recNum { font-size: 2rem; }
}

.vitalsHead { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
.vitalsEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brand); }
.srcBadge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--surface); border: 1px solid var(--border); color: var(--muted-strong);
}
.srcDot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-glow); }
.vitalsBody { display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap; }
.recRing { position: relative; width: 132px; height: 132px; display: grid; place-items: center; flex-shrink: 0; }
.recRing svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.recTrack { fill: none; stroke: var(--track); stroke-width: 9; }
.recFill { fill: none; stroke: currentColor; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 700ms var(--ease-premium); filter: drop-shadow(0 0 10px currentColor); }
.recRing[data-tone="good"]  .recFill { color: var(--pos); }
.recRing[data-tone="watch"] .recFill { color: var(--warn); }
.recRing[data-tone="low"]   .recFill { color: var(--neg); }
.recRing[data-tone="muted"] .recFill { color: var(--muted); }
.recNum  { font-family: var(--font-display); font-weight: 600; font-size: 2.5rem; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.recUnit { font-size: var(--text-base); color: var(--muted-strong); }
.recCap  { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.vMetrics { display: flex; flex-direction: column; gap: var(--space-3); flex: 1; min-width: 150px; }
.vRow { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--border); }
.vRow:last-child { border-bottom: 0; }
.vLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.vVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); font-variant-numeric: tabular-nums; }
.vVal em { font-family: var(--font-mono); font-style: normal; font-size: 11px; color: var(--muted); margin-left: 4px; }
.vitalsFoot { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
.vitalsSync { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vitalsEmpty { display: flex; flex-direction: column; gap: var(--space-3); justify-content: center; flex: 1; }
.vitalsEmptyTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; }
.vitalsEmptyBody  { font-size: 13px; color: var(--muted-strong); line-height: 1.55; max-width: 42ch; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: 0.6rem var(--space-4); border-radius: var(--radius-md);
  font-size: var(--text-sm); font-family: var(--font-ui); font-weight: 600;
  cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--fg);
  white-space: nowrap; text-decoration: none;
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease),
              color var(--duration) var(--ease), filter var(--duration) var(--ease),
              box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease);
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--brand); color: var(--brand-ink); font-weight: 700; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 26px var(--brand-glow); transform: translateY(-1px); }
.btn-ghost { color: var(--fg); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--surface); }
.btn-link { color: var(--muted-strong); padding: var(--space-2) var(--space-2); }
.btn-link:hover { color: var(--neg); }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0; background: var(--overlay);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 1000; display: grid; place-items: center; padding: var(--space-4);
  animation: fade 200ms var(--ease-premium);
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.panel {
  width: min(480px, 100%); background: var(--bg-elevated);
  border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-6);
  box-shadow: 0 28px 70px -16px rgba(0,0,0,0.7);
  animation: rise 320ms var(--ease-premium);
  max-height: 90dvh; overflow-y: auto;
}
@keyframes rise { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
.panelHead { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-5); }
.panelEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--brand); }
.panelTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-2xl); letter-spacing: -0.03em; margin: var(--space-2) 0 0; }
.panelClose { background: transparent; border: 1px solid var(--border); color: var(--muted-strong); font-size: 20px; line-height: 1; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; flex-shrink: 0; transition: color var(--duration), border-color var(--duration); }
.panelClose:hover { color: var(--fg); border-color: var(--border-strong); }
.srcPills { display: flex; gap: var(--space-2); margin-bottom: var(--space-5); flex-wrap: wrap; }
.srcPill {
  appearance: none; flex: 1; min-width: 96px; padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--surface); color: var(--muted-strong);
  font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all var(--duration) var(--ease-premium);
}
.srcPill .srcEmoji { font-size: 18px; }
.srcPillActive, .srcPillActive:hover { border-color: var(--brand); background: var(--brand-soft); color: var(--fg); box-shadow: 0 0 0 3px var(--brand-soft); }
.fieldGrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.field { display: flex; flex-direction: column; gap: 6px; }
.fieldFull { grid-column: 1 / -1; }
.fieldLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.fieldInput {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 12px; color: var(--fg); font-family: var(--font-mono); font-size: 14px; outline: none;
  transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium);
}
.fieldInput:focus { border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
.panelNote {
  margin: var(--space-4) 0 0; padding: var(--space-3) var(--space-4);
  border-left: 2px solid var(--brand-line); background: var(--brand-soft);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px; line-height: 1.55; color: var(--muted-strong);
}
.panelNote a { color: var(--brand); text-decoration: none; }
.panelNote a:hover { text-decoration: underline; }
.panelActions { display: flex; align-items: center; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-6); }
.panelActions .spacer { margin-right: auto; }
.srcActions { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-4); }
.srcActions .spacer { margin-right: auto; }

/* ── Live ticker ── */
.ticker {
  position: relative; display: flex; align-items: stretch;
  margin: calc(var(--space-2) * -1) 0 var(--space-8);
  border: 1px solid var(--border); border-radius: var(--radius-pill);
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  box-shadow: var(--card-shadow); overflow: hidden;
}
.ticker:hover .tickerTrack { animation-play-state: paused; }
.tickerLead {
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
  padding: 0 var(--space-4) 0 var(--space-5);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--brand);
  border-right: 1px solid var(--border); position: relative; z-index: 2;
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
}
.tickerPulse {
  width: 7px; height: 7px; border-radius: 50%; background: var(--brand); flex-shrink: 0;
  animation: tickerPulse 2.4s var(--ease) infinite;
}
@keyframes tickerPulse {
  0%   { box-shadow: 0 0 0 0 var(--brand-line); }
  70%  { box-shadow: 0 0 0 7px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.tickerViewport {
  position: relative; flex: 1; min-width: 0; overflow: hidden;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 4%, #000 92%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 4%, #000 92%, transparent);
}
.tickerTrack {
  display: flex; align-items: center; width: max-content;
  padding: 13px 0; animation: tickerScroll linear infinite; will-change: transform;
}
@keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tickerItem {
  display: inline-flex; align-items: center; gap: 11px;
  padding: 0 var(--space-5); border-right: 1px solid var(--border);
  white-space: nowrap; color: var(--brand);
}
.tiLabel { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--muted); }
.tiVal   { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.01em; color: var(--fg); font-variant-numeric: tabular-nums; }
.tiUnit  { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--muted); margin-left: 3px; }
.tiDelta { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: currentColor; }
.tiSpark { display: block; flex-shrink: 0; }
.tickerItem[data-tone="good"]  { color: var(--pos); }
.tickerItem[data-tone="watch"] { color: var(--warn); }
.tickerItem[data-tone="low"]   { color: var(--neg); }
.tickerItem[data-tone="muted"] { color: var(--muted); }
@media (prefers-reduced-motion: reduce) { .tickerTrack { animation: none; } .tickerViewport { overflow-x: auto; } }

/* ── How-to guide ── */
.howto { margin: var(--space-4) 0 var(--space-2); padding: var(--space-4); border: 1px solid var(--brand-line); background: var(--brand-soft); border-radius: var(--radius-md); }
.howtoTitle { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: var(--text-sm); margin-bottom: var(--space-3); }
.howtoSteps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-3); counter-reset: step; }
.howtoSteps li { position: relative; padding-left: 34px; font-size: 13px; line-height: 1.5; color: var(--muted-strong); counter-increment: step; }
.howtoSteps li::before { content: counter(step); position: absolute; left: 0; top: -1px; display: grid; place-items: center; width: 22px; height: 22px; border-radius: 50%; background: var(--brand); color: var(--brand-ink); font-family: var(--font-display); font-weight: 700; font-size: 12px; }
.howtoSteps strong { color: var(--fg); font-weight: 600; }
.howtoChips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.howtoChip { display: inline-block; padding: 3px 9px; border-radius: var(--radius-pill); background: var(--surface-2); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg); }
.howtoFoot { margin: var(--space-3) 0 0; font-size: 11px; line-height: 1.5; color: var(--muted); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ── Mobile bottom nav ── */
.mobileNav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: rgba(8,8,8,0.92); border-top: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
}
@media (max-width: 520px) { .mobileNav { display: flex; } .page { padding-bottom: calc(80px + env(safe-area-inset-bottom)); } }
[data-theme="daylight"] .mobileNav { background: rgba(242,241,250,0.94); }
[data-theme="aurora"]   .mobileNav { background: rgba(6,8,18,0.92); }
.mobileNavItem {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0; text-decoration: none; color: var(--muted);
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 180ms;
}
.mobileNavItem:hover, .mobileNavItem.active { color: var(--brand); }
.mobileNav .wm-icon { width: 32px; height: 32px; border-radius: 10px; cursor: default; }
.mobileNav .wm-icon svg { width: 52%; height: 52%; }
</style>

<script>
/* ================================================================
 * Apps in the suite
 * ================================================================ */
const WM_ICONS = {
  home:     '<svg viewBox="0 0 24 24"><g class="ic ic-home"><path d="M3.5 11.2 12 4.3l8.5 6.9"/><path d="M5.4 9.8V19.2h13.2V9.8"/><path d="M9.8 19.2v-5.1h4.4v5.1"/></g></svg>',
  sports:   '<svg viewBox="0 0 24 24"><path class="ic ic-fill ic-sports" d="M13.5 3 6 13h4.6L9.5 21 18 10.4h-5L13.5 3Z"/></svg>',
  foods:    '<svg viewBox="0 0 24 24"><g class="ic ic-foods"><path d="M8 3v5.2a2 2 0 0 0 4 0V3"/><path d="M10 3v18"/><path d="M16.5 3c-1.6 1-2.4 3-2.4 5.4 0 1.8 1.1 2.6 2.4 2.6V21"/></g></svg>',
  progress: '<svg viewBox="0 0 24 24"><g class="ic ic-progress"><path d="M4 20V4M4 20h16"/><path class="trend" d="M7 16l3.5-3.6 3 2.4L20 7"/><path d="M16 7h4v4"/></g></svg>',
  goals:    '<svg viewBox="0 0 24 24"><g class="ic ic-goals"><circle class="ping" cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5.3"/><circle class="bull ic-fill" cx="12" cy="12" r="1.7"/></g></svg>',
  finance:  '<svg viewBox="0 0 24 24"><g class="ic ic-finance"><circle cx="12" cy="12" r="8.6"/><path d="M14.6 9.3a3 3 0 0 0-2.6-1.5h-.6a2.3 2.3 0 0 0 0 4.6h1.2a2.3 2.3 0 0 1 0 4.6h-.6a3 3 0 0 1-2.6-1.5"/><path d="M12 6v12"/></g></svg>',
  supp:     '<svg viewBox="0 0 24 24"><g class="ic ic-supp"><rect x="2.8" y="9" width="18.4" height="6" rx="3" transform="rotate(45 12 12)"/><path d="M8.5 8.5 15.5 15.5"/></g></svg>',
  water:    '<svg viewBox="0 0 24 24"><g class="ic ic-water"><circle class="ripple" cx="12" cy="19" r="6"/><path class="drop" d="M12 3.6c0 0-6.4 6.9-6.4 10.8a6.4 6.4 0 0 0 12.8 0C18.4 10.5 12 3.6 12 3.6Z"/></g></svg>',
  band:     '<svg viewBox="0 0 24 24"><g class="ic ic-band"><rect x="7" y="3" width="10" height="18" rx="5"/><path d="M9 10h6M9 13h4"/></g></svg>',
  stim:     '<svg viewBox="0 0 24 24"><g class="ic ic-stim"><path d="M3 9h14v7a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V9Z"/><path d="M17 11h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M7 4c0 0 .5-1 1.5-1s2 1 2 1 .5-1 1.5-1 1.5 1 1.5 1"/></g></svg>',
};
function wmIcon(key, active) {
  return '<span class="wm-icon' + (active ? ' is-active' : '') + '" aria-hidden>' + (WM_ICONS[key] || '') + '</span>';
}

const APPS = [
  { file: 'finance.html',     name: 'Finance',      tag: 'Net worth · subs · orders · wishlist',  icon: 'finance', wide: true },
  { file: 'gym.html',         name: 'Sports',       tag: 'Gym · Activities · Points',              icon: 'sports',  wide: true },
  { file: 'supplements.html', name: 'Supplements',  tag: 'Your stack + smart recommendations',     icon: 'supp' },
  { file: 'whoop.html',       name: 'Fitness Band', tag: 'Whoop · Fitbit · Apple Watch sync',      icon: 'band' },
  { file: 'water.html',       name: 'Water',        tag: 'Daily hydration target',                 icon: 'water' },
  { file: 'goals.html',       name: 'Goals',        tag: 'Goals & streaks',                        icon: 'goals' },
  { file: 'progress.html',    name: 'Progress',     tag: 'Photos & measurements',                  icon: 'progress' },
  { file: 'macros.html',      name: 'Foods',        tag: 'Food · Calories · Caffeine tracker',     icon: 'foods' },
  { file: 'caffeine-tracker.html', name: 'Stimulant', tag: 'Peak · Crash · Half-life · 90+ drinks', icon: 'stim' },
];

/* ================================================================
 * Theme
 * ================================================================ */
const THEMES = [
  { key: 'nocturne', label: 'Nocturne', swatch: '#00FF88' },
  { key: 'aurora',   label: 'Aurora',   swatch: 'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key: 'daylight', label: 'Daylight', swatch: '#6A45FF' },
];
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme') || 'aurora'; } catch(e){ return 'aurora'; } })();
if (!THEMES.some(t => t.key === currentTheme)) currentTheme = 'aurora';
function applyTheme(name){
  if (!THEMES.some(t => t.key === name)) name = 'aurora';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  try { localStorage.setItem('patron_theme', name); } catch(e){}

}

/* ================================================================
 * Shared health record
 * ================================================================ */
const HEALTH_KEY = 'patron_health_v1';
const LEGACY_WHOOP_KEY = 'patron_whoop_data_v1';
function loadHealth(){
  try {
    let r = localStorage.getItem(HEALTH_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return d; }
    r = localStorage.getItem(LEGACY_WHOOP_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return Object.assign({ source: 'whoop' }, d); }
  } catch(e){}
  return null;
}
function saveHealth(d){ try { localStorage.setItem(HEALTH_KEY, JSON.stringify(d)); } catch(e){} }
function clearHealth(){ try { localStorage.removeItem(HEALTH_KEY); } catch(e){} }
let health = loadHealth();

/* ---- Live WHOOP sync ---- */
const ON_SERVER = location.protocol === 'http:' || location.protocol === 'https:';
let whoopStatus = { connected: false, checked: false };
async function syncWhoop(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/whoop/data', { cache: 'no-store' });
    const j = await r.json();
    whoopStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'whoop', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'whoop') {
      clearHealth(); health = null;
    }
  } catch (e) { whoopStatus = { connected: false, checked: true }; }
  render();
}

/* ---- Live Fitbit sync ---- */
let fitbitStatus = { connected: false, checked: false };
async function syncFitbit(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/fitbit/data', { cache: 'no-store' });
    const j = await r.json();
    fitbitStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'fitbit', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, bedtime: j.bedtime, wakeTime: j.wakeTime, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'fitbit') {
      clearHealth(); health = null;
    }
  } catch (e) { fitbitStatus = { connected: false, checked: true }; }
  render();
}

function sourceLabel(s){ return s === 'apple' ? 'Apple Watch' : s === 'manual' ? 'Manual' : s === 'fitbit' ? 'Fitbit' : 'Whoop'; }
function recTone(r){ if (r == null) return 'muted'; if (r >= 67) return 'good'; if (r >= 34) return 'watch'; return 'low'; }
function formatHM(h){ if (h == null) return '—'; const hh = Math.floor(h); const mm = Math.round((h - hh) * 60); return hh + 'h ' + String(mm).padStart(2,'0') + 'm'; }
function formatClock(t){ if (!t) return '—'; const [h, m] = String(t).split(':').map(Number); if (!isFinite(h)) return esc(t); const ap = h < 12 ? 'am' : 'pm'; const h12 = h % 12 === 0 ? 12 : h % 12; return h12 + ':' + String(m || 0).padStart(2,'0') + ap; }
function ago(ts){ if (!ts) return ''; const m = Math.max(0, Math.round((Date.now() - ts) / 60000)); if (m < 1) return 'just now'; if (m < 60) return m + 'm ago'; return Math.round(m / 60) + 'h ago'; }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================================================================
 * Live stats per app card
 * ================================================================ */
function lsGet(key){ try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e){ return null; } }
function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }
function localDateKey(d){ d = d || new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function activeDateKey(){ const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return localDateKey(d); }
function statFor(file){
  try {
    if (file === 'finance.html') { const s = lsGet('finance_standalone_v1'); if (s && Array.isArray(s.accounts) && s.accounts.length) { const nw = s.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); return { value: 'CHF ' + fmtNum(nw), label: 'net worth' }; } }
    else if (file === 'supplements.html') { const s = lsGet('supplements_standalone_v1'); if (s && Array.isArray(s.items) && s.items.length) { const tk = (s.taken && s.taken[activeDateKey()]) || {}; const n = s.items.filter(i => tk[i.id]).length; return { value: n + '/' + s.items.length, label: 'taken today' }; } }
    else if (file === 'water.html') { const s = lsGet('water_standalone_v1'); if (s && s.logs) { const n = s.logs[localDateKey()] || 0; return { value: String(n), label: (n === 1 ? 'drink' : 'drinks') + ' today' }; } }
    else if (file === 'whoop.html') { if (health && health.recovery != null) return { value: Math.round(health.recovery) + '%', label: 'recovery' }; }
    else if (file === 'caffeine-tracker.html') { const s = lsGet('caffeine_tracker_v1'); if (s && Array.isArray(s.logs) && s.logs.length) { const todayKey = (function(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })(); if (s.dateKey === todayKey) { const total = s.logs.reduce((a,x)=>a+(Number(x.mg)||0),0); return { value: total + ' mg', label: 'today' }; } } }
  } catch (e) {}
  return null;
}
function cardHtml(a){
  const st = statFor(a.file);
  const tail = st
    ? '<div class="cardStat"><span class="cardStatValue">' + esc(st.value) + '</span><span class="cardStatLabel">' + esc(st.label) + '</span></div>'
    : '<p class="cardTag">' + esc(a.tag) + '</p>';
  return '<a class="card' + (a.wide ? ' tileWide' : '') + '" href="' + a.file + '">'
    + '<span class="cardArrow" aria-hidden>↗</span>'
    + '<div class="cardTop">' + wmIcon(a.icon) + '<span class="cardName">' + esc(a.name) + '</span></div>'
    + tail + '</a>';
}

/* ================================================================
 * Live ticker
 * ================================================================ */
function sparkSvg(seed){
  const w = 46, h = 16, n = 6, pad = 2;
  const pts = [];
  for (let i = 0; i < n; i++){
    const t = (Math.sin(seed * 1.7 + i * 1.3) + Math.sin(seed * 0.6 + i * 0.7)) / 2;
    pts.push([pad + (i / (n - 1)) * (w - pad * 2), pad + (1 - (t * 0.5 + 0.5)) * (h - pad * 2)]);
  }
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length - 1];
  return '<svg class="tiSpark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" aria-hidden>'
    + '<path d="' + d + '" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>'
    + '<circle cx="' + last[0].toFixed(1) + '" cy="' + last[1].toFixed(1) + '" r="2.1" fill="currentColor" style="filter:drop-shadow(0 0 4px currentColor)"/></svg>';
}
function tickerMetrics(){
  const out = [];
  const add = (label, value, unit, tone, delta) => out.push({ label, value, unit: unit || '', tone: tone || 'brand', delta: delta || '' });
  const h = health;
  if (h){
    if (h.recovery != null) add('REC', Math.round(h.recovery), '%', recTone(h.recovery));
    if (h.sleepHours != null){ const hh = Math.floor(h.sleepHours), mm = Math.round((h.sleepHours - hh) * 60); add('SLP', hh + 'h' + String(mm).padStart(2,'0'), '', h.sleepPerf != null ? (h.sleepPerf >= 85 ? 'good' : h.sleepPerf >= 60 ? 'watch' : 'low') : 'brand'); }
    if (h.strain != null) add('STR', (Math.round(h.strain * 10) / 10).toFixed(1), '', 'brand');
    if (h.hrv != null) add('HRV', Math.round(h.hrv), 'ms', 'good');
    if (h.rhr != null) add('RHR', Math.round(h.rhr), 'bpm', 'brand');
  }
  try {
    const fin = lsGet('finance_standalone_v1');
    if (fin && Array.isArray(fin.accounts) && fin.accounts.length){ const nw = fin.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); add('NET', 'CHF ' + fmtNum(nw), '', 'good'); }
    const wat = lsGet('water_standalone_v1');
    if (wat && wat.logs){ const n = wat.logs[localDateKey()] || 0; add('H2O', String(n), n === 1 ? 'drink' : 'drinks', 'brand'); }
    const sup = lsGet('supplements_standalone_v1');
    if (sup && Array.isArray(sup.items) && sup.items.length){ const tk = (sup.taken && sup.taken[activeDateKey()]) || {}; const n = sup.items.filter(i => tk[i.id]).length; add('SUP', n + '/' + sup.items.length, '', n >= sup.items.length ? 'good' : 'brand'); }
  } catch(e){}
  return out;
}
function tickerHtml(){
  const items = tickerMetrics();
  if (!items.length){
    return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>Luca · Live</div>'
      + '<div class="tickerViewport"><div class="tickerTrack" style="animation:none;padding-left:var(--space-5)">'
      + '<span class="tickerItem" style="border:0"><span class="tiLabel">No data yet — add vitals to go live</span></span>'
      + '</div></div></div>';
  }
  const chip = (m, i) => '<span class="tickerItem" data-tone="' + m.tone + '">'
    + '<span class="tiLabel">' + esc(m.label) + '</span>'
    + '<span class="tiVal">' + esc(m.value) + (m.unit ? '<span class="tiUnit">' + esc(m.unit) + '</span>' : '') + '</span>'
    + (m.delta ? '<span class="tiDelta">' + esc(m.delta) + '</span>' : '')
    + sparkSvg(i + 1) + '</span>';
  const seq = items.map(chip).join('');
  const dur = Math.max(18, items.length * 6);
  return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>Luca · Live</div>'
    + '<div class="tickerViewport"><div class="tickerTrack" style="animation-duration:' + dur + 's">'
    + seq + seq + '</div></div></div>';
}

}
function saveVitals(){
  const num = (id) => { const el = document.getElementById(id); if (!el || el.value === '') return null; const n = Number(el.value); return isFinite(n) ? n : null; };
  const str = (id) => { const el = document.getElementById(id); return el && el.value ? el.value : null; };
  const recovery = num('f-rec');
  const bedtime = str('f-bed');
  const wakeTime = str('f-wake');
  let sleepHours = num('f-sleep');
  if (sleepHours == null && bedtime && wakeTime){
    const [bh, bm] = bedtime.split(':').map(Number);
    const [wh, wm] = wakeTime.split(':').map(Number);
    let mins = (wh * 60 + wm) - (bh * 60 + bm);
    if (mins <= 0) mins += 24 * 60;
    sleepHours = Math.round((mins / 60) * 10) / 10;
  }
  const hrv = num('f-hrv');
  const rhr = num('f-rhr');
  const target = num('f-target') || 8;
  if (recovery == null && sleepHours == null && hrv == null && rhr == null) { alert('Enter at least one value (recovery, sleep, or bed + wake times).'); return; }
  const sleepPerf = sleepHours != null ? Math.round(Math.min(100, (sleepHours / target) * 100)) : null;
  health = { source: ui.draftSource, connected: true, ts: Date.now(), recovery, sleepHours, sleepPerf, sleepTargetHours: target, bedtime, wakeTime, hrv, rhr, strain: null };
  saveHealth(health);
  ui.modalOpen = false;
  render();
}

/* ================================================================
 * Profile modal
 * ================================================================ */
function draftFromProfile(){
  const p = profile || {};
  const units = p.units === 'imperial' ? 'imperial' : 'metric';
  const h = (p.heightCm == null || p.heightCm === '') ? '' : (units === 'imperial' ? Math.round(p.heightCm / 2.54) : Math.round(p.heightCm));
  const w = (p.weightKg == null || p.weightKg === '') ? '' : (units === 'imperial' ? Math.round(p.weightKg / 0.45359237) : p.weightKg);
  return { name: p.name || '', age: p.age != null ? String(p.age) : '', sex: p.sex || '', units, height: h === '' ? '' : String(h), weight: w === '' ? '' : String(w), workouts: p.workoutsPerWeek != null && p.workoutsPerWeek !== '' ? String(p.workoutsPerWeek) : '', level: p.gymLevel || '', goal: p.goal || '', caffeine: p.caffeineMgPerDay != null && p.caffeineMgPerDay !== '' ? String(p.caffeineMgPerDay) : '' };
}
function openProfile(){ ui.profileDraft = draftFromProfile(); ui.profileOpen = true; ui.modalOpen = false; renderModal(); }
function profileModalHtml(){
  const d = ui.profileDraft || draftFromProfile();
  const imperial = d.units === 'imperial';
  const isEdit = !!profile;
  const sel = (key, opts) => '<select class="fieldInput" data-pf="' + key + '"><option value=""' + (d[key] === '' ? ' selected' : '') + '>—</option>' + opts.map(o => '<option value="' + o[0] + '"' + (d[key] === o[0] ? ' selected' : '') + '>' + o[1] + '</option>').join('') + '</select>';
  const inp = (key, type, ph, attrs) => '<input class="fieldInput" type="' + type + '" data-pf="' + key + '" placeholder="' + esc(ph) + '" value="' + esc(d[key]) + '" ' + (attrs || '') + ' />';
  const field = (label, inner) => '<div class="field"><label class="fieldLabel">' + label + '</label>' + inner + '</div>';
  const body = '<div class="fieldGrid">'
    + '<div class="field fieldFull"><label class="fieldLabel">Name</label>' + inp('name', 'text', 'Luca', 'autocomplete="name"') + '</div>'
    + field('Age', inp('age', 'number', '—', 'min="0" max="120" inputmode="numeric"'))
    + field('Sex', sel('sex', [['M', 'Male'], ['F', 'Female']]))
    + field('Units', sel('units', [['metric', 'Metric (cm/kg)'], ['imperial', 'Imperial (in/lb)']]))
    + field('Height (' + (imperial ? 'in' : 'cm') + ')', inp('height', 'number', imperial ? '70' : '178', 'min="0" inputmode="numeric"'))
    + field('Weight (' + (imperial ? 'lb' : 'kg') + ')', inp('weight', 'number', imperial ? '170' : '77', 'min="0" step="0.1" inputmode="decimal"'))
    + field('Workouts / week', inp('workouts', 'number', '4', 'min="0" max="14" inputmode="numeric"'))
    + field('Training level', sel('level', [['beginner', 'Beginner'], ['intermediate', 'Intermediate'], ['advanced', 'Advanced']]))
    + field('Primary goal', sel('goal', [['cut', 'Cut'], ['bulk', 'Bulk'], ['recomp', 'Recomp'], ['maintain', 'Maintain'], ['general_health', 'General health']]))
    + field('Caffeine mg/day', inp('caffeine', 'number', 'optional', 'min="0" max="1000" step="10" inputmode="numeric"'))
    + '</div>';
  return '<div class="overlay" data-action="close-profile"><div class="panel" data-stop="1">'
    + '<div class="panelHead"><div><div class="panelEyebrow">' + (isEdit ? 'Your profile' : 'Welcome') + '</div><h2 class="panelTitle">' + (isEdit ? 'Edit profile' : 'Set up your dashboard') + '</h2></div>'
    + (isEdit ? '<button type="button" class="panelClose" data-action="close-profile">×</button>' : '') + '</div>'
    + (isEdit ? '' : '<p class="panelNote" style="border-color:var(--brand-line)">Tell the suite a little about you — Luca personalises it, and your stats pre-fill the apps. Stored only in this browser; edit anytime.</p>')
    + body
    + '<div class="panelActions"><button type="button" class="btn ' + (isEdit ? 'btn-ghost' : 'btn-link') + '" data-action="close-profile">' + (isEdit ? 'Cancel' : 'Skip for now') + '</button>'
    + '<button type="button" class="btn btn-primary" data-action="save-profile">' + (isEdit ? 'Save' : 'Save &amp; start') + '</button></div></div></div>';
}
function saveProfile(){
  const d = ui.profileDraft || {};
  const name = (d.name || '').trim();
  if (!name) { alert('Add a name to continue (or Skip for now).'); return; }
  const units = d.units === 'imperial' ? 'imperial' : 'metric';
  const num = (x) => { if (x === '' || x == null) return ''; const n = Number(x); return isFinite(n) ? n : ''; };
  const hRaw = num(d.height), wRaw = num(d.weight);
  const heightCm = hRaw === '' ? '' : (units === 'imperial' ? Math.round(hRaw * 2.54) : Math.round(hRaw));
  const weightKg = wRaw === '' ? '' : (units === 'imperial' ? Math.round(wRaw * 0.45359237 * 10) / 10 : wRaw);
  profile = { name, age: num(d.age), sex: d.sex || '', heightCm, weightKg, units, workoutsPerWeek: num(d.workouts), gymLevel: d.level || '', goal: d.goal || '', caffeineMgPerDay: num(d.caffeine), onboarded: true, ts: Date.now() };
  saveProfileObj(profile);
  ui.profileOpen = false;
  render();
}

/* ================================================================
 * Events
 * ================================================================ */
document.addEventListener('click', e => {
  const stop = e.target.closest('[data-stop]');
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  if (action === 'theme') { applyTheme(btn.getAttribute('data-theme')); return; }
  if (action === 'open-vitals') { openVitals(); return; }
  if (action === 'open-profile') { openProfile(); return; }
  if (action === 'close-profile') {
    if (!stop || btn.tagName === 'BUTTON') {
      if (!profile) { profile = { onboarded: true, ts: Date.now() }; saveProfileObj(profile); }
      ui.profileOpen = false; renderModal();
    }
    return;
  }
  if (action === 'save-profile') { saveProfile(); return; }
  if (action === 'close-vitals') { if (!stop || btn.tagName === 'BUTTON') { ui.modalOpen = false; renderModal(); } return; }
  if (action === 'src') { ui.draftSource = btn.getAttribute('data-src'); renderModal(); return; }
  if (action === 'save-vitals') { saveVitals(); return; }
  if (action === 'clear-vitals') { if (confirm('Clear today\'s vitals from the suite?')) { clearHealth(); health = null; ui.modalOpen = false; render(); } return; }
  if (action === 'whoop-sync') { syncWhoop(); return; }
  if (action === 'whoop-disconnect') {
    fetch('/api/whoop/logout').catch(()=>{}).then(() => {
      whoopStatus = { connected: false, checked: true };
      if (health && health.source === 'whoop') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
  if (action === 'fitbit-sync') { syncFitbit(); return; }
  if (action === 'fitbit-disconnect') {
    fetch('/api/fitbit/logout').catch(()=>{}).then(() => {
      fitbitStatus = { connected: false, checked: true };
      if (health && health.source === 'fitbit') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
});

document.addEventListener('input', e => {
  const t = e.target; if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  ui.profileDraft[t.dataset.pf] = t.value;
});
document.addEventListener('change', e => {
  const t = e.target; if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  if (t.dataset.pf === 'units') {
    const d = ui.profileDraft, toImp = t.value === 'imperial';
    const conv = (v, f, dp) => (v === '' || v == null || !isFinite(Number(v))) ? v : String(Math.round(Number(v) * f * (dp ? 10 : 1)) / (dp ? 10 : 1));
    if (toImp) { d.height = conv(d.height, 1/2.54, 0); d.weight = conv(d.weight, 1/0.45359237, 0); }
    else        { d.height = conv(d.height, 2.54, 0);   d.weight = conv(d.weight, 0.45359237, 1); }
    d.units = t.value;
    renderModal();
    return;
  }
  ui.profileDraft[t.dataset.pf] = t.value;
});

window.addEventListener('storage', e => {
  if (e.key === 'patron_theme' && e.newValue) { applyTheme(e.newValue); return; }
  if (e.key === HEALTH_KEY || e.key === LEGACY_WHOOP_KEY || e.key === null) { health = loadHealth(); render(); }
});

if (!profile) { ui.profileDraft = draftFromProfile(); ui.profileOpen = true; }
applyTheme(currentTheme);

(function bootVitals(){
  if (!ON_SERVER) return;
  try {
    const q = new URLSearchParams(location.search);
    const w = q.get('whoop'), f = q.get('fitbit');
    if (w || f) {
      history.replaceState(null, '', location.pathname);
      if (w === 'error' || w === 'denied') alert('Whoop connection didn\'t complete. Check your WHOOP_CLIENT_ID / SECRET and the registered redirect URL, then try again.');
      if (f === 'error' || f === 'denied') alert('Fitbit connection didn\'t complete. Check your FITBIT_CLIENT_ID / SECRET and the registered redirect URL, then try again.');
    }
  } catch (e) {}
  syncWhoop();
  syncFitbit();
})();
</script>
