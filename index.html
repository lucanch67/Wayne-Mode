<style>
/* ================================================================
 * Luca — dashboard · black/dark CryptoVault style
 * ================================================================ */

/* ── Design tokens ── */
:root {
  color-scheme: dark;
  --bg: #080808; --bg-elevated: #111111;
  --surface: rgba(255,255,255,0.035); --surface-2: rgba(255,255,255,0.065);
  --fg: #F2F2F2; --muted: rgba(242,242,242,0.50); --muted-strong: rgba(242,242,242,0.74);
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.15);
  --brand: #00FF88; --brand-2: #00CC6A; --brand-ink: #000000;
  --brand-soft: rgba(0,255,136,0.09); --brand-line: rgba(0,255,136,0.22); --brand-glow: rgba(0,255,136,0.30);
  --pos: #00FF88; --pos-soft: rgba(0,255,136,0.09); --pos-line: rgba(0,255,136,0.22);
  --neg: #FF4060; --neg-soft: rgba(255,64,96,0.10); --neg-line: rgba(255,64,96,0.22);
  --warn: #FFB930; --warn-soft: rgba(255,185,48,0.10); --warn-line: rgba(255,185,48,0.24);
  --track: rgba(255,255,255,0.07);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 20px 48px -28px rgba(0,0,0,0.95);
  --glow-1: rgba(0,255,136,0.05); --glow-2: rgba(0,200,100,0.025);
  --grain-opacity: 0.04; --overlay: rgba(0,0,0,0.80);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:16px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1); --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Cormorant Garamond',serif; --font-ui:'Space Grotesk'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #060812; --bg-elevated: #0E0F1E;
  --surface: rgba(120,130,255,0.045); --surface-2: rgba(120,130,255,0.08);
  --fg: #EEF0FF; --muted: rgba(210,215,255,0.52); --muted-strong: rgba(210,215,255,0.76);
  --border: rgba(140,150,255,0.11); --border-strong: rgba(140,150,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.30); --brand-glow: rgba(124,107,255,0.50);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.15); --glow-2: rgba(79,227,208,0.08);
  --grain-opacity: 0.04; --overlay: rgba(5,6,18,0.80);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F2F1FA; --bg-elevated: #FFFFFF;
  --surface: rgba(255,255,255,0.90); --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.06), 0 16px 34px -24px rgba(23,22,60,0.20);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02; --overlay: rgba(28,26,52,0.42);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base); -webkit-font-smoothing: antialiased;
  transition: background var(--duration) var(--ease);
}

/* ── Grid background (daylight only) ── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0;
}
[data-theme="daylight"] body::before {
  opacity: 1;
  background-image:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
}

/* ── Grain ── */
.grain-overlay::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  opacity: var(--grain-opacity); mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 200px 200px;
}

/* ── Sticky topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: var(--space-3);
  padding: max(13px, env(safe-area-inset-top)) 20px 13px;
  background: rgba(8,8,8,0.88);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
[data-theme="daylight"] .topbar { background: rgba(242,241,250,0.92); }
[data-theme="aurora"]   .topbar { background: rgba(6,8,18,0.90); }

.topbarLogo {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: var(--fg); flex-shrink: 0;
}
.topbarLogoIcon {
  width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px var(--brand-glow);
  animation: logo-glow 3s ease-in-out infinite;
}
@keyframes logo-glow {
  0%,100% { box-shadow: 0 0 14px var(--brand-glow); }
  50%      { box-shadow: 0 0 28px var(--brand-glow), 0 0 48px rgba(0,255,136,0.12); }
}
.topbarLogoName {
  font-family: var(--font-display); font-weight: 700; font-size: 15px;
  letter-spacing: -0.3px;
}
.topbarGreeting {
  font-size: 12px; color: var(--muted); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-left: var(--space-3); border-left: 1px solid var(--border); margin-left: 2px;
}
.topbarRight {
  display: flex; align-items: center; gap: var(--space-2);
  margin-left: auto; flex-shrink: 0;
}
.liveBadge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: var(--radius-pill);
  background: var(--brand-soft); border: 1px solid var(--brand-line);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px; color: var(--brand); white-space: nowrap;
}
.liveDot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--brand); box-shadow: 0 0 6px var(--brand-glow);
  animation: live-pulse 1.8s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(.75); }
}

/* hide overflow items on small screens */
@media (max-width: 640px) { .topbarGreeting { display: none; } }
@media (max-width: 520px) { .liveBadge { display: none; } }
@media (max-width: 420px) { .themeSeg { display: none; } }

/* ── Theme switcher ── */
.themeSeg {
  display: inline-flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill);
  padding: 3px; gap: 2px;
}
.themeBtn {
  appearance: none; background: transparent; border: 0; color: var(--muted);
  font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium);
}
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink: 0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }

/* ── Profile chip + gear ── */
.profileChip {
  display: inline-flex; align-items: center; gap: 8px; padding: 5px 13px 5px 6px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill);
  color: var(--fg); font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium);
}
.profileChip:hover { border-color: var(--brand-line); background: var(--brand-soft); }
.profileChipNew { padding: 7px 14px; color: var(--brand); border-color: var(--brand-line); background: var(--brand-soft); }
.profileAvatar {
  display: grid; place-items: center; width: 22px; height: 22px; border-radius: 50%;
  background: var(--brand); color: var(--brand-ink);
  font-family: var(--font-display); font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.gearBtn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted-strong); font-size: 16px; cursor: pointer;
  transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium);
}
.gearBtn:hover { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); }

/* ── Page shell ── */
.page {
  position: relative; min-height: 100dvh;
  background: var(--bg); color: var(--fg);
  padding: var(--space-6) var(--space-5) var(--space-16);
  isolation: isolate;
}
[data-theme="aurora"] .page,
[data-theme="nocturne"] .page { background: transparent; }
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: -1;
  background:
    radial-gradient(60% 50% at 80% 0%, var(--glow-1), transparent 70%),
    radial-gradient(50% 40% at 10% 95%, var(--glow-2), transparent 72%);
}
.shell { max-width: 1080px; margin: 0 auto; position: relative; z-index: 2; }

/* ── Reminders ── */
.reminders { display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-5); }
.remindersLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-right: var(--space-2); }
.reminderChip {
  display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px;
  border-radius: var(--radius-pill); border: 1px solid var(--warn-line); background: var(--warn-soft);
  color: var(--fg); font-size: 12px; font-weight: 600; text-decoration: none;
  transition: border-color var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium);
}
.reminderChip:hover { border-color: var(--warn); transform: translateY(-1px); }
.reminderDot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 8px var(--warn); flex-shrink: 0; }
.reminderGo { color: var(--muted); }

/* ── Bento grid ── */
.bento { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: var(--space-4); grid-auto-flow: dense; }
@media (max-width: 900px) { .bento { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 520px)  { .bento { grid-template-columns: 1fr; gap: var(--space-3); } }
.tileWide { grid-column: span 2; }
@media (max-width: 520px) { .tileWide { grid-column: span 1; } }

/* ── Entrance animation ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bento > * { opacity: 0; animation: fadeUp 560ms var(--ease-premium) forwards; }
.bento > *:nth-child(1)  { animation-delay: 40ms  }
.bento > *:nth-child(2)  { animation-delay: 90ms  }
.bento > *:nth-child(3)  { animation-delay: 140ms }
.bento > *:nth-child(4)  { animation-delay: 190ms }
.bento > *:nth-child(5)  { animation-delay: 240ms }
.bento > *:nth-child(6)  { animation-delay: 290ms }
.bento > *:nth-child(7)  { animation-delay: 340ms }
.bento > *:nth-child(8)  { animation-delay: 390ms }
.bento > *:nth-child(9)  { animation-delay: 440ms }
.bento > *:nth-child(10) { animation-delay: 490ms }
@media (prefers-reduced-motion: reduce) { .bento > * { animation: none; opacity: 1; } }

/* ── App card ── */
.card {
  position: relative; display: flex; flex-direction: column; gap: var(--space-3);
  min-height: 132px; padding: var(--space-5);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);
  text-decoration: none; color: var(--fg); overflow: hidden; cursor: pointer;
  transition: border-color 220ms var(--ease-premium), background 220ms var(--ease-premium),
              transform 220ms var(--ease-premium), box-shadow 220ms var(--ease-premium);
}
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
}
.card:hover {
  border-color: var(--brand-line);
  background: var(--brand-soft);
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px var(--brand-line) inset, 0 0 40px -12px var(--brand-glow), var(--card-shadow);
}
/* ── Theme-specific card treatments ── */
[data-theme="nocturne"] .card::after {
  background: linear-gradient(90deg, transparent, rgba(0,255,136,0.12), transparent);
}
[data-theme="nocturne"] .card:hover {
  box-shadow: 0 0 0 1px rgba(0,255,136,0.24) inset, 0 0 44px -10px rgba(0,255,136,0.46), var(--card-shadow);
}
[data-theme="aurora"] .card {
  background: linear-gradient(160deg, rgba(139,123,255,0.055) 0%, var(--surface) 68%);
}
[data-theme="aurora"] .card::after {
  background: linear-gradient(90deg, transparent, rgba(139,123,255,0.18), transparent);
}
[data-theme="aurora"] .card:hover {
  background: linear-gradient(135deg, rgba(139,123,255,0.16) 0%, rgba(79,227,208,0.07) 100%);
  border-color: rgba(139,123,255,0.34);
  box-shadow: 0 0 0 1px rgba(139,123,255,0.34) inset, 0 0 48px -10px rgba(124,107,255,0.60), var(--card-shadow);
}
/* ── Animated SVG icons (Wayne Mode Icons) ── */
.wm-icon {
  position: relative; width: 44px; height: 44px; flex: none;
  display: grid; place-items: center; border-radius: 13px;
  background: var(--brand-soft); border: 1px solid var(--brand-line);
  color: var(--brand);
  box-shadow: 0 0 12px var(--brand-glow), inset 0 0 10px var(--brand-soft);
  transition: transform .28s cubic-bezier(.2,.85,.25,1),
              box-shadow .28s ease, background .28s ease,
              border-color .28s ease, color .28s ease;
}
.wm-icon::before {
  content: ''; position: absolute; inset: -1px; border-radius: inherit;
  border: 1px solid var(--brand-line);
  box-shadow: 0 0 10px var(--brand-soft);
  opacity: .5; pointer-events: none;
  animation: wm-pulse 2.6s ease-in-out infinite;
}
@keyframes wm-pulse {
  0%,100% { transform: scale(1);    opacity: .45; }
  45%     { transform: scale(1.04); opacity: .95; }
  55%     { transform: scale(1.035);opacity: .7;  }
}
.wm-icon svg { width: 48%; height: 48%; display: block; overflow: visible; }
.wm-icon .ic { fill: none; stroke: currentColor; stroke-width: 1.7;
               stroke-linecap: round; stroke-linejoin: round; }
.wm-icon .ic-fill { fill: currentColor; stroke: none; }
.wm-icon:hover {
  transform: translateY(-3px);
  background: var(--brand-line); border-color: var(--brand);
  box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 22px var(--brand-glow),
              inset 0 0 14px var(--brand-soft);
}
.wm-icon:hover::before { animation: none; opacity: 1; border-color: var(--brand); box-shadow: 0 0 22px var(--brand-glow); }
.wm-icon.is-active, .mobileNavItem.active .wm-icon {
  background: var(--brand); border-color: var(--brand); color: var(--brand-ink);
  transform: translateY(-1px);
  box-shadow: 0 0 24px var(--brand-glow), 0 6px 18px rgba(0,0,0,.5);
}
.wm-icon.is-active::before, .mobileNavItem.active .wm-icon::before { opacity: 0; animation: none; }
/* ── Theme-specific icon glow ── */
[data-theme="nocturne"] .wm-icon {
  box-shadow: 0 0 16px rgba(0,255,136,0.38), inset 0 0 10px rgba(0,255,136,0.08);
}
[data-theme="nocturne"] .wm-icon:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 28px rgba(0,255,136,0.60), inset 0 0 14px rgba(0,255,136,0.12);
}
[data-theme="aurora"] .wm-icon {
  border-color: rgba(139,123,255,0.36);
  box-shadow: 0 0 16px rgba(124,107,255,0.48), inset 0 0 10px rgba(139,123,255,0.10);
}
[data-theme="aurora"] .wm-icon:hover {
  border-color: rgba(139,123,255,0.70);
  box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 30px rgba(124,107,255,0.70), inset 0 0 16px rgba(79,227,208,0.10);
}
/* per-icon micro-animations on hover */
.wm-icon:hover .ic-sports { animation: wm-flash .55s steps(1,end) infinite; transform-origin: center; }
@keyframes wm-flash { 0%,100%{opacity:1;transform:scale(1);} 20%{opacity:.25;} 40%{opacity:1;transform:scale(1.12);} 60%{opacity:.4;} 80%{opacity:1;} }
.ic-water .ripple { opacity: 0; }
.wm-icon:hover .ic-water .drop   { animation: wm-squish .9s ease-in-out infinite; transform-origin: 12px 18px; }
.wm-icon:hover .ic-water .ripple { animation: wm-ripple 1.1s ease-out infinite; transform-origin: 12px 19px; }
@keyframes wm-squish { 0%,100%{transform:scaleY(1) scaleX(1);} 50%{transform:scaleY(.92) scaleX(1.06);} }
@keyframes wm-ripple { 0%{opacity:.8;transform:scale(.3);} 100%{opacity:0;transform:scale(1.5);} }
.wm-icon:hover .ic-progress .trend { animation: wm-grow .9s ease-out infinite; transform-origin: 4px 20px; }
@keyframes wm-grow { 0%{transform:scaleY(.2);opacity:.4;} 60%{transform:scaleY(1.08);opacity:1;} 100%{transform:scaleY(1);} }
.wm-icon:hover .ic-goals .ping { animation: wm-ping 1s ease-out infinite; transform-origin: 12px 12px; }
.wm-icon:hover .ic-goals .bull { animation: wm-beat .7s ease-in-out infinite; transform-origin: 12px 12px; }
@keyframes wm-ping { 0%{opacity:.7;transform:scale(.4);} 100%{opacity:0;transform:scale(1.25);} }
@keyframes wm-beat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);} }
.wm-icon:hover .ic-finance { animation: wm-flip 1.1s ease-in-out infinite; transform-origin: center; }
@keyframes wm-flip { 0%,100%{transform:rotateY(0);} 50%{transform:rotateY(180deg);} }
.wm-icon:hover .ic-supp { animation: wm-spin 1.2s linear infinite; transform-origin: center; }
@keyframes wm-spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
.wm-icon:hover .ic-foods { animation: wm-wiggle .6s ease-in-out infinite; transform-origin: center bottom; }
@keyframes wm-wiggle { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
.wm-icon:hover .ic-home { animation: wm-bob .7s ease-in-out infinite; transform-origin: center; }
@keyframes wm-bob { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-1.5px) scale(1.06);} }
.wm-icon:hover .ic-stim { animation: wm-steam 1.1s ease-in-out infinite; transform-origin: center bottom; }
@keyframes wm-steam { 0%,100%{transform:translateY(0) scaleX(1);} 30%{transform:translateY(-2px) scaleX(0.97);} 60%{transform:translateY(-1px) scaleX(1.02);} }
.wm-icon:hover .ic-biz { animation: wm-rise 0.9s ease-in-out infinite; transform-origin: center bottom; }
@keyframes wm-rise { 0%,100%{transform:translateY(0) scaleX(1);} 50%{transform:translateY(-2px) scaleX(1.04);} }
@media (prefers-reduced-motion: reduce) { .wm-icon,.wm-icon::before,.wm-icon * { animation: none !important; } }
.cardName { font-family: var(--font-ui); font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.02em; }
.cardTag  { font-size: 12px; color: var(--muted); line-height: 1.4; }
.cardArrow {
  position: absolute; top: var(--space-5); right: var(--space-5);
  color: var(--muted); font-size: 16px;
  transition: color 220ms var(--ease-premium), transform 220ms var(--ease-premium);
}
.card:hover .cardArrow { color: var(--brand); transform: translate(2px,-2px); }
.cardTop  { display: flex; align-items: center; gap: var(--space-3); }
.cardStat { display: flex; flex-direction: column; gap: 2px; margin-top: auto; }
.cardStatValue { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; color: var(--fg); font-variant-numeric: tabular-nums; }
.cardStatLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* ── Vitals tile ── */
.vitals {
  grid-column: span 2; grid-row: span 2;
  display: flex; flex-direction: column; gap: var(--space-4);
  padding: var(--space-6);
  border: 1px solid var(--brand-line); border-radius: var(--radius-lg);
  background:
    radial-gradient(ellipse 60% 50% at 100% 0%, var(--brand-soft), transparent 70%),
    var(--surface);
  box-shadow: 0 0 50px -24px var(--brand-glow), var(--card-shadow);
  position: relative; overflow: hidden;
}
.vitals::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--brand), transparent);
  opacity: 0.6;
}
@media (max-width: 520px) { .vitals { grid-column: span 1; grid-row: auto; } }
@media (max-width: 480px) {
  .vitalsBody { flex-direction: column; align-items: flex-start; gap: var(--space-4); }
  .vMetrics { min-width: 0; width: 100%; }
  .recRing { width: 108px; height: 108px; }
  .recNum { font-size: 2rem; }
}

.vitalsHead { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
.vitalsEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brand); }
.srcBadge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--surface); border: 1px solid var(--border); color: var(--muted-strong);
}
.srcDot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-glow); }
.vitalsBody { display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap; }
.recRing { position: relative; width: 132px; height: 132px; display: grid; place-items: center; flex-shrink: 0; }
.recRing svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.recTrack { fill: none; stroke: var(--track); stroke-width: 9; }
.recFill { fill: none; stroke: currentColor; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 700ms var(--ease-premium); filter: drop-shadow(0 0 10px currentColor); }
.recRing[data-tone="good"]  .recFill { color: var(--pos); }
.recRing[data-tone="watch"] .recFill { color: var(--warn); }
.recRing[data-tone="low"]   .recFill { color: var(--neg); }
.recRing[data-tone="muted"] .recFill { color: var(--muted); }
.recNum  { font-family: var(--font-display); font-weight: 600; font-size: 2.5rem; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.recUnit { font-size: var(--text-base); color: var(--muted-strong); }
.recCap  { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.vMetrics { display: flex; flex-direction: column; gap: var(--space-3); flex: 1; min-width: 150px; }
.vRow { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--border); }
.vRow:last-child { border-bottom: 0; }
.vLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.vVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); font-variant-numeric: tabular-nums; }
.vVal em { font-family: var(--font-mono); font-style: normal; font-size: 11px; color: var(--muted); margin-left: 4px; }
.vitalsFoot { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
.vitalsSync { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vitalsEmpty { display: flex; flex-direction: column; gap: var(--space-3); justify-content: center; flex: 1; }
.vitalsEmptyTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; }
.vitalsEmptyBody  { font-size: 13px; color: var(--muted-strong); line-height: 1.55; max-width: 42ch; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: 0.6rem var(--space-4); border-radius: var(--radius-md);
  font-size: var(--text-sm); font-family: var(--font-ui); font-weight: 600;
  cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--fg);
  white-space: nowrap; text-decoration: none;
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease),
              color var(--duration) var(--ease), filter var(--duration) var(--ease),
              box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease);
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--brand); color: var(--brand-ink); font-weight: 700; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 26px var(--brand-glow); transform: translateY(-1px); }
.btn-ghost { color: var(--fg); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--surface); }
.btn-link { color: var(--muted-strong); padding: var(--space-2) var(--space-2); }
.btn-link:hover { color: var(--neg); }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0; background: var(--overlay);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 1000; display: grid; place-items: center; padding: var(--space-4);
  animation: fade 200ms var(--ease-premium);
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.panel {
  width: min(480px, 100%); background: var(--bg-elevated);
  border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-6);
  box-shadow: 0 28px 70px -16px rgba(0,0,0,0.7);
  animation: rise 320ms var(--ease-premium);
  max-height: 90dvh; overflow-y: auto;
}
@keyframes rise { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
.panelHead { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-5); }
.panelEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--brand); }
.panelTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-2xl); letter-spacing: -0.03em; margin: var(--space-2) 0 0; }
.panelClose { background: transparent; border: 1px solid var(--border); color: var(--muted-strong); font-size: 20px; line-height: 1; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; flex-shrink: 0; transition: color var(--duration), border-color var(--duration); }
.panelClose:hover { color: var(--fg); border-color: var(--border-strong); }
.srcPills { display: flex; gap: var(--space-2); margin-bottom: var(--space-5); flex-wrap: wrap; }
.srcPill {
  appearance: none; flex: 1; min-width: 96px; padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--surface); color: var(--muted-strong);
  font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all var(--duration) var(--ease-premium);
}
.srcPill .srcEmoji { font-size: 18px; }
.srcPillActive, .srcPillActive:hover { border-color: var(--brand); background: var(--brand-soft); color: var(--fg); box-shadow: 0 0 0 3px var(--brand-soft); }
.fieldGrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.field { display: flex; flex-direction: column; gap: 6px; }
.fieldFull { grid-column: 1 / -1; }
.fieldLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.fieldInput {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 12px; color: var(--fg); font-family: var(--font-mono); font-size: 14px; outline: none;
  transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium);
}
.fieldInput:focus { border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
.panelNote {
  margin: var(--space-4) 0 0; padding: var(--space-3) var(--space-4);
  border-left: 2px solid var(--brand-line); background: var(--brand-soft);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px; line-height: 1.55; color: var(--muted-strong);
}
.panelNote a { color: var(--brand); text-decoration: none; }
.panelNote a:hover { text-decoration: underline; }
.panelActions { display: flex; align-items: center; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-6); }
.panelActions .spacer { margin-right: auto; }
.srcActions { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-4); }
.srcActions .spacer { margin-right: auto; }

/* ── Live ticker ── */
.ticker {
  position: relative; display: flex; align-items: stretch;
  margin: calc(var(--space-2) * -1) 0 var(--space-8);
  border: 1px solid var(--border); border-radius: var(--radius-pill);
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  box-shadow: var(--card-shadow); overflow: hidden;
}
.ticker:hover .tickerTrack { animation-play-state: paused; }
.tickerLead {
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
  padding: 0 var(--space-4) 0 var(--space-5);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--brand);
  border-right: 1px solid var(--border); position: relative; z-index: 2;
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
}
.tickerPulse {
  width: 7px; height: 7px; border-radius: 50%; background: var(--brand); flex-shrink: 0;
  animation: tickerPulse 2.4s var(--ease) infinite;
}
@keyframes tickerPulse {
  0%   { box-shadow: 0 0 0 0 var(--brand-line); }
  70%  { box-shadow: 0 0 0 7px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.tickerViewport {
  position: relative; flex: 1; min-width: 0; overflow: hidden;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 4%, #000 92%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 4%, #000 92%, transparent);
}
.tickerTrack {
  display: flex; align-items: center; width: max-content;
  padding: 13px 0; animation: tickerScroll linear infinite; will-change: transform;
}
@keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tickerItem {
  display: inline-flex; align-items: center; gap: 11px;
  padding: 0 var(--space-5); border-right: 1px solid var(--border);
  white-space: nowrap; color: var(--brand);
}
.tiLabel { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--muted); }
.tiVal   { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.01em; color: var(--fg); font-variant-numeric: tabular-nums; }
.tiUnit  { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--muted); margin-left: 3px; }
.tiDelta { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: currentColor; }
.tiSpark { display: block; flex-shrink: 0; }
.tickerItem[data-tone="good"]  { color: var(--pos); }
.tickerItem[data-tone="watch"] { color: var(--warn); }
.tickerItem[data-tone="low"]   { color: var(--neg); }
.tickerItem[data-tone="muted"] { color: var(--muted); }
@media (prefers-reduced-motion: reduce) { .tickerTrack { animation: none; } .tickerViewport { overflow-x: auto; } }

/* ── How-to guide ── */
.howto { margin: var(--space-4) 0 var(--space-2); padding: var(--space-4); border: 1px solid var(--brand-line); background: var(--brand-soft); border-radius: var(--radius-md); }
.howtoTitle { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: var(--text-sm); margin-bottom: var(--space-3); }
.howtoSteps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-3); counter-reset: step; }
.howtoSteps li { position: relative; padding-left: 34px; font-size: 13px; line-height: 1.5; color: var(--muted-strong); counter-increment: step; }
.howtoSteps li::before { content: counter(step); position: absolute; left: 0; top: -1px; display: grid; place-items: center; width: 22px; height: 22px; border-radius: 50%; background: var(--brand); color: var(--brand-ink); font-family: var(--font-display); font-weight: 700; font-size: 12px; }
.howtoSteps strong { color: var(--fg); font-weight: 600; }
.howtoChips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.howtoChip { display: inline-block; padding: 3px 9px; border-radius: var(--radius-pill); background: var(--surface-2); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg); }
.howtoFoot { margin: var(--space-3) 0 0; font-size: 11px; line-height: 1.5; color: var(--muted); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ================================================================
 * NEW: Haulix + Apple Glass layout
 * ================================================================ */

/* ── Background blobs ── */
.bg-blobs { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.bg-blob { position: absolute; border-radius: 50%; opacity: 0.7; }
.bg-blob-1 { width: 700px; height: 700px; top: -200px; left: -150px; background: var(--glow-1); filter: blur(90px); }
.bg-blob-2 { width: 550px; height: 550px; bottom: -150px; right: -120px; background: var(--glow-2); filter: blur(80px); }
.bg-blob-3 { width: 450px; height: 450px; top: 35%; left: 35%; background: var(--brand-soft); filter: blur(100px); }
.bg-blob-4 { display: none; }

/* ── AURORA: northern lights drifting curtains ── */
[data-theme="aurora"] .bg-blob-1 {
  background: radial-gradient(ellipse at center, rgba(139,123,255,0.38) 0%, rgba(100,60,220,0.14) 55%, transparent 100%);
  animation: aurora-drift-1 22s ease-in-out infinite;
}
[data-theme="aurora"] .bg-blob-2 {
  background: radial-gradient(ellipse at center, rgba(79,227,208,0.28) 0%, rgba(40,180,160,0.10) 55%, transparent 100%);
  animation: aurora-drift-2 28s ease-in-out infinite;
}
[data-theme="aurora"] .bg-blob-3 {
  background: radial-gradient(ellipse at center, rgba(185,140,255,0.20) 0%, rgba(110,70,210,0.07) 55%, transparent 100%);
  animation: aurora-drift-3 18s ease-in-out infinite;
}
[data-theme="aurora"] .bg-blob-4 {
  display: block;
  width: 130%; height: 320px;
  top: 22%; left: -15%;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(139,123,255,0.07) 25%,
    rgba(79,227,208,0.09) 50%,
    rgba(139,123,255,0.06) 75%,
    transparent 100%);
  border-radius: 50%;
  filter: blur(44px);
  animation: aurora-curtain 32s ease-in-out infinite;
}
@keyframes aurora-drift-1 {
  0%,100% { transform: translate(0,0) scale(1); }
  20%     { transform: translate(70px,50px) scale(1.09); }
  50%     { transform: translate(35px,-55px) scale(0.94); }
  75%     { transform: translate(-45px,35px) scale(1.06); }
}
@keyframes aurora-drift-2 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(-75px,-55px) scale(1.12); }
  66%     { transform: translate(45px,-25px) scale(0.91); }
}
@keyframes aurora-drift-3 {
  0%,100% { transform: translate(0,0) scale(1); opacity: 0.65; }
  50%     { transform: translate(-55px,-75px) scale(1.22); opacity: 1; }
}
@keyframes aurora-curtain {
  0%,100% { transform: translateY(0) scaleX(1);    opacity: 0.45; }
  30%     { transform: translateY(-65px) scaleX(1.06); opacity: 0.85; }
  70%     { transform: translateY(45px) scaleX(0.96);  opacity: 0.55; }
}

/* ── NOCTURNE: pulsing neon-green orbs ── */
[data-theme="nocturne"] .bg-blob-1 {
  background: radial-gradient(ellipse at center, rgba(0,255,136,0.24) 0%, rgba(0,200,100,0.09) 55%, transparent 100%);
  animation: nocturne-pulse-1 9s ease-in-out infinite;
}
[data-theme="nocturne"] .bg-blob-2 {
  background: radial-gradient(ellipse at center, rgba(0,255,136,0.16) 0%, rgba(0,180,80,0.06) 55%, transparent 100%);
  animation: nocturne-pulse-2 14s ease-in-out infinite;
}
[data-theme="nocturne"] .bg-blob-3 {
  background: radial-gradient(ellipse at center, rgba(0,255,136,0.11) 0%, rgba(0,150,70,0.04) 55%, transparent 100%);
  animation: nocturne-pulse-3 11s ease-in-out infinite;
}
[data-theme="nocturne"] .bg-blob-4 { display: none; }
@keyframes nocturne-pulse-1 {
  0%,100% { transform: scale(1);    opacity: 0.65; }
  50%     { transform: scale(1.20); opacity: 1; }
}
@keyframes nocturne-pulse-2 {
  0%,100% { transform: translate(0,0) scale(0.9);   opacity: 0.50; }
  40%     { transform: translate(-45px,-35px) scale(1.14); opacity: 0.80; }
  80%     { transform: translate(25px,25px) scale(1.02);  opacity: 0.60; }
}
@keyframes nocturne-pulse-3 {
  0%,100% { transform: translate(0,0) scale(1);    opacity: 0.38; }
  33%     { transform: translate(35px,-45px) scale(1.18); opacity: 0.72; }
  66%     { transform: translate(-22px,32px) scale(0.94); opacity: 0.50; }
}

@media (prefers-reduced-motion: reduce) { .bg-blob { animation: none !important; } }
/* Canvas handles aurora + nocturne; hide CSS blobs for those */
[data-theme="aurora"] .bg-blobs,
[data-theme="nocturne"] .bg-blobs { display: none; }

/* ── Sidebar dock ── */
.sidebar-dock {
  position: fixed; left: 18px; top: 50%; transform: translateY(-50%);
  z-index: 60; display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 20px 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-radius: 999px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(255,255,255,0.04);
}
[data-theme="daylight"] .sidebar-dock { background: rgba(255,255,255,0.55); box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 1px rgba(255,255,255,0.9), 0 0 0 1px rgba(0,0,0,0.06); }
@media (max-width: 900px) { .sidebar-dock { display: none; } }

.sidebar-dock-logo {
  width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px var(--brand-glow); text-decoration: none;
  margin-bottom: 4px;
}
.sidebar-dock-divider { width: 28px; height: 1px; background: var(--border); margin: 2px 0; }
.sidebar-dock-btn {
  position: relative; width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 0; cursor: pointer;
  transition: background 200ms, color 200ms; text-decoration: none;
}
/* sidebar entrance */
@keyframes sdSlideIn {
  from { opacity: 0; transform: translateX(-10px) scale(0.88); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.sidebar-dock-btn { opacity: 0; animation: sdSlideIn 380ms var(--ease-premium) forwards; }
.sidebar-dock-btn:nth-child(1) { animation-delay:  80ms }
.sidebar-dock-btn:nth-child(2) { animation-delay: 130ms }
.sidebar-dock-btn:nth-child(3) { animation-delay: 180ms }
.sidebar-dock-btn:nth-child(4) { animation-delay: 230ms }
.sidebar-dock-btn:nth-child(5) { animation-delay: 280ms }
.sidebar-dock-btn:nth-child(6) { animation-delay: 330ms }
.sidebar-dock-btn:nth-child(7) { animation-delay: 380ms }
.sidebar-dock-btn:nth-child(8) { animation-delay: 430ms }
@media (prefers-reduced-motion: reduce) { .sidebar-dock-btn { animation: none; opacity: 1; } }
.sidebar-dock-btn:hover, .sidebar-dock-btn.sdActive { background: var(--brand-soft); }
.sidebar-dock-btn .wm-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: transparent; border: 1px solid transparent; box-shadow: none;
  color: var(--muted); pointer-events: none;
  transition: background .28s ease, border-color .28s ease, color .28s ease, box-shadow .28s ease;
}
.sidebar-dock-btn .wm-icon::before { opacity: 0.18; }
.sidebar-dock-btn:hover .wm-icon, .sidebar-dock-btn.sdActive .wm-icon {
  background: var(--brand-soft); border-color: var(--brand-line); color: var(--brand);
  box-shadow: 0 0 12px var(--brand-glow), inset 0 0 10px var(--brand-soft);
}
.sidebar-dock-btn:hover .wm-icon::before, .sidebar-dock-btn.sdActive .wm-icon::before { opacity: 1; }
/* per-icon micro-animations triggered by button hover */
.sidebar-dock-btn:hover .ic-sports { animation: wm-flash .55s steps(1,end) infinite; transform-origin: center; }
.sidebar-dock-btn:hover .ic-water .drop   { animation: wm-squish .9s ease-in-out infinite; transform-origin: 12px 18px; }
.sidebar-dock-btn:hover .ic-water .ripple { animation: wm-ripple 1.1s ease-out infinite; transform-origin: 12px 19px; }
.sidebar-dock-btn:hover .ic-progress .trend { animation: wm-grow .9s ease-out infinite; transform-origin: 4px 20px; }
.sidebar-dock-btn:hover .ic-goals .ping { animation: wm-ping 1s ease-out infinite; transform-origin: 12px 12px; }
.sidebar-dock-btn:hover .ic-goals .bull { animation: wm-beat .7s ease-in-out infinite; transform-origin: 12px 12px; }
.sidebar-dock-btn:hover .ic-finance { animation: wm-flip 1.1s ease-in-out infinite; transform-origin: center; }
.sidebar-dock-btn:hover .ic-supp { animation: wm-spin 1.2s linear infinite; transform-origin: center; }
.sidebar-dock-btn:hover .ic-home { animation: wm-bob .7s ease-in-out infinite; transform-origin: center; }
.sidebar-dock-btn:hover .ic-stim { animation: wm-steam 1.1s ease-in-out infinite; transform-origin: center bottom; }
.sidebar-dock-btn:hover .ic-biz { animation: wm-rise 0.9s ease-in-out infinite; transform-origin: center bottom; }
.sidebar-dock-tooltip {
  position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.88); color: #fff; font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  padding: 5px 10px; border-radius: 8px; white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 150ms; z-index: 99;
}
.sidebar-dock-btn:hover .sidebar-dock-tooltip { opacity: 1; }
[data-theme="daylight"] .sidebar-dock-tooltip { background: rgba(20,18,40,0.9); }

/* ── Main wrapper ── */
.main-wrapper { margin-left: 96px; min-height: 100dvh; position: relative; z-index: 1; }
@media (max-width: 900px) { .main-wrapper { margin-left: 0; } }

/* ── Glass header ── */
.glass-header {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 12px;
  padding: max(12px, env(safe-area-inset-top)) 24px 12px;
  background: rgba(6,8,18,0.72);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid var(--border);
}
[data-theme="daylight"] .glass-header { background: rgba(242,241,250,0.82); }
[data-theme="nocturne"] .glass-header {
  background: rgba(6,6,6,0.92);
  border-bottom: 1px solid rgba(0,255,136,0.16);
  box-shadow: 0 1px 0 rgba(0,255,136,0.08), 0 4px 28px -8px rgba(0,255,136,0.10);
}
[data-theme="aurora"] .glass-header {
  background: rgba(5,6,18,0.90);
  border-bottom: 1px solid rgba(139,123,255,0.22);
  box-shadow: 0 1px 0 rgba(139,123,255,0.12), 0 4px 28px -8px rgba(124,107,255,0.18);
}
.stat-pills { flex: 1; display: flex; align-items: center; gap: clamp(6px, 1.4vw, 18px); flex-wrap: nowrap; overflow: hidden; min-width: 0; }
.stat-pill {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px;
  border-radius: 999px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  font-family: var(--font-mono); font-size: 11px; white-space: nowrap; flex-shrink: 0;
}
[data-theme="daylight"] .stat-pill { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.08); }
[data-theme="nocturne"] .stat-pill { background: rgba(0,255,136,0.05); border-color: rgba(0,255,136,0.14); }
[data-theme="aurora"]   .stat-pill { background: rgba(139,123,255,0.08); border-color: rgba(139,123,255,0.18); }
.stat-pill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.stat-pill-lbl { color: var(--muted); font-size: 10px; }
.stat-pill-val { color: var(--fg); font-weight: 600; }
.header-search { flex: 0 0 clamp(160px, 18vw, 300px); position: relative; }
.header-search-input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px; padding: 6px 12px 6px 30px; color: var(--fg);
  font-family: var(--font-ui); font-size: 13px; outline: none;
  transition: border-color 200ms, background 200ms;
}
[data-theme="daylight"] .header-search-input { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.10); }
.header-search-input::placeholder { color: var(--muted); }
.header-search-input:focus { border-color: var(--brand-line); background: rgba(255,255,255,0.07); }
[data-theme="nocturne"] .header-search-input { background: rgba(0,255,136,0.03); border-color: rgba(0,255,136,0.10); }
[data-theme="nocturne"] .header-search-input:focus { border-color: rgba(0,255,136,0.38); background: rgba(0,255,136,0.05); box-shadow: 0 0 0 3px rgba(0,255,136,0.08); }
[data-theme="aurora"]   .header-search-input { background: rgba(139,123,255,0.05); border-color: rgba(139,123,255,0.13); }
[data-theme="aurora"]   .header-search-input:focus { border-color: rgba(139,123,255,0.44); background: rgba(139,123,255,0.07); box-shadow: 0 0 0 3px rgba(139,123,255,0.10); }
.header-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; line-height: 1; }
.header-right { flex: 1; display: flex; align-items: center; gap: 8px; justify-content: flex-end; min-width: 0; }
.notif-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: color 200ms, background 200ms;
}
.notif-btn:hover { color: var(--fg); background: rgba(255,255,255,0.09); }
[data-theme="nocturne"] .notif-btn:hover { background: rgba(0,255,136,0.07); border-color: rgba(0,255,136,0.20); color: var(--brand); }
[data-theme="aurora"]   .notif-btn:hover { background: rgba(139,123,255,0.09); border-color: rgba(139,123,255,0.26); color: var(--brand); }
@media (max-width: 640px) { .header-search { display: none; } }
@media (max-width: 480px) { .stat-pills .stat-pill:nth-child(n+3) { display: none; } }

/* ── Page layout override ── */
.page { padding: 0 0 var(--space-16); background: transparent; }
.main-wrapper { background: transparent; }
.shell { max-width: 1200px; }

/* ── Title bar ── */
.title-bar { padding: var(--space-6) var(--space-6) 0; }
.title-bar-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-2); }
.wm-hero { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.4rem, 5vw, 3.8rem); letter-spacing: -0.03em; line-height: 1; color: var(--fg); }
.wm-date-sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
.title-toggles { display: flex; align-items: center; gap: 20px; padding-top: 6px; }
.toggle-row { display: flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: 12px; color: var(--muted); cursor: pointer; }
/* iOS toggle */
.ios-toggle { position: relative; display: inline-block; width: 34px; height: 19px; cursor: pointer; }
.ios-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.ios-toggle-track { position: absolute; inset: 0; border-radius: 999px; background: var(--track); transition: background 200ms; }
.ios-toggle input:checked + .ios-toggle-track { background: var(--brand); }
.ios-toggle-thumb { position: absolute; top: 2px; left: 2px; width: 15px; height: 15px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: transform 200ms; pointer-events: none; }
.ios-toggle input:checked ~ .ios-toggle-thumb { transform: translateX(15px); }
@media (max-width: 520px) { .title-toggles { display: none; } }

/* ── Tab strip ── */
.tab-strip { display: flex; align-items: center; gap: 4px; padding: var(--space-4) var(--space-6) 0; flex-wrap: wrap; }
.tab-btn {
  appearance: none; background: transparent; border: 1px solid transparent;
  border-radius: 999px; padding: 6px 16px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 200ms var(--ease-premium); white-space: nowrap;
}
.tab-btn:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
.tab-btn.tabActive { background: var(--brand-soft); border-color: var(--brand-line); color: var(--brand); }
[data-theme="nocturne"] .tab-btn.tabActive {
  box-shadow: 0 0 14px rgba(0,255,136,0.30), 0 0 0 1px rgba(0,255,136,0.22) inset;
}
[data-theme="aurora"] .tab-btn.tabActive {
  background: linear-gradient(135deg, rgba(139,123,255,0.20), rgba(79,227,208,0.10));
  border-color: rgba(139,123,255,0.36);
  box-shadow: 0 0 18px rgba(124,107,255,0.42), 0 0 0 1px rgba(139,123,255,0.32) inset;
}

/* ── Haulix 2-col grid ── */
.haulix-grid {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--space-4);
  padding: var(--space-4) var(--space-6);
}
@media (max-width: 900px) { .haulix-grid { grid-template-columns: 1fr; padding: var(--space-4); } }

/* ── Glass panel ── */
.glass-panel {
  border-radius: 20px; padding: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.12), 0 0 0 1px rgba(255,255,255,0.04);
}
[data-theme="daylight"] .glass-panel { background: rgba(255,255,255,0.65); box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 1px rgba(255,255,255,0.9), 0 0 0 1px rgba(0,0,0,0.05); }
[data-theme="nocturne"] .glass-panel {
  background: rgba(0,255,136,0.028);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 1px rgba(0,255,136,0.09), 0 0 0 1px rgba(0,255,136,0.07);
}
[data-theme="aurora"] .glass-panel {
  background: rgba(139,123,255,0.046);
  box-shadow: 0 8px 32px rgba(78,60,210,0.28), inset 0 1px 1px rgba(139,123,255,0.14), 0 0 0 1px rgba(139,123,255,0.09);
}
.glass-panel-title { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.glass-panel-title + .glass-panel-title { margin-top: -4px; }

/* ── Quick actions ── */
.quick-actions { display: flex; flex-direction: column; gap: 7px; }
.qa-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  color: var(--fg); font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: background 200ms var(--ease-premium), border-color 200ms, transform 200ms;
}
.qa-btn:hover { background: var(--brand-soft); border-color: var(--brand-line); transform: translateX(2px); }
[data-theme="daylight"] .qa-btn { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.08); }
.qa-icon { width: 26px; height: 26px; border-radius: 8px; background: var(--brand-soft); border: 1px solid var(--brand-line); display: flex; align-items: center; justify-content: center; color: var(--brand); font-size: 13px; flex-shrink: 0; }
.qa-icon.done { background: var(--pos-soft); border-color: var(--pos-line); color: var(--pos); }
.qa-arrow { margin-left: auto; color: var(--muted); font-size: 12px; transition: color 200ms; }
.qa-btn:hover .qa-arrow { color: var(--brand); }

/* ── Priority alert queue ── */
.alert-queue { display: flex; flex-direction: column; gap: 7px; }
.alert-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 12px; background: rgba(255,255,255,0.03);
  border-left: 3px solid var(--warn); border-top: 1px solid rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.04);
}
.alert-item.tone-good  { border-left-color: var(--pos); }
.alert-item.tone-neg   { border-left-color: var(--neg); }
.alert-item.tone-brand { border-left-color: var(--brand); }
.alert-item-body { flex: 1; min-width: 0; }
.alert-item-title { font-family: var(--font-ui); font-size: 12px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.alert-item-sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.alert-item-val { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--fg); flex-shrink: 0; }

/* ── Recent activity ── */
.activity-list { display: flex; flex-direction: column; }
.activity-item { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.activity-item:last-child { border-bottom: 0; }
.act-tag { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 999px; flex-shrink: 0; background: var(--brand-soft); border: 1px solid var(--brand-line); color: var(--brand); }
.act-tag.health  { background: var(--pos-soft);  border-color: var(--pos-line);  color: var(--pos); }
.act-tag.finance { background: var(--warn-soft); border-color: var(--warn-line); color: var(--warn); }
.act-tag.system  { background: var(--surface);   border-color: var(--border);    color: var(--muted); }
.act-text { font-family: var(--font-ui); font-size: 12px; color: var(--fg); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.act-time { font-family: var(--font-mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }

/* ── Daily output bar chart ── */
.output-bars { display: flex; align-items: flex-end; gap: 8px; height: 88px; }
.ob-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.ob-pct { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--fg); }
.ob-track { width: 100%; flex: 1; background: var(--track); border-radius: 4px 4px 0 0; position: relative; overflow: hidden; }
.ob-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 4px 4px 0 0; transition: height 700ms var(--ease-premium); }
.ob-lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

/* ── Financial trend chart ── */
.fin-chart svg { width: 100%; display: block; }
.fin-chart-legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
.fin-legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.fin-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Health compact ── */
.health-compact { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.hc-metric { padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
.hc-lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.hc-val { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 400; letter-spacing: -0.01em; line-height: 1.1; color: var(--fg); font-variant-numeric: tabular-nums; }
.hc-val em { font-family: var(--font-mono); font-style: normal; font-size: 10px; color: var(--muted); margin-left: 2px; vertical-align: middle; }

/* ── Suite section ── */
.suite-section { padding: 0 var(--space-6) var(--space-8); }
@media (max-width: 900px) { .suite-section { padding: 0 var(--space-4) var(--space-8); } }
.suite-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-4); }

/* ── Spacer between haulix sections ── */
.haulix-spacer { height: 16px; }

/* ── Mobile bottom nav ── */
.mobileNav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: rgba(8,8,8,0.92); border-top: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
}
@media (max-width: 520px) { .mobileNav { display: flex; } .page { padding-bottom: calc(80px + env(safe-area-inset-bottom)); } }
[data-theme="daylight"] .mobileNav { background: rgba(242,241,250,0.94); }
[data-theme="aurora"]   .mobileNav { background: rgba(6,8,18,0.92); }
.mobileNavItem {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0; text-decoration: none; color: var(--muted);
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 180ms;
}
.mobileNavItem:hover, .mobileNavItem.active { color: var(--brand); }
.mobileNav .wm-icon { width: 32px; height: 32px; border-radius: 10px; cursor: default; }
.mobileNav .wm-icon svg { width: 52%; height: 52%; }
</style>

/* ================================================================
 * Theme
 * ================================================================ */
const THEMES = [
  { key: 'nocturne', label: 'Nocturne', swatch: '#00FF88' },
  { key: 'aurora',   label: 'Aurora',   swatch: 'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key: 'daylight', label: 'Daylight', swatch: '#6A45FF' },
];
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme') || 'aurora'; } catch(e){ return 'aurora'; } })();
if (!THEMES.some(t => t.key === currentTheme)) currentTheme = 'aurora';
function applyTheme(name){
  if (!THEMES.some(t => t.key === name)) name = 'aurora';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  try { localStorage.setItem('patron_theme', name); } catch(e){}
  render();
}
function themeSegHtml(){
  return '<div class="themeSeg" role="radiogroup" aria-label="Theme">'
    + THEMES.map(t => '<button type="button" class="themeBtn ' + (t.key === currentTheme ? 'themeBtnActive' : '') + '" data-action="theme" data-theme="' + t.key + '"><span class="themeSwatch" style="background:' + t.swatch + '"></span>' + t.label + '</button>').join('')
    + '</div>';
}

/* ================================================================
 * Shared health record
 * ================================================================ */
const HEALTH_KEY = 'patron_health_v1';
const LEGACY_WHOOP_KEY = 'patron_whoop_data_v1';
function loadHealth(){
  try {
    let r = localStorage.getItem(HEALTH_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return d; }
    r = localStorage.getItem(LEGACY_WHOOP_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return Object.assign({ source: 'whoop' }, d); }
  } catch(e){}
  return null;
}
function saveHealth(d){ try { localStorage.setItem(HEALTH_KEY, JSON.stringify(d)); } catch(e){} }
function clearHealth(){ try { localStorage.removeItem(HEALTH_KEY); } catch(e){} }
let health = loadHealth();

/* ---- Live WHOOP sync ---- */
const ON_SERVER = location.protocol === 'http:' || location.protocol === 'https:';
let whoopStatus = { connected: false, checked: false };
async function syncWhoop(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/whoop/data', { cache: 'no-store' });
    const j = await r.json();
    whoopStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'whoop', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'whoop') {
      clearHealth(); health = null;
    }
  } catch (e) { whoopStatus = { connected: false, checked: true }; }
  render();
}

/* ---- Live Fitbit sync ---- */
let fitbitStatus = { connected: false, checked: false };
async function syncFitbit(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/fitbit/data', { cache: 'no-store' });
    const j = await r.json();
    fitbitStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'fitbit', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, bedtime: j.bedtime, wakeTime: j.wakeTime, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'fitbit') {
      clearHealth(); health = null;
    }
  } catch (e) { fitbitStatus = { connected: false, checked: true }; }
  render();
}

function sourceLabel(s){ return s === 'apple' ? 'Apple Watch' : s === 'manual' ? 'Manual' : s === 'fitbit' ? 'Fitbit' : 'Whoop'; }
function recTone(r){ if (r == null) return 'muted'; if (r >= 67) return 'good'; if (r >= 34) return 'watch'; return 'low'; }
function formatHM(h){ if (h == null) return '—'; const hh = Math.floor(h); const mm = Math.round((h - hh) * 60); return hh + 'h ' + String(mm).padStart(2,'0') + 'm'; }
function formatClock(t){ if (!t) return '—'; const [h, m] = String(t).split(':').map(Number); if (!isFinite(h)) return esc(t); const ap = h < 12 ? 'am' : 'pm'; const h12 = h % 12 === 0 ? 12 : h % 12; return h12 + ':' + String(m || 0).padStart(2,'0') + ap; }
function ago(ts){ if (!ts) return ''; const m = Math.max(0, Math.round((Date.now() - ts) / 60000)); if (m < 1) return 'just now'; if (m < 60) return m + 'm ago'; return Math.round(m / 60) + 'h ago'; }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================================================================
 * Profile
 * ================================================================ */
const SUITE_PROFILE_KEY = 'patron_profile_v1';
function loadProfile(){ try { const r = localStorage.getItem(SUITE_PROFILE_KEY); return r ? JSON.parse(r) : null; } catch(e){ return null; } }
function saveProfileObj(p){ try { localStorage.setItem(SUITE_PROFILE_KEY, JSON.stringify(p)); } catch(e){} }
let profile = loadProfile();
function firstName(){ return profile && profile.name ? String(profile.name).trim().split(/\s+/)[0] : ''; }

 * ================================================================ */
const ui = { modalOpen: false, draftSource: 'manual', profileOpen: false, profileDraft: null, activeTab: 'All', showInsights: true, liveSync: true };

/* ================================================================
 * Glass header (replaces topbar, rendered into #topbar-root)
 * ================================================================ */
function glassHeaderHtml(){
  const name = firstName();
  const chip = profile
    ? '<button type="button" class="profileChip" data-action="open-profile" title="Edit profile"><span class="profileAvatar">' + esc((name || '·').charAt(0).toUpperCase()) + '</span>' + esc(name || 'Profile') + '</button>'
    : '<button type="button" class="profileChip profileChipNew" data-action="open-profile">Set up profile</button>';

  let pills = '';
  try {
    const suppData = lsGet('supplements_standalone_v1');
    if (suppData && Array.isArray(suppData.items) && suppData.items.length) {
      const tk = (suppData.taken && suppData.taken[activeDateKey()]) || {};
      const n = suppData.items.filter(function(i){ return tk[i.id]; }).length;
      pills += '<span class="stat-pill"><span class="stat-pill-dot" style="background:var(--brand)"></span><span class="stat-pill-lbl">Supps</span><span class="stat-pill-val">' + n + '/' + suppData.items.length + '</span></span>';
    }
    const watData = lsGet('water_standalone_v1');
    if (watData && watData.logs) {
      const wn = watData.logs[localDateKey()] || 0;
      pills += '<span class="stat-pill"><span class="stat-pill-dot" style="background:var(--pos)"></span><span class="stat-pill-lbl">H2O</span><span class="stat-pill-val">' + wn + '</span></span>';
    }
    if (health && health.sleepHours != null) {
      pills += '<span class="stat-pill"><span class="stat-pill-dot" style="background:var(--warn)"></span><span class="stat-pill-lbl">Sleep</span><span class="stat-pill-val">' + formatHM(health.sleepHours) + '</span></span>';
    }
    if (health && health.hrv != null) {
      pills += '<span class="stat-pill"><span class="stat-pill-dot" style="background:var(--pos)"></span><span class="stat-pill-lbl">HRV</span><span class="stat-pill-val">' + Math.round(health.hrv) + 'ms</span></span>';
    }
  } catch(e){}
  if (!pills) pills = '<span class="stat-pill" style="cursor:pointer" data-action="open-vitals"><span class="stat-pill-lbl">Add vitals to go live</span></span>';

  return '<header class="glass-header">'
    + '<div class="stat-pills">' + pills + '</div>'
    + '<div class="header-search"><span class="header-search-icon">&#x2315;</span>'
    + '<input class="header-search-input" type="search" placeholder="Search apps…" aria-label="Search apps" /></div>'
    + '<div class="header-right">'
    + themeSegHtml()
    + '<button type="button" class="notif-btn" aria-label="Notifications" title="Notifications">&#128276;</button>'
    + chip + '</div></header>';
}

    + '</div>';

/* ================================================================
 * Haulix insight grid (2-col overview panels)
 * ================================================================ */
function haulixtHtml(){
  if (!ui.showInsights) return '';

  /* ---- Quick Actions ---- */
  const weightDone = loggedWeightToday(), gymDone = loggedGymToday(), vitalsDone = !!health;
  const qaHtml = '<div class="quick-actions">'
    + '<a class="qa-btn" href="progress.html"><span class="qa-icon' + (weightDone ? ' done' : '') + '">' + (weightDone ? '✓' : '⚖') + '</span>Log weight<span class="qa-arrow">→</span></a>'
    + '<a class="qa-btn" href="gym.html"><span class="qa-icon' + (gymDone ? ' done' : '') + '">' + (gymDone ? '✓' : '⚡') + '</span>Log gym<span class="qa-arrow">→</span></a>'
    + '<button type="button" class="qa-btn" data-action="open-vitals"><span class="qa-icon' + (vitalsDone ? ' done' : '') + '">' + (vitalsDone ? '✓' : '♥') + '</span>Update vitals<span class="qa-arrow">→</span></button>'
    + '</div>';

  /* ---- Priority Alerts ---- */
  const alerts = [];
  if (!weightDone) alerts.push({ text: 'Log today\'s weight', sub: 'progress.html', tone: '' });
  if (!gymDone)    alerts.push({ text: 'Log today\'s gym session', sub: 'gym.html', tone: '' });
  if (health && health.recovery != null){
    const t = recTone(health.recovery);
    alerts.push({ text: 'Recovery: ' + Math.round(health.recovery) + '%', sub: 'via ' + sourceLabel(health.source), tone: t === 'good' ? 'tone-good' : t === 'low' ? 'tone-neg' : 'tone-brand', val: Math.round(health.recovery) + '%' });
  }
  if (!alerts.length) alerts.push({ text: 'All clear', sub: 'Nothing pending today', tone: 'tone-good' });
  const alertsHtml = '<div class="alert-queue">'
    + alerts.slice(0, 4).map(function(a){
        return '<div class="alert-item ' + a.tone + '"><div class="alert-item-body"><div class="alert-item-title">' + esc(a.text) + '</div><div class="alert-item-sub">' + esc(a.sub || '') + '</div></div>' + (a.val ? '<div class="alert-item-val">' + esc(a.val) + '</div>' : '') + '</div>';
      }).join('')
    + '</div>';

  /* ---- Recent Activity ---- */
  const acts = [];
  if (gymDone)    acts.push({ tag: 'health',  text: 'Gym logged today',   time: 'today' });
  if (weightDone) acts.push({ tag: 'health',  text: 'Weight logged',      time: 'today' });
  if (health && health.ts)  acts.push({ tag: 'health',  text: 'Vitals updated',     time: ago(health.ts) });
  try {
    const biz = lsGet('business_v1');
    if (biz && biz.mrr > 0) acts.push({ tag: 'finance', text: 'MRR: €' + fmtNum(biz.mrr), time: 'current' });
    const fin = lsGet('finance_standalone_v1');
    if (fin && Array.isArray(fin.accounts) && fin.accounts.length){
      const nw = fin.accounts.reduce(function(a,x){ return a+(Number(x.amountCHF)||0); }, 0);
      acts.push({ tag: 'finance', text: 'Net worth: CHF ' + fmtNum(nw), time: 'current' });
    }
  } catch(e){}
  if (!acts.length) acts.push({ tag: 'system', text: 'Start logging to see activity', time: 'now' });
  const actsHtml = '<div class="activity-list">'
    + acts.slice(0, 5).map(function(a){
        return '<div class="activity-item"><span class="act-tag ' + esc(a.tag) + '">' + esc(a.tag) + '</span><span class="act-text">' + esc(a.text) + '</span><span class="act-time">' + esc(a.time) + '</span></div>';
      }).join('')
    + '</div>';

  const leftCol = '<div class="glass-panel">'
    + '<div class="glass-panel-title">Quick Actions</div>' + qaHtml
    + '<div class="haulix-spacer"></div>'
    + '<div class="glass-panel-title">Priority Alerts</div>' + alertsHtml
    + '<div class="haulix-spacer"></div>'
    + '<div class="glass-panel-title">Recent Activity</div>' + actsHtml
    + '</div>';

  /* ---- Daily Output chart ---- */
  function barPct(label, pct, color){
    return '<div class="ob-col"><div class="ob-pct">' + pct + '%</div>'
      + '<div class="ob-track"><div class="ob-fill" style="height:' + pct + '%;background:' + color + '"></div></div>'
      + '<div class="ob-lbl">' + label + '</div></div>';
  }
  let gymPct = gymDone ? 100 : 0;
  let h2oPct = (function(){ try { const w=lsGet('water_standalone_v1'); const n=w&&w.logs?(w.logs[localDateKey()]||0):0; const t=(w&&w.dailyTarget)||8; return Math.min(100,Math.round((n/t)*100)); } catch(e){ return 0; } })();
  let supPct = (function(){ try { const s=lsGet('supplements_standalone_v1'); if(!s||!Array.isArray(s.items)||!s.items.length) return 0; const tk=(s.taken&&s.taken[activeDateKey()])||{}; return Math.round((s.items.filter(function(i){return tk[i.id];}).length/s.items.length)*100); } catch(e){ return 0; } })();
  let vitPct = health ? (health.recovery!=null ? health.recovery : health.sleepPerf!=null ? health.sleepPerf : 30) : 0;
  let wgtPct = weightDone ? 100 : 0;
  const barsHtml = '<div class="output-bars">'
    + barPct('GYM', gymPct, 'var(--brand)')
    + barPct('H2O', h2oPct, 'var(--pos)')
    + barPct('SUP', supPct, 'var(--warn)')
    + barPct('VIT', Math.round(vitPct), 'var(--neg)')
    + barPct('WGT', wgtPct, 'var(--brand-2)')
    + '</div>';

  /* ---- Financial trend (area chart SVG) ---- */
  var finNw = 0, finMrr = 0;
  try {
    var finD = lsGet('finance_standalone_v1');
    if (finD && Array.isArray(finD.accounts)) finNw = finD.accounts.reduce(function(a,x){ return a+(Number(x.amountCHF)||0); }, 0);
    var bizD = lsGet('business_v1');
    if (bizD && bizD.mrr > 0) finMrr = bizD.mrr;
  } catch(e){}
  var finSvg = (function(){
    var W=300, H=90, pad=6;
    var nwY=[0.68,0.72,0.71,0.77,0.82,0.88,1.0];
    var mrrY=[0.45,0.50,0.55,0.53,0.62,0.70,0.80];
    function pts(arr){ return arr.map(function(v,i){ return [pad+(i/6)*(W-pad*2), pad+(1-v)*(H-pad*2)]; }); }
    function lineD(pp){ return pp.map(function(p,i){ return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1); }).join(' '); }
    function areaD(pp){ return lineD(pp)+' L'+pp[pp.length-1][0].toFixed(1)+' '+H+' L'+pp[0][0].toFixed(1)+' '+H+' Z'; }
    var np=pts(nwY), mp=pts(mrrY);
    return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:90px">'
      +'<defs>'

      +'</defs>'
      +'<path d="'+areaD(np)+'" fill="url(#gNw)"/>'
      +'<path d="'+areaD(mp)+'" fill="url(#gMrr)"/>'
      +'<path d="'+lineD(np)+'" fill="none" stroke="var(--brand)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      +'<path d="'+lineD(mp)+'" fill="none" stroke="var(--warn)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      +'</svg>';
  })();

  /* ---- Health compact ---- */
  var hcHtml = '';
  if (health){
    hcHtml = '<div class="haulix-spacer"></div><div class="glass-panel-title">Health</div>'
      + '<div class="health-compact">'
      + '<div class="hc-metric"><div class="hc-lbl">Sleep</div><div class="hc-val">' + (health.sleepHours!=null ? formatHM(health.sleepHours) : '—') + '</div></div>'
      + '<div class="hc-metric"><div class="hc-lbl">HRV</div><div class="hc-val">' + (health.hrv!=null ? Math.round(health.hrv)+'<em>ms</em>' : '—') + '</div></div>'
      + '<div class="hc-metric"><div class="hc-lbl">Resting HR</div><div class="hc-val">' + (health.rhr!=null ? Math.round(health.rhr)+'<em>bpm</em>' : '—') + '</div></div>'
      + '<div class="hc-metric"><div class="hc-lbl">Sleep Score</div><div class="hc-val">' + (health.sleepPerf!=null ? Math.round(health.sleepPerf)+'<em>%</em>' : '—') + '</div></div>'
      + '</div>';
  }

  var rightCol = '<div class="glass-panel">'
    + '<div class="glass-panel-title">Daily Output</div>' + barsHtml
    + hcHtml
    + '<div class="haulix-spacer"></div><div class="glass-panel-title">Financial Trend</div>'

/* ================================================================
 * Live stats per app card
 * ================================================================ */
function lsGet(key){ try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e){ return null; } }
function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }
function localDateKey(d){ d = d || new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function activeDateKey(){ const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return localDateKey(d); }
function statFor(file){
  try {
    if (file === 'business.html') { const s = lsGet('business_v1'); if (s && s.mrr > 0) return { value: '€' + fmtNum(s.mrr), label: 'MRR' }; if (s && s.activeClients > 0) return { value: String(s.activeClients), label: 'active clients' }; }
    else if (file === 'finance.html') { const s = lsGet('finance_standalone_v1'); if (s && Array.isArray(s.accounts) && s.accounts.length) { const nw = s.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); return { value: 'CHF ' + fmtNum(nw), label: 'net worth' }; } }
    else if (file === 'supplements.html') { const s = lsGet('supplements_standalone_v1'); if (s && Array.isArray(s.items) && s.items.length) { const tk = (s.taken && s.taken[activeDateKey()]) || {}; const n = s.items.filter(i => tk[i.id]).length; return { value: n + '/' + s.items.length, label: 'taken today' }; } }
    else if (file === 'water.html') { const s = lsGet('water_standalone_v1'); if (s && s.logs) { const n = s.logs[localDateKey()] || 0; return { value: String(n), label: (n === 1 ? 'drink' : 'drinks') + ' today' }; } }
    else if (file === 'whoop.html') { if (health && health.recovery != null) return { value: Math.round(health.recovery) + '%', label: 'recovery' }; }
    else if (file === 'caffeine-tracker.html') { const s = lsGet('caffeine_tracker_v1'); if (s && Array.isArray(s.logs) && s.logs.length) { const todayKey = (function(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })(); if (s.dateKey === todayKey) { const total = s.logs.reduce((a,x)=>a+(Number(x.mg)||0),0); return { value: total + ' mg', label: 'today' }; } } }
  } catch (e) {}
  return null;
}
function cardHtml(a){
  const st = statFor(a.file);
  const tail = st
    ? '<div class="cardStat"><span class="cardStatValue">' + esc(st.value) + '</span><span class="cardStatLabel">' + esc(st.label) + '</span></div>'
    : '<p class="cardTag">' + esc(a.tag) + '</p>';
