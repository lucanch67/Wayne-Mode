<html lang="en">
<head>

<title>Fitness Band · Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"aurora");}catch(e){document.documentElement.setAttribute("data-theme","aurora");}</script>
<style>

/* ============================================================
 * Fitness Band · PC Desktop Layout
 * Same design tokens as the suite — wide two-column shell.
 * ============================================================ */

:root {
  color-scheme: dark;
  --bg: #080808; --bg-elevated: #111111;
  --surface: rgba(255,255,255,0.028); --surface-2: rgba(255,255,255,0.055);
  --fg: #F3F2F8; --muted: rgba(243,242,248,0.50); --muted-strong: rgba(243,242,248,0.74);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.17);
  --brand: #00FF88; --brand-2: #00CC6A; --brand-ink: #000000;
  --brand-soft: rgba(0,255,136,0.09); --brand-line: rgba(0,255,136,0.22); --brand-glow: rgba(0,255,136,0.30);
  --pos: #46E0A8; --pos-soft: rgba(70,224,168,0.12); --pos-line: rgba(70,224,168,0.26);
  --neg: #FB7185; --neg-soft: rgba(251,113,133,0.12); --neg-line: rgba(251,113,133,0.26);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.10); --warn-line: rgba(251,191,36,0.26);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 18px 44px -30px rgba(0,0,0,0.85);
  --glow-1: rgba(0,255,136,0.09); --glow-2: rgba(70,224,168,0.05);
  --grain-opacity: 0.05;
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm: 8px; --radius-md: 11px; --radius-lg: 18px; --radius-xl: 24px; --radius-pill: 999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem; --text-4xl:3.25rem;
  --ease: cubic-bezier(0.2,0.8,0.2,1); --ease-premium: cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono'; --font-sans:'Hanken Grotesk';
  --sidebar-w: 320px;
  --suiteBar-h: 52px;
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #080913; --bg-elevated: #12131F;
  --surface: rgba(150,160,255,0.045); --surface-2: rgba(150,160,255,0.08);
  --fg: #EEF0FF; --muted: rgba(220,225,255,0.52); --muted-strong: rgba(220,225,255,0.76);
  --border: rgba(150,160,255,0.11); --border-strong: rgba(150,160,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.32); --brand-glow: rgba(124,107,255,0.6);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.20); --glow-2: rgba(79,227,208,0.13);
  --grain-opacity: 0.05;
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F3F2FA; --bg-elevated: #FFFFFF;
  --surface: #FFFFFF; --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base); -webkit-font-smoothing: antialiased;
  transition: background var(--duration) var(--ease);
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 48px 48px;
}
[data-theme="daylight"] body::before {
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
}

/* ── Suite top bar ── */
#suiteBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--suiteBar-h);
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px;
  background: rgba(8,8,8,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}
[data-theme="daylight"] #suiteBar { background: rgba(242,241,250,0.94); }
[data-theme="aurora"] #suiteBar { background: rgba(6,8,18,0.94); }
.stLogo { display: flex; align-items: center; gap: 9px; text-decoration: none; color: var(--fg); }
.stLogoIcon {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px var(--brand-glow);
}
.stLogoName { font-family: var(--font-display), sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
.stSpacer { flex: 1; }
.stBack {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px 6px 10px; border-radius: var(--radius-pill);
  background: var(--brand-soft); border: 1px solid var(--brand-line);
  color: var(--brand); font-family: var(--font-ui), sans-serif; font-size: 12px; font-weight: 600;
  text-decoration: none; transition: background var(--duration) var(--ease);
}
.stBack:hover { background: color-mix(in srgb, var(--brand) 18%, transparent); }

/* ── Shell below bar ── */
#shell {
  position: fixed;
  top: var(--suiteBar-h); left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
}

/* ── Sidebar ── */
#sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg-elevated);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  position: relative;
}
#sidebar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(70% 45% at 50% 0%, var(--glow-1), transparent 80%);
}

.sideHead {
  padding: var(--space-8) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 1;
}
.pageTitle {
  font-family: var(--font-display), sans-serif;
  font-weight: 700; font-size: var(--text-2xl); letter-spacing: -0.03em;
  color: var(--fg); line-height: 1;
}
.pageSub {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.18em; color: var(--muted); margin-top: var(--space-2);
}

/* ── Recovery ring panel ── */
.ringPanel {
  padding: var(--space-6) var(--space-6) var(--space-5);
  display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
  position: relative; z-index: 1;
  border-bottom: 1px solid var(--border);
}
.recoveryRing {
  position: relative;
  width: 200px; height: 200px;
  display: grid; place-items: center;
}
.ringSvg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
.ringTrack { fill: none; stroke: var(--track); stroke-width: 9; }
.ringFill {
  fill: none; stroke: currentColor; stroke-width: 9; stroke-linecap: round;
  transition: stroke-dashoffset 800ms var(--ease-premium);
  filter: drop-shadow(0 0 14px currentColor);
}
.recoveryRing[data-tone="good"]  .ringFill { color: var(--pos); }
.recoveryRing[data-tone="watch"] .ringFill { color: var(--warn); }
.recoveryRing[data-tone="low"]   .ringFill { color: var(--neg); }
.recoveryRing[data-tone="muted"] .ringFill { color: var(--muted); }
.ringInner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.ringVal {
  font-family: var(--font-display), sans-serif;
  font-weight: 700; font-size: 3.75rem; line-height: 1;
  letter-spacing: -0.04em; color: var(--fg); font-variant-numeric: tabular-nums;
}
.ringUnit { font-family: var(--font-display), sans-serif; font-weight: 500; font-size: var(--text-xl); color: var(--muted-strong); }
.ringLabel {
  margin-top: var(--space-2); font-family: var(--font-mono);
  font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-strong);
}
.ringTier {
  font-family: var(--font-display), sans-serif;
  font-weight: 600; font-size: var(--text-base); letter-spacing: -0.01em; color: var(--fg);
  margin-top: 2px;
}

/* Source / status chip */
.statusChip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: var(--radius-pill);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted-strong);
}
.statusChip.live { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); }
.statusChip.warn-chip { border-color: var(--warn-line); background: var(--warn-soft); color: var(--warn); }
.chipDot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: currentColor; box-shadow: 0 0 6px currentColor;
  animation: chipPulse 1.8s ease-in-out infinite;
}
@keyframes chipPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ── Source selector ── */
.srcSection { padding: var(--space-4) var(--space-6); border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.srcLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-3); }
.srcPills { display: flex; flex-direction: column; gap: var(--space-2); }
.srcPill {
  appearance: none; background: transparent; border: 1px solid var(--border);
  color: var(--muted-strong); font-family: var(--font-ui), sans-serif; font-size: var(--text-sm); font-weight: 600;
  padding: 9px var(--space-4); border-radius: var(--radius-md); cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: var(--space-3);
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
}
.srcPill:hover { border-color: var(--border-strong); background: var(--surface); color: var(--fg); }
.srcPill.active { border-color: var(--brand-line); background: var(--brand-soft); color: var(--fg); }
.srcPillIcon { width: 20px; height: 20px; display: grid; place-items: center; flex-shrink: 0; }

/* ── Sidebar actions ── */
.sideActions { padding: var(--space-4) var(--space-6); display: flex; flex-direction: column; gap: var(--space-3); position: relative; z-index: 1; }

/* ── Theme switcher ── */
.themeSection { padding: var(--space-4) var(--space-6); border-top: 1px solid var(--border); margin-top: auto; position: relative; z-index: 1; }
.themeLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--space-3); }
.themePills { display: flex; gap: var(--space-2); }
.themeBtn {
  appearance: none; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: var(--font-ui), sans-serif; font-size: 11px; font-weight: 600;
  padding: 6px 11px 6px 8px; border-radius: var(--radius-pill); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background var(--duration) var(--ease), color var(--duration) var(--ease), border-color var(--duration) var(--ease);
}
.themeBtn:hover { color: var(--muted-strong); }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); border-color: var(--brand-line); }
.themeSwatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }

/* ── Main content ── */
#main {
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  background: var(--bg);
  position: relative;
}
#main::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(55% 40% at 80% 8%, var(--glow-1), transparent 70%),
              radial-gradient(45% 35% at 15% 88%, var(--glow-2), transparent 72%);
}
#mainInner { position: relative; z-index: 1; padding: var(--space-8); display: flex; flex-direction: column; gap: var(--space-6); flex: 1; }

/* ── Ticker ── */
.ticker {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) var(--space-4); border: 1px solid var(--brand-line);
  border-radius: var(--radius-pill); background: var(--brand-soft);
  overflow: hidden; flex-shrink: 0;
}
.tickerEyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--brand); white-space: nowrap;
  padding-right: var(--space-3); border-right: 1px solid var(--border); flex-shrink: 0;
}
.tickerPulse { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-glow); animation: chipPulse 1.6s ease-in-out infinite; }
.tickerScroll {
  flex: 1; overflow: hidden; position: relative; min-width: 0;
  mask-image: linear-gradient(90deg, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
}
.tickerTrack { display: inline-flex; align-items: center; gap: var(--space-8); animation: tickerScroll 42s linear infinite; white-space: nowrap; padding-left: var(--space-4); will-change: transform; }
@keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.tickerCell { display: inline-flex; align-items: center; gap: var(--space-2); font-variant-numeric: tabular-nums; white-space: nowrap; padding: 2px 8px; border-radius: var(--radius-sm); }
.tickerCell[data-tone="good"]   { color: var(--pos); }
.tickerCell[data-tone="watch"]  { color: var(--warn); }
.tickerCell[data-tone="urgent"] { color: var(--neg); animation: tickerUrgent 1.8s ease-in-out infinite; }
.tickerSymbol { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-strong); }
.tickerValue  { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--fg); padding: 1px 4px; border-radius: 3px; display: inline-flex; align-items: baseline; gap: 2px; }
.tickerUnit   { font-size: 9px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
.tickerSpark  { width: 52px; height: 14px; flex-shrink: 0; color: var(--pos); filter: drop-shadow(0 0 2px currentColor); }
.tickerSpark[data-tone="watch"]  { color: var(--warn); }
.tickerSpark[data-tone="urgent"] { color: var(--neg); filter: drop-shadow(0 0 3px currentColor); }
.tickerDelta  { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
@keyframes tickerUrgent { 0%,100%{opacity:1} 50%{opacity:.5} }
.ticker:hover .tickerTrack { animation-play-state: paused; }
@media (prefers-reduced-motion:reduce) { .tickerTrack,.tickerPulse,.chipDot { animation: none !important; } }

/* ── Trend card ── */
.trendCard {
  padding: var(--space-6); border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);
  display: flex; flex-direction: column; gap: var(--space-4);
  transition: border-color var(--duration) var(--ease);
}
.trendCard:hover { border-color: var(--border-strong); }
.trendHead { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4); }
.cardTitle { font-family: var(--font-display), sans-serif; font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.02em; color: var(--fg); }
.trendDelta { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
.trendUp { color: var(--pos); }
.trendDown { color: var(--warn); }
.trendSvg { width: 100%; height: 80px; overflow: visible; }
.trendLine { fill: none; stroke: var(--brand); stroke-width: 1.8; stroke-linejoin: round; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--brand-glow)); }
.trendArea { stroke: none; }
.trendDot { fill: var(--brand); opacity: 0.4; }
.trendDotLast { fill: var(--brand); filter: drop-shadow(0 0 6px var(--brand)); }

/* ── Stat grid ── */
.statGrid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: var(--space-4); }
.statCard {
  padding: var(--space-5); border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);
  display: flex; flex-direction: column; gap: var(--space-2);
  transition: border-color var(--duration) var(--ease), background var(--duration) var(--ease), transform var(--duration) var(--ease);
  cursor: default;
}
.statCard:hover { border-color: var(--border-strong); background: var(--surface-2); transform: translateY(-2px); }
.statLabel { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-strong); }
.statValueRow { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; }
.statValue { font-family: var(--font-display), sans-serif; font-weight: 700; font-size: var(--text-4xl); line-height: 1; letter-spacing: -0.04em; color: var(--fg); font-variant-numeric: tabular-nums; }
.statUnit  { font-family: var(--font-display), sans-serif; font-weight: 500; font-size: var(--text-lg); color: var(--muted-strong); }
.statSub   { font-size: var(--text-xs); color: var(--muted); letter-spacing: 0.02em; }
.statBadge {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600; font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em; padding: 3px 9px; border-radius: var(--radius-pill); align-self: flex-start;
  border: 1px solid var(--border); background: var(--surface-2);
}
.statBadge[data-tone="good"]    { color: var(--pos); border-color: var(--pos-line); }
.statBadge[data-tone="watch"]   { color: var(--warn); border-color: var(--warn-line); }
.statBadge[data-tone="low"]     { color: var(--neg); border-color: var(--neg-line); }
.statBadge[data-tone="neutral"] { color: var(--muted-strong); }

/* ── Bottom row: Sleep debt + Coach ── */
.bottomRow { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

/* Sleep debt */
.debtCard {
  padding: var(--space-5); border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);
  display: flex; flex-direction: column; gap: var(--space-4);
  transition: border-color var(--duration) var(--ease);
}
.debtCard:hover { border-color: var(--border-strong); }
.cardHead { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); }
.debtTotal { font-family: var(--font-display), sans-serif; font-weight: 600; font-size: var(--text-lg); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.debtTotal em { font-family: var(--font-mono); font-style: normal; font-size: var(--text-xs); letter-spacing: 0.06em; color: var(--muted); margin-left: 6px; }
.debtTotal[data-tone="watch"] { color: var(--neg); }
.debtTotal[data-tone="good"]  { color: var(--pos); }
.debtBars { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: var(--space-2); flex: 1; }

.debtTrack { position: relative; width: 100%; height: 80px; display: flex; align-items: center; }

.debtBarSurplus { bottom: 50%; background: linear-gradient(180deg, var(--pos) 0%, var(--pos-soft) 100%); box-shadow: 0 0 8px -2px var(--pos-line); }

.debtLegend { display: flex; align-items: center; gap: var(--space-4); font-family: var(--font-mono); font-size: 10px; color: var(--muted-strong); letter-spacing: 0.06em; }
.legendDot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.legendDot[data-tone="good"] { background: var(--pos); box-shadow: 0 0 6px var(--pos-line); }
.legendDot[data-tone="watch"] { background: var(--warn); }
.legendDot[data-tone="low"]  { background: var(--neg); }

/* Coach */
.coachCard {
  padding: var(--space-5); border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--card-shadow);

}

.coachList { list-style: none; display: flex; flex-direction: column; gap: var(--space-4); }
.coachList li {
  display: grid; grid-template-columns: auto 1fr; gap: var(--space-3); align-items: flex-start;
  padding-left: var(--space-3); border-left: 1px solid var(--border);
  transition: border-color var(--duration) var(--ease);
}
.coachList li:hover { border-left-color: var(--brand); }
.coachMark { color: var(--brand); font-size: var(--text-lg); line-height: 1.2; filter: drop-shadow(0 0 5px var(--brand-glow)); }
.coachList strong { display: block; font-weight: 700; color: var(--fg); margin-bottom: 3px; font-size: var(--text-sm); line-height: 1.4; }
.coachList li span:not(.coachMark) { color: var(--muted-strong); font-size: var(--text-sm); line-height: 1.55; }

/* ── Shared button ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: 0.625rem var(--space-4); border-radius: var(--radius-md);
  font-size: var(--text-sm); font-family: var(--font-ui), sans-serif; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--fg);
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease), transform var(--duration-fast) var(--ease), box-shadow var(--duration) var(--ease);
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--brand); color: var(--brand-ink); font-weight: 700; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 24px var(--brand-glow); }
.btn-primary:active:not(:disabled) { transform: translateY(1px); }

.btn-ghost:hover:not(:disabled) { border-color: var(--border-strong); background: var(--surface); }
.btn-link  { color: var(--muted-strong); padding: var(--space-2) var(--space-3); }

/* ── Connect panel ── */
.connectPanel {
  display: flex; flex-direction: column; gap: var(--space-5);
  max-width: 680px; margin: 0 auto; width: 100%;
  padding: var(--space-8); border: 1px solid var(--border); border-radius: var(--radius-xl);
  background: var(--surface); box-shadow: var(--card-shadow);
}
.connectIntro { font-size: var(--text-lg); line-height: 1.5; color: var(--fg); }
.connectIntro em { font-style: normal; color: var(--brand); font-weight: 700; }
.connectSub { font-size: var(--text-sm); color: var(--muted); letter-spacing: 0.02em; line-height: 1.55; }
.setupNote {
  padding: var(--space-3) var(--space-4); border-left: 2px solid var(--warn-line);
  background: var(--warn-soft); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: var(--text-xs); line-height: 1.55; color: var(--muted-strong);
}
.setupNote strong { color: var(--warn); font-weight: 600; }

/* Apple / Manual form */
.fieldGrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.field { display: flex; flex-direction: column; gap: 6px; }
.fieldFull { grid-column: 1 / -1; }
.fieldLabel { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-strong); }
.fieldInput {
  width: 100%; padding: 0.625rem 0.75rem;
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md);
  color: var(--fg); font-family: var(--font-ui), sans-serif; font-size: var(--text-base);
  transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
}
.fieldInput:focus { outline: none; border-color: var(--brand-line); box-shadow: 0 0 0 3px var(--brand-soft); }
.formActions { display: flex; align-items: center; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-2); }

/* ── Chips ── */
.appleChip { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border: 1px solid var(--brand-line); border-radius: var(--radius-pill); background: var(--brand-soft); color: var(--brand); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.sampleChip { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border: 1px dashed var(--warn-line); border-radius: var(--radius-pill); background: var(--warn-soft); color: var(--warn); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }

/* ── Sidebar footer / sync row ── */
.syncRow { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

/* ── Connect-here notice (shown in main when sidebar is on connect mode) ── */
.connectNotice { display: flex; align-items: center; justify-content: center; flex: 1; }

/* ── Responsive fallback: narrow browsers get vertical layout ── */
@media (max-width: 900px) {
  body { overflow: auto; }
  #shell { display: block; }
  #sidebar {
    position: static; border-right: none; border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  #main { overflow: visible; }
  .statGrid { grid-template-columns: repeat(2, 1fr); }
  .bottomRow { grid-template-columns: 1fr; }
}

</style>

<script>
/* ================================================================
 * SAMPLE DATA
 * ================================================================ */
const SLEEP_TARGET = 8;
const SAMPLE = {
  date: 'today',
  recovery: 92,
  hrv: 218,
  rhr: 32,
  sleepPerf: 85,
  sleepHours: 7 + 40 / 60,
  strain: 4.0,
  hrvBaseline: null, rhrBaseline: null, sleepPerfBaseline: null,
  strainWeeklyAvg: 7.8,
  hrvAnomalous: true,
  recoveryTrend: [78, 92],
  sleepDebt7d: [
    { day: 'Sun', hours: 6.7 },
    { day: 'Tue', hours: 7 + 40 / 60 },
  ],
  sleepTargetHours: SLEEP_TARGET,
  vitalityScore: 73, vitalityTier: 'Solid',
  lastSyncedMinutes: 12,
  daysAvailable: 2,
};

/* ================================================================
 * HELPERS
 * ================================================================ */
function recoveryTone(r) {
  if (r == null) return 'muted';
  if (r >= 67) return 'good';
  if (r >= 34) return 'watch';
  return 'low';
}
function formatHM(h) {
  if (h == null) return '—';
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + 'h ' + String(mm).padStart(2, '0') + 'm';
}
function formatDebt(minutes) {
  const sign = minutes < 0 ? '-' : '+', abs = Math.abs(minutes);
  return sign + Math.floor(abs / 60) + 'h ' + String(abs % 60).padStart(2, '0') + 'm';
}
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function buildItems(d) {
  const items = [];
  if (d.recovery != null) {
    const trend = d.recoveryTrend.length >= 2 ? d.recoveryTrend : [d.recovery, d.recovery];
    const prior = trend.length > 1 ? trend.slice(0,-1).reduce((a,b)=>a+b,0)/(trend.length-1) : d.recovery;
    const delta = Math.round(d.recovery - prior);
    const tone = d.recovery >= 67 ? 'good' : d.recovery >= 34 ? 'watch' : 'urgent';
    items.push({ symbol:'REC', value:String(Math.round(d.recovery)), unit:'%', spark:trend, delta, deltaUnit:'%', tone });
  }
  if (d.hrv != null) {
    const baseline = d.hrvBaseline != null ? d.hrvBaseline : d.hrv;
    const delta = (d.hrvBaseline != null && !d.hrvAnomalous) ? Math.round(d.hrv - d.hrvBaseline) : null;
    const tone = d.hrvAnomalous ? 'urgent' : delta == null ? 'watch' : delta >= -2 ? 'good' : delta >= -8 ? 'watch' : 'urgent';
    items.push({ symbol:'HRV', value:String(Math.round(d.hrv)), unit:'ms', spark:[baseline, d.hrv], delta, deltaUnit:'ms', tone });
  }
  if (d.rhr != null) {
    const baseline = d.rhrBaseline != null ? d.rhrBaseline : d.rhr;
    const delta = d.rhrBaseline != null ? Math.round(d.rhr - d.rhrBaseline) : null;
    const tone = delta == null ? 'watch' : delta <= 0 ? 'good' : delta <= 3 ? 'watch' : 'urgent';
    items.push({ symbol:'RHR', value:String(Math.round(d.rhr)), unit:'bpm', spark:[baseline, d.rhr], delta, deltaUnit:'bpm', inverse:true, tone });
  }
  if (d.sleepHours != null) {
    const spark = d.sleepDebt7d.length >= 2 ? d.sleepDebt7d.map(n=>n.hours) : [d.sleepTargetHours, d.sleepHours];
    const delta = Math.round((d.sleepHours - d.sleepTargetHours) * 10) / 10;
    const tone = d.sleepHours >= d.sleepTargetHours - 0.5 ? 'good' : d.sleepHours >= d.sleepTargetHours - 1.5 ? 'watch' : 'urgent';
    const h = Math.floor(d.sleepHours), m = Math.round((d.sleepHours - h) * 60);
    items.push({ symbol:'SLP', value:h+'h'+String(m).padStart(2,'0'), unit:'', spark, delta, deltaUnit:'h', tone });
  }
  if (d.strain != null) {
    const baseline = d.strainWeeklyAvg != null ? d.strainWeeklyAvg : d.strain;
    const delta = d.strainWeeklyAvg != null ? Math.round((d.strain - d.strainWeeklyAvg)*10)/10 : null;
    const tone = delta != null && delta > 2 ? 'watch' : 'good';
    items.push({ symbol:'STR', value:d.strain.toFixed(1), unit:'', spark:[baseline, d.strain], delta, deltaUnit:'', tone });
  }
  if (d.sleepDebt7d.length > 0) {
    const debtH = d.sleepDebt7d.reduce((a,n) => a+(n.hours-d.sleepTargetHours), 0);
    const debtRounded = Math.round(debtH*10)/10;
    const tone = debtH > -1 ? 'good' : debtH > -3 ? 'watch' : 'urgent';
    items.push({ symbol:'DBT', value:(debtH>=0?'+':'')+debtRounded.toFixed(1), unit:'h', spark:d.sleepDebt7d.map(n=>n.hours-d.sleepTargetHours), delta:null, deltaUnit:'', tone });
  }
  return items;
}
function sparkSvg(values, tone) {
  if (values.length < 2) return '';
  const W=52, H=14, pad=1.5;
  const min = Math.min(...values), max = Math.max(...values);
  const range = Math.max(0.0001, max - min);
  const stepX = (W - pad*2) / (values.length - 1);
  const pts = values.map((v,i) => (pad+i*stepX).toFixed(1)+','+(H-pad-((v-min)/range)*(H-pad*2)).toFixed(1)).join(' ');
  const last = values[values.length-1];
  const lastX = pad + (values.length-1)*stepX;
  const lastY = H-pad-((last-min)/range)*(H-pad*2);
  return '<svg viewBox="0 0 '+W+' '+H+'" class="tickerSpark" aria-hidden data-tone="'+tone+'">'
    +'<polyline points="'+pts+'" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" />'
    +'<circle cx="'+lastX.toFixed(1)+'" cy="'+lastY.toFixed(1)+'" r="1.6" fill="currentColor" /></svg>';
}

/* ================================================================
 * LIVE DATA / STATE
 * ================================================================ */
const LS_KEY = 'whoop_standalone_connected_v1';
const HEALTH_KEY = 'patron_health_v1';
const WHOOP_SHARE_KEY = 'patron_whoop_data_v1';
const ON_SERVER = location.protocol === 'http:' || location.protocol === 'https:';

let liveData = null, liveConnected = false;
let fitbitData = null, fitbitConnected = false;
let appleData = null, editingApple = false;
let connected = false;
let syncing = false;
let connectSource = 'whoop';
let activeKind = null;

try { connected = localStorage.getItem(LS_KEY) === '1'; } catch {}

function loadApple() {
  try { const c = JSON.parse(localStorage.getItem(HEALTH_KEY)||'null'); if (c && c.source === 'apple') appleData = c; } catch {}
}
function clearApple() {
  appleData = null;
  try { const c = JSON.parse(localStorage.getItem(HEALTH_KEY)||'null'); if (c && c.source==='apple') localStorage.removeItem(HEALTH_KEY); } catch {}
}
function publishWhoopData(d) {
  const snap = { source:'whoop', connected:true, ts:Date.now(), recovery:d.recovery, hrv:d.hrv, rhr:d.rhr, sleepPerf:d.sleepPerf, sleepHours:d.sleepHours, sleepTargetHours:d.sleepTargetHours, strain:d.strain, vitalityScore:d.vitalityScore };
  try { localStorage.setItem(WHOOP_SHARE_KEY, JSON.stringify(snap)); } catch {}
  try { localStorage.setItem(HEALTH_KEY, JSON.stringify(snap)); } catch {}
}
function publishFitbitData(d) {
  const snap = { source:'fitbit', connected:true, ts:Date.now(), recovery:d.recovery, hrv:d.hrv, rhr:d.rhr, sleepPerf:d.sleepPerf, sleepHours:d.sleepHours, sleepTargetHours:d.sleepTargetHours, strain:d.strain, bedtime:d.bedtime, wakeTime:d.wakeTime, vitalityScore:d.vitalityScore };
  try { localStorage.setItem(HEALTH_KEY, JSON.stringify(snap)); } catch {}
}
function clearWhoopData() {
  try { localStorage.removeItem(WHOOP_SHARE_KEY); } catch {}
  try { const c = JSON.parse(localStorage.getItem(HEALTH_KEY)||'null'); if (c && c.source==='whoop') localStorage.removeItem(HEALTH_KEY); } catch {}
}
function clearFitbitData() {
  try { const c = JSON.parse(localStorage.getItem(HEALTH_KEY)||'null'); if (c && c.source==='fitbit') localStorage.removeItem(HEALTH_KEY); } catch {}
}
function buildLiveData(j) {
  const trend = Array.isArray(j.recoveryTrend) && j.recoveryTrend.length ? j.recoveryTrend : (j.recovery != null ? [j.recovery] : []);
  return {
    date:'today', recovery:j.recovery, hrv:j.hrv, rhr:j.rhr,
    sleepPerf:j.sleepPerf, sleepHours:j.sleepHours, strain:j.strain,
    hrvBaseline:null, rhrBaseline:null, sleepPerfBaseline:null,
    strainWeeklyAvg:j.strainWeeklyAvg||null, hrvAnomalous:false,
    recoveryTrend:trend, sleepDebt7d:Array.isArray(j.sleepDebt7d)?j.sleepDebt7d:[],
    sleepTargetHours:j.sleepTargetHours||8, vitalityScore:null, vitalityTier:'',
    lastSyncedMinutes:0, daysAvailable:trend.length,
  };
}
async function syncWhoopLive() {
  if (!ON_SERVER) return;
  syncing = true; render();
  try {
    const r = await fetch('/api/whoop/data',{cache:'no-store'}), j = await r.json();
    if (j && j.connected) { liveData = buildLiveData(j); liveConnected = true; }
    else { liveData = null; liveConnected = false; }
  } catch { liveData = null; liveConnected = false; }
  syncing = false; render();
}
async function syncFitbitLive() {
  if (!ON_SERVER) return;
  syncing = true; render();
  try {
    const r = await fetch('/api/fitbit/data',{cache:'no-store'}), j = await r.json();
    if (j && j.connected) { fitbitData = buildLiveData(j); fitbitData.bedtime=j.bedtime; fitbitData.wakeTime=j.wakeTime; fitbitConnected = true; }
    else { fitbitData = null; fitbitConnected = false; }
  } catch { fitbitData = null; fitbitConnected = false; }
  syncing = false; render();
}
function saveAppleEntry() {
  const num = id => { const el = document.getElementById(id); if (!el || el.value==='') return null; const n = Number(el.value); return isFinite(n)?n:null; };
  const recovery=num('a-rec'),sleepHours=num('a-sleep'),hrv=num('a-hrv'),rhr=num('a-rhr'),strain=num('a-strain'),target=num('a-target')||8;
  if (recovery==null && sleepHours==null && hrv==null && rhr==null && strain==null) { alert('Enter at least one reading.'); return; }
  const sleepPerf = sleepHours!=null ? Math.round(Math.min(100,(sleepHours/target)*100)) : null;
  const snap = { source:'apple', connected:true, ts:Date.now(), recovery, hrv, rhr, sleepPerf, sleepHours, sleepTargetHours:target, strain, vitalityScore:null };
  appleData = snap;
  try { localStorage.setItem(HEALTH_KEY, JSON.stringify(snap)); } catch {}
  editingApple = false; render();
}

/* ================================================================
 * THEMES
 * ================================================================ */
const THEMES = [
  { key:'nocturne', label:'Nocturne', swatch:'#00FF88' },
  { key:'aurora',   label:'Aurora',   swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key:'daylight', label:'Daylight', swatch:'#6A45FF' },
];
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme')||'aurora'; } catch { return 'aurora'; } })();
if (!THEMES.some(t=>t.key===currentTheme)) currentTheme = 'aurora';
function applyTheme(name) {
  if (!THEMES.some(t=>t.key===name)) name = 'aurora';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  try { localStorage.setItem('patron_theme', name); } catch {}
  renderThemePills();
}

/* ================================================================
 * RENDER — split into sidebar sections + main content
 * ================================================================ */

function renderThemePills() {
  document.getElementById('themePills').innerHTML = THEMES.map(t =>
    '<button type="button" class="themeBtn '+(t.key===currentTheme?'themeBtnActive':'')+'" data-action="theme" data-theme="'+t.key+'">'
    +'<span class="themeSwatch" style="background:'+t.swatch+'"></span>'+t.label+'</button>'
  ).join('');
}

function renderRingPanel(d) {
  const panel = document.getElementById('ringPanel');
  if (!d) {
    panel.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:var(--space-4)">Connect a source to see recovery.</div>';
    return;
  }
  const tone = recoveryTone(d.recovery);
  const r = d.recovery;
  const circ = 2 * Math.PI * 88;
  const recoveryTier = r!=null ? (r>=67?'Recovered':r>=34?'Building':'Drained') : '—';
  panel.innerHTML =
    '<div class="recoveryRing" data-tone="'+tone+'">'
    + '<svg viewBox="0 0 200 200" class="ringSvg" aria-hidden>'
    +   '<circle cx="100" cy="100" r="88" class="ringTrack"/>'
    +   (r!=null ? '<circle cx="100" cy="100" r="88" class="ringFill" style="stroke-dasharray:'+circ+';stroke-dashoffset:'+(circ*(1-r/100))+';" />' : '')
    + '</svg>'
    + '<div class="ringInner">'
    +   '<div class="ringVal">'+(r!=null?Math.round(r):'—')+'</div>'
    +   '<div class="ringUnit">'+(r!=null?'%':'')+'</div>'
    +   '<div class="ringLabel">Recovery</div>'
    +   '<div class="ringTier">'+recoveryTier+'</div>'
    + '</div></div>';
}

function renderSrcPills() {
  const srcs = [
    { key:'whoop', icon: whoopSvg(), label:'Whoop' },
    { key:'fitbit', icon: fitbitSvg(), label:'Fitbit' },
    { key:'apple', icon: appleSvg(), label:'Apple Health' },
  ];
  document.getElementById('srcPills').innerHTML = srcs.map(s =>
    '<button type="button" class="srcPill '+(connectSource===s.key?'active':'')+'" data-action="src-tab" data-src="'+s.key+'">'
    +'<span class="srcPillIcon">'+s.icon+'</span>'+s.label+'</button>'
  ).join('');
}

function renderSideActions(d, kind) {
  const el = document.getElementById('sideActions');
  if (!d) {
    el.innerHTML = '';
    return;
  }
  let html = '';
  if (kind === 'apple') {
    html = '<span class="appleChip"><span class="chipDot"></span>Apple Watch · Manual</span>'
      + '<button type="button" class="btn btn-ghost btn-full" data-action="edit-apple">Edit readings</button>'
      + '<button type="button" class="btn btn-link btn-full" data-action="remove-apple">Remove</button>';
  } else if (kind === 'sample') {
    html = '<span class="sampleChip"><span class="chipDot"></span>Sample data · preview</span>'
      + '<button type="button" class="btn btn-link btn-full" data-action="disconnect">Disconnect preview</button>';
  } else {
    const srcLabel = kind === 'fitbit-live' ? 'Fitbit · Live' : 'Whoop · Live';
    html = '<span class="appleChip"><span class="chipDot"></span>'+srcLabel+'</span>'
      + '<div class="syncRow"><span>'+(d.lastSyncedMinutes!=null?'synced '+d.lastSyncedMinutes+'m ago':'—')+'</span>'
      + '<button type="button" class="btn btn-ghost" data-action="sync"'+(syncing?' disabled':'')+'>'+(syncing?'syncing…':'Sync')+'</button></div>'
      + '<button type="button" class="btn btn-link btn-full" data-action="disconnect">Disconnect</button>';
  }
  el.innerHTML = html;
}

/* ── Source icons (simple SVG) ── */
function whoopSvg() {
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="6"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/></svg>';
}
function fitbitSvg() {
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
}
function appleSvg() {
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10z"/><path d="M12 8v4l3 3"/></svg>';
}

/* ── Main content sections ── */
function tickerHtml(d) {
  const items = buildItems(d);
  if (!items.length) return '';
  const rolled = items.concat(items);
  const cells = rolled.map(item => {
    const arrow = item.delta==null?'':item.inverse?(item.delta<=0?'↗':'↘'):(item.delta>=0?'↗':'↘');
    const deltaText = item.delta==null?'':(item.delta>=0?'+':'')+item.delta+item.deltaUnit;
    return '<span class="tickerCell" data-tone="'+item.tone+'">'
      +'<span class="tickerSymbol">'+item.symbol+'</span>'
      +'<span class="tickerValue">'+esc(item.value)+(item.unit?'<span class="tickerUnit">'+item.unit+'</span>':'')+'</span>'
      +sparkSvg(item.spark, item.tone)
      +(deltaText?'<span class="tickerDelta">'+arrow+' '+deltaText+'</span>':'')
      +'</span>';
  }).join('');
  return '<div class="ticker" role="status" aria-label="Live insights">'
    +'<div class="tickerEyebrow"><span class="tickerPulse" aria-hidden></span>Luca · Live</div>'
    +'<div class="tickerScroll"><div class="tickerTrack">'+cells+'</div></div></div>';
}

function trendHtml(d) {
  const trend = d.recoveryTrend;
  const hasTrend = trend.length >= 2;
  const W=600, H=80, pad=4;
  const trendDelta = hasTrend ? trend[trend.length-1] - trend[0] : 0;
  const min = hasTrend ? Math.min(...trend) : 0;
  const max = hasTrend ? Math.max(...trend) : 100;
  const range = Math.max(1, max - min);
  const stepX = hasTrend ? (W-pad*2)/(trend.length-1) : 0;
  const pts = trend.map((v,i) => (pad+i*stepX).toFixed(1)+','+(H-pad-((v-min)/range)*(H-pad*2-4)).toFixed(1)).join(' ');
  let dots = '';
  trend.forEach((v,i) => {
    const x = pad+i*stepX, y = H-pad-((v-min)/range)*(H-pad*2-4);
    const last = i===trend.length-1;
    dots += '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(last?3.5:2)+'" class="'+(last?'trendDotLast':'trendDot')+'" />';
  });
  const svgContent = hasTrend
    ? '<svg viewBox="0 0 '+W+' '+H+'" class="trendSvg" preserveAspectRatio="none" aria-hidden>'
      +'<defs><linearGradient id="tFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--brand)" stop-opacity="0.28"/><stop offset="100%" stop-color="var(--brand)" stop-opacity="0"/></linearGradient></defs>'
      +'<polyline class="trendArea" points="'+(pad+','+H+' '+pts+' '+(pad+(trend.length-1)*stepX)+','+H)+'" fill="url(#tFill)"/>'
      +'<polyline class="trendLine" points="'+pts+'"/>'+dots+'</svg>'
    : '<div style="color:var(--muted);font-size:var(--text-sm);padding:var(--space-4) 0">Need a few more days of data for the trend.</div>';
  return '<div class="trendCard">'
    +'<div class="trendHead"><span class="cardTitle">'+trend.length+'-day recovery trend</span>'
    +(hasTrend?'<span class="trendDelta '+(trendDelta>=0?'trendUp':'trendDown')+'">'+(trendDelta>=0?'↑':'↓')+' '+Math.abs(Math.round(trendDelta))+'%</span>':'')
    +'</div>'+svgContent+'</div>';
}

function statGridHtml(d) {
  function statCard(label, val, unit, sub, badge, badgeTone) {
    return '<div class="statCard">'
      +'<div class="statLabel">'+label+'</div>'
      +'<div class="statValueRow"><span class="statValue">'+esc(val)+'</span>'+(unit?'<span class="statUnit">'+unit+'</span>':'')+'</div>'
      +'<div class="statSub">'+esc(sub)+'</div>'
      +(badge?'<div class="statBadge" data-tone="'+badgeTone+'">'+esc(badge)+'</div>':'')
      +'</div>';
  }
  const hrvDelta = (d.hrv!=null && d.hrvBaseline!=null) ? Math.round(d.hrv - d.hrvBaseline) : null;
  const rhrDelta = (d.rhr!=null && d.rhrBaseline!=null) ? Math.round(d.rhr - d.rhrBaseline) : null;
  const sleepDelta = (d.sleepPerf!=null && d.sleepPerfBaseline!=null) ? Math.round((d.sleepPerf - d.sleepPerfBaseline)*10)/10 : null;
  return '<div class="statGrid">'
    + statCard('Sleep', formatHM(d.sleepHours), '', d.sleepPerf!=null?Math.round(d.sleepPerf)+'% efficiency':'—',
        sleepDelta!=null?(sleepDelta>=0?'↗ +'+sleepDelta+'%':'↘ '+sleepDelta+'%'):null,
        sleepDelta!=null&&sleepDelta>=0?'good':'watch')
    + statCard('Strain', d.strain!=null?d.strain.toFixed(1):'—', '', 'today',
        d.strainWeeklyAvg!=null?'wk avg '+d.strainWeeklyAvg.toFixed(1):null,
        (d.strainWeeklyAvg!=null && d.strain!=null && d.strain>d.strainWeeklyAvg+1)?'watch':'neutral')
    + statCard('HRV', d.hrv!=null?String(Math.round(d.hrv)):'—', 'ms', d.hrvAnomalous?'reading flagged':'rmssd',
        hrvDelta!=null?(hrvDelta>=0?'↑ +'+hrvDelta+' ms':'↓ '+hrvDelta+' ms'):null,
        hrvDelta!=null&&hrvDelta>=0?'good':'watch')
    + statCard('RHR', d.rhr!=null?String(Math.round(d.rhr)):'—', 'bpm', 'resting',
        rhrDelta!=null?(rhrDelta<=0?'↓ '+rhrDelta+' bpm':'↑ +'+rhrDelta+' bpm'):null,
        rhrDelta!=null&&rhrDelta<=0?'good':'watch')
    +'</div>';
}

function sleepDebtHtml(d) {
  if (!d.sleepDebt7d.length) return '';
  const nights = d.sleepDebt7d, target = d.sleepTargetHours;
  const totalMin = nights.reduce((a,x) => a+(x.hours-target), 0) * 60;
  const maxAbs = 1.5;
  let bars = '';
  nights.forEach(n => {
    const delta = n.hours - target;
    const pct = Math.min(Math.abs(delta)/maxAbs, 1) * 100;
    const surplus = delta >= 0;
    bars += '<div class="debtCol">'
      +'<div class="debtTrack"><div class="debtBaseline"></div>'
      +'<div class="'+(surplus?'debtBarSurplus':'debtBarDeficit')+'" style="height:'+pct+'%"></div>'
      +'</div><div class="debtDayLabel">'+esc(n.day)+'</div></div>';
  });
  return '<div class="debtCard">'
    +'<div class="cardHead"><span class="cardTitle">Sleep debt</span>'
    +'<span class="debtTotal" data-tone="'+(totalMin<0?'watch':'good')+'">'+formatDebt(Math.round(totalMin))+'<em> last '+nights.length+' nights</em></span>'
    +'</div>'
    +'<div class="debtBars">'+bars+'</div>'
    +'<div class="debtLegend">'
    +'<span><span class="legendDot" data-tone="good"></span>Surplus</span>'
    +'<span><span class="legendDot" data-tone="low"></span>Deficit</span>'
    +'</div></div>';
}

function coachHtml(d) {
  const tips = [];
  if (d.hrv!=null && d.hrvBaseline!=null && !d.hrvAnomalous) {
    const delta = Math.round(d.hrv - d.hrvBaseline);
    if (delta <= -5) tips.push({ strong:'Your HRV is '+Math.round(d.hrv)+'ms, '+Math.abs(delta)+'ms under your '+Math.round(d.hrvBaseline)+'ms baseline.', rest:' Aim for 8h sleep tonight and skip caffeine after 2pm. HRV usually rebounds inside 48h once the inputs reset.' });
    else if (delta >= 5) tips.push({ strong:'HRV is '+Math.round(d.hrv)+'ms, '+delta+'ms above baseline.', rest:' Strong recovery signal. This is a green-light day to push the hardest session.' });
  }
  if (d.strain!=null && d.strainWeeklyAvg!=null && d.strain>d.strainWeeklyAvg+2)
    tips.push({ strong:'Strain '+d.strain.toFixed(1)+' today, above your '+d.strainWeeklyAvg.toFixed(1)+' weekly avg.', rest:' One recovery day (Z2 only, target under 10 strain) lets HRV climb back without sacrificing the block.' });
  if (d.sleepDebt7d.length > 0) {
    const debtMin = d.sleepDebt7d.reduce((a,x)=>a+(x.hours-d.sleepTargetHours),0)*60;
    if (debtMin < -90) tips.push({ strong:'Sleep debt '+formatDebt(Math.round(debtMin))+' across the week.', rest:' Add 30 minutes tonight to stay ahead of the cognitive cost. The cheapest training intervention you can make is going to bed earlier.' });
  }
  if (d.recovery!=null && d.recovery<34)
    tips.unshift({ strong:'Recovery '+Math.round(d.recovery)+'%. Your ceiling is lower today.', rest:' Cut caffeine ~30% and skip a second hard session. Trying to brute-force a red day costs you tomorrow.' });
  else if (d.recovery!=null && d.recovery>=80)
    tips.unshift({ strong:'Recovery '+Math.round(d.recovery)+'%. Green light to push.', rest:' Stack the hardest training or cognitive session inside the peak window.' });
  if (!tips.length)
    tips.push({ strong:'Building your baseline.', rest:" Need 7+ days of valid readings before personalized coaching kicks in. You're at "+d.daysAvailable+' now.' });
  const lis = tips.slice(0,3).map(t =>
    '<li><span class="coachMark" aria-hidden>✦</span><div><strong>'+esc(t.strong)+'</strong><span>'+esc(t.rest)+'</span></div></li>'
  ).join('');
  return '<div class="coachCard"><div class="cardHead"><span class="cardTitle">How to improve today</span></div><ul class="coachList">'+lis+'</ul></div>';
}

function connectPanelHtml() {
  function appleFormHtml() {
    const a = appleData || {}, v = k => (a[k]!=null?a[k]:'');
    return '<p class="connectIntro">Add today's <em>recovery</em>, <em>sleep</em> &amp; <em>HRV</em> from Apple Health. They feed the same dashboard and supplement picks.</p>'
      +(appleData?'<p class="connectSub">Editing your saved Apple Watch readings.</p>':'')
      +'<div class="fieldGrid">'
      +'<div class="field"><label class="fieldLabel" for="a-rec">Recovery / readiness %</label><input id="a-rec" class="fieldInput" type="number" placeholder="—" value="'+esc(v('recovery'))+'" min="0" max="100" inputmode="numeric"/></div>'
      +'<div class="field"><label class="fieldLabel" for="a-sleep">Sleep (hours)</label><input id="a-sleep" class="fieldInput" type="number" placeholder="7.5" value="'+esc(v('sleepHours'))+'" min="0" max="24" step="0.1" inputmode="decimal"/></div>'
      +'<div class="field"><label class="fieldLabel" for="a-hrv">HRV (ms)</label><input id="a-hrv" class="fieldInput" type="number" placeholder="—" value="'+esc(v('hrv'))+'" min="0" max="300" inputmode="numeric"/></div>'
      +'<div class="field"><label class="fieldLabel" for="a-rhr">Resting HR (bpm)</label><input id="a-rhr" class="fieldInput" type="number" placeholder="—" value="'+esc(v('rhr'))+'" min="20" max="150" inputmode="numeric"/></div>'
      +'<div class="field"><label class="fieldLabel" for="a-strain">Strain (0–21, optional)</label><input id="a-strain" class="fieldInput" type="number" placeholder="—" value="'+esc(v('strain'))+'" min="0" max="21" step="0.1" inputmode="decimal"/></div>'
      +'<div class="field fieldFull"><label class="fieldLabel" for="a-target">Sleep target (hours)</label><input id="a-target" class="fieldInput" type="number" placeholder="8" value="'+esc(a.sleepTargetHours!=null?a.sleepTargetHours:8)+'" min="4" max="12" step="0.5" inputmode="decimal"/></div>'
      +'</div>'
      +'<p class="setupNote"><strong>Setup note:</strong> Apple Health has no web API — a browser can't read HealthKit directly. Open the Health app, copy today's numbers in here.</p>'
      +'<div class="formActions">'+(appleData?'<button type="button" class="btn btn-link" data-action="remove-apple">Remove</button>':'')
      +'<button type="button" class="btn btn-primary" data-action="save-apple">Save readings</button></div>';
  }
  function fitbitBodyHtml() {
    const cta = ON_SERVER
      ? '<a class="btn btn-primary" href="/api/fitbit/login">Connect Fitbit</a>'
        +'<p class="setupNote"><strong>Setup note:</strong> needs your Fitbit API keys set on the host. Then this is a real one-tap sign-in — sleep, HRV, resting HR &amp; bed/wake times sync automatically.</p>'
      : '<p class="setupNote"><strong>Setup note:</strong> live Fitbit sync runs on the deployed app (Vercel). Opened locally, use <strong>Apple Health</strong> to enter numbers by hand.</p>';
    return '<p class="connectIntro">Bring your <em>sleep</em>, <em>HRV</em>, and <em>resting HR</em> into Luca. One tap. Sign in with Fitbit, allow access, you're back here.</p>'
      +'<p class="connectSub">We never see your Fitbit password. You can disconnect anytime. Fitbit has no recovery score, so that ring stays blank.</p>'+cta;
  }
  function whoopBodyHtml() {
    const cta = ON_SERVER
      ? '<a class="btn btn-primary" href="/api/whoop/login">Connect Whoop</a>'
        +'<p class="setupNote"><strong>Setup note:</strong> needs your WHOOP API keys on the host. Then this is a real one-tap sign-in.</p>'
      : '<button type="button" class="btn btn-primary" data-action="connect">Preview with sample data</button>'
        +'<p class="setupNote"><strong>Setup note:</strong> live WHOOP sync runs on the deployed app. Tap to preview with sample numbers — these are <em>not</em> saved into the suite.</p>';
    return '<p class="connectIntro">Bring your <em>recovery</em>, <em>sleep</em>, and <em>strain</em> into Luca. One tap. Sign in with Whoop, allow access, you're back here.</p>'
      +'<p class="connectSub">We never see your Whoop password. You can disconnect anytime.</p>'+cta;
  }
  const body = connectSource === 'apple' ? appleFormHtml() : connectSource === 'fitbit' ? fitbitBodyHtml() : whoopBodyHtml();
  return '<div class="connectNotice"><div class="connectPanel">'+body+'</div></div>';
}

function render() {
  let d = null, kind = null;
  if (liveData) { d = liveData; kind = 'whoop-live'; }
  else if (fitbitData) { d = fitbitData; kind = 'fitbit-live'; }
  else if (appleData && !editingApple) { d = buildLiveData(appleData); kind = 'apple'; }
  else if (!ON_SERVER && connected) { d = SAMPLE; kind = 'sample'; }
  activeKind = kind;

  if (kind === 'whoop-live') publishWhoopData(liveData);
  else if (kind === 'fitbit-live') publishFitbitData(fitbitData);

  renderRingPanel(d);
  renderSrcPills();
  renderSideActions(d, kind);

  const main = document.getElementById('mainInner');
  if (d && (kind !== 'apple' || !editingApple)) {
    main.innerHTML =
      tickerHtml(d)
      + trendHtml(d)
      + statGridHtml(d)
      + '<div class="bottomRow">'
      + (d.sleepDebt7d.length ? sleepDebtHtml(d) : '<div></div>')
      + coachHtml(d)
      + '</div>';
  } else {
    main.innerHTML = connectPanelHtml();
  }
}

/* ================================================================
 * EVENTS
 * ================================================================ */
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  if (action === 'theme') { applyTheme(btn.getAttribute('data-theme')); return; }
  if (action === 'src-tab') {
    connectSource = btn.getAttribute('data-src');
    if (connectSource !== 'apple') editingApple = false;
    render(); return;
  }
  if (action === 'save-apple') { saveAppleEntry(); return; }
  if (action === 'edit-apple') { editingApple = true; connectSource = 'apple'; render(); return; }
  if (action === 'remove-apple') {
    if (confirm('Remove your Apple Health readings from the suite?')) { clearApple(); editingApple = false; render(); }
    return;
  }
  if (action === 'connect') { connected = true; try { localStorage.setItem(LS_KEY, '1'); } catch {} render(); return; }
  if (action === 'disconnect') {
    if (activeKind === 'fitbit-live') {
      fetch('/api/fitbit/logout').catch(()=>{}).then(()=>{ fitbitConnected=false; fitbitData=null; clearFitbitData(); render(); });
    } else if (activeKind === 'whoop-live' || ON_SERVER) {
      fetch('/api/whoop/logout').catch(()=>{}).then(()=>{ liveConnected=false; liveData=null; clearWhoopData(); render(); });
    } else if (confirm('Disconnect preview?')) {
      connected = false; try { localStorage.setItem(LS_KEY, '0'); } catch {} render();
    }
    return;
  }
  if (action === 'sync') {
    if (activeKind === 'fitbit-live') { syncFitbitLive(); }
    else if (ON_SERVER) { syncWhoopLive(); }
    else { syncing=true; render(); setTimeout(()=>{ syncing=false; render(); }, 900); }
    return;
  }
});

/* ================================================================
 * BOOT
 * ================================================================ */
loadApple();
renderThemePills();
applyTheme(currentTheme);

(function bootLive() {
  if (!ON_SERVER) return;
  try {
    const q = new URLSearchParams(location.search);
    const w = q.get('whoop'), f = q.get('fitbit');
    if (w || f) {
      history.replaceState(null, '', location.pathname);
      if (w === 'error' || w === 'denied') alert('Whoop connection didn't complete.');
      if (f === 'error' || f === 'denied') alert('Fitbit connection didn't complete.');
      if (f === 'connected') connectSource = 'fitbit';
    }
  } catch {}
  syncWhoopLive();
  syncFitbitLive();
})();
</script>
